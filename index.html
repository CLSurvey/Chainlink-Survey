    mk("Close","",()=>{close();_selPolyline=-1;plotPoints();});
  });
}

/* ── STATIONING ALONG A POLYLINE (alignment) ──────────────────── */
// Resolve segment i of a polyline into measurable geometry.
function _plSegGeom(pl,i){
  const P=pl.verts[i], Q=pl.verts[i+1], s=pl.segs[i];
  if(!P||!Q||!s)return null;
  if(s.type==="arc"){
    const bP=_plBearing(s.centerE,s.centerN,P.E,P.N);
    const bQ=_plBearing(s.centerE,s.centerN,Q.E,Q.N);
    const sweep=_arcSweep(bP,bQ,s.dir); // math-space rad, − = CW
    return {type:"arc",P,Q,centerE:s.centerE,centerN:s.centerN,R:s.R,dir:s.dir,
            bP,bQ,sweep,len:Math.abs(sweep)*s.R};
  }
  return {type:"line",P,Q,len:Math.hypot(Q.E-P.E,Q.N-P.N)};
}
function _plTotalLen(pl){
  let L=0;
  for(let i=0;i<pl.segs.length;i++){const g=_plSegGeom(pl,i); if(g)L+=g.len;}
  return L;
}
// Station display: ft → 1+00 per 100; m → 1+000 per 1000.
function _fmtSta(d){
  const base=units==="ft"?100:1000, pad=units==="ft"?2:3;
  const neg=d<0; d=Math.abs(d);
  const big=Math.floor(d/base), rest=d-big*base;
  return (neg?"-":"")+big+"+"+String(Math.floor(rest)).padStart(pad,"0")+
         (rest%1).toFixed(2).slice(1);
}
function _parseSta(str){
  if(str==null)return NaN;
  const s=String(str).trim();
  if(s.includes("+")){
    const base=units==="ft"?100:1000;
    const parts=s.split("+");
    const big=parseFloat(parts[0]), rest=parseFloat(parts[1]);
    if(isNaN(big)||isNaN(rest))return NaN;
    return big*base+rest;
  }
  return parseFloat(s);
}
// Station/offset of a world point. Offset sign: + = right of travel.
// Considers every segment whose perpendicular foot falls on it; best = min |offset|.
function _plStaOffOfPoint(pl,E0,N0){
  let best=null, cum=0;
  for(let i=0;i<pl.segs.length;i++){
    const g=_plSegGeom(pl,i); if(!g){continue}
    if(g.type==="line"){
      const az=Math.atan2(g.Q.E-g.P.E,g.Q.N-g.P.N);
      const vE=E0-g.P.E, vN=N0-g.P.N;
      const along=vE*Math.sin(az)+vN*Math.cos(az);
      const off  =vE*Math.cos(az)-vN*Math.sin(az); // + = right of travel
      if(along>=-1e-9 && along<=g.len+1e-9){
        if(!best||Math.abs(off)<Math.abs(best.off))
          best={sta:cum+Math.max(0,Math.min(g.len,along)),off,seg:i};
      }
    } else {
      const r0=Math.hypot(E0-g.centerE,N0-g.centerN);
      if(r0>1e-12){
        // angular position along travel from the start of the arc
        const b0=_plBearing(g.centerE,g.centerN,E0,N0);
        const a0=(90-b0)*Math.PI/180, aP=(90-g.bP)*Math.PI/180;
        const TAU=2*Math.PI;
        let dd=g.sweep>0?((a0-aP)%TAU+TAU)%TAU:((aP-a0)%TAU+TAU)%TAU;
        if(dd<=Math.abs(g.sweep)+1e-9){
          // +off = RIGHT of travel: CW arc → inward, CCW arc → outward
          const off=g.dir==="cw"?(g.R-r0):(r0-g.R);
          if(!best||Math.abs(off)<Math.abs(best.off))
            best={sta:cum+Math.min(dd,Math.abs(g.sweep))*g.R,off,seg:i};
        }
      }
    }
    cum+=g.len;
  }
  return best; // null → point is beyond the alignment's perpendicular coverage
}
// Coordinates (and forward azimuth) at a station + signed offset.
function _plPointAtStaOff(pl,sta,off){
  if(sta<-1e-9)return null;
  let cum=0;
  for(let i=0;i<pl.segs.length;i++){
    const g=_plSegGeom(pl,i); if(!g)continue;
    if(sta<=cum+g.len+1e-9){
      const along=Math.max(0,sta-cum);
      if(g.type==="line"){
        const az=Math.atan2(g.Q.E-g.P.E,g.Q.N-g.P.N);
        const E=g.P.E+along*Math.sin(az)+off*Math.cos(az);
        const N=g.P.N+along*Math.cos(az)-off*Math.sin(az);
        return {E,N,az:((az*180/Math.PI)+360)%360};
      }
      // arc: walk the sweep, then offset radially.
      // +off = RIGHT of travel: CW arc → inward (−R), CCW arc → outward (+R)
      const aP=(90-g.bP)*Math.PI/180;
      const a=aP+(g.sweep>0?1:-1)*(along/g.R);
      const r=g.R+(g.dir==="cw"?-off:off);
      if(r<=0)return null;
      const E=g.centerE+r*Math.cos(a), N=g.centerN+r*Math.sin(a);
      // forward tangent azimuth at this station
      const radialBrg=((90-a*180/Math.PI)+360)%360;
      const tanAz=((radialBrg+(g.dir==="cw"?-90:90))+360)%360;
      return {E,N,az:tanAz};
    }
    cum+=g.len;
  }
  return null; // beyond the end
}
function _plStaOffQuery(pl){
  if(!requirePro("Polyline stationing")) return;
  _pickPoint("Tap the point to station against "+pl.name,pt=>{
    const r=_plStaOffOfPoint(pl,pt.Easting,pt.Northing);
    if(!r){alert("Point #"+pt.Point+" doesn't project onto "+pl.name+" — it's beyond the alignment ends.");_selPolyline=-1;plotPoints();return}
    showResult("Sta/Offset — #"+pt.Point+" on "+pl.name,[
      {lbl:"Station:",val:_fmtSta(r.sta)},
      {lbl:"Sta (dist):",val:r.sta.toFixed(3)+" "+units},
      {lbl:"Offset:",val:Math.abs(r.off).toFixed(3)+" "+units+" "+(r.off>=0?"RIGHT":"LEFT")},
      {lbl:"Segment:",val:String(r.seg+1)+" of "+pl.segs.length},
    ],[
      {txt:"Another Point",cls:"ok",fn:()=>_plStaOffQuery(pl)},
      {txt:"Done",cls:"",fn:()=>{_selPolyline=-1;plotPoints();}},
    ]);
  });
}
function _plSetPointAtSta(pl){
  if(!requirePro("Polyline stationing")) return;
  const totLen=_plTotalLen(pl);
  calculatorInput("Station along "+pl.name+" (0 to "+totLen.toFixed(3)+" "+units+", shown as "+_fmtSta(totLen)+"):","",staStr=>{
    if(staStr===null||staStr===""){_selPolyline=-1;plotPoints();return;}
    const sta=parseFloat(staStr);
    if(isNaN(sta)){alert("Enter a station distance.");_selPolyline=-1;plotPoints();return}
    if(sta<0||sta>totLen+1e-6){alert("Station outside alignment (0 to "+_fmtSta(totLen)+").");_selPolyline=-1;plotPoints();return}
    calculatorInput("Offset: + RIGHT, \u2212 LEFT ("+units+"):","0",offStr=>{
      if(offStr===null){_selPolyline=-1;plotPoints();return;}
      const off=parseFloat(offStr)||0;
      const r=_plPointAtStaOff(pl,sta,off);
      if(!r){alert("Offset collapses an arc at that station — reduce it.");return}
      showResult("Point at "+_fmtSta(sta)+(off!==0?(" / "+Math.abs(off).toFixed(3)+(off>=0?" R":" L")):"")+" — "+pl.name,[
        {lbl:"Northing:",val:r.N.toFixed(4)},
        {lbl:"Easting:",val:r.E.toFixed(4)},
        {lbl:"Fwd Tangent:",val:fmtBrg(r.az)},
      ],[
        {txt:"Save as Point",cls:"ok",fn:()=>_saveCogoPoint({Northing:r.N,Easting:r.E,Elevation:0},null,null,
          "STA "+_fmtSta(sta)+(off!==0?(off>=0?" R":" L")+Math.abs(off).toFixed(2):""))},
        {txt:"Another Station",cls:"blue",fn:()=>_plSetPointAtSta(pl)},
        {txt:"Done",cls:"",fn:()=>{_selPolyline=-1;plotPoints();}},
      ]);
    });
  });
}

// Ungroup: drop the polyline grouping; underlying points/lines/arcs stay put
function _breakPolyline(plIdx){
  _polylines.splice(plIdx,1);
  _selPolyline=-1; saveData(); plotPoints();
  showResult("\u2713 Polyline Broken",[
    {lbl:"Result:",val:"Ungrouped \u2014 segments remain as individual geometry"},
  ]);
}


function _offsetPolyline(pl,plIdx){
  if(!requirePro("Polyline offset")) return;
  if(!pl.verts||!pl.segs||pl.segs.length===0){alert("This polyline has no geometry to offset.");return;}
  calculatorInput("Offset dist: +RIGHT, \u2212LEFT ("+units+"):","0",od=>{
    if(!od){_selPolyline=-1;plotPoints();return;}
    const d=parseFloat(od); if(isNaN(d)||d===0){alert("Enter a non-zero offset.");_selPolyline=-1;plotPoints();return;}
    _takeSnapshot("Offset Polyline");

    // 1. Offset each segment independently (parametric form)
    const seg=[];
    for(let i=0;i<pl.segs.length;i++){
      const P=pl.verts[i], Q=pl.verts[i+1], s=pl.segs[i];
      if(!P||!Q)continue;
      if(s.type==="arc"){
        const newR = s.dir==="cw"? s.R+d : s.R-d; // +d = right of travel
        if(newR<=0){alert("Offset collapses an arc (radius \u2264 0). Reduce the distance.");_selPolyline=-1;plotPoints();return;}
        const bP=_plBearing(s.centerE,s.centerN,P.E,P.N);
        const bQ=_plBearing(s.centerE,s.centerN,Q.E,Q.N);
        const a=_plArcPt(s.centerE,s.centerN,newR,bP);
        const b=_plArcPt(s.centerE,s.centerN,newR,bQ);
        seg.push({kind:"arc",aE:a.E,aN:a.N,bE:b.E,bN:b.N,centerE:s.centerE,centerN:s.centerN,R:newR,dir:s.dir});
      } else {
        const az=Math.atan2(Q.E-P.E,Q.N-P.N);   // survey azimuth (rad)
        const pr=az+Math.PI/2;                   // perpendicular, right of travel
        const oE=d*Math.sin(pr), oN=d*Math.cos(pr);
        seg.push({kind:"line",aE:P.E+oE,aN:P.N+oN,bE:Q.E+oE,bN:Q.N+oN});
      }
    }
    if(seg.length===0){alert("Nothing to offset.");return;}

    // 2. Miter consecutive offset segments at their intersection
    for(let i=0;i<seg.length-1;i++){
      const c1=seg[i], c2=seg[i+1];
      const jx=c1.bE, jy=c1.bN; // joint corner (pre-miter offset endpoint)
      let ix=null, iy=null;
      if(c1.kind==="line"&&c2.kind==="line"){
        const d1E=c1.bE-c1.aE, d1N=c1.bN-c1.aN;
        const d2E=c2.bE-c2.aE, d2N=c2.bN-c2.aN;
        const den=d1E*d2N-d1N*d2E;
        if(Math.abs(den)<1e-10) continue; // parallel — leave butt joint
        const t=((c2.aE-c1.aE)*d2N-(c2.aN-c1.aN)*d2E)/den;
        ix=c1.aE+t*d1E; iy=c1.aN+t*d1N;
      } else if(c1.kind==="line"&&c2.kind==="arc"){
        const best=_nearest(_lineCircle(c1.aE,c1.aN,c1.bE,c1.bN,c2.centerE,c2.centerN,c2.R),jx,jy);
        if(!best)continue; ix=best[0]; iy=best[1];
      } else if(c1.kind==="arc"&&c2.kind==="line"){
        const best=_nearest(_lineCircle(c2.aE,c2.aN,c2.bE,c2.bN,c1.centerE,c1.centerN,c1.R),jx,jy);
        if(!best)continue; ix=best[0]; iy=best[1];
      } else {
        const best=_nearest(_circleCircle(c1.centerE,c1.centerN,c1.R,c2.centerE,c2.centerN,c2.R),jx,jy);
        if(!best)continue; ix=best[0]; iy=best[1];
      }
      if(ix===null)continue;
      c1.bE=ix; c1.bN=iy; c2.aE=ix; c2.aN=iy; // shared joint
    }

    // 3. Materialize → new points + connections + a new polyline
    const ptNum=(E,N)=>{
      let n=pointCounter; while(_ptExists(n))n++;
      points.push({Point:n,Northing:N,Easting:E,Elevation:0,Type:"COGO",Flag:"",Description:"OFS"});
      pointCounter=n+1; return n;
    };
    const vCoord=[{E:seg[0].aE,N:seg[0].aN}];
    for(let i=0;i<seg.length;i++) vCoord.push({E:seg[i].bE,N:seg[i].bN});
    const vNums=vCoord.map(c=>ptNum(c.E,c.N));

    const newSegs=[];
    for(let i=0;i<seg.length;i++){
      const s=seg[i], from=vNums[i], to=vNums[i+1];
      if(s.kind==="arc"){
        const sB=_plBearing(s.centerE,s.centerN,s.aE,s.aN);
        const eB=_plBearing(s.centerE,s.centerN,s.bE,s.bN);
        plotConnections.push(_buildArcConn(s.centerE,s.centerN,s.R,sB,eB,s.dir,"solid"));
        newSegs.push({type:"arc",centerE:s.centerE,centerN:s.centerN,R:s.R,dir:s.dir});
      } else {
        plotConnections.push({from,to,style:"solid"});
        newSegs.push({type:"line"});
      }
    }

    _polylines.push({name:pl.name+"-OFS",verts:vCoord,segs:newSegs});
    _selPolyline=-1; // clear selection so source polyline + vertex rings clear
    saveData(); plotPoints();
    showResult("\u2713 Polyline Offset",[
      {lbl:"New polyline:",val:pl.name+"-OFS"},
      {lbl:"Segments:",val:String(newSegs.length)},
      {lbl:"Offset:",val:Math.abs(d).toFixed(3)+" "+units+" "+(d>=0?"Right":"Left")},
    ]);
  });
}

// ── Geometry helpers for offset joins (return [[E,N],...] solutions) ──────────
function _lineCircle(aE,aN,bE,bN,cE,cN,R){
  const dE=bE-aE, dN=bN-aN;
  const fx=aE-cE, fy=aN-cN;
  const A=dE*dE+dN*dN, B=2*(fx*dE+fy*dN), C=fx*fx+fy*fy-R*R;
  if(A<1e-12)return [];
  const disc=B*B-4*A*C; if(disc<0)return [];
  const sq=Math.sqrt(disc);
  const t1=(-B-sq)/(2*A), t2=(-B+sq)/(2*A);
  return [[aE+t1*dE,aN+t1*dN],[aE+t2*dE,aN+t2*dN]];
}
function _circleCircle(c1E,c1N,R1,c2E,c2N,R2){
  const dx=c2E-c1E, dy=c2N-c1N, dd=Math.hypot(dx,dy);
  if(dd<1e-9||dd>R1+R2||dd<Math.abs(R1-R2))return [];
  const a=(R1*R1-R2*R2+dd*dd)/(2*dd);
  const h=Math.sqrt(Math.max(0,R1*R1-a*a));
  const mx=c1E+a*dx/dd, my=c1N+a*dy/dd;
  return [[mx+h*dy/dd,my-h*dx/dd],[mx-h*dy/dd,my+h*dx/dd]];
}
function _nearest(sols,x,y){
  if(!sols||sols.length===0)return null;
  return sols.slice().sort((p,q)=>Math.hypot(p[0]-x,p[1]-y)-Math.hypot(q[0]-x,q[1]-y))[0];
}

function _computePPM(T_C, P_hPa){
  return 281.77 - (79.661 * P_hPa) / (273.15 + T_C);
}

function _applyPPM(dist){
  let d=dist;
  if(_ppmEnabled && _ppmValue!==0) d*=(1 + _ppmValue / 1e6);
  // Grid/ground combined scale factor — ground measurement → grid distance
  if(combinedScaleFactor && combinedScaleFactor!==1) d*=combinedScaleFactor;
  return d;
}

function setKnownStation(){
  if(!currentPoint){alert("Occupy a point first.");return}
  const occ=currentPoint;
  const isStart=occ.Point===points[0].Point;
  const defN=occ.Northing.toFixed(4), defE=occ.Easting.toFixed(4), defZ=occ.Elevation.toFixed(4);
  const seq=[["Northing",defN],["Easting",defE],["Elevation",defZ]];
  const vals=[];let i=0;
  const step=()=>{
    if(i>=seq.length){
      const N=parseFloat(vals[0]), E=parseFloat(vals[1]), Z=parseFloat(vals[2]);
      if(isNaN(N)||isNaN(E)){alert("Invalid coordinates.");return}
      _takeSnapshot("Set Station Coords");
      if(isStart){
        // Point 1 — update in place (original behavior)
        occ.Northing=N; occ.Easting=E; occ.Elevation=Z;
        currentPoint=occ;
        saveData(); updateStatus(); plotPoints();
        showResult("✓ Station Coords Set",[
          {lbl:"Point:",    val:"#"+occ.Point},
          {lbl:"Northing:", val:N.toFixed(4)},
          {lbl:"Easting:",  val:E.toFixed(4)},
          {lbl:"Elevation:",val:Z.toFixed(4)},
        ]);
      } else {
        // Not point 1 — create a new point and occupy it
        const newPt={
          Point:pointCounter++,
          Northing:N, Easting:E, Elevation:Z,
          Type:"Setup", Description:"STA",
          Flag:"", ih:occ.ih||0
        };
        points.push(newPt);
        currentPoint=newPt;
        saveData(); updateStatus(); plotPoints();
        showResult("✓ New Station Created",[
          {lbl:"New Point:", val:"#"+newPt.Point},
          {lbl:"Northing:",  val:N.toFixed(4)},
          {lbl:"Easting:",   val:E.toFixed(4)},
          {lbl:"Elevation:", val:Z.toFixed(4)},
          {lbl:"Now occupied:", val:"#"+newPt.Point},
        ]);
      }
      return;
    }
    calculatorInput(seq[i][0]+":",seq[i][1],v=>{if(v===null)return;vals.push(v);i++;step()});
  }; step();
}

function takeShot(){
  if(!currentPoint){alert("Occupy a point first.");return}

  // First 3D shot this session — show distance mode notice
  if(surveyMode==="3D" && !_3dModeNoticeShown &&
     points.filter(p=>p.Type==="Shot"&&p.SlopeDist).length===0){

function _doTakeShot(){
  if(!currentPoint){return}
  // In 3D mode, if HI has never been set for this occupation, ask now
  if(surveyMode==="3D" && !currentPoint._hiSet){
    calculatorInput("Set Instrument Height HI for Pt #"+currentPoint.Point+" ("+units+"):",
      currentPoint.ih>0?currentPoint.ih.toFixed(3):"0.000", hiVal=>{
      if(hiVal===null)return;
      currentPoint.ih = parseFloat(hiVal)||0;
      currentPoint._hiSet = true;
      saveData();
      const _lastDesc=recentShots.length?recentShots[recentShots.length-1].desc:"";
      _shotForm(_lastDesc);
    });
  } else {
    const _lastDesc=recentShots.length?recentShots[recentShots.length-1].desc:"";
    _shotForm(_lastDesc);
  }
}

        pill.style.cssText="display:flex;gap:4px;margin-bottom:4px";
        ["Azimuth","Quadrant"].forEach(label=>{
          const isActive=(label==="Azimuth"&&bearingMode==="az")||(label==="Quadrant"&&bearingMode==="quad");
          const b=document.createElement("button");
          b.textContent=label;
          b.style.cssText="flex:1;padding:6px 4px;border-radius:var(--radius);font-family:var(--font-ui);font-size:.72em;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .15s;border:1px solid "+(isActive?"var(--accent2)":"var(--border)")+";color:"+(isActive?"var(--accent2)":"var(--muted)")+";background:"+(isActive?"var(--accent2-lo)":"var(--surface2)");
          b.onclick=()=>{
            const newMode=label==="Azimuth"?"az":"quad";
            if(newMode===bearingMode) return;
            // Cross-convert the az field value into the new format
            const curDec = bearingMode==="quad" && fields._azDec!=null && !isNaN(fields._azDec)
              ? fields._azDec : parseDMS(fields.az);
            bearingMode=newMode;
            if(!isNaN(curDec)){
              fields._azDec=((curDec%360)+360)%360;
              fields.az=fmtBrg(fields._azDec);
            } else {
              fields._azDec=NaN; fields.az="";
            }
            _lsSet("cl_bearingMode",bearingMode);
            // Don't change activeField — just re-render the whole form in the new mode
            render();
          };
          pill.appendChild(b);
        });
        form.appendChild(pill);
      }

      // ── Numpad (numeric fields) or Alpha (desc) or Quad bearing (az in quad mode) ──
      if(activeField==="desc"){
        // Alpha keyboard
        const alpha = document.createElement("div"); alpha.className="sf-alpha";
        [..."ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 -,./"].forEach(k=>{
          const b=document.createElement("button"); b.textContent=k===" "?"SPC":k;
          b.onclick=()=>{fields.desc+=(k===" "?" ":k);renderDescOnly()};
          alpha.appendChild(b);
        });
        const bkb=document.createElement("button");bkb.textContent="⌫";bkb.className="sa-wide2";
        bkb.onclick=()=>{fields.desc=fields.desc.slice(0,-1);renderDescOnly()};alpha.appendChild(bkb);
        const clb=document.createElement("button");clb.textContent="CLR";clb.className="sa-wide2";
        clb.onclick=()=>{fields.desc="";renderDescOnly()};alpha.appendChild(clb);
        const okb=document.createElement("button");okb.textContent="✓ Done";okb.className="sa-wide3";
        okb.style.cssText="border-color:var(--ok);color:var(--ok)";
        okb.onclick=()=>{activeField="az";render()};alpha.appendChild(okb);
        form.appendChild(alpha);
      } else if(activeField==="az" && bearingMode==="quad"){
        // Quadrant bearing keyboard
        const qwrap=document.createElement("div");
        _buildQuadKeyboard(qwrap, (azDec, previewStr)=>{
          fields._azDec = azDec;
          fields.az = isNaN(azDec) ? "—" : previewStr;
          const azDisp = modal.querySelector(".sf-val.active");
          if(azDisp) azDisp.textContent = fields.az;
        });
        // Store button appended after quad keyboard
        const storeBtn2=document.createElement("button");
        storeBtn2.textContent="✓ STORE SHOT"; storeBtn2.className="np-ok";
        storeBtn2.style.cssText="width:100%;margin-top:6px;padding:13px;border-color:var(--ok);color:#fff;background:linear-gradient(180deg,rgba(104,168,74,.35) 0%,rgba(104,168,74,.2) 100%);border-radius:var(--radius);font-family:var(--font-ui);font-size:.88em;font-weight:700;letter-spacing:.06em;border:1px solid var(--ok);cursor:pointer;box-shadow:0 0 8px rgba(104,168,74,.3)";
        storeBtn2.onclick=()=>{ close(); (onStore||_processShot)(fields, is3D, ih, occ); };
        qwrap.appendChild(storeBtn2);
        form.appendChild(qwrap);
      } else {
        // Standard Numpad
        const np = document.createElement("div"); np.className="sf-numpad";
        const appendDigit = d => {
          if(freshFields.has(activeField)){
            fields[activeField] = d;
            freshFields.delete(activeField);
          } else {
            fields[activeField] += d;
          }
          renderActiveVal();
        };
        ["7","8","9","⌫","4","5","6","+/-","1","2","3","CLR","0","."].forEach(k=>{
          const b=document.createElement("button");
          b.textContent=k;
          if(k==="CLR") b.className="np-clr";
          else if(k==="⌫") b.className="np-back";
          else if(k==="+/-") b.className="np-neg";
          b.onclick=()=>{
            if(k==="CLR"){
              fields[activeField]="";
              freshFields.delete(activeField);
              renderActiveVal();
            } else if(k==="⌫"){
              freshFields.delete(activeField);
              fields[activeField]=fields[activeField].slice(0,-1)||"";
              renderActiveVal();
            } else if(k==="+/-"){
              freshFields.delete(activeField);
              let _mf=fields[activeField];
              if(_mf.startsWith("-")){fields[activeField]=_mf.slice(1);}
              else{fields[activeField]="-"+(_mf==="0"||_mf===""?"":_mf);}
              fields[activeField]=fields[activeField].replace(/^(-?)0+(\d)/,"$1$2");
              renderActiveVal();
            } else appendDigit(k);
          };
          np.appendChild(b);
        });
        const storeBtn = document.createElement("button");
        storeBtn.textContent="✓ STORE SHOT"; storeBtn.className="np-ok";
        storeBtn.onclick=()=>{ close(); (onStore||_processShot)(fields, is3D, ih, occ); };
        np.appendChild(storeBtn);
        form.appendChild(np);
      }

      modal.appendChild(form);

      // Cancel
      const can=document.createElement("button");can.className="btn";can.textContent="Cancel";
      can.style.marginTop="6px"; can.onclick=close; modal.appendChild(can);
    }

    // Lightweight re-render helpers that avoid full re-render on every keypress
    function renderActiveVal(){
      const v = modal.querySelector(".sf-val.active");
      if(v) v.textContent = fields[activeField]||"—";
      // Keep fields.ih in sync with currentPoint.ih (set via _changeIH)
      fields.ih = (occ.ih||0).toFixed(3);
    }
    function renderDescOnly(){
      const descEl = modal.querySelector(".sf-val.sf-desc");
      if(descEl){
        descEl.textContent = fields.desc||"tap to enter";
        descEl.style.color = fields.desc?"var(--text)":"var(--muted)";
      }
    }

    render();
  });
}

function _changeIH(){
  // Called from shot form header — change IH for current occupation without closing form
  calculatorInput(`Instrument Height IH (${units}):`, (currentPoint.ih||0).toFixed(3), val=>{
    if(val===null) return;
    const newIH = parseFloat(val);
    if(isNaN(newIH)||newIH<0){ alert("Invalid IH"); return; }
    _takeSnapshot("Change HI"); currentPoint.ih = newIH;
    currentPoint._hiSet = true;
    saveData();
    // Re-render any open shot form by closing and reopening
    closeAllModals();
    _shotForm();
  });
}

function _processShot(fields, is3D, ih, occ){
  const ptNum = parseInt(fields.pt);
  if(isNaN(ptNum)||ptNum<1){alert("Bad point number.");takeShot();return}
  if(_ptExists(ptNum)){alert(`Point #${ptNum} already exists.`);takeShot();return}

  const rawAz = bearingMode==="quad" && fields._azDec!=null ? fields._azDec : parseBrg(fields.az);
  if(isNaN(rawAz)){alert(bearingMode==="quad"?"Enter a bearing (N/S + degrees + E/W).":"Bad azimuth — use DDD.MMSS format.");takeShot();return}
  const trueAz = ((rawAz % 360) + 360) % 360; // no orientation offset — user enters true azimuth

  let distVal = parseFloat(fields.dist);
  if(isNaN(distVal)||distVal<=0){alert("Bad distance.");takeShot();return}
  // Apply prism constant to raw measurement
  distVal += prismConstant;
  distVal = _applyPPM(distVal); // atmospheric PPM correction

  let E,N,Z,hd;
  if(is3D){
    const za = parseDMS(fields.va);
    if(isNaN(za)||za<0||za>180){alert("Bad zenith angle — 90=level, <90=uphill, >90=downhill.");takeShot();return}
    const th = parseFloat(fields.th)||0;
    const ihUsed = parseFloat(fields.ih)||0;
    occ._lastTH = th;
    _lastTHValue = th; // persist across shots
    occ.ih = ihUsed;
    if(distMode==="HD"){
      // User entered horizontal distance — derive SD from HD and ZA for storage
      // HD = SD × sin(ZA) → SD = HD / sin(ZA)
      const zaRad=za*Math.PI/180;
      const sd=Math.abs(Math.sin(zaRad))>0.0001 ? distVal/Math.sin(zaRad) : distVal;
      ({E,N,Z,hd} = computeShot3D(occ,trueAz,sd,za,ihUsed,th));
      fields._sdDerived=sd; // store for raw record
    } else {
      ({E,N,Z,hd} = computeShot3D(occ,trueAz,distVal,za,ihUsed,th));
    }
  } else {
    ({E,N,Z,hd} = computeShot2D(occ,trueAz,distVal));
  }

  // Apply lateral and vertical offsets
  const latOff  = parseFloat(fields.offLat)  || 0;
  const vertOff = parseFloat(fields.offVert) || 0;
  if(latOff !== 0){
    // Lateral offset: perpendicular to shot azimuth
    // +right = az+90°, -left = az-90°
    const perpAz = (trueAz + (latOff>=0?90:-90) + 360) % 360;
    const absOff = Math.abs(latOff);
    E += absOff * Math.sin(perpAz*Math.PI/180);
    N += absOff * Math.cos(perpAz*Math.PI/180);
  }
  if(vertOff !== 0){
    Z += vertOff;
  }

  const p={
    Point:ptNum,Northing:N,Easting:E,Elevation:Z,Type:"Shot",Flag:"",
    From:occ.Point,
    InstReading:fields.az,   // raw instrument reading (before orientation)
    RawAz:toDMS(rawAz),
    TrueAz:toDMS(trueAz),
    HorizDist:hd,
    Description:fields.desc,
    ...(latOff!==0||vertOff!==0?{LatOffset:latOff,VertOffset:vertOff}:{}),
    ...(is3D?{SlopeDist:fields._sdDerived||distVal,ZenithAngle:fields.va,
               IH:parseFloat(fields.ih)||0,
               TH:parseFloat(fields.th)||0}:{})
  };

  _takeSnapshot("Shot Pt #"+ptNum);
  points.push(p);
  pointCounter = Math.max(pointCounter, ptNum+1);
  undoStack.push(p); // legacy
  if(fields.line!=="none") plotConnections.push({from:occ.Point,to:ptNum,style:fields.line});
  recentShots.push({pt:ptNum,desc:fields.desc,hd:hd.toFixed(2)});
  saveData();
  if(navigator.vibrate) navigator.vibrate(30);

  const resultRows = [
    {lbl:"N:", val:N.toFixed(3)},{lbl:"E:",val:E.toFixed(3)},
    ...(is3D?[{lbl:"Z:",val:Z.toFixed(3)}]:[]),
    {lbl:"HD:",val:hd.toFixed(3)+" "+units},
    {lbl:"Az:",val:fmtBrg(trueAz)},
    ...(latOff!==0?[{lbl:"Lat Off:",val:(latOff>0?"R ":"L ")+Math.abs(latOff).toFixed(3)+" "+units}]:[]),
    ...(vertOff!==0?[{lbl:"Vert Off:",val:(vertOff>0?"U ":"D ")+Math.abs(vertOff).toFixed(3)+" "+units}]:[]),
    {lbl:"Desc:",val:fields.desc||"—"},
  ];
  showResult(`✓ Shot #${ptNum}`, resultRows,[
    {txt:"▶ Next Shot",           cls:"ok",  fn:()=>{ pointCounter=ptNum+1; takeShot(); }},
    {txt:`⬛ Occupy #${ptNum}`,   cls:"blue", fn:()=>{ currentPoint=p; updateStatus(); takeShot(); }},
    {txt:"↩ Undo",                cls:"danger",fn:undo},
  ]);
}

// Bring F2 azimuth to same face as F1 — handles both plunged (+180) and auto-corrected instruments
function _f2AzCorr(az1, az2){
  const withSub = ((az2-180)+360)%360;
  const withoutSub = az2;
  const d1 = Math.min(Math.abs(withSub-az1), 360-Math.abs(withSub-az1));
  const d2 = Math.min(Math.abs(withoutSub-az1), 360-Math.abs(withoutSub-az1));
  return d1 <= d2 ? withSub : withoutSub;
}

// Circular mean of two bearings
function _circMean(a1, a2){
  const x=Math.cos(a1*Math.PI/180)+Math.cos(a2*Math.PI/180);
  const y=Math.sin(a1*Math.PI/180)+Math.sin(a2*Math.PI/180);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function twoFaceShot(){
  if(!currentPoint){alert("Occupy a point first.");return}
  const occ=currentPoint;
  const is3D=surveyMode==="3D";
  openModal((modal,close)=>{
    modal.innerHTML="<h2>\u21c4 Two-Face Shot</h2>"+
      "<p class='info'>Take Face 1 (direct) using the normal shot form, then plunge 180\u00b0 on both axes, re-sight the target, and take Face 2 (reverse). The two observations are averaged into one point, cancelling collimation"+(is3D?" and vertical index":"")+" error.</p>"+
      "<div class='result-box'><span class='lbl'>Occupied:</span> <span class='val'>#"+occ.Point+(occ.Description?" \u2014 "+occ.Description:"")+"</span></div>";
    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
    mk("Start Face 1 \u2192","ok",()=>{close();_twoFaceCapture(occ,is3D);});
    mk("Cancel","",close);
  });
}

// Parse one face's shot-form fields into corrected observation values.
// Returns null if any required reading is missing/invalid.
function _twoFaceParse(fields,is3D){
  const azRaw=(bearingMode==="quad" && fields._azDec!=null && !isNaN(fields._azDec))
    ? fields._azDec : parseBrg(fields.az);
  if(isNaN(azRaw)) return null;
  const az=((azRaw%360)+360)%360;
  let dist=parseFloat(fields.dist);
  if(isNaN(dist)||dist<=0) return null;
  dist=_applyPPM(dist+prismConstant);          // same corrections as a normal shot
  if(!is3D) return {az, hd:dist};
  const va=parseDMS(fields.va);
  if(isNaN(va)||va<0||va>180) return null;
  // Form distance is SD or HD depending on distMode; reduce to slope distance
  let sd=dist;
  if(distMode==="HD"){
    const s=Math.sin(va*Math.PI/180);
    sd=Math.abs(s)>0.0001 ? dist/s : dist;
  }
  const th=parseFloat(fields.th)||0;
  return {az, va, sd, th};
}

// Face 1 -> (flip prompt) -> Face 2, both through the normal shot form.
function _twoFaceCapture(occ,is3D){
  _shotForm("2F","none",(f1Fields)=>{
    const f1=_twoFaceParse(f1Fields,is3D);
    if(!f1){alert("Face 1 readings were incomplete \u2014 two-face cancelled.");return;}
    openModal((modal,close)=>{
      modal.innerHTML="<h2>\u21c4 Face 2</h2>"+
        "<p class='info'>Plunge 180\u00b0 on both axes, re-sight the same target, then take Face 2 in the normal shot form.</p>"+
        "<div class='result-box'>"+
        "<span class='lbl'>Face 1 Az:</span> <span class='val'>"+fmtBrg(f1.az)+"</span><br>"+
        (is3D?"<span class='lbl'>Face 1 VA:</span> <span class='val'>"+toDMS(f1.va)+"</span><br>":"")+
        "<span class='lbl'>Expected F2 Az:</span> <span class='val'>~"+fmtBrg((f1.az+180)%360)+"</span>"+
        (is3D?"<br><span class='lbl'>Expected F2 VA:</span> <span class='val'>~"+toDMS(360-f1.va)+"</span>":"")+
        "</div>";
      const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
      mk("Take Face 2 \u2192","ok",()=>{
        close();
        _shotForm("2F","none",(f2Fields)=>{
          const f2=_twoFaceParse(f2Fields,is3D);
          if(!f2){alert("Face 2 readings were incomplete \u2014 two-face cancelled.");return;}
          _twoFaceReduce(occ,is3D,f1,f2);
        });
      });
      mk("Cancel","",close);
    });
  });
}

// Reduce the two captured faces: average angles (F2 corrected), report errors.
function _twoFaceReduce(occ,is3D,f1,f2){
  const az2corr=_f2AzCorr(f1.az,f2.az);
  const avgAz=_circMean(f1.az,az2corr);
  const collimErr=((az2corr-f1.az+540)%360-180)/2;   // signed horizontal collimation (half the face difference)
  if(!is3D){
    const avgHD=(f1.hd+f2.hd)/2;
    const {E,N,Z}=computeShot2D(occ,avgAz,avgHD);
    _showTwoFaceResult(avgAz,avgHD,null,null,collimErr,null,E,N,Z,occ,false);
  } else {
    const va2corr=360-f2.va;                       // reverse-face zenith folds about 360
    const avgVA=(f1.va+va2corr)/2;
    const avgSD=(f1.sd+f2.sd)/2;
    const indexErr=(f1.va+f2.va-360)/2;            // vertical index error
    const ih=occ.ih||0, th=f1.th||0;
    const {E,N,Z,hd}=computeShot3D(occ,avgAz,avgSD,avgVA,ih,th);
    _showTwoFaceResult(avgAz,avgSD,avgVA,hd,collimErr,indexErr,E,N,Z,occ,true);
  }
}

function _showTwoFaceResult(avgAz,avgSD,avgVA,hd,collimErr,indexErr,E,N,Z,occ,is3D){
  const ptNum=pointCounter;
  const rows=[
    {lbl:"Avg Azimuth:", val:fmtBrg(avgAz)},
    {lbl:"Avg Dist:",    val:avgSD.toFixed(3)+" "+units},
  ];
  if(is3D && avgVA!==null){
    rows.push({lbl:"Avg Vert Angle:",val:toDMS(avgVA)});
    rows.push({lbl:"Horiz Dist:",    val:(hd||0).toFixed(3)+" "+units});
  }
  rows.push({lbl:"N:",val:N.toFixed(4)},{lbl:"E:",val:E.toFixed(4)});
  if(is3D) rows.push({lbl:"Z:",val:Z.toFixed(4)});
  rows.push({lbl:"— Instrument Errors —",val:""});
  rows.push({lbl:"Collimation:",val:(collimErr>=0?"+":"\u2212")+Math.abs(Math.round(collimErr*3600))+"\""});
  if(indexErr!==null) rows.push({lbl:"Vert Index:",val:(indexErr>=0?"+":"\u2212")+Math.abs(Math.round(indexErr*3600))+"\""});

  showResult("Two-Face Result",rows,[
    {txt:"Store as Pt #"+ptNum,"cls":"ok",fn:()=>{
      _takeSnapshot("Two-Face Shot");
      const newPt={
        Point:pointCounter++, Northing:N, Easting:E, Elevation:Z||0,
        Type:"Shot", Description:"2F",
        TrueAz:toDMS(avgAz), HorizDist:avgSD.toFixed(3),
        From:occ.Point, Flag:""
      };
      points.push(newPt);
      saveData(); updateStatus(); plotPoints();
      showResult("✓ Shot Stored",[
        {lbl:"Point #:",val:String(newPt.Point)},
        {lbl:"N:",val:N.toFixed(4)},{lbl:"E:",val:E.toFixed(4)},
      ]);
    }},
    {txt:"Discard","cls":"",fn:()=>{}},
  ]);
}

function checkShot(){
  _helpContext="checkshot";
  if(!currentPoint){alert("Occupy a point first.");return}
  const occ=currentPoint;
  calculatorInput("Known Point #:","",num=>{
    if(!num)return;
    const knownPt=points.find(p=>p.Point==+num);
    if(!knownPt){alert("Not found.");return}
    if(knownPt.Point===occ.Point){alert("Must be a different point.");return}
    // Compute what we expect
    const expectedAz=azimuth(occ,knownPt);
    const expectedHD=dist2D(occ,knownPt);
    const instExpected=((expectedAz%360)+360)%360; // true azimuth — no orientation offset
    calculatorInput("Instrument reading to known pt (DDD.MMSS):","",azStr=>{
      if(!azStr)return;
      const rawAz=parseDMS(azStr);
      if(isNaN(rawAz)){alert("Bad reading.");return}
      calculatorInput(`Measured HD to #${knownPt.Point} (${units}):` ,"",distStr=>{
        if(!distStr)return;
        let measHD=parseFloat(distStr);
        if(isNaN(measHD)||measHD<=0){alert("Bad distance.");return}
        measHD=_applyPPM(measHD+prismConstant); // same corrections as a regular shot
        // Compute measured position
        const trueAz=((rawAz%360)+360)%360;
        const measE=occ.Easting  + measHD*Math.sin(trueAz*Math.PI/180);
        const measN=occ.Northing + measHD*Math.cos(trueAz*Math.PI/180);
        const dE=measE-knownPt.Easting;
        const dN=measN-knownPt.Northing;
        const residual=Math.hypot(dE,dN);
        const dAz=((trueAz-expectedAz+540)%360)-180; // signed az difference
        const dHD=measHD-expectedHD;
        const qual=residual<(units==="ft"?0.1:0.03)?"✓ Good":
                   residual<(units==="ft"?0.5:0.15)?"⚠ Fair":"✗ Poor";
        showResult("Check Shot — #"+knownPt.Point,[
          {lbl:"Expected Az:",  val:fmtBrg(expectedAz)},
          {lbl:"Measured Az:",  val:fmtBrg(trueAz)},
          {lbl:"Az Error:",     val:(dAz>=0?"+":"")+dAz.toFixed(4)+"°"},
          {lbl:"Expected HD:",  val:expectedHD.toFixed(3)+" "+units},
          {lbl:"Measured HD:",  val:measHD.toFixed(3)+" "+units},
          {lbl:"HD Error:",     val:(dHD>=0?"+":"")+dHD.toFixed(3)+" "+units},
          {lbl:"Position Res:", val:residual.toFixed(4)+" "+units+" "+qual},
          {lbl:"Inst set to:",  val:fmtBrg(instExpected)+" for on-line"},
        ],[
          {txt:"Check Another",cls:"ok",fn:()=>checkShot()},
        ]);
      });
    });
  });
}

function occupyPoint(){
  calculatorInput("Point # to occupy:","",num=>{
    if(!num)return; const p=points.find(pt=>pt.Point===parseInt(num));
    if(!p){alert("Point not found.");return}
    // Clear _hiSet so takeShot prompts HI for the new occupation
    if(currentPoint) currentPoint._hiSet = false;
    if(surveyMode==="3D"){
      // Always prompt HI on every new occupation in 3D
      const prevHI = p.ih!=null&&p.ih>0 ? p.ih.toFixed(3) : "0.000";
      calculatorInput(`Instrument Height HI (${units}):`, prevHI, hiVal=>{
        if(hiVal===null)return;
        p.ih=parseFloat(hiVal)||0; p._hiSet=true; currentPoint=p; saveData();
        showResult(`✓ Occupying #${p.Point}`,[
          {lbl:"N:",val:p.Northing.toFixed(3)},
          {lbl:"E:",val:p.Easting.toFixed(3)},
          {lbl:"Z:",val:p.Elevation.toFixed(3)},
          {lbl:"HI:",val:p.ih.toFixed(3)+" "+units},
        ]);
      });
    } else {
      currentPoint=p; saveData();
      showResult(`✓ Occupying #${p.Point}`,[
        {lbl:"N:",val:p.Northing.toFixed(3)},
        {lbl:"E:",val:p.Easting.toFixed(3)},
      ]);
    }
  });
}

function _updateUndoBtn(){
  const btn=document.getElementById("undoBtn");
  if(btn){
    const hasUndo=_snapshots.length>0||undoStack.length>0;
    if(hasUndo){
      btn.classList.add("visible");
      if(_snapshots.length>0){
        const last=_snapshots[_snapshots.length-1];
        btn.textContent="↩ Undo: "+last.label;
      } else {
        const last=undoStack[undoStack.length-1];
        btn.textContent="↩ Undo Pt #"+(last.Point||"?");
      }
    } else {
      btn.classList.remove("visible");
    }
  }
  const rbtn=document.getElementById("redoBtn");
  if(rbtn){
    if(_redoStack.length>0){
      rbtn.classList.add("visible");
      rbtn.textContent="↪ Redo: "+_redoStack[_redoStack.length-1].label;
    } else {
      rbtn.classList.remove("visible");
    }
  }
}
function undoFromCanvas(){
  if(_snapshots.length>0){
    const snap=_snapshots.pop();
    // Save the state we're leaving so it can be redone
    _redoStack.push(_snapState(snap.label));
    if(_redoStack.length>MAX_SNAPSHOTS) _redoStack.shift();
    _restoreSnap(snap);
  } else if(undoStack.length){
    // Legacy fallback
    const p=undoStack.pop();
    points=points.filter(x=>x!==p);
    plotConnections=plotConnections.filter(c=>c.to!==p.Point&&c.from!==p.Point);
    recentShots=recentShots.filter(s=>s.pt!==p.Point);
    if(p===currentPoint)currentPoint=points[points.length-1]||null;
    saveData();
    _updateUndoBtn();
  } else {
    alert("Nothing to undo.");
  }
}
function undo(){ undoFromCanvas(); }
function redoFromCanvas(){
  if(!_redoStack.length){alert("Nothing to redo.");return}
  const snap=_redoStack.pop();
  // Save the state we're leaving so the redo itself can be undone —
  // push directly (not via _takeSnapshot) so the redo chain survives
  _snapshots.push(_snapState(snap.label));
  if(_snapshots.length>MAX_SNAPSHOTS) _snapshots.shift();
  _restoreSnap(snap);
}
function redo(){ redoFromCanvas(); }

// Is math-space angle `a` within the arc's swept extent?
function _angleInSweep(conn,a){
  const TAU=2*Math.PI;
  const sweep=conn.endAngle-conn.startAngle; // signed; <0 = CW
  const dd = sweep>0 ? ((a-conn.startAngle)%TAU+TAU)%TAU
                     : ((conn.startAngle-a)%TAU+TAU)%TAU;
  return dd <= Math.abs(sweep)+1e-9;
}

let _lastStlAz="";  // remember last az for Measure Again
let _polylines=[];        // [{name, verts:[{E,N}], segs:[{type:"line"}|{type:"arc",centerE,centerN,R,dir}]}]
let _plDraft=null;        // polyline being built (vertex/segment model)
let _selPolyline=-1;      // index of a polyline selected on the plot, or -1
const _PL_TOL=0.01;       // world units: vertices closer than this are coincident
const _PL_SNAP=0.05;      // world units: a line/arc endpoint within this of the last vertex "meets" it

function _stlMeasure(geom){
  const occ=currentPoint;
  if(!occ){alert("Occupy a point first.");return;}
  calculatorInput("Instrument reading to rodman (DDD.MMSS):",_lastStlAz,azStr=>{
    if(!azStr)return;
    const rawAz=parseDMS(azStr);
    if(isNaN(rawAz)){alert("Bad azimuth.");return;}
    const trueAz=((rawAz%360)+360)%360;
    _lastStlAz=toDMS(trueAz); // save for next time
    calculatorInput("Horiz Distance to rodman ("+units+"):","",distStr=>{
      if(!distStr)return;
      const hd=parseFloat(distStr);
      if(isNaN(hd)||hd<=0){alert("Bad distance.");return;}
      _stlCompute(geom,trueAz,hd);
    });
  });
}

function _stlCompute(geom,trueAz,hd,skipZoom){
  if(geom.kind==="arc") return _stlComputeArc(geom.conn,trueAz,hd,skipZoom);
  const pA=geom.pA, pB=geom.pB;
  const occ=currentPoint;
  const rayR=trueAz*Math.PI/180;
  const rayUE=Math.sin(rayR), rayUN=Math.cos(rayR);

  // Rodman position
  const shotE=occ.Easting  + hd*rayUE;
  const shotN=occ.Northing + hd*rayUN;

  // Line geometry
  const dE=pB.Easting-pA.Easting, dN=pB.Northing-pA.Northing;
  const lineLen=Math.hypot(dE,dN);
  const uE=dE/lineLen, uN=dN/lineLen;
  const linePerpE=-uN, linePerpN=uE;

  // In/Out: where does the ray hit the line?
  const cross=rayUE*uN - rayUN*uE;
  let crossDist=null, crossE=null, crossN=null, inOutMove=null;
  if(Math.abs(cross)>1e-10){
    const dpE=pA.Easting-occ.Easting, dpN=pA.Northing-occ.Northing;
    crossDist=(dpE*uN - dpN*uE)/cross;
    crossE=occ.Easting + crossDist*rayUE;
    crossN=occ.Northing+ crossDist*rayUN;
    inOutMove=crossDist-hd;
  }

  // Lateral: slide rodman perpendicular onto line
  const slideRightE=rayUN, slideRightN=-rayUE;
  const slideDenom=slideRightE*linePerpE + slideRightN*linePerpN;
  let latMove=null, landE=null, landN=null;
  if(Math.abs(slideDenom)>1e-10){
    latMove=((pA.Easting-shotE)*linePerpE+(pA.Northing-shotN)*linePerpN)/slideDenom;
    landE=shotE+latMove*slideRightE;
    landN=shotN+latMove*slideRightN;
  }

  // Draw — line + shot ray + correction vectors
  tempGeom=[
    {type:"extline",E1:pA.Easting,N1:pA.Northing,E2:pB.Easting,N2:pB.Northing,
     color:"rgba(74,158,255,.6)",dash:[4,4]},
    {type:"segment",E1:occ.Easting,N1:occ.Northing,E2:shotE,N2:shotN,
     color:"rgba(240,160,32,.6)"},
  ];
  tempIntersections=[{Easting:shotE,Northing:shotN}];
  if(landE!==null){
    tempGeom.push({type:"segment",E1:shotE,N1:shotN,E2:landE,N2:landN,
      color:"rgba(104,168,74,.8)"});
    tempIntersections.push({Easting:landE,Northing:landN});
  }
  if(crossE!==null){
    tempGeom.push({type:"segment",E1:shotE,N1:shotN,E2:crossE,N2:crossN,
      color:"rgba(200,120,200,.7)"});
    tempIntersections.push({Easting:crossE,Northing:crossN});
  }
  plotPoints();
  if(!skipZoom) zoomToPoints([{E:pA.Easting,N:pA.Northing},
    {E:pB.Easting,N:pB.Northing},{E:occ.Easting,N:occ.Northing},{E:shotE,N:shotN}]);

  // Build result rows — slide (green) and in/out (purple)
  const rows=[
    {lbl:"Occupied:",val:"#"+occ.Point},
    {lbl:"Shot Az:",val:fmtBrg(trueAz)+"  Dist: "+hd.toFixed(3)+" "+units},
  ];

  // Slide L/R
  if(latMove===null){
    rows.push({lbl:"SLIDE:",val:"Ray parallel to line"});
  } else if(Math.abs(latMove)<0.005){
    rows.push({lbl:"SLIDE:",val:"✓ ON LINE"});
  } else {
    rows.push({lbl:"SLIDE "+(latMove>0?"RIGHT ▶":"◄ LEFT")+":",
               val:Math.abs(latMove).toFixed(3)+" "+units});
  }

  // In/Out
  if(crossDist===null){
    rows.push({lbl:"IN/OUT:",val:"Ray parallel to line"});
  } else if(crossDist<0){
    rows.push({lbl:"IN/OUT:",val:"Line is behind you"});
  } else if(Math.abs(inOutMove)<0.005){
    rows.push({lbl:"IN/OUT:",val:"✓ ON LINE"});
  } else {
    rows.push({lbl:"MOVE "+(inOutMove>0?"OUT ▶":"◄ IN")+":",
               val:Math.abs(inOutMove).toFixed(3)+" "+units});
  }

  showResult("Stake to Line",rows,[
    {txt:"Measure Again","cls":"ok",fn:()=>_stlMeasure(geom)},
    {txt:"Change Geometry","cls":"",fn:()=>{window._stlActive=false;tempGeom=[];tempIntersections=[];plotPoints();stakeToLine()}},
    {txt:"Done","cls":"",fn:()=>{window._stlActive=false;tempGeom=[];tempIntersections=[];plotPoints()}},
  ]);
}

// Stake to an arc — radial/independent corrections to the true curve (not the chord).
// SLIDE and IN/OUT mirror the line method: each one alone lands the rod on the arc.
//   IN/OUT  = move along the sight ray (hold azimuth) to where it crosses the arc
//   SLIDE   = move perpendicular to the sight (hold distance) to where it crosses the arc
function _stlComputeArc(conn,trueAz,hd,skipZoom){
  const occ=currentPoint;
  const rayR=trueAz*Math.PI/180;
  const rayUE=Math.sin(rayR), rayUN=Math.cos(rayR);
  const shotE=occ.Easting + hd*rayUE;
  const shotN=occ.Northing + hd*rayUN;
  const cE=conn.centerE, cN=conn.centerN, R=conn.R;

  // Perpendicular (radial) offset — the true distance off the curve, for reference/QC
  const r0=Math.hypot(shotE-cE, shotN-cN);
  const radialOff=r0-R;                       // + = rodman outside the arc
  const radE=r0>1e-9?(shotE-cE)/r0:1, radN=r0>1e-9?(shotN-cN)/r0:0;
  const perpLandE=cE+R*radE, perpLandN=cN+R*radN;

  // IN/OUT — intersect the sight ray with the arc's circle (hold azimuth)
  let inOutMove=null, ioE=null, ioN=null, ioBehind=false, ioOnArc=false;
  {
    const fE=occ.Easting-cE, fN=occ.Northing-cN;
    const b=2*(fE*rayUE+fN*rayUN), c=fE*fE+fN*fN-R*R;
    const disc=b*b-4*c;
    if(disc>=0){
      const sq=Math.sqrt(disc);
      const t1=(-b-sq)/2, t2=(-b+sq)/2;
      const t=Math.abs(t1-hd)<=Math.abs(t2-hd)?t1:t2; // crossing nearest the rodman
      ioBehind=t<0;
      ioE=occ.Easting+t*rayUE; ioN=occ.Northing+t*rayUN;
      inOutMove=t-hd;                            // + = move OUT, − = move IN
      ioOnArc=_angleInSweep(conn,Math.atan2(ioN-cN,ioE-cE));
    }
  }

  // SLIDE L/R — intersect the perpendicular-to-sight line through the rodman with the circle
  const slRE=rayUN, slRN=-rayUE; // unit vector to the right of the sight ray
  let latMove=null, slE=null, slN=null, slOnArc=false;
  {
    const gE=shotE-cE, gN=shotN-cN;
    const b=2*(gE*slRE+gN*slRN), c=gE*gE+gN*gN-R*R;
    const disc=b*b-4*c;
    if(disc>=0){
      const sq=Math.sqrt(disc);
      const s1=(-b-sq)/2, s2=(-b+sq)/2;
      const s=Math.abs(s1)<=Math.abs(s2)?s1:s2;  // nearest crossing
      latMove=s;                                  // + = SLIDE RIGHT
      slE=shotE+s*slRE; slN=shotN+s*slRN;
      slOnArc=_angleInSweep(conn,Math.atan2(slN-cN,slE-cE));
    }
  }

  tempGeom=[
    {type:"bndarc",cx:cE,cy:cN,R:R,tA:conn.startAngle,tB:conn.endAngle,
     dt:conn.endAngle-conn.startAngle,color:"rgba(74,158,255,.6)"},
    {type:"segment",E1:occ.Easting,N1:occ.Northing,E2:shotE,N2:shotN,color:"rgba(240,160,32,.6)"},
  ];
  tempIntersections=[{Easting:shotE,Northing:shotN}];
  if(slE!==null){
    tempGeom.push({type:"segment",E1:shotE,N1:shotN,E2:slE,N2:slN,color:"rgba(104,168,74,.85)"});
    tempIntersections.push({Easting:slE,Northing:slN});
  }
  if(ioE!==null && !ioBehind){
    tempGeom.push({type:"segment",E1:shotE,N1:shotN,E2:ioE,N2:ioN,color:"rgba(200,120,200,.7)"});
    tempIntersections.push({Easting:ioE,Northing:ioN});
  }
  plotPoints();
  if(!skipZoom) zoomToPoints([{E:cE,N:cN},{E:occ.Easting,N:occ.Northing},
    {E:shotE,N:shotN},{E:perpLandE,N:perpLandN}]);

  const rows=[
    {lbl:"Occupied:",val:"#"+occ.Point},
    {lbl:"Shot Az:",val:fmtBrg(trueAz)+"  Dist: "+hd.toFixed(3)+" "+units},
    {lbl:"Arc R:",val:R.toFixed(3)+" "+units},
  ];
  // SLIDE L/R (hold distance, step perpendicular onto the arc)
  if(latMove===null){
    rows.push({lbl:"SLIDE:",val:"Slide misses the arc"});
  } else if(Math.abs(latMove)<0.005){
    rows.push({lbl:"SLIDE:",val:"\u2713 ON ARC"});
  } else {
    rows.push({lbl:"SLIDE "+(latMove>0?"RIGHT \u25b6":"\u25c4 LEFT")+":",
               val:Math.abs(latMove).toFixed(3)+" "+units+(slOnArc?"":" (ext)")});
  }
  // IN/OUT (hold azimuth, move along sight onto the arc)
  if(inOutMove===null){
    rows.push({lbl:"IN/OUT:",val:"Sight ray misses the arc"});
  } else if(ioBehind){
    rows.push({lbl:"IN/OUT:",val:"Arc is behind you"});
  } else if(Math.abs(inOutMove)<0.005){
    rows.push({lbl:"IN/OUT:",val:"\u2713 ON ARC"});
  } else {
    rows.push({lbl:"MOVE "+(inOutMove>0?"OUT \u25b6":"\u25c4 IN")+":",
               val:Math.abs(inOutMove).toFixed(3)+" "+units+(ioOnArc?"":" (ext)")});
  }
  // Perpendicular offset — reference QC value (how far off the curve)
  if(Math.abs(radialOff)>=0.005){
    rows.push({lbl:"Perp offset:",val:Math.abs(radialOff).toFixed(3)+" "+units+
               (radialOff>0?" outside":" inside")});
  }

  const geom={kind:"arc",conn};
  showResult("Stake to Arc",rows,[
    {txt:"Measure Again","cls":"ok",fn:()=>_stlMeasure(geom)},
    {txt:"Change Geometry","cls":"",fn:()=>{window._stlActive=false;tempGeom=[];tempIntersections=[];plotPoints();stakeToLine()}},
    {txt:"Done","cls":"",fn:()=>{window._stlActive=false;tempGeom=[];tempIntersections=[];plotPoints()}},
  ]);
}

}

    function render(){

      if(p.From)
        html+="<br><span class='lbl'>From occ:</span>&nbsp;<span class='val'>#"+p.From+"</span>";
      box.innerHTML=html; modal.appendChild(box);

      // Raw observation
      if(p.InstReading||p.SlopeDist||p.ZenithAngle){
        const rawBox=document.createElement("div"); rawBox.className="result-box";
        rawBox.style.cssText="margin-top:4px;border-left-color:var(--accent2)";
        let rh="<span style='font-family:var(--font-ui);font-size:.70em;font-weight:700;color:var(--accent2);letter-spacing:.1em;text-transform:uppercase'>Raw Observation</span><br>";
        if(p.InstReading) rh+="<span class='lbl'>Inst reading:</span>&nbsp;<span class='val'>"+p.InstReading+"</span><br>";
        if(p.SlopeDist)   rh+="<span class='lbl'>Slope dist:</span>&nbsp;<span class='val'>"+Number(p.SlopeDist).toFixed(4)+" "+units+"</span>&nbsp;&nbsp;";
        if(p.ZenithAngle) rh+="<span class='lbl'>Zenith:</span>&nbsp;<span class='val'>"+p.ZenithAngle+"</span>";
        if(p.LatOffset||p.VertOffset)
          rh+="<br><span class='lbl'>Lat off:</span>&nbsp;<span class='val'>"+(p.LatOffset||0)+" "+units+"</span>&nbsp;&nbsp;"+
              "<span class='lbl'>Vert off:</span>&nbsp;<span class='val'>"+(p.VertOffset||0)+" "+units+"</span>";
        rawBox.innerHTML=rh; modal.appendChild(rawBox);
      }

      const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b);};

      mk("Edit Coords / Desc","blue",()=>{
        calculatorInput("Northing ["+p.Northing.toFixed(3)+"]:",p.Northing.toFixed(3),n=>{if(n===null)return;
          calculatorInput("Easting ["+p.Easting.toFixed(3)+"]:",p.Easting.toFixed(3),e=>{if(e===null)return;
            calculatorInput("Elevation ["+(p.Elevation||0).toFixed(3)+"]:",(p.Elevation||0).toFixed(3),z=>{if(z===null)return;
              alphaInput("Description:",p.Description||"",desc=>{
                _takeSnapshot("Edit Pt #"+p.Point);
                p.Northing=parseFloat(n)||p.Northing;
                p.Easting=parseFloat(e)||p.Easting;
                p.Elevation=parseFloat(z)||0;
                p.Description=desc||p.Description;
                saveData(); plotPoints(); render();
              });
            });
          });
        });
      });

      if(p.InstReading){
        mk("Re-enter Raw Reading (recompute coords)","accent",()=>{
          calculatorInput("Inst reading (DDD.MMSS) [was "+p.InstReading+"]:",p.InstReading,newAz=>{
            if(!newAz)return;
            const rawAz=parseDMS(newAz);
            if(isNaN(rawAz)){alert("Bad azimuth");return;}
            const trueAz=((rawAz%360)+360)%360;
            const oldHD=String(p.HorizDist||"0");
            calculatorInput("Horiz Distance [was "+oldHD+"]:",oldHD,newDist=>{
              if(!newDist)return;
              const hd=parseFloat(newDist);
              if(isNaN(hd)||hd<=0){alert("Bad distance");return;}

              // 3D fields — only prompt if point has 3D data
              function _do3D(cb){
                if(p.ZenithAngle){
                  const oldSD=String(p.SlopeDist||hd);
                  calculatorInput("Slope Dist [was "+oldSD+"]:",oldSD,newSD=>{
                    if(!newSD)return;
                    calculatorInput("Zenith Angle (DDD.MMSS) [was "+p.ZenithAngle+"]:",p.ZenithAngle,newZA=>{
                      if(!newZA)return;
                      const oldIH=String(p.IH||0);
                      calculatorInput("Inst Height (HI) [was "+oldIH+"]:",oldIH,newIH=>{
                        if(!newIH)return;
                        const oldTH=String(p.TH||0);
                        calculatorInput("Target Height (TH) [was "+oldTH+"]:",oldTH,newTH=>{
                          if(!newTH)return;
                          cb({sd:parseFloat(newSD)||hd,
                              za:parseDMS(newZA),
                              ih:parseFloat(newIH)||0,
                              th:parseFloat(newTH)||0});
                        });
                      });
                    });
                  });
                } else {
                  cb(null); // 2D point
                }
              }

              _do3D(d3=>{
              const occ=points.find(pt=>pt.Point===p.From)||currentPoint;
              if(!occ){alert("Original occupation not found.");return;}

              // Helper: parse DMS symbol or numeric format — must be defined FIRST
              function _parseAnyAz(s){
                if(!s) return NaN;
                const m=s.match(/^(-?)(\d+)[°d]\s*(\d+)['m]\s*(\d+\.?\d*)["s]?/);
                if(m) return (m[1]?-1:1)*(+m[2]+(+m[3])/60+(+m[4])/3600);
                return parseDMS(s);
              }

              // Compute new position
              const oldE=p.Easting, oldN=p.Northing;
              const newE=occ.Easting  + hd*Math.sin(trueAz*Math.PI/180);
              const newN=occ.Northing + hd*Math.cos(trueAz*Math.PI/180);
              const dE=newE-oldE, dN=newN-oldN;

              // Capture old azimuth BEFORE mutating p
              const _oldTrueAzDeg=_parseAnyAz(p.TrueAz);
              const deltaAz=trueAz-_oldTrueAzDeg;

              // Find downstream chain
              function _getChain(fromPt, visited){
                visited=visited||new Set();
                visited.add(fromPt.Point);
                const children=points.filter(x=>x.From===fromPt.Point&&!visited.has(x.Point));
                let chain=[];
                children.forEach(c=>{chain.push(c);chain=chain.concat(_getChain(c,visited));});
                return chain;
              }
              const chain=_getChain(p);

              // Compute new elevation if 3D
              let newZ=p.Elevation||0;
              if(d3&&!isNaN(d3.za)&&d3.sd>0){
                const zaRad=d3.za*Math.PI/180;
                const hdCalc=d3.sd*Math.sin(zaRad);
                const dZ=d3.sd*Math.cos(zaRad);
                newZ=(occ.Elevation||0)+d3.ih+dZ-d3.th;
                // Also update hd from slope dist if 3D
              }
              const oldZ=p.Elevation||0;
              const dZ=newZ-oldZ;

              // Apply p correction function (called after user chooses)
              function _applyCorrection(){
                _takeSnapshot("Edit Pt #"+p.Point);
                p.InstReading=newAz;
                p.RawAz=toDMS(rawAz);
                p.TrueAz=toDMS(trueAz);
                p.HorizDist=hd;
                p.Easting=newE;
                p.Northing=newN;
                p.Elevation=newZ;
                if(d3){
                  p.SlopeDist=d3.sd;
                  p.ZenithAngle=String(d3.za);
                  p.IH=d3.ih;
                  p.TH=d3.th;
                }
              }

              // Recursive chain recompute with azimuth rotation + elevation shift
              function _recomputeChain(rootPt, cumDeltaAz){
                const children=points.filter(cp=>cp.From===rootPt.Point);
                children.forEach(cp=>{
                  const az=_parseAnyAz(cp.TrueAz);
                  const hdC=parseFloat(cp.HorizDist);
                  if(!isNaN(az)&&!isNaN(hdC)&&hdC>0){
                    const newAzC=(az+cumDeltaAz+360)%360;
                    cp.TrueAz=toDMS(newAzC);
                    cp.Easting =rootPt.Easting  + hdC*Math.sin(newAzC*Math.PI/180);
                    cp.Northing=rootPt.Northing + hdC*Math.cos(newAzC*Math.PI/180);
                    // Propagate elevation: if child has 3D data recompute from root,
                    // otherwise shift by dZ
                    if(cp.ZenithAngle&&cp.SlopeDist&&cp.IH!=null&&cp.TH!=null){
                      const zaR=parseDMS(cp.ZenithAngle)*Math.PI/180;
                      const cpDZ=cp.SlopeDist*Math.cos(zaR);
                      cp.Elevation=(rootPt.Elevation||0)+cp.IH+cpDZ-cp.TH;
                    } else {
                      cp.Elevation=(cp.Elevation||0)+dZ;
                    }
                    _recomputeChain(cp, cumDeltaAz);
                  } else {
                    cp.Easting+=dE; cp.Northing+=dN;
                    cp.Elevation=(cp.Elevation||0)+dZ;
                    _recomputeChain(cp, cumDeltaAz);
                  }
                });
              }

              if(chain.length>0){
                // Only show rows relevant to what actually changed
                const _resRows=[];
                const _posChanged=Math.abs(dE)>0.0001||Math.abs(dN)>0.0001;
                const _azChanged=Math.abs(deltaAz)>0.0001;
                const _elChanged=Math.abs(dZ)>0.0001;
                if(_posChanged) _resRows.push({lbl:"Pt #"+p.Point+" Δ horiz:",val:"ΔE="+dE.toFixed(3)+" ΔN="+dN.toFixed(3)});
                if(_azChanged)  _resRows.push({lbl:"Az change:",val:(deltaAz>=0?"+":"")+deltaAz.toFixed(4)+"°"});
                if(_elChanged)  _resRows.push({lbl:"Elev change:",val:(dZ>=0?"+":"")+dZ.toFixed(3)+" "+units});
                if(d3&&d3.ih!=null) _resRows.push({lbl:"New HI:",val:d3.ih.toFixed(3)+" "+units});
                if(d3&&d3.th!=null) _resRows.push({lbl:"New TH:",val:d3.th.toFixed(3)+" "+units});
                if(!_posChanged&&!_azChanged&&!_elChanged) _resRows.push({lbl:"Note:",val:"No change in position or elevation"});
                _resRows.push({lbl:"Downstream:",val:chain.length+" pt(s)"});
                showResult("Correction Applied",_resRows,[
                  {txt:"Yes — Rotate & Recompute Chain",cls:"ok",fn:()=>{
                    _applyCorrection();
                    _recomputeChain(p, deltaAz);
                    saveData(); plotPoints();
                    showResult("Chain Recomputed",[
                      {lbl:"Points updated:",val:chain.length},
                      {lbl:"Az rotation:",val:(deltaAz>=0?"+":"")+deltaAz.toFixed(4)+"° applied to all shots"},
                    ]);
                  }},
                  {txt:"No — This Point Only",cls:"",fn:()=>{
                    _applyCorrection();
                    saveData(); plotPoints();
                  }},
                ]);
              } else {
                _applyCorrection();
                saveData(); plotPoints(); render();
              }
              }); // close _do3D
            });
          });
        });
      }

      mk("Occupy This Point","ok",()=>{currentPoint=p;saveData();updateStatus();close();});
      mk("Stakeout to Here","ok",()=>{close();_doStakeout(p,"#"+p.Point);});
      mk("Flag / Mark","",()=>{close();flagPoint_pt(p);});
      mk("Delete Point","danger",()=>{
        confirmDialog("Delete Point #"+p.Point+"?",yes=>{
          if(!yes)return;
          _takeSnapshot("Delete Pt #"+p.Point);
          points=points.filter(x=>x!==p);
          plotConnections=plotConnections.filter(c=>c.to!==p.Point&&c.from!==p.Point);
          saveData(); plotPoints(); close(); pointListMenu();
        });
      });
      mk("< Back to List","",()=>{close();pointListMenu();});
    }
    render();
  });
}

          const N=parseFloat(fields.n);
          const E=parseFloat(fields.e);
          if(isNaN(N)||isNaN(E)){alert("Northing and Easting are required.");return;}
          const Z=parseFloat(fields.z)||0;
          _takeSnapshot("Manual Pt #"+ptNum);
          const p={Point:ptNum,Northing:N,Easting:E,Elevation:Z,
                   Type:"Manual",Flag:"",ih:0,Description:fields.desc};
          points.push(p);
          pointCounter=Math.max(pointCounter,ptNum+1);

          if(navigator.vibrate)navigator.vibrate(30);
          close();
          showResult(`✓ Point #${ptNum} Stored`,[
            {lbl:"N:",val:N.toFixed(4)},
            {lbl:"E:",val:E.toFixed(4)},
            {lbl:"Z:",val:Z.toFixed(4)},
            {lbl:"Desc:",val:fields.desc||"—"},
          ],[
            {txt:"➕ Enter Another",cls:"ok",fn:enterPointManually},
            {txt:"⬛ Occupy This Point",cls:"blue",fn:()=>{currentPoint=p;updateStatus();}},
          ]);
        };
        np.appendChild(storeBtn);
        form.appendChild(np);
      }

      modal.appendChild(form);
      const can=document.createElement("button");can.className="btn";can.textContent="Cancel";
      can.style.marginTop="6px";can.onclick=close;modal.appendChild(can);
    }
    render();
  });
}

// Decimal degrees -> DDD.MMSS string (the app's azimuth input format)
function _toDDMMSS(deg){
  deg=((deg%360)+360)%360;
  let d=Math.floor(deg), m=Math.floor((deg-d)*60), s=Math.round(((deg-d)*60-m)*60);
  if(s>=60){s-=60;m++;} if(m>=60){m-=60;d++;}
  return d+"."+String(m).padStart(2,"0")+String(s).padStart(2,"0");
}

// Every point shot from `rootNum`, transitively, in breadth-first order
// (a parent always appears before the points shot from it).
function _getDownstreamChain(rootNum){
  const out=[], queue=[rootNum], seen=new Set([rootNum]);
  while(queue.length){
    const cur=queue.shift();
    points.forEach(p=>{
      if(p.From===cur && !seen.has(p.Point)){ seen.add(p.Point); out.push(p); queue.push(p.Point); }
    });
  }
  return out;
}

// Re-enter the corrected azimuth + horizontal distance of the shot that produced
// this point, then optionally cascade the move down the traverse chain. Every
// downstream point is replayed from its own measured vector relative to its
// (now corrected) occupied station, so the traverse geometry is preserved.
function _correctShot(pt,S){
  const curAz=azimuth(S,pt), curDist=dist2D(S,pt);
  const do3D = surveyMode==="3D" && !pt.noZ;
  bearingInput(`Corrected azimuth from #${S.Point}:`, _toDDMMSS(curAz), azStr=>{
    if(azStr===null)return;
    const az=parseBrg(azStr); if(isNaN(az)){alert("Bad azimuth — use DDD.MMSS.");return;}
    calculatorInput(`Corrected horiz dist from #${S.Point} (${units}) [${curDist.toFixed(3)}]:`, curDist.toFixed(3), dStr=>{
      if(dStr===null)return;
      const d=parseFloat(dStr); if(isNaN(d)||d<0){alert("Bad distance.");return;}
      const r=((az%360)+360)%360*Math.PI/180;
      const newE=S.Easting+d*Math.sin(r), newN=S.Northing+d*Math.cos(r);

      // Stage 2 (3D only): re-enter zenith angle and recompute elevation using
      // the stored instrument/target heights. 90 = level, <90 = uphill.
      const proceed=(newZ,za,ihv,thv)=>{
        const dE=newE-pt.Easting, dN=newN-pt.Northing, dZ=newZ-pt.Elevation;
        const chain=_getDownstreamChain(pt.Point);
        const apply=(cascade)=>{
          _takeSnapshot("Correct Shot #"+pt.Point);
          const old={}; old[pt.Point]={E:pt.Easting,N:pt.Northing,Z:pt.Elevation};
          chain.forEach(c=>old[c.Point]={E:c.Easting,N:c.Northing,Z:c.Elevation});
          pt.Easting=newE; pt.Northing=newN; pt.Elevation=newZ;
          pt.TrueAz=toDMS(((az%360)+360)%360); pt.HorizDist=d;
          if(do3D && za!=null){
            const zr=za*Math.PI/180;
            pt.ZenithAngle=_toDDMMSS(za);
            pt.SlopeDist=d/Math.sin(zr);
            pt.IH=ihv; pt.TH=thv;
          }
          if(cascade){
            chain.forEach(c=>{                     // BFS order: parent already moved
              if(old[c.From]==null) return;
              const S2=points.find(p=>p.Point===c.From); if(!S2) return;
              c.Easting =S2.Easting +(old[c.Point].E-old[c.From].E);
              c.Northing=S2.Northing+(old[c.Point].N-old[c.From].N);
              c.Elevation=S2.Elevation+(old[c.Point].Z-old[c.From].Z); // carry Z too
            });
          }
          _recomputeAreaLabels();
          saveData(); plotPoints();
          const rows=[
            {lbl:"Pt #"+pt.Point+":",val:"N "+newN.toFixed(3)+"  E "+newE.toFixed(3)+(do3D?"  Z "+newZ.toFixed(3):"")},
            {lbl:"Shift:",val:"ΔN "+dN.toFixed(3)+"  ΔE "+dE.toFixed(3)+(do3D?"  ΔZ "+dZ.toFixed(3):"")+" "+units},
            {lbl:"Downstream:",val:cascade?(chain.length+" pt(s) moved with it"):"left in place"},
            {lbl:"Note:",val:"Re-run COGO → Traverse Correction if this leg is in a closed loop."},
          ];
          showResult("✓ Shot Corrected",rows);
        };
        if(chain.length>0){
          showResult("Correct Shot #"+pt.Point,[
            {lbl:"New position:",val:"N "+newN.toFixed(3)+"  E "+newE.toFixed(3)+(do3D?"  Z "+newZ.toFixed(3):"")},
            {lbl:"Shift:",val:"ΔN "+dN.toFixed(3)+"  ΔE "+dE.toFixed(3)+(do3D?"  ΔZ "+dZ.toFixed(3):"")+" "+units},
            {lbl:"Downstream pts:",val:chain.length+" shot from this point or beyond"},
          ],[
            {txt:"Cascade Down Chain",cls:"ok",fn:()=>apply(true)},
            {txt:"This Point Only",cls:"",fn:()=>apply(false)},
          ]);
        } else { apply(false); }
      };

      if(do3D){
        const ihDef=(parseFloat(pt.IH)||0).toFixed(3), thDef=(parseFloat(pt.TH)||0).toFixed(3);
        calculatorInput(`Instrument height IH (${units}) [${ihDef}]:`, ihDef, ihStr=>{
          if(ihStr===null)return;
          const ihv=parseFloat(ihStr); if(isNaN(ihv)){alert("Bad IH.");return;}
          calculatorInput(`Target height TH (${units}) [${thDef}]:`, thDef, thStr=>{
            if(thStr===null)return;
            const thv=parseFloat(thStr); if(isNaN(thv)){alert("Bad TH.");return;}
            const dVcur=pt.Elevation - S.Elevation - ihv + thv;
            const zaDef=pt.ZenithAngle || _toDDMMSS(Math.atan2(curDist, dVcur)*180/Math.PI);
            calculatorInput(`Corrected zenith angle (DDD.MMSS, 90=level) [${zaDef}]:`, zaDef, zStr=>{
              if(zStr===null)return;
              const za=parseDMS(zStr); if(isNaN(za)||za<=0||za>=180){alert("Bad zenith angle.");return;}
              const newZ = S.Elevation + ihv - thv + d/Math.tan(za*Math.PI/180);
              proceed(newZ, za, ihv, thv);
            });
          });
        });
      } else {
        proceed(pt.Elevation, null, null, null);  // 2D: elevation unchanged
      }
    });
  });
}

// ── Universal point-tap picker ──────────────────────────────────
let _pickedPts = []; // currently selected points for visual feedback

function _pickPoint(promptText, cb){
  const banner=document.getElementById("intersectBanner");
  if(banner){banner.textContent=promptText;banner.classList.add("visible");}
  closeAllModals();

  window._connClickActive=true;
  window._connClickHandler=function(pt){
    window._connClickActive=false;
    window._connClickHandler=null;
    if(banner) banner.classList.remove("visible");
    // Add to picked list and redraw so highlight shows
    _pickedPts.push(pt);
    _drawPickedOverlay();
    cb(pt);
    // If the callback didn't arm another pick, the flow is complete —
    // clear the highlight rings so they don't linger after the operation.
    if(!window._connClickActive){
      _pickedPts=[];
      tempGeom=tempGeom.filter(g=>g._pick!==true);
      plotPoints();
    }
  };
  window._connClickCancelCb=()=>{
    if(banner) banner.classList.remove("visible");
    _pickedPts=[];
    tempGeom=tempGeom.filter(g=>g._pick!==true);
    plotPoints();
    cb(null);
  };
}

function _drawPickedOverlay(){
  // Build tempGeom entries for picked points and connecting lines
  // Remove old pick geometry
  tempGeom=tempGeom.filter(g=>g._pick!==true);
  // Highlight circles for each picked point
  _pickedPts.forEach((p,i)=>{
    tempGeom.push({type:"pickHighlight",E:p.Easting,N:p.Northing,
                   idx:i,_pick:true});
  });
  // Dotted lines: connect p0-p1 (line 1) and p2-p3 (line 2) if picked
  if(_pickedPts.length>=2){
    tempGeom.push({type:"extline",
      E1:_pickedPts[0].Easting,N1:_pickedPts[0].Northing,
      E2:_pickedPts[1].Easting,N2:_pickedPts[1].Northing,
      color:"rgba(74,158,255,.5)",dash:[5,5],_pick:true});
  }
  if(_pickedPts.length>=4){
    tempGeom.push({type:"extline",
      E1:_pickedPts[2].Easting,N1:_pickedPts[2].Northing,
      E2:_pickedPts[3].Easting,N2:_pickedPts[3].Northing,
      color:"rgba(62,207,116,.5)",dash:[5,5],_pick:true});
  }
  plotPoints();
}

// Wrapper: pick N points in sequence, then call cb(arrayOfPoints)
function _pickPoints(count, promptFn, cb){
  _pickedPts=[];
  tempGeom=tempGeom.filter(g=>g._pick!==true);
  const picked=[];
  function next(){
    if(picked.length>=count){
      _pickedPts=[];
      tempGeom=tempGeom.filter(g=>g._pick!==true);
      cb(picked);
      return;
    }
    _pickPoint(promptFn(picked.length,count), pt=>{
      if(!pt){
        _pickedPts=[];
        tempGeom=tempGeom.filter(g=>g._pick!==true);
        plotPoints();
        cb(null);
        return;
      }
      picked.push(pt);
      next();
    });
  }
  next();
}

/* ── AVERAGE POINTS — mean of repeated observations + residuals ── */
function cogoAveragePoints(){
  if(!requirePro("Average Points")) return;
  _helpContext="cogo-average";
  alphaInput("Point #s to average (comma separated, 2+):","",str=>{
    if(str===null||!str.trim())return;
    const nums=str.split(/[,\s]+/).map(s=>parseInt(s)).filter(n=>!isNaN(n));
    if(nums.length<2){alert("Enter at least 2 point numbers.");return}
    const pts=[];
    for(const n of nums){
      const p=points.find(x=>x.Point===n);
      if(!p){alert("Point #"+n+" not found.");return}
      if(pts.some(x=>x.Point===n)){alert("Point #"+n+" listed twice.");return}
      pts.push(p);
    }
    const mN=pts.reduce((s,p)=>s+p.Northing,0)/pts.length;
    const mE=pts.reduce((s,p)=>s+p.Easting,0)/pts.length;
    const zPts=pts.filter(p=>typeof p.Elevation==="number"&&!isNaN(p.Elevation));
    const mZ=zPts.length?zPts.reduce((s,p)=>s+p.Elevation,0)/zPts.length:0;
    // Residuals from the mean
    let maxH=0;
    const rows=[
      {lbl:"Points:",val:pts.map(p=>"#"+p.Point).join(", ")},
      {lbl:"Mean N:",val:mN.toFixed(4)},
      {lbl:"Mean E:",val:mE.toFixed(4)},
      ...(zPts.length?[{lbl:"Mean Z:",val:mZ.toFixed(4)+" ("+zPts.length+" of "+pts.length+" pts)"}]:[]),
    ];
    pts.forEach(p=>{
      const dN=p.Northing-mN, dE=p.Easting-mE, dH=Math.hypot(dN,dE);
      if(dH>maxH)maxH=dH;
      rows.push({lbl:"#"+p.Point+" resid:",val:
        "dN "+(dN>=0?"+":"")+dN.toFixed(3)+"  dE "+(dE>=0?"+":"")+dE.toFixed(3)+"  ("+dH.toFixed(3)+")"});
    });
    const tol=units==="ft"?0.10:0.03;
    rows.push({lbl:"Max spread:",val:maxH.toFixed(3)+" "+units+(maxH<tol?"  \u2713 Good":"  \u26a0 Review")});
    showResult("Average of "+pts.length+" Points",rows,[
      {txt:"Save Mean as New Point",cls:"ok",fn:()=>_saveCogoPoint({Northing:mN,Easting:mE,Elevation:mZ},null,null,"AVG")},
      {txt:"Done",cls:"",fn:()=>{}},
    ]);
  });
}

function cogoInverse(){
  _helpContext="cogo-inverse";
  _pickPoints(2,(i)=>i===0?"Tap FROM point":"Tap TO point",pts=>{
    if(!pts)return;
    const pa=pts[0],pb=pts[1];
    const dE=pb.Easting-pa.Easting,dN=pb.Northing-pa.Northing,dZ=(pb.Elevation||0)-(pa.Elevation||0);
    const hd=Math.hypot(dE,dN);
    let az=Math.atan2(dE,dN)*180/Math.PI;if(az<0)az+=360;
    const slope=Math.hypot(hd,dZ);
    const grade=hd>0?(dZ/hd)*100:0;
    const u=units;
    showResult("Inverse #"+pa.Point+"→#"+pb.Point,[
      {lbl:"ΔN:",val:dN.toFixed(3)+" "+u},{lbl:"ΔE:",val:dE.toFixed(3)+" "+u},{lbl:"ΔZ:",val:dZ.toFixed(3)+" "+u},
      {lbl:"Azimuth:",val:fmtBrg(az)},{lbl:"Horiz D:",val:hd.toFixed(3)+" "+u},
      {lbl:"Slope D:",val:slope.toFixed(3)+" "+u},{lbl:"Grade:",val:grade.toFixed(2)+"%"},
    ],[
      {txt:"Save Midpoint",cls:"blue",fn:()=>_saveCogoPoint({Northing:(pa.Northing+pb.Northing)/2,Easting:(pa.Easting+pb.Easting)/2,Elevation:(pa.Elevation+pb.Elevation)/2},pa.Point,pb.Point,"MID")},
      {txt:"Stakeout to #"+pb.Point,cls:"ok",fn:()=>_doStakeout(pb,"#"+pb.Point)},
    ]);
  });
}

function intBearBear(){
  _helpContext="cogo-bb";
  _pickPoint("Tap Point 1",p1=>{if(!p1)return;
    bearingInput("Az from #"+p1.Point+":","",az1=>{if(!az1)return;const a1=parseBrg(az1);if(isNaN(a1))return alert("Bad az");
      _pickPoint("Tap Point 2",p2=>{if(!p2)return;
        bearingInput("Az from #"+p2.Point+":","",az2=>{if(!az2)return;const a2=parseBrg(az2);if(isNaN(a2))return alert("Bad az");
          const r1=a1*Math.PI/180,r2=a2*Math.PI/180;
          const den=Math.sin(r1)*Math.cos(r2)-Math.cos(r1)*Math.sin(r2);
          if(Math.abs(den)<1e-10)return alert("Lines are parallel.");
          const t=((p2.Easting-p1.Easting)*Math.cos(r2)-(p2.Northing-p1.Northing)*Math.sin(r2))/den;
          const ei=p1.Easting+t*Math.sin(r1), ni=p1.Northing+t*Math.cos(r1);
          tempGeom=[
            {type:"ray",E:p1.Easting,N:p1.Northing,az:a1,color:"rgba(74,158,255,.5)"},
            {type:"ray",E:p2.Easting,N:p2.Northing,az:a2,color:"rgba(62,207,116,.5)"},
          ];
          tempIntersections=[{Easting:ei,Northing:ni}]; plotPoints();
          zoomToPoints([{E:p1.Easting,N:p1.Northing},{E:p2.Easting,N:p2.Northing},{E:ei,N:ni}]);
          showResult("Bearing–Bearing Intersection",[
            {lbl:"N:",val:ni.toFixed(4)},{lbl:"E:",val:ei.toFixed(4)},
          ],[
            {txt:"Save as Point",cls:"ok",fn:()=>{tempGeom=[];tempIntersections=[];plotPoints();_promptSaveInt(ei,ni,p1.Point,p2.Point)}},

function intArcLine(){

        calculatorInput("Line To Point #:","",l2=>{if(!l2)return;
          const pb=points.find(p=>p.Point==+l2);if(!pb)return alert("Not found");

          const a=dx*dx+dy*dy;
          const b=2*(fx*dx+fy*dy);

          });

              {lbl:"N:",val:sols[0].N.toFixed(4)},{lbl:"E:",val:sols[0].E.toFixed(4)},
