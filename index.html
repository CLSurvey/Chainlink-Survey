    // Build coord display
    let boxHtml =
      `<span class="lbl">N:</span>&nbsp;<span class="val">${p.Northing.toFixed(4)}</span>&nbsp;&nbsp;`+
      `<span class="lbl">E:</span>&nbsp;<span class="val">${p.Easting.toFixed(4)}</span><br>`+
      `<span class="lbl">Z:</span>&nbsp;<span class="val">${(p.Elevation||0).toFixed(4)}</span>&nbsp;&nbsp;`+
      `<span class="lbl">Desc:</span>&nbsp;<span class="val">${p.Description||"—"}</span>`;
    // Computed shot data
    if(p.HorizDist){
      boxHtml += `<br><span class="lbl">HD:</span>&nbsp;<span class="val">${Number(p.HorizDist).toFixed(3)} ${units}</span>&nbsp;&nbsp;`+
        `<span class="lbl">True Az:</span>&nbsp;<span class="val">${p.TrueAz||"—"}</span>`;
    }
    // Raw instrument data
    if(p.InstReading){
      boxHtml += `<br><span class="lbl" style="color:var(--muted)">Raw reading:</span>&nbsp;<span class="val">${p.InstReading}</span>`;
    }
    if(p.SlopeDist){
      boxHtml += `&nbsp;&nbsp;<span class="lbl" style="color:var(--muted)">SD:</span>&nbsp;<span class="val">${Number(p.SlopeDist).toFixed(3)}</span>`;
    }
    if(p.ZenithAngle){
      boxHtml += `&nbsp;&nbsp;<span class="lbl" style="color:var(--muted)">ZA:</span>&nbsp;<span class="val">${p.ZenithAngle}</span>`;
    }
    if(p.From){
      boxHtml += `<br><span class="lbl" style="color:var(--muted)">From occ:</span>&nbsp;<span class="val">#${p.From}</span>`;
    }
    box.innerHTML = boxHtml;
    modal.appendChild(box);
    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className=`btn ${cls}`;b.textContent=t;
      b.onclick=()=>{close();selectedPoint=null;plotPoints();fn()};modal.appendChild(b)};
    mk(`⬛ Occupy #${p.Point}`,"blue",()=>{currentPoint=p;saveData()});
    mk("📍 Stakeout to Here","ok",()=>_doStakeout(p,`#${p.Point}`));
    mk("✏ Edit Point","",()=>{ _editPointMenu(p); });
    mk("🚩 Flag / Mark","",()=>flagPoint_pt(p));
    mk("↔ Connect to Another Point","blue",()=>{
      // Set this point as FROM, then enter tap mode for TO
      _connFrom=p;
      window._connClickActive=true;
      window._connClickHandler=function(toPt){
        if(toPt.Point===p.Point) return; // ignore tapping same point
        _connCancel();
        _plotStylePrompt(style=>{
          if(style!=="none"){
            _takeSnapshot("Draw Connection");
            plotConnections.push({from:p.Point,to:toPt.Point,style});
            saveData();
            showResult("✔ Connected",[
              {lbl:"From:",val:"#"+p.Point+" "+(p.Description||"")},
              {lbl:"To:",  val:"#"+toPt.Point+" "+(toPt.Description||"")},
              {lbl:"Style:",val:style},
            ],[{txt:"Connect Another",cls:"ok",fn:()=>_drawConnByTap()}]);
          }
        });
      };
      const banner=document.getElementById("intersectBanner");
      if(banner){
        banner.textContent="✔ From: Pt #"+p.Point+" — tap the TO point on the plot";
        banner.classList.add("visible");
      }
      plotPoints();
    });
    mk("✕ Delete Point","danger",()=>{
      confirmDialog(`Delete Point #${p.Point}?`,yes=>{
        if(!yes)return;
        points=points.filter(x=>x!==p);undoStack=undoStack.filter(x=>x!==p);
        plotConnections=plotConnections.filter(c=>c.to!==p.Point&&c.from!==p.Point);
        if(p===currentPoint)currentPoint=points[0]||null;
        saveData();
      });
    });
    const can=document.createElement("button");can.className="btn";can.textContent="Close";
    can.onclick=()=>{close();selectedPoint=null;plotPoints()};modal.appendChild(can);
  });
}

function _arcContextMenu(conn, connIdx){
  openModal((modal,close)=>{
    modal.innerHTML=`<h2>🌀 Arc</h2>`;
    const box=document.createElement("div");box.className="result-box";
    box.innerHTML=
      `<span class="lbl">Center N:</span>&nbsp;<span class="val">${conn.centerN.toFixed(3)}</span><br>`+
      `<span class="lbl">Center E:</span>&nbsp;<span class="val">${conn.centerE.toFixed(3)}</span><br>`+
      `<span class="lbl">Radius:</span>&nbsp;<span class="val">${conn.R.toFixed(3)} ${units}</span><br>`+
      `<span class="lbl">Arc Len:</span>&nbsp;<span class="val">${conn.arcLen.toFixed(3)} ${units}</span><br>`+
      `<span class="lbl">Delta:</span>&nbsp;<span class="val">${conn.delta.toFixed(4)}°</span><br>`+
      `<span class="lbl">Chord:</span>&nbsp;<span class="val">${conn.chord.toFixed(3)} ${units}</span><br>`+
      `<span class="lbl">Direction:</span>&nbsp;<span class="val">${conn.dir.toUpperCase()}</span>`;
    modal.appendChild(box);
    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className=`btn ${cls}`;b.textContent=t;
      b.onclick=()=>{close();selectedConn=null;plotPoints();fn()};modal.appendChild(b)};

    // If this arc belongs to a polyline, offer polyline actions
    const _plIdx=_polylineForConn(conn);
    if(_plIdx>=0) mk("▸ Polyline "+_polylines[_plIdx].name,"blue",()=>{_selPolyline=_plIdx;plotPoints();_polylineActionMenu(_plIdx);});

    // Intersect with another geometry
    mk("⊕ Intersect with Another Line/Arc","blue",()=>{
      if(!requirePro("Intersections")) return;
      intersectFirst={type:"arc", connIdx, conn};
      intersectMode=true;
      selectedConn=connIdx;
      plotPoints();
      const bn=document.getElementById("intersectBanner");
      bn.textContent="⊕ TAP SECOND LINE OR ARC — or tap empty space to cancel";
      bn.classList.add("visible");
    });

    // Midpoint of arc — point on the curve at half the sweep
    mk("◐ Midpoint of Arc","blue",()=>{
      const aMid=conn.startAngle+(conn.endAngle-conn.startAngle)/2;
      _saveCogoPoint({
        Northing:conn.centerN+conn.R*Math.sin(aMid),
        Easting: conn.centerE+conn.R*Math.cos(aMid),
        Elevation:0
      },null,null,"ARCMID");
    });

    // Offset Arc
    mk("⇔ Offset Arc","ok",()=>{
      if(!requirePro("Arc offset")) return;
      calculatorInput("Offset: +RIGHT of travel, −LEFT ("+units+"):","0",od=>{
        if(!od)return;
        const pD=parseFloat(od); if(isNaN(pD)){alert("Bad offset");return;}
        // Right of CW arc = outside = larger R; Left = inside = smaller R
        const newR = conn.dir==="cw" ? conn.R+pD : conn.R-pD;
        if(newR<=0){alert("Offset collapses arc (radius ≤0).");return;}
        const newArc=_buildArcConn(conn.centerE,conn.centerN,newR,
          conn.startBrg,conn.endBrg,conn.dir,conn.style||"solid");
        const s2=conn.startBrg*Math.PI/180, e2=conn.endBrg*Math.PI/180;
        const sE=conn.centerE+newR*Math.sin(s2), sN=conn.centerN+newR*Math.cos(s2);
        const eE=conn.centerE+newR*Math.sin(e2), eN=conn.centerN+newR*Math.cos(e2);
        let nxt=pointCounter;
        while(_ptExists(nxt))nxt++;
        const pA={Point:nxt++,Northing:sN,Easting:sE,Elevation:0,Type:"COGO",Flag:"",Description:"OFS"};
        while(_ptExists(nxt))nxt++;
        const pB={Point:nxt++,Northing:eN,Easting:eE,Elevation:0,Type:"COGO",Flag:"",Description:"OFS"};
        _takeSnapshot("Offset Arc"); points.push(pA); points.push(pB); pointCounter=nxt;
        plotConnections.push(newArc);
        saveData(); plotPoints();
        showResult("✓ Offset Arc Created",[
          {lbl:"New Radius:", val:newR.toFixed(3)+" "+units},
          {lbl:"Offset:",     val:Math.abs(pD).toFixed(3)+" "+units+" "+(pD>=0?"Right":"Left")},
          {lbl:"Start Pt:",   val:"#"+pA.Point},{lbl:"End Pt:",val:"#"+pB.Point},
        ]);
      });
    });

    // Delete arc
    mk("🗑 Delete This Arc","danger",()=>{
      _takeSnapshot("Delete Arc");
      plotConnections.splice(connIdx,1);
      saveData();
    });

    const can=document.createElement("button");can.className="btn";can.textContent="Close";
    can.onclick=()=>{close();selectedConn=null;plotPoints()};modal.appendChild(can);
  });
}

function _lineContextMenu(conn, connIdx){
  const from=points.find(p=>p.Point==conn.from);
  const to  =points.find(p=>p.Point==conn.to);
  if(!from||!to) return;
  const hd=dist2D(from,to);
  const az=azimuth(from,to);
  const azBack=((az+180)%360);

  openModal((modal,close)=>{
    modal.innerHTML=`<h2>📏 Line #${conn.from} → #${conn.to}</h2>`;
    const box=document.createElement("div");box.className="result-box";
    box.innerHTML=
      `<span class="lbl">Dist:</span>&nbsp;<span class="val">${hd.toFixed(3)} ${units}</span><br>`+
      `<span class="lbl">Az:</span>&nbsp;<span class="val">${fmtBrg(az)}</span><br>`+
      `<span class="lbl">Rev Az:</span>&nbsp;<span class="val">${toDMS(azBack)}</span>`;
    modal.appendChild(box);

    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className=`btn ${cls}`;b.textContent=t;
      b.onclick=()=>{close();selectedConn=null;plotPoints();fn()};modal.appendChild(b)};

    // If this line belongs to a polyline, offer polyline actions
    const _plIdx=_polylineForConn(conn);
    if(_plIdx>=0) mk("▸ Polyline "+_polylines[_plIdx].name,"blue",()=>{_selPolyline=_plIdx;plotPoints();_polylineActionMenu(_plIdx);});

    // Offset Line
    mk("↔ Offset Line","ok",()=>{
      calculatorInput(`Offset dist: + RIGHT, − LEFT (${units}):` ,"0",od=>{
        if(!od)return;
        const pD=parseFloat(od); if(isNaN(pD)){alert("Bad offset");return;}
        // Direction perpendicular to line (az+90 = right)
        const rp=(az+90)*Math.PI/180;
        const r=az*Math.PI/180;
        // New from/to offset perpendicular
        const nfE=from.Easting +pD*Math.sin(rp), nfN=from.Northing+pD*Math.cos(rp);
        const ntE=to.Easting   +pD*Math.sin(rp), ntN=to.Northing  +pD*Math.cos(rp);
        const nfZ=(from.Elevation+to.Elevation)/2;
        // Save two new points and connect them
        let nxt=pointCounter;
        while(_ptExists(nxt))nxt++;
        const pA={Point:nxt,Northing:nfN,Easting:nfE,Elevation:from.Elevation,Type:"COGO",Flag:"",ih:0,Description:"OFS"};
        nxt++;while(_ptExists(nxt))nxt++;
        const pB={Point:nxt,Northing:ntN,Easting:ntE,Elevation:to.Elevation,  Type:"COGO",Flag:"",ih:0,Description:"OFS"};
        nxt++;
        _takeSnapshot("Offset Line"); points.push(pA);points.push(pB);
        pointCounter=nxt;
        plotConnections.push({from:pA.Point,to:pB.Point,style:conn.style});
        saveData();
        showResult("✓ Offset Line Created",[
          {lbl:"From Pt:",val:`#${pA.Point}`},
          {lbl:"To Pt:",  val:`#${pB.Point}`},
          {lbl:"Offset:", val:Math.abs(pD).toFixed(3)+" "+units+" "+(pD>=0?"Right":"Left")},
        ]);
      });
    });

    // Reverse azimuth — flip from/to
    mk("🔄 Reverse Direction","",()=>{
      _takeSnapshot("Reverse Line"); const tmp=conn.from; conn.from=conn.to; conn.to=tmp;
      saveData();
    });

    // Midpoint of this line — no point-pair picking needed
    mk("◐ Create Midpoint","blue",()=>{
      _saveCogoPoint({
        Northing:(from.Northing+to.Northing)/2,
        Easting:(from.Easting+to.Easting)/2,
        Elevation:((from.Elevation||0)+(to.Elevation||0))/2
      },from.Point,to.Point,"MID");
    });

    // Divide line into N equal segments
    mk("✂ Divide into N Segments","blue",()=>{
      calculatorInput("Number of segments (2+):","2",ns=>{
        if(!ns)return;
        const n=parseInt(ns);
        if(isNaN(n)||n<2){alert("Enter 2 or more.");return}
        if(n>200){alert("Too many segments.");return}
        _takeSnapshot("Divide Line ÷"+n);
        let nxt=pointCounter; const made=[];
        for(let k=1;k<n;k++){
          while(_ptExists(nxt))nxt++;
          const t=k/n;
          points.push({Point:nxt,
            Northing:from.Northing+(to.Northing-from.Northing)*t,
            Easting: from.Easting +(to.Easting -from.Easting )*t,
            Elevation:(from.Elevation||0)+((to.Elevation||0)-(from.Elevation||0))*t,
            Type:"COGO",Flag:"",ih:0,Description:"DIV"});
          made.push(nxt); nxt++;
        }
        pointCounter=nxt;
        saveData();
        showResult("✓ Line Divided",[
          {lbl:"Segments:",val:String(n)},
          {lbl:"New Pts:",val:"#"+made[0]+(made.length>1?" – #"+made[made.length-1]:"")},
          {lbl:"Seg Len:",val:(hd/n).toFixed(3)+" "+units},
        ]);
      });
    });

    // Prorate point on line
    mk("⚖ Prorate Point","blue",()=>{
      cogoProrate(from, to);
    });

    // Intersect with another line or arc
    mk("⊕ Intersect with Another Line/Arc","blue",()=>{
      close();
      if(!requirePro("Intersections")) return;
      intersectFirst = {
        type: conn.type==="arc"?"arc":"line",
        connIdx, conn
      };
      intersectMode = true;
      selectedConn = connIdx;
      plotPoints();
      const bn=document.getElementById("intersectBanner");
      bn.textContent="⊕ TAP SECOND LINE OR ARC — or tap empty space to cancel";
      bn.classList.add("visible");
    });

    // Delete connection
    mk("🗑 Delete This Line","danger",()=>{
      _takeSnapshot("Delete Line");
      plotConnections.splice(connIdx,1);
      saveData();
    });

    const can=document.createElement("button");can.className="btn";can.textContent="Close";
    can.onclick=()=>{close();selectedConn=null;plotPoints()};modal.appendChild(can);
  });
}

  { id:"save", section:"Getting Started", title:"Saving & Exporting",

  { id:"shot-setup", section:"Shots", title:"Setting Up a Station",
    preview:"Occupy a point, set coords, understand orientation",
    body:`<h3>Setting Up at a Station</h3>
<p>Before taking shots, tell ChainLink where your instrument is. Tap <strong>SHOTS → Occupy Point</strong> and enter the point number. In 3D mode you'll be prompted for your instrument height (HI).</p>

<h3>Understanding Orientation in ChainLink</h3>
<p>ChainLink does not apply an orientation offset — <strong>you enter true azimuths directly</strong>. This means your total station must be set to display true (grid) azimuths before you start shooting.</p>
<h3>How to Orient Your Total Station</h3>
<p><strong>Method 1 — Backsight to a Known Point:</strong> The most common field method. Use COGO → Inverse to find the true azimuth from your station to a known backsight point. Then at your instrument, set the horizontal circle to that azimuth while aimed at the backsight. Every subsequent reading will be a true azimuth.</p>
<p><strong>Method 2 — Compass Bearing:</strong> In open terrain with no nearby control, use a hand compass to get an approximate north bearing. Set your instrument circle to 0°00'00" while pointed at magnetic north (apply declination if needed). Less accurate but workable for topographic shots where relative positions matter more than absolute.</p>
<p><strong>Method 3 — Known Azimuth Between Two Points:</strong> If you have two control points, use COGO → Inverse to compute the azimuth between them. Set up on one, backsight the other, and set your circle to that azimuth. This is the most accurate method.</p>
<div class="tip">On most total stations: aim at your backsight → press Menu/Config → Horizontal Angle → Set Angle → type the azimuth → confirm. The exact steps vary by manufacturer.</div>

<li>Amber banner appears</li>
<li>Tap any other line or arc</li>
<li>Result appears — save or cancel</li>
</ul>
<p>Works for Line×Line, Line×Arc, Arc×Arc.</p>
<div class="tip">Tap empty space to cancel at any time.</div>`},

  // ── COGO ────────────────────────────────────────────────────
  { id:"cogo-intro", section:"COGO", title:"Using COGO Functions",
    preview:"How to navigate the COGO menu and enter values",
    body:`<h3>Opening COGO</h3>
<p>Tap <strong>COGO</strong> in the bottom toolbar. The plot stays visible in the upper half of the screen so you can see what you're working with.</p>
<h3>Entering Values</h3>
<p>The numpad clears the prefilled value on first digit. Azimuths in DDD.MMSS format.</p>
<h3>Point Numbers</h3>
<p>When a field expects a point number you can type it or tap the point on the plot.</p>
<h3>Results</h3>
<p>Results appear in a panel on the canvas with temp geometry showing the computation visually before you save.</p>`},

  { id:"cogo-inverse", section:"COGO", title:"Inverse",
    preview:"Distance and bearing between two stored points",
    body:`<h3>Inverse</h3>
<p>Computes ΔN, ΔE, ΔZ, azimuth, horizontal distance, slope distance, and grade between any two stored points.</p>
<div class="tip">Use Inverse to check a field distance against a plan distance. Any discrepancy shows in ΔN/ΔE.</div>`},

  { id:"cogo-bd", section:"COGO", title:"Bearing & Distance",
    preview:"Radiate a new point from a known point",
    body:`<h3>Bearing & Distance (Radiation)</h3>
<p>Computes a new point given a starting point, true azimuth, and distance.</p>
<div class="tip">Use this to lay out control points from a known station when you can't occupy the remote point.</div>`},

  { id:"cogo-bb", section:"COGO", title:"Bearing-Bearing Intersection",
    preview:"Find where two lines of known azimuth cross",
    body:`<h3>Bearing-Bearing Intersection</h3>
<p>Finds where two rays of known true azimuth from two known points cross. Two rays drawn on canvas, intersection marked.</p>
<div class="tip">Classic use: finding the intersection of two property lines, or locating a point by triangulation from two stations.</div>`},

  { id:"cogo-dd", section:"COGO", title:"Distance-Distance Intersection",
    preview:"Find where two circles of known radius cross",
    body:`<h3>Distance-Distance Intersection</h3>
<p>Finds where two circles cross. Enter two points and a radius from each. Both solutions shown — pick the correct one.</p>
<div class="tip">Classic use: locating a missing monument from two tape measurements to found corners.</div>`},

  { id:"cogo-4pt", section:"COGO", title:"Four-Point (Line-Line)",
    preview:"Intersect two lines each defined by two points",
    body:`<h3>Four-Point Line-Line Intersection</h3>
<p>Finds where two lines cross, each defined by two stored points. Lines are extended infinitely if needed.</p>
<div class="tip">More accurate than bearing-bearing when you have monuments on each line.</div>`},

  { id:"cogo-ptline", section:"COGO", title:"Point to Line (Perpendicular)",
    preview:"Drop a perpendicular from a point to a line",
    body:`<h3>Perpendicular Offset</h3>
<p>Finds the foot of perpendicular from a point to a line, and the perpendicular distance and side.</p>
<div class="tip">Also available from the line context menu (tap a line → Offset Line).</div>`},

  { id:"cogo-arcline", section:"COGO", title:"Arc-Line Intersection",
    preview:"Find where a line crosses a circle",
    body:`<h3>Arc-Line Intersection</h3>
<p>Finds where a line crosses a circle (center point + radius). Usually gives two solutions — result shows whether each falls on the actual segment or its extension.</p>`},

  { id:"cogo-arcarc", section:"COGO", title:"Arc-Arc Intersection",
    preview:"Find where two circles cross",
    body:`<h3>Arc-Arc Intersection</h3>
<p>Finds where two circles cross given center points and radii. Pick the correct solution from the two markers.</p>`},

  { id:"cogo-area", section:"COGO", title:"Area & Perimeter",
    preview:"Compute polygon area — tap points or type numbers",
    body:`<h3>Area & Perimeter</h3>
<h3>Tap Points on Plot</h3>
<p>Tap each boundary point in order — you can also tap a line or arc to pull in its endpoints. An amber outline builds as you go. Tap the first point again to close and compute. The circles and order numbers persist through pan and zoom.</p>
<h3>Type Point Numbers</h3>
<p>Enter point numbers separated by spaces or commas.</p>
<h3>Acreage Label</h3>
<p>After computing, an amber acreage label appears at the centroid of the polygon on the canvas. Each calculation adds its own label, so you can show several parcels at once. Tap any label to delete just that one.</p>
<h3>Arc Correction</h3>
<p>If any boundary uses a draw-only arc connection, the area uses the true circular segment area rather than chord approximation.</p>
<div class="warn">Points must be in order around the polygon — CW or CCW. Out-of-order gives a wrong self-intersecting result.</div>`},

  { id:"cogo-traverse", section:"COGO", title:"Traverse Correction",
    preview:"Check and adjust a traverse loop",
    body:`<h3>Traverse Correction</h3>
<p>Tap traverse points in order on the plot, ending on your closing shot — the separate re-observation of the start. Tap <strong>Done</strong> to compute. Shows total distance, closure error, precision ratio, and ΔN/ΔE error.</p>
<div class="warn">Don't re-tap the original start point to close. The closing shot is its own point; re-tapping the start forces a zero closure.</div>
<h3>Bowditch Adjustment</h3>
<p>Distributes closure error proportionally by distance across the traverse points. The closing shot is pulled onto the start coordinate; intermediate points get proportional corrections.</p>
<div class="warn">Bowditch modifies stored coordinates permanently. Save your CSV first.</div>`},

  { id:"cogo-resection", section:"COGO", title:"Resection",
    preview:"Determine your position from observations to known points",
    body:`<h3>Resection — Find Your Position</h3>
<h3>2-Point: True Az + Distance</h3>
<p>Shoot two known points, record true azimuth and distance to each. App averages the two independent solutions and reports the residual.</p>
<h3>2-Point: Distance Only</h3>
<p>Shoot distance to two known points — no azimuth needed. Two solutions shown on canvas — pick the correct one.</p>
<h3>3-Point: Tienstra</h3>
<p>Observe azimuth to three known points. Very accurate when the three points surround your position.</p>
<div class="warn">Avoid the danger circle — if your position lies on the circumscribed circle of the three points, Tienstra is undefined.</div>`},

  { id:"cogo-prorate", section:"COGO", title:"Prorate on Line",
    preview:"Proportionate measurement for missing monuments",
    body:`<h3>Proportionate Measurement</h3>
<p>Places a lost corner proportionally between two found corners based on measured vs record distances.</p>
<p><strong>Ratio = measured total ÷ record total</strong></p>
<p><strong>Prorated distance = record distance × ratio</strong></p>
<div class="tip">Also available from the line context menu (tap a line → Prorate Point).</div>`},

  { id:"cogo-offset", section:"COGO", title:"Offset to Line",
    preview:"Place a point at a distance and perpendicular offset from a line",
    body:`<h3>Offset to Line</h3>
<p>Places a point at a measured distance along a line from the FROM end, then offset perpendicular. Positive offset = right of line looking A→B, negative = left.</p>`},

  { id:"cogo-arc", section:"COGO", title:"Arc / Curve Layout",
    preview:"Generate or draw arcs by center+radius or 3-point",
    body:`<h3>Arc / Curve Layout — Four Methods</h3>
<ul>
<li><strong>Center + Radius — Generate Points</strong> — evenly spaced points along the arc at a specified interval</li>
<li><strong>3-Point — Generate Points</strong> — fit a circle through three stored points, generate arc points</li>
<li><strong>Center + Radius — Draw Only</strong> — draws the arc as a green curve with no new points</li>
<li><strong>3-Point — Draw Only</strong> — fits and draws the arc from three points</li>
</ul>
<div class="tip">Draw-only arcs can be tapped for intersection computations. Generated arc points can be included in area calculations with arc correction automatically applied.</div>`},

  { id:"cogo-polyline", section:"COGO", title:"Polylines: Build, Offset, Manage",
    preview:"Chain points, lines, and arcs into a named polyline",
    body:`<h3>Build Polyline</h3>
<p>Tap <strong>COGO → Build Polyline</strong>, name it, then tap points in order on the plot. If an existing arc already connects two consecutive points, the segment follows the arc automatically; otherwise it's straight.</p>
<p>Tap a curved segment's arc to straighten it, or tap a different arc over the same span to switch. <strong>Undo Last</strong> removes the last vertex. Tap <strong>Done</strong> to store.</p>
<h3>Polyline Manager</h3>
<p>Tap <strong>COGO → Polyline Manager</strong> to list stored polylines. From there you can <strong>Offset Polyline</strong> (parallel copy left or right of travel, arcs offset by adjusting radius) or <strong>Delete</strong>.</p>
<p>You can also tap any line or arc that belongs to a polyline — a polyline action button appears in its context menu.</p>
<p>Polylines are saved with the job and restore from CSV backups.</p>
<div class="tip">Classic use: building a road centerline of tangents and curves, then offsetting it to get edge-of-pavement or right-of-way lines.</div>`},

  { id:"cogo-deflection", section:"COGO", title:"Angle at Point",
    preview:"Interior, exterior, and deflection angle at a vertex from three tapped points",
    body:`<h3>Angle at Point</h3>
<p>Tap <strong>COGO → Angle at Point</strong>, then tap three points on the plot. The middle point is the vertex; the first and third are the two legs.</p>
<h3>Results</h3>
<ul>
<li><strong>Interior Angle</strong> — the smaller angle between the two legs at the vertex</li>
<li><strong>Exterior Angle</strong> — the reflex angle (360° − interior)</li>
<li><strong>Deflection</strong> — signed angle from the first leg to the second: R (right) or L (left)</li>
</ul>
<p>The interior angle is drawn as a green arc on the canvas at the vertex, with the angle value labeled. Both legs shown in amber and blue.</p>
<div class="tip">Classic use: the angle at a traverse corner, the angle at a property corner, or the included angle between two lines.</div>`},

  { id:"cogo-midpoint", section:"COGO", title:"Midpoint",
    preview:"Find the midpoint between two stored points",
    body:`<h3>Midpoint</h3><p>Computes the exact midpoint between two stored points in N, E, and Z.</p>`},

  { id:"cogo-average", section:"COGO", title:"Average Points",
    preview:"Mean of repeated observations + residuals",
    body:`<h3>Average Points</h3>
<p>Enter two or more point numbers (the same feature shot several times). ChainLink computes the mean N/E/Z and shows each point's residual from the mean, plus the maximum spread with a good/review flag.</p>
<p>Save the mean as a new point. Elevations are averaged only over points that have them.</p>`},

  { id:"cogo-stationing", section:"COGO", title:"Stationing on a Polyline",
    preview:"Station/offset along an alignment",
    body:`<h3>Stationing</h3>
<p>Open <strong>Polyline Manager</strong>, tap a polyline, then:</p>
<p><strong>Sta/Offset of a Point</strong> — tap any stored point and read its station and perpendicular offset (RIGHT = +, LEFT = −) along the alignment.</p>
<p><strong>Point at Sta/Offset</strong> — enter a station as a plain distance from the start and a signed offset; ChainLink computes the coordinates and forward tangent azimuth, which you can save as a point.</p>
<p>Stations are displayed as 1+00 per 100 ft, or 1+000 per 1000 m. Arcs are followed along their true curve.</p>`},

  { id:"cogo-cutfill", section:"COGO", title:"Cut / Fill",
    preview:"Elevation comparison against a design grade or plane",
    body:`<h3>Cut / Fill</h3><p>Compares ground elevations against a design surface. Each point is flagged cut or fill with the magnitude (cut when design is above ground).</p>
<p><strong>Flat Design Elevation</strong> — one ground point against a single design height.</p>
<p><strong>3-Point Design Plane</strong> — tap three design points to define a tilted plane, then check any number of ground points against it. The plane's maximum grade is reported. Useful for rough grading and sloped pads.</p>`},

  { id:"cogo-rotate", section:"COGO", title:"Rotate / Align",
    preview:"Rotate all points to align two points to a target azimuth",
    body:`<h3>Rotate / Align</h3>
<p>Rotates all points so the line between two specified points aligns to a target azimuth. Arc centers and angles are also rotated correctly.</p>
<div class="warn">Permanently modifies all stored coordinates. Use Undo immediately if wrong.</div>`},

  { id:"cogo-translate", section:"COGO", title:"Translate",
    preview:"Shift all points by ΔN, ΔE, ΔZ",
    body:`<h3>Translate</h3>
<p>Adds a fixed offset to every point's N, E, and Z. Used to shift a local grid to real-world coordinates.</p>`},

  { id:"cogo-scale", section:"COGO", title:"Scale",
    preview:"Scale all points about a pivot point",
    body:`<h3>Scale</h3><p>Scales all coordinates about a pivot point by a given factor. Arc centers and radii are also scaled.</p>`},

  // ── STAKEOUT ────────────────────────────────────────────────
  { id:"stakeout", section:"Stakeout", title:"Stakeout",
    preview:"Navigate to a stored point or entered coordinates",
    body:`<h3>Stakeout</h3>
<p>Tap <strong>STAKEOUT → Stake to Stored Point</strong> or <strong>Stake to Entered Coords</strong>.</p>
<p>Result shows: horizontal distance, true azimuth, instrument setting, and in 3D mode: ΔZ, target elevation, rod height (TH), and cut/fill.</p>
<h3>Change Rod Height</h3>
<p>Tap <strong>Change Rod Height</strong> in the stakeout result to update TH and instantly recalculate cut/fill without re-entering the point.</p>
<div class="warn">Requires an occupied point.</div>`},

  { id:"stake-to-line", section:"Stakeout", title:"Stake to Line or Arc",
    preview:"Guide a rodman onto a baseline or curve using instrument readings",
    body:`<h3>Stake to Line or Arc</h3>
<p>Tap <strong>STAKEOUT → Stake to Line</strong>, then <strong>tap any drawn line or arc</strong> on the plot to select it — no need to pick endpoints. The chosen geometry highlights in blue.</p>
<h3>Take a Shot</h3>
<p>Shoot the rodman, then enter the instrument reading (azimuth) and horizontal distance. The corrections are reported from the instrument operator's perspective.</p>
<h3>Line Results</h3>
<ul>
<li><strong>SLIDE L/R</strong> — move the rod perpendicular to the line of sight onto the line.</li>
<li><strong>MOVE IN/OUT</strong> — move the rod along the same azimuth to where the line crosses.</li>
</ul>
<h3>Arc Results</h3>
<p>For a curve the corrections work just like a line — each one alone puts the rod on the true arc (not the chord):</p>
<ul>
<li><strong>SLIDE L/R</strong> — hold distance, step perpendicular to the line of sight onto the arc.</li>
<li><strong>MOVE IN/OUT</strong> — hold azimuth, move along the line of sight to where it crosses the arc.</li>
<li><strong>Perp offset</strong> — reference value: the true perpendicular distance off the curve (toward or away from center).</li>
</ul>
<p>If a correction's landing point falls past the end of the arc it's marked "(ext)". If you're directly radially outside the arc, SLIDE has no solution — move IN instead.</p>
<div class="tip">Re-shoot with <strong>Measure Again</strong>, or <strong>Change Geometry</strong> to stake a different line or arc.</div>`},

  // ── POINTS & DATA ───────────────────────────────────────────
  { id:"pointlist", section:"Points & Data", title:"Point List & Detail View",
    preview:"View, sort, edit, and access raw data for every point",
    body:`<h3>Point List</h3>
<p>Access from <strong>More → Point List / Edit</strong>. Tap any column header to sort. Points with raw observation data show a <strong>*</strong> after the description.</p>
<h3>Tap a Row → Detail View</h3>
<p>Opens a full detail screen showing:</p>
<ul>
<li>Computed N, E, Z, type, HD, true azimuth, from occupation</li>
<li><strong>Raw Observation</strong> section (bronze border) — instrument reading, slope distance, zenith angle, HI, TH, offsets</li>
</ul>
<h3>Edit Coords / Desc</h3>
<p>Edit any computed value directly.</p>
<h3>Re-enter Raw Reading</h3>
<p>Correct the instrument reading, distance, and in 3D mode: slope distance, zenith angle, HI, and TH. The app recomputes the point position from the original occupation.</p>
<p>If downstream points exist (points shot from this point or its children), you're offered to <strong>Rotate & Recompute Chain</strong> — applies the azimuth delta to every downstream shot and recomputes positions and elevations recursively.</p>
<div class="tip">This is the field fix for a bad backsight or wrong instrument reading.</div>`},

  { id:"longpress", section:"Points & Data", title:"Long Press to Add Point",
    preview:"Hold finger on canvas to place a point at that location",
    body:`<h3>Long Press on Canvas</h3>
<p>Hold your finger on any empty area of the plot for ~0.6 seconds. The phone vibrates and a dialog shows the world coordinates at that location.</p>
<p>Tap <strong>Save as Point #N</strong>, enter a description, and the point is stored.</p>
<div class="tip">Doesn't fire on existing points (opens point menu instead) or during area/connect-tap modes.</div>`},

  { id:"manual-entry", section:"Points & Data", title:"Manual Point Entry",
    preview:"Type in coordinates for control or design points",
    body:`<h3>Manual Point Entry</h3>
<p>Tap <strong>+ Enter Point Manually</strong> from the Point List screen. Enter point number, description, northing, easting, and optional elevation.</p>
<div class="tip">Enter control points this way before starting a job. Once stored you can occupy them, use them in COGO, and stakeout to them.</div>`},

  { id:"flag", section:"Points & Data", title:"Flagging Points",
    preview:"Mark control points and questionable shots",
    body:`<h3>Flag a Point</h3>
<p>Tap a point on the plot → <strong>🚩 Flag / Mark</strong>, or use <strong>SHOTS → Flag a Point</strong> by number. Choose:</p>
<ul>
<li><strong>★ Control</strong> — drawn as a blue triangle on the plot</li>
<li><strong>⚑ Questionable</strong> — drawn as an amber diamond</li>
<li><strong>✕ Clear Flag</strong> — back to a normal point</li>
</ul>
<p>Flags are saved with the job and survive in the CSV. Flagging is undoable.</p>
<div class="tip">Flag your control as ★ so it stands out at a glance, and mark shots to re-take as ⚑ before you leave the site.</div>`},

  { id:"connections", section:"Points & Data", title:"Drawing Connections",
    preview:"Draw lines between stored points — three methods",
    body:`<h3>Drawing Connections</h3>
<h3>During Shot Entry</h3>
<p>Set the connection style to Solid or Dashed in the shot form. Default is None.</p>
<h3>Tap a Point → Connect to Another Point</h3>
<p>Tap any point on the plot → <strong>↔ Connect to Another Point</strong> → tap the destination → choose Solid or Dashed. Fastest field method.</p>
<h3>COGO → Draw Connection</h3>
<p>Choose <strong>👆 Tap Two Points</strong> or <strong>⌨ Type Point Numbers</strong>.</p>
<h3>Managing Connections</h3>
<p>Tap a line: Offset Line, Reverse Direction, Prorate Point, Intersect, Delete.</p>`},

  { id:"elev-shift", section:"Points & Data", title:"Shift All Elevations",
    preview:"Correct assumed elevations to match a known benchmark",
    body:`<h3>Shift All Elevations</h3>
<p>Tap <strong>More → Shift All Elevations</strong>. Workflow:</p>
<ol>
<li>Enter the point number you just shot on a known elevation</li>
<li>Enter the true elevation of that point</li>
<li>App shows the delta and asks to confirm</li>
<li>All point elevations shift by that delta</li>
</ol>
<p>Fully undoable. Use when you collected data with assumed elevations and later tied into a benchmark.</p>`},

  // ── TOOLS ───────────────────────────────────────────────────
  { id:"sat-setup", section:"Satellite & GPS", title:"Satellite Imagery — What It Is & Setup",
    preview:"Put an aerial photo behind your drawing",
    body:`<h3>What This Does</h3>
<p>Normally your drawing floats on a blank background. The satellite feature puts a real aerial photo behind it, so your measured points and lines sit on top of the actual property — you can see the house, the driveway, the tree line, and how your work lines up with all of it.</p>
<p>For the photo to line up, the app needs to know one thing: <strong>where on Earth one of your points actually is</strong>. That's called anchoring, and your phone's GPS does it in one tap.</p>
<h3>Easiest Way — GPS Start</h3>
<p>When you create a new job, choose <strong>📡 GPS Start</strong>. Stand at your starting point, let the phone get a fix, and the app does the rest: it works out where you are, picks the right coordinate grid for your state, fills in the ground elevation from government survey maps, and switches the aerial photo on.</p>
<h3>Anchoring a Job You Already Have</h3>
<p>Open <strong>More → 🛰 Satellite Imagery</strong>. Stand at any point you've already recorded, tap <strong>Use Phone GPS</strong>, and the app offers two choices:</p>
<p><strong>Shift whole job to grid coords</strong> — renumbers all your coordinates onto the official state grid (recommended; nothing about the shape of your work changes, only the labels on the numbers).</p>
<p><strong>Keep local coords</strong> — your numbers stay exactly as they are; the photo just lines up behind them.</p>
<h3>What's a "State Plane zone"?</h3>
<p>The US is divided into named map grids — every state has one or a few. It's how professionals state exactly where something is using plain X/Y numbers instead of latitude/longitude. The app picks your zone automatically from the GPS fix and shows nearby alternatives in case you're close to a boundary.</p>
<h3>The 🛰 Button</h3>
<p>The 🛰 button on the right side of the plot turns the photo (and the blue GPS dot) on and off with one tap. Bright = on, dim = off.</p>
<h3>Aerial vs Topo</h3>
<p>In the 🛰 menu, <strong>Basemap</strong> switches between the aerial photo and a <strong>USGS topographic map</strong> — the classic government map style with contour lines, roads, and section lines.</p>
<div class="warn">The photo is a visual reference only. Phone GPS is accurate to roughly 10–30 ft, and aerial photos have their own small alignment errors. Never measure or set anything off the photo — your instrument measurements are the truth; the photo is just context.</div>
<div class="tip">If the photo looks slightly rotated against your linework, the <strong>Rotation nudge</strong> slider in the 🛰 menu lets you true it up by eye.</div>`},

  { id:"sat-livegps", section:"Satellite & GPS", title:"The Blue Dot — Live GPS Position",
    preview:"See where you're standing on the plot",
    body:`<h3>What the Blue Dot Means</h3>
<p>Once a job is anchored, a blue dot shows where your phone is right now, updating as you walk — the same idea as the dot in any maps app, except it's on <em>your</em> survey drawing.</p>
<p>The faint circle around it shows GPS uncertainty: the phone is somewhere inside that circle, probably near the middle. Big circle = poor signal (trees, buildings); small circle = good signal.</p>
<h3>Reading the Signals</h3>
<p><strong>"📍 acquiring GPS…"</strong> in the corner means the phone is still looking for satellites — normal for the first few seconds, and it can take longer indoors.</p>
<p>A <strong>blue arrow at the screen edge</strong> means you're off-screen in that direction — pan or zoom out to find yourself.</p>
<p>A <strong>dimmed dot</strong> means the fix is stale (no update for 15+ seconds).</p>
<h3>Turning It Off</h3>
<p>GPS uses battery. The 🛰 button toggles it together with the photo, or use <strong>📍 Live GPS marker</strong> in the 🛰 menu to control it separately.</p>
<div class="tip">The dot is a "which part of the property am I in" tool, good to a couple of car-lengths — not a precise position.</div>`},

  { id:"sat-navigate", section:"Satellite & GPS", title:"GPS Navigate — Walk to a Point",
    preview:"An arrow and distance guiding you to any point",
    body:`<h3>Walking to a Point You Can't See</h3>
<p>Say point #12 is a corner marker somewhere in the brush. Open <strong>Stakeout → 📡 GPS Navigate to Point</strong>, enter 12, and the app draws a dashed line from the blue dot (you) to the target, with a live readout at the top:</p>
<p><strong>→ #12&nbsp;&nbsp;143.2 ft&nbsp;&nbsp;@ 61°23'</strong></p>
<p>That's the distance left and the compass direction (61° is roughly northeast; 0° is north, 90° east, 180° south, 270° west). Walk, watch the number fall, and the readout turns <strong>green</strong> when you're within about 3 ft.</p>
<h3>Stopping</h3>
<p>Open the same menu entry again to stop navigating.</p>
<div class="tip">GPS gets you to the neighborhood of the point — the last few feet are for your eyes, a flag, or the instrument. That's still a huge time-saver in thick cover.</div>`},

  { id:"sat-gpspoint", section:"Satellite & GPS", title:"Store a Point Where You Stand",
    preview:"Drop a pin at your GPS position",
    body:`<h3>Marking Things As You Walk</h3>
<p>Found an iron pin, a gate, a culvert, or anything worth remembering? <strong>🛰 menu → 📌 Store Point at GPS position</strong> drops a numbered point right where you're standing and asks for a description.</p>
<h3>How It's Labeled</h3>
<p>The point gets tagged like <strong>[GPS ±15ft]</strong> so that later — in the point list or an export — nobody mistakes a rough walked-to position for a precise instrument measurement. They're different animals, and the tag keeps them honest.</p>
<div class="tip">Perfect for scouting a property before the real work: walk it once, pin everything you find, then decide where to set up.</div>`},

  { id:"sat-offline", section:"Satellite & GPS", title:"Using Imagery With No Cell Signal",
    preview:"Save the aerial photo before you leave WiFi",
    body:`<h3>The Problem</h3>
<p>The aerial photo streams from the internet, and job sites often have no signal. The fix: load the photo <em>before</em> you go.</p>
<h3>How</h3>
<p>While you're on WiFi, open the job, position the view over the property, and tap <strong>🛰 menu → ⬇ Cache visible area for offline</strong>. The app downloads and saves the photo tiles for that view at several zoom levels. Zoom out and repeat to cover a wider area.</p>
<h3>Also Automatic</h3>
<p>Any part of the photo you've simply <em>looked at</em> gets saved too. The deliberate button just makes sure the whole site is covered instead of only where you happened to scroll.</p>
<div class="tip">Everything else in ChainLink already works offline — measurements, calculations, saving. Only fresh photo areas and the elevation lookup need a connection.</div>`},

  { id:"keyboard", section:"Tools", title:"Using a Keyboard (Desktop/Laptop)",
    preview:"Type instead of tapping when on a PC",
    body:`<h3>Typing Into the Keypads</h3>
<p>On a computer, every on-screen keypad also accepts your physical keyboard: <strong>digits and letters</strong> type directly, <strong>Enter</strong> confirms or stores the shot, <strong>Backspace</strong> deletes, <strong>Tab</strong> jumps between fields in the shot form, and <strong>Esc</strong> cancels (in the shot form, Esc asks twice so you can't throw away a half-entered shot by accident).</p>
<h3>Moving Around the Plot</h3>
<p><strong>Arrow keys</strong> pan (hold Shift for bigger steps), <strong>+ / −</strong> zoom, <strong>Home</strong> resets the view, and <strong>Ctrl+Z / Ctrl+Y</strong> undo and redo.</p>
<div class="tip">Nothing changes on a phone or tablet — the touch keypads work exactly as before.</div>`},

  { id:"undo", section:"Tools", title:"Undo & Redo",
    preview:"Reverse or replay the last actions",
    body:`<h3>Undo</h3>
<p>The red <strong>↩ Undo</strong> button appears bottom-left of the canvas whenever there's something to undo. Shows exactly what action will be reversed. ChainLink keeps the last 20 undoable actions.</p>
<h3>Redo</h3>
<p>After an undo, a blue <strong>↪ Redo</strong> button appears above it to replay what you just undid. Performing any new action clears the redo chain.</p>
<h3>What Can Be Undone</h3>
<p>Every shot, COGO point, manual point, arc, connection, delete, edit, flag, rotate, translate, scale, Bowditch, orientation change, HI change, line reverse, and elevation shift.</p>
<div class="warn">Loading a job from file and clearing all data reset the undo history.</div>`},

  { id:"export", section:"Tools", title:"Export: DXF, LandXML, PDF, SVG, GeoJSON, KML",
    preview:"Export for CAD, GIS, and survey office software",
    body:`<h3>DXF Export</h3>
<p>Points on POINTS layer, labels on LABELS, solid lines on LINES, dashed on DASHED. Arcs export as true ARC entities. Readable by AutoCAD, Civil 3D, and most CAD software.</p>
<h3>LandXML Export</h3>
<p>LandXML 1.2 with N/E/Z and descriptions. Compatible with Carlson, Trimble Geomatics Office, and Leica Infinity.</p>
<h3>PDF Plot</h3>
<p>Renders the entire job — all points, linework, and labels — fitted to an A4 sheet regardless of your current zoom, with a title block, approximate scale, and north arrow. Orientation is chosen automatically from the survey's shape.</p>
<h3>SVG Export</h3>
<p>Vector linework and labels in true world units (one SVG unit = one foot or metre). Opens in Illustrator, Inkscape, and most CAD packages.</p>
<h3>GeoJSON Export</h3>
<p>Points and linework as GeoJSON features in local grid coordinates (E, N) — note these are not lon/lat.</p>
<h3>KML Export (Google Earth)</h3>
<p>Available once a job is anchored with GPS (see Satellite & GPS help). Exports your points and lines as a .kml file that opens directly in Google Earth — the easiest "here's what I measured" file to hand to a client or landowner, because they can spin the globe and see the work on real imagery with no special software. Curves are exported as straight lines between their endpoints.</p>
<div class="tip">CSV is your primary backup format. The others are for sharing with office software.</div>`},

  { id:"data-mgmt", section:"Tools", title:"Data Management Utilities",
    preview:"Delete connections, clear data, save folder, force reload",
    body:`<h3>Delete Connection</h3>
<p><strong>More → Delete Connection</strong> removes a drawn line — or just tap the line on the plot and choose Delete.</p>
<h3>Clear All Data</h3>
<p><strong>More → Clear All Data</strong> wipes the current job's points and connections after confirmation. This also resets the undo history.</p>

/* ══ HELP SYSTEM LOGIC ════════════════════════════════════════════ */

function openHelp(){
  _setHelpGuess();
  _buildHelpTopics(HELP_TOPICS);
  document.getElementById("helpPanel").classList.add("open");
  document.getElementById("helpSearchInput").value="";
  document.getElementById("helpDetail").classList.remove("open");
  document.getElementById("helpTopics").style.display="";
  // If a screen context is set, jump straight to that help topic
  if(_helpContext){
    const direct=HELP_TOPICS.find(t=>t.id===_helpContext);
    if(direct){ _showHelpDetail(direct); return; }
  }
}

function closeHelp(){
  document.getElementById("helpPanel").classList.remove("open");
}

function helpBack(){
  document.getElementById("helpTopics").style.display="";
  document.getElementById("helpDetail").classList.remove("open");
  document.getElementById("helpSearchInput").value="";
  helpFilter("");
}

function _buildHelpTopics(topics){
  const container=document.getElementById("helpTopics");
  container.innerHTML="";
  // Group by section
  const sections={};
  topics.forEach(t=>{
    if(!sections[t.section]) sections[t.section]=[];
    sections[t.section].push(t);
  });
  Object.entries(sections).forEach(([sec,items])=>{
    const sd=document.createElement("div"); sd.className="help-section";
    const st=document.createElement("div"); st.className="help-section-title";
    st.textContent=sec; sd.appendChild(st);
    items.forEach(item=>{
      const td=document.createElement("div"); td.className="help-topic";
      // Highlight suggested topics
      if(item._suggested) td.classList.add("highlighted");
      td.innerHTML=`<div class="help-topic-title">${item.title}</div>
                    <div class="help-topic-preview">${item.preview}</div>`;
      td.onclick=()=>_showHelpDetail(item);
      sd.appendChild(td);
    });
    container.appendChild(sd);
  });
}

function _showHelpDetail(item){
  document.getElementById("helpTopics").style.display="none";
  document.getElementById("helpDetailBody").innerHTML=item.body;
  document.getElementById("helpDetail").classList.add("open");
}

function helpFilter(q){
  q=q.toLowerCase().trim();
  if(!q){ _buildHelpTopics(HELP_TOPICS); return; }
  const filtered=HELP_TOPICS.filter(t=>
    t.title.toLowerCase().includes(q)||
    t.preview.toLowerCase().includes(q)||
    t.body.toLowerCase().includes(q)||
    t.section.toLowerCase().includes(q)
  );
  _buildHelpTopics(filtered);
}

function _setHelpGuess(){
  const guessEl=document.getElementById("helpGuess");
  const guessText=document.getElementById("helpGuessText");
  const guess=_helpGuess();
  HELP_TOPICS.forEach(t=>delete t._suggested);
  if(guess){
    guessEl.classList.add("visible");
    guessText.textContent=guess.text;
    if(guess.topic){
      const t=HELP_TOPICS.find(t=>t.id===guess.topic);
      if(t) t._suggested=true;
    }
  } else {
    guessEl.classList.remove("visible");
  }
}

function _helpGuess(){
  // Score-based context system — pick the most relevant suggestion
  // from the full list of possible states, returning the highest priority match.
  const ptCount    = points.length;
  const shotPts    = points.filter(p=>p.Type==="Shot");
  const cogoPts    = points.filter(p=>p.Type==="COGO"||p.Type==="Manual");
  const connCount  = plotConnections.length;
  const arcCount   = plotConnections.filter(c=>c.type==="arc").length;
  const hasShots   = shotPts.length>0;
  const hasCOGO    = cogoPts.length>0;
  const is3D       = surveyMode==="3D";
  const occ        = currentPoint;
  const hasOri     = orientationChosen;
  const lastSnap   = _snapshots.length>0?_snapshots[_snapshots.length-1]:null;
  const lastAction = lastSnap?lastSnap.label:"";

  // ── Highest priority: critical missing setup ──────────────────
  if(ptCount<=1)
    return {text:"Just getting started? Make sure your instrument circle is set to true azimuths, then tap SHOTS → Occupy Point and take your first shot.",topic:"shot-setup"};

  // ── 3D mode checks ────────────────────────────────────────────
  if(is3D&&hasShots){
    const badElev=shotPts.filter(p=>p.Elevation===100||p.Elevation===0);
    if(badElev.length===shotPts.length)
      return {text:"All your 3D shots have default elevations (0 or 100). Check that you’re entering the zenith angle correctly — 90° = level.",topic:"shot-3d"};
    const noHI=shotPts.filter(p=>p.SlopeDist&&!p.IH&&p.IH!==0);
    if(noHI.length>0&&shotPts.length>0)
      return {text:"Some shots may be missing an instrument height (HI). In 3D mode, HI is shown in the shot form header — tap it to change.",topic:"shot-3d"};
  }

  // ── Just took a shot ─────────────────────────────────────────
  if(lastAction.startsWith("Shot Pt")){
    if(connCount===0)
      return {text:"Shot stored. Want to connect it to your previous point? Set the connection style to Solid in the shot form, or use COGO → Draw Connection.",topic:"connections"};
    return {text:"Shot stored. Keep shooting, or tap a point on the plot to occupy it, stakeout to it, or edit it.",topic:"shot-2d"};
  }

  // ── Just ran a COGO operation ─────────────────────────────────
  if(lastAction==="COGO Pt"||lastAction.startsWith("COGO"))
    return {text:"COGO point saved. You can use it in further computations, stakeout to it, or occupy it as a new station.",topic:"cogo-intro"};

  // ── Just did a transform ─────────────────────────────────────
  if(lastAction==="Rotate"||lastAction==="Translate"||lastAction.startsWith("Scale"))
    return {text:"Transform applied. If something looks wrong, the Undo button (↩) is in the bottom-left of the canvas.",topic:"undo"};

  // ── Just deleted something ────────────────────────────────────
  if(lastAction.startsWith("Delete"))
    return {text:"Deleted. If that was a mistake, tap the ↩ Undo button on the canvas right now.",topic:"undo"};

  // ── Has shots but no connections ─────────────────────────────
  if(hasShots&&connCount===0&&shotPts.length>2)
    return {text:"You have "+shotPts.length+" shots with no lines drawn between them. Connect them during shot entry (choose Solid or Dashed), or use COGO → Draw Connection.",topic:"connections"};

  // ── Has enough for area calc ──────────────────────────────────
  if(ptCount>=4&&connCount>=3&&!hasCOGO)
    return {text:"You have enough points to compute an area or run a traverse closure. Try COGO → Area & Perimeter.",topic:"cogo-area"};

  // ── Has control pts but no shots yet ─────────────────────────
  if(!hasShots&&cogoPts.length>0)
    return {text:"Control points are set up. Occupy one (tap it on the plot → Occupy) and start taking shots.",topic:"shot-setup"};

  // ── Has arc connections ───────────────────────────────────────
  if(arcCount>0&&!hasCOGO)
    return {text:"You have a drawn arc. You can tap it to intersect it with a line, or include it in an area computation for exact curved area.",topic:"plot-intersect-tap"};

  // ── Not saved recently ────────────────────────────────────────
  if(ptCount>8&&connCount>3)
    return {text:"Good amount of data collected. Consider saving a CSV backup — More → Save CSV to Folder.",topic:"save"};

  // ── Generic active job ────────────────────────────────────────
  if(hasShots&&connCount>0)
    return {text:"Job is active with "+ptCount+" points and "+connCount+" connections. Try Inverse, Area, or a COGO intersection.",topic:"cogo-intro"};

  // ── Fallback ──────────────────────────────────────────────────
  return {text:"Tap any topic below to learn more, or type in the search box.",topic:null};
}

window.addEventListener("resize",plotPoints);
// Desktop keyboard shortcuts — Ctrl/Cmd+Z undo, Ctrl+Y or Ctrl/Cmd+Shift+Z redo.
// Ignored while typing in an input so text-field undo still works.
window.addEventListener("keydown",e=>{
  const tag=(e.target&&e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea"||(e.target&&e.target.isContentEditable))return;
  if(_modalStack.length)return; // don't undo canvas edits while a keypad/modal is open
  const mod=e.ctrlKey||e.metaKey;
  if(!mod)return;
  const k=e.key.toLowerCase();
  if(k==="z"&&!e.shiftKey){e.preventDefault();if(_snapshots.length||undoStack.length)undoFromCanvas();}
  else if(k==="y"||(k==="z"&&e.shiftKey)){e.preventDefault();if(_redoStack.length)redoFromCanvas();}
});

// Physical keyboard support — routes desktop keys to the on-screen keypad
// buttons in the topmost open modal. No keypad logic is duplicated: we just
// find the visible button whose label matches the key and click it, so
// mobile/touch behavior is completely unaffected.
window.addEventListener("keydown",e=>{
  if(!_modalStack.length)return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const tag=(e.target&&e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea"||(e.target&&e.target.isContentEditable))return;
  const modal=_modalStack[_modalStack.length-1].querySelector(".modal");
  if(!modal)return;
  const btns=[...modal.querySelectorAll("button")].filter(b=>b.offsetParent!==null); // visible only
  const byText=t=>btns.find(b=>b.textContent===t);
  const k=e.key;

  // Tab / Shift+Tab cycles fields in the shot form (.sf-val tiles)
  if(k==="Tab"){
    const vals=[...modal.querySelectorAll(".sf-val")].filter(v=>v.onclick);
    if(vals.length>1){
      e.preventDefault();
      const i=vals.findIndex(v=>v.classList.contains("active"));
      vals[(i+(e.shiftKey?-1:1)+vals.length)%vals.length].click();
    }
    return;
  }

  let target=null;
  if(/^[0-9.]$/.test(k)) target=byText(k);
  else if(k===",") target=byText(",")||byText(".");            // decimal-comma keyboards
  else if(k==="-") target=byText("-")||byText("+/-");
  else if(k==="Backspace") target=byText("⌫")||byText("⌫ DEL");
  else if(k==="Delete") target=byText("CLR");
  else if(k==="Enter") target=byText("OK")||byText("✓ STORE SHOT")||byText("✓ Done");
  else if(k==="Escape"){
    target=byText("CANCEL")||byText("Cancel")||byText("Close")||byText("No");
    // Shot form holds in-progress data — require a second Esc within 1.2s
    if(target && modal.querySelector(".sf-val")){
      const now=Date.now();
      if(!window._escArm || now-window._escArm>1200){
        window._escArm=now; e.preventDefault();
        target.textContent="Press Esc again to cancel";
        setTimeout(()=>{ if(target.isConnected) target.textContent="Cancel"; },1200);
        return;
      }
      window._escArm=0;
    }
  }
  else if(k===" ") target=byText("SPC");
  else if(k==="/") target=byText("/");
  else if(/^[a-zA-Z]$/.test(k)) target=byText(k.toUpperCase()); // alpha grid + quad N/S/E/W

  if(target){e.preventDefault();target.click();}
});

// Plot navigation from a physical keyboard — arrows pan the view in the
// arrow's direction (map convention), +/- zoom, Home resets. Inactive while
// a modal, the job screen, or the help panel is open, or when typing.
window.addEventListener("keydown",e=>{
  if(_modalStack.length)return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const tag=(e.target&&e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea"||(e.target&&e.target.isContentEditable))return;
  const js=document.getElementById("jobScreen");
  if(js&&getComputedStyle(js).display!=="none")return;
  const hp=document.getElementById("helpPanel");
  if(hp&&getComputedStyle(hp).display!=="none")return;
  const step=e.shiftKey?200:60;
  switch(e.key){
    case "ArrowUp":    e.preventDefault(); panBy(0,-step); break;
    case "ArrowDown":  e.preventDefault(); panBy(0, step); break;
    case "ArrowLeft":  e.preventDefault(); panBy( step,0); break;
    case "ArrowRight": e.preventDefault(); panBy(-step,0); break;
    case "+": case "=": e.preventDefault(); zoomBy(1.25); break;
    case "-": case "_": e.preventDefault(); zoomBy(0.8);  break;
    case "Home":       e.preventDefault(); resetPlot();   break;
  }
});

/* ── Splash chain canvas ───────────────────────────────────── */
(function(){
  const canvas = document.getElementById('splashChain');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const LW=28, LH=14, TH=2.8, PITCH=20;
  const AMBER='#f0a020', BRONZE='#c87830', BG='#0a0905';

  function rrect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  let offset=0;
  function drawSplashChain(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=BG;
    rrect(ctx,2,H/2-LH/2-3,W-4,LH+6,5); ctx.fill();
    ctx.strokeStyle='#2a2010'; ctx.lineWidth=.8; ctx.stroke();
    const cy=H/2;
    const count=Math.ceil(W/PITCH)+4;
    const startX=(offset%PITCH)-PITCH*2;
    ctx.save();
    rrect(ctx,3,H/2-LH/2-2,W-6,LH+4,4); ctx.clip();
    // Pass 1: all links
    for(let i=0;i<count;i++){
      const cx=startX+i*PITCH;
      const color=i%2===0?AMBER:BRONZE;
      ctx.beginPath(); ctx.ellipse(cx,cy,LW/2,LH/2,0,0,Math.PI*2);
      ctx.strokeStyle=color; ctx.lineWidth=TH; ctx.stroke();
      ctx.beginPath(); ctx.ellipse(cx,cy,LW/2-TH*1.1,LH/2-TH*1.1,0,0,Math.PI*2);
      ctx.strokeStyle=color; ctx.lineWidth=TH*.35; ctx.globalAlpha=.28; ctx.stroke(); ctx.globalAlpha=1;
    }
    // Pass 2: right halves of amber over bronze
    for(let i=0;i<count;i+=2){
      const cx=startX+i*PITCH;
      ctx.save();
      ctx.beginPath(); ctx.rect(cx,cy-LH,LW/2+1,LH*2); ctx.clip();
      ctx.beginPath(); ctx.ellipse(cx,cy,LW/2,LH/2,0,0,Math.PI*2);
      ctx.strokeStyle=AMBER; ctx.lineWidth=TH; ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
    // Fades
    const fl=ctx.createLinearGradient(0,0,22,0);
    fl.addColorStop(0,BG); fl.addColorStop(1,'rgba(10,9,5,0)');
    ctx.fillStyle=fl; ctx.fillRect(0,0,22,H);
    const fr=ctx.createLinearGradient(W-22,0,W,0);
    fr.addColorStop(0,'rgba(10,9,5,0)'); fr.addColorStop(1,BG);
    ctx.fillStyle=fr; ctx.fillRect(W-22,0,22,H);
  }
  function tickChain(){offset-=0.5;drawSplashChain();requestAnimationFrame(tickChain);}
  tickChain();
})();
