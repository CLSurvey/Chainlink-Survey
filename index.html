// ── AREA CALCULATION — module-level state ────────────────────────
let _areaPoly = [];
let _areaArcs = [];   // arcs the user explicitly tapped for this selection
let _areaMode = false;

function _areaCancel(){
  _areaMode = false;
  window._areaClickActive = false;
  window._areaClickHandler = null;
  window._connClickCancelCb = null;
  _areaPoly = [];
  _areaArcs = [];
  tempGeom = [];
  const banner = document.getElementById("intersectBanner");
  if(banner){
    banner.classList.remove("visible");
    banner.textContent = "⊕ TAP SECOND LINE OR ARC — or tap empty space to cancel";
  }
  plotPoints();
}

function _areaUpdateDisplay(){
  // Preview the ACTUAL boundary: resolve every edge exactly as the area
  // math will (shared resolver), drawing arcs as arcs and lines as solid
  // lines — committed edges bright, the implied closing edge faint.
  tempGeom = [];
  const n=_areaPoly.length;
  if(n>=2){
    const edges=_resolvePolyEdges(_areaPoly,_areaArcs);
    const BRIGHT="rgba(240,160,32,.85)", FAINT="rgba(240,160,32,.35)";
    const push=(i,color)=>{
      const p1=_areaPoly[i], p2=_areaPoly[(i+1)%n];
      const ea=edges[i];
      if(ea){
        tempGeom.push({type:"bndarc",cx:ea.cx,cy:ea.cy,R:ea.R,
                       tA:ea.tA,tB:ea.tB,dt:ea.dt,color});
      } else {
        tempGeom.push({type:"bndline",
          E1:p1.Easting,N1:p1.Northing,
          E2:p2.Easting,N2:p2.Northing,color});
      }
    };
    for(let i=0;i<n-1;i++)push(i,BRIGHT);
    // Closing edge: only meaningful for 3+ points, or 2 points where the
    // committed edge is an arc (segment figure — closing chord differs)
    if(n>=3 || (n===2 && edges[0]))push(n-1,FAINT);
  }
  // Circles are now drawn inside plotPoints() so they survive pan/zoom
  plotPoints();
}

function _areaFinish(){
  // 2 points are enough when an explicitly tapped arc spans them — arc +
  // closing chord encloses a circular segment. Otherwise 3+ points required.
  if(_areaPoly.length<3){
    const segOK=_areaPoly.length===2 && _arcForEdge(_areaPoly[0],_areaPoly[1],_areaArcs);
    if(!segOK){ alert("Need at least 3 points (or 2 spanned by a tapped arc)."); _areaCancel(); return; }
  }
  const poly=_areaPoly.slice();
  const arcs=_areaArcs.slice();
  _areaCancel();

  const {area, perimeter, arcUsed} = _computePolyArea(poly,arcs);
  const perim = perimeter;

  const ids=poly.map(p=>p.Point);
  const u=units;
  const rows=[
    {lbl:"Points:",val:ids.join("→")},
    {lbl:"Perimeter:",val:perim.toFixed(3)+" "+u},
  ];
  if(u==="ft"){
    rows.push({lbl:"Area (sq ft):",val:area.toFixed(2)+(arcUsed?" ✓ arc corrected":"")});
    rows.push({lbl:"Acres:",val:(area/43560).toFixed(4)});
    rows.push({lbl:"Sq Yd:",val:(area/9).toFixed(2)});
  } else {
    rows.push({lbl:"Area (m²):",val:area.toFixed(2)+(arcUsed?" ✓ arc corrected":"")});
    rows.push({lbl:"Hectares:",val:(area/10000).toFixed(4)});
  }
  // Draw area label at polygon centroid on the canvas
  _drawAreaLabel(poly, area, u, arcs.map(c=>({cx:c.centerE,cy:c.centerN,R:c.R})));
  showResult("Area & Perimeter",rows);
}

// ── Shared edge resolver ─────────────────────────────────────────────────────
// For the closed polygon implied by poly, returns a per-edge array of arc
// descriptors {cx,cy,R,tA,tB,dt} or null (straight edge). Used by BOTH the
// area math and the selection preview so they can never disagree.
// Arc participation rules:
//  • An edge with an endpoint INTERIOR to a drawn arc follows the sub-arc
//    (the user selected a point on the curve — intent is explicit).
//  • An edge spanning a FULL arc follows it only if the user explicitly
//    tapped that arc (explicitArcs); otherwise it is a straight chord.
//  • A full-arc edge is demoted to a chord if other edges trace parts of the
//    same arc, or an earlier edge already took the full arc.
function _resolvePolyEdges(poly,explicitArcs){
  const n=poly.length;
  const cand=new Array(n).fill(null);
  for(let i=0;i<n;i++) cand[i]=_arcForEdge(poly[i],poly[(i+1)%n],explicitArcs);
  const edgeArc=new Array(n).fill(null);
  const fullTaken=new Set();
  for(let i=0;i<n;i++){
    const a=cand[i];
    if(!a) continue;
    if(a.full){
      if(fullTaken.has(a.conn)) continue;
      if(cand.some((b,k)=>k!==i&&b&&!b.full&&b.conn===a.conn)) continue;
      fullTaken.add(a.conn);
    }
    edgeArc[i]={cx:a.conn.centerE,cy:a.conn.centerN,R:a.conn.R,tA:a.tA,tB:a.tB,dt:a.dt};
  }
  return edgeArc;
}

// ── Polygon area with arc correction (Green's theorem) ──────────────────────
// Exact area for perimeters mixing straight edges, draw-only arcs, and runs of
// generated arc points. All contributions go into one signed accumulator S
// (∮ x dy − y dx), so convex/concave arcs and CW/CCW traversal all resolve
// correctly; area = |S|/2 at the end.
function _computePolyArea(poly,explicitArcs){
  const n=poly.length;
  let S=0, perim=0, arcUsed=false;

  // 1) Draw-only arcs — via the shared resolver
  const edgeArc=_resolvePolyEdges(poly,explicitArcs||[]);

  // 2) Runs of generated arc points (consecutive dashed connections).
  //    Fit a circumcircle to the run and verify every run point lies on it
  //    before treating the edges as arc edges — straight dashed lines pass
  //    through untouched.
  function findDashed(a,b){
    return plotConnections.find(c=>c.style==="dashed"&&!c.type&&
      ((c.from===a&&c.to===b)||(c.from===b&&c.to===a)));
  }
  let i=0, scanned=0;
  while(i<n&&scanned<n){
    if(edgeArc[i]||!findDashed(poly[i].Point,poly[(i+1)%n].Point)){i++;scanned++;continue;}
    // Collect the consecutive dashed run starting at edge i
    const runIdx=[i];
    let j=i;
    while(runIdx.length<n){
      const nxt=(j+1)%n;
      if(edgeArc[nxt]||!findDashed(poly[nxt].Point,poly[(nxt+1)%n].Point))break;
      runIdx.push(nxt); j=nxt;
    }
    const runPts=runIdx.map(k=>poly[k]); runPts.push(poly[(j+1)%n]);
    if(runPts.length>=3){
      const a=runPts[0], b=runPts[Math.floor(runPts.length/2)], c=runPts[runPts.length-1];
      const ax=a.Easting,ay=a.Northing,bx=b.Easting,by=b.Northing,cx=c.Easting,cy=c.Northing;
      const D=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
      if(Math.abs(D)>1e-10){
        const ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/D;
        const uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/D;
        const R=Math.hypot(ax-ux,ay-uy);
        const tol=Math.max(0.02,R*1e-4);
        const onCircle=runPts.every(p=>Math.abs(Math.hypot(p.Easting-ux,p.Northing-uy)-R)<tol);
        if(onCircle){
          for(const k of runIdx){
            const p1=poly[k], p2=poly[(k+1)%n];
            const tA=Math.atan2(p1.Northing-uy,p1.Easting-ux);
            const tB=Math.atan2(p2.Northing-uy,p2.Easting-ux);
            let dt=tB-tA;                       // shortest way around — interval
            while(dt> Math.PI)dt-=2*Math.PI;    // chords are well under 180°
            while(dt<-Math.PI)dt+=2*Math.PI;
            edgeArc[k]={cx:ux,cy:uy,R,tA,tB,dt};
          }
        }
      }
    }
    scanned+=runIdx.length;
    i=j+1;
    if(i>=n)break;
  }

  // 3) Accumulate — Green's theorem for arc edges, shoelace for straight
  for(let k=0;k<n;k++){
    const p1=poly[k], p2=poly[(k+1)%n];
    const ea=edgeArc[k];
    if(ea){
      arcUsed=true;
      // ∫(x dy − y dx) along arc, t: tA → tA+dt
      S += ea.R*ea.cx*(Math.sin(ea.tB)-Math.sin(ea.tA))
         - ea.R*ea.cy*(Math.cos(ea.tB)-Math.cos(ea.tA))
         + ea.R*ea.R*ea.dt;
      perim += ea.R*Math.abs(ea.dt);
    } else {
      S += p1.Easting*p2.Northing - p2.Easting*p1.Northing;
      perim += Math.hypot(p2.Easting-p1.Easting, p2.Northing-p1.Northing);
    }
  }
  return {area:Math.abs(S)/2, perimeter:perim, arcUsed};
}

// Match a polygon edge to a draw-only arc connection. Both edge endpoints
// must lie ON the arc (within tolerance). Sub-arc (interior point) matches
// are automatic; FULL-span (endpoint-to-endpoint) matches are returned only
// for arcs in explicitArcs — the user must have tapped the arc itself,
// otherwise an edge between an arc's two endpoints is just a chord.
// Returns {conn,tA,tB,dt,full} or null.
function _arcForEdge(p1,p2,explicitArcs){
  const tol=0.05;
  const exp=explicitArcs||[];
  for(const c of plotConnections){
    if(c.type!=="arc")continue;
    const span=Math.abs(c.endAngle-c.startAngle);
    if(span<1e-9)continue;
    const s1=_arcPos(c,p1,tol), s2=_arcPos(c,p2,tol);
    if(s1===null||s2===null)continue;
    if(Math.abs(s1-s2)*c.R<tol)continue;        // degenerate — same spot on arc
    const angTol=tol/Math.max(c.R,1e-9);
    const full=Math.min(s1,s2)<angTol && Math.max(s1,s2)>span-angTol;
    if(full && !exp.includes(c))continue;        // chord unless arc was tapped
    const sgn=c.endAngle>=c.startAngle?1:-1;     // arc sweep direction
    const tA=c.startAngle+sgn*s1;
    const tB=c.startAngle+sgn*s2;
    return {conn:c,tA,tB,dt:tB-tA,full};
  }
  return null;
}

// Angular position of point p along arc c, measured from the arc's start in
// its sweep direction, clamped to [0,|sweep|]. Returns null if p is not on
// the arc (off the circle, or outside the swept span).
function _arcPos(c,p,tol){
  const dE=p.Easting-c.centerE, dN=p.Northing-c.centerN;
  if(Math.abs(Math.hypot(dE,dN)-c.R)>tol)return null;
  const span=Math.abs(c.endAngle-c.startAngle);
  const sgn=c.endAngle>=c.startAngle?1:-1;
  let s=sgn*(Math.atan2(dN,dE)-c.startAngle);
  s=((s%(2*Math.PI))+2*Math.PI)%(2*Math.PI);   // → [0, 2π)
  const angTol=tol/Math.max(c.R,1e-9)+1e-9;
  if(s<=span+angTol)return Math.min(s,span);
  if(s>=2*Math.PI-angTol)return 0;             // numerically just below start
  return null;
}

// Area labels on the plot — each carries its point numbers so it can be
// recomputed if those points move. Multiple labels coexist.
let _areaLabels = [];

function _drawAreaLabel(poly, area, u, arcSigs){
  const cE = poly.reduce((s,p)=>s+p.Easting,  0)/poly.length;
  const cN = poly.reduce((s,p)=>s+p.Northing, 0)/poly.length;
  const label = u==="ft"
    ? (area/43560).toFixed(4)+" ac"
    : (area/10000).toFixed(4)+" ha";
  // Store point numbers so we can recompute if points move
  const ptNums = poly.map(p=>p.Point);
  _areaLabels.push({E:cE, N:cN, label, ptNums, u, arcSigs:arcSigs||[]});
  saveData();
}

function _recomputeAreaLabels(){
  if(!_areaLabels.length) return;
  // Recompute each label against current point coordinates; drop any whose
  // polygon no longer has enough surviving points.
  _areaLabels = _areaLabels.filter(lbl=>{
    if(!lbl.ptNums) return false;
    const poly = lbl.ptNums.map(n=>points.find(p=>p.Point===n)).filter(Boolean);
    if(poly.length < 3) return false;
    // Re-resolve explicitly selected arcs by signature
    const arcs=(lbl.arcSigs||[]).map(s=>
      plotConnections.find(c=>c.type==="arc" &&
        Math.abs(c.centerE-s.cx)<0.01 && Math.abs(c.centerN-s.cy)<0.01 &&
        Math.abs(c.R-s.R)<0.01)
    ).filter(Boolean);
    const {area} = _computePolyArea(poly,arcs);
    const cE = poly.reduce((s,p)=>s+p.Easting, 0)/poly.length;
    const cN = poly.reduce((s,p)=>s+p.Northing,0)/poly.length;
    const u = lbl.u||units;
    lbl.label = u==="ft"
      ? (area/43560).toFixed(4)+" ac"
      : (area/10000).toFixed(4)+" ha";
    lbl.E = cE;
    lbl.N = cN;
    return true;
  });
}

// Tap a line or arc in area mode — pull its endpoints into the perimeter,
// continuing from the current chain. Closing back to the first point finishes.
function _areaTapConn(conn){
  let eA=null, eB=null;
  if(conn.type==="arc"){
    const tol=0.05;
    const sE=conn.centerE+conn.R*Math.cos(conn.startAngle);
    const sN=conn.centerN+conn.R*Math.sin(conn.startAngle);
    const fE=conn.centerE+conn.R*Math.cos(conn.endAngle);
    const fN=conn.centerN+conn.R*Math.sin(conn.endAngle);
    eA=points.find(p=>Math.hypot(p.Easting-sE,p.Northing-sN)<tol);
    eB=points.find(p=>Math.hypot(p.Easting-fE,p.Northing-fN)<tol);
    if(!eA||!eB){
      const banner=document.getElementById("intersectBanner");
      if(banner)banner.textContent="⚠ Arc has no survey points at its ends — tap points instead";
      return;
    }
    if(!_areaArcs.includes(conn))_areaArcs.push(conn);  // explicit selection
  } else {
    eA=points.find(p=>p.Point==conn.from);
    eB=points.find(p=>p.Point==conn.to);
    if(!eA||!eB)return;
  }
  // Order the pair to continue from the end of the current chain
  const last=_areaPoly[_areaPoly.length-1];
  let seq=[eA,eB];
  if(last){
    if(last.Point===eB.Point) seq=[eB,eA];
    else if(last.Point!==eA.Point){
      const dA=Math.hypot(eA.Easting-last.Easting,eA.Northing-last.Northing);
      const dB=Math.hypot(eB.Easting-last.Easting,eB.Northing-last.Northing);
      if(dB<dA) seq=[eB,eA];
    }
  }
  for(const pt of seq){
    if(_areaPoly.length>=2 && pt.Point===_areaPoly[0].Point &&
       (_areaPoly.length>=3 ||
        _arcForEdge(_areaPoly[0],_areaPoly[1],_areaArcs) || conn.type==="arc")){
      window._areaClickActive=false;
      window._areaClickHandler=null;
      _areaFinish(); return;
    }
    if(_areaPoly.find(p=>p.Point===pt.Point)) continue;
    _areaPoly.push(pt);
  }
  _areaProgressBanner();
  _areaUpdateDisplay();
}


function cogoTraverseClosure(){
  if(!requirePro("Traverse correction")) return;
  _helpContext="cogo-traverse";
  // Tap-to-pick traverse points in order, Done button to finish
  const poly=[];
  let _tvDone=false;

  function _tvUpdateGeom(){
    tempGeom=tempGeom.filter(g=>g._tv!==true);
    // Draw lines between consecutive picked points
    for(let i=0;i<poly.length-1;i++){
      tempGeom.push({type:"segment",
        E1:poly[i].Easting,N1:poly[i].Northing,
        E2:poly[i+1].Easting,N2:poly[i+1].Northing,
        color:"rgba(74,158,255,.6)",_tv:true});
    }
    // Highlight only the most recently tapped point
    _pickedPts=poly.length>0?[poly[poly.length-1]]:[];
    _drawPickedOverlay();
  }

  function _tvFinish(){
    _pickedPts=[];
    tempGeom=tempGeom.filter(g=>g._tv!==true);
    window._connClickActive=false;
    window._connClickHandler=null;
    const banner=document.getElementById("intersectBanner");
    if(banner) banner.classList.remove("visible");
    if(poly.length<3){alert("Need at least 3 points.");plotPoints();return}
    plotPoints();
    let sumN=0,sumE=0,totalD=0;
    for(let i=0;i<poly.length-1;i++){
      const a=poly[i],b=poly[i+1];
      sumN+=b.Northing-a.Northing;sumE+=b.Easting-a.Easting;
      totalD+=Math.hypot(b.Easting-a.Easting,b.Northing-a.Northing);
    }
    const closD=Math.hypot(sumN,sumE);
    const ratio=closD>0?Math.round(totalD/closD):Infinity;
    let closAz=Math.atan2(sumE,sumN)*180/Math.PI;if(closAz<0)closAz+=360;
    showResult("Traverse Correction",[
      {lbl:"Points:",val:poly.map(p=>"#"+p.Point).join(" → ")},
      {lbl:"Legs:",val:poly.length-1},{lbl:"Total Dist:",val:totalD.toFixed(3)+" "+units},
      {lbl:"Closure Dist:",val:closD.toFixed(4)+" "+units},{lbl:"Closure Az:",val:fmtBrg(closAz)},
      {lbl:"Precision:",val:ratio===Infinity?"Perfect":"1:"+ratio.toLocaleString()},
      {lbl:"Error N:",val:sumN.toFixed(4)+" "+units},{lbl:"Error E:",val:sumE.toFixed(4)+" "+units},
    ],[
      {txt:"Bowditch Adjust",cls:"ok",fn:()=>_bowditchAdjust(poly,sumN,sumE,totalD)},
      {txt:"Cancel",cls:"",fn:()=>{}},
    ]);
  }

  function _tvNextPick(){
    const banner=document.getElementById("intersectBanner");
    const n=poly.length;
    if(banner){
      banner.textContent=n===0
        ?"Tap first traverse point"
        :"Tap next point (✓ "+n+" selected) — end on your closing shot, then tap Done";
      banner.classList.add("visible");
    }
    window._connClickActive=true;
    window._connClickHandler=function(pt){
      // Re-tapping the original start point is rejected: pushing the same
      // point object would telescope the leg sum to a perfect zero closure.
      // A closed loop is closed by its re-measured closing shot, not the start.
      if(poly.length>0 && pt.Point===poly[0].Point){
        const banner=document.getElementById("intersectBanner");
        if(banner) banner.textContent="That's the start point — tap your closing shot instead, then Done";
        return;
      }
      // Avoid duplicate consecutive points
      if(poly.length>0 && poly[poly.length-1].Point===pt.Point) return;
      poly.push(pt);
      _tvUpdateGeom();
      _tvNextPick();
    };
    window._connClickCancelCb=()=>{
      _pickedPts=[];
      tempGeom=tempGeom.filter(g=>g._tv!==true);
      plotPoints();
    };
  }

  // Show a "Done" button that floats while picking
  openModal((modal,close)=>{
    modal.innerHTML="<h2>Traverse Correction</h2>"+
      "<p class='info'>Tap traverse points in order, ending on your closing shot (the separate re-observation of the start), then tap Done. Don't re-tap the original start point — that forces a zero closure.</p>";
    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
    mk("Done — Compute","ok",()=>{close();_tvFinish();});
    mk("Cancel","",()=>{
      close();
      _pickedPts=[];
      tempGeom=tempGeom.filter(g=>g._tv!==true);
      window._connClickActive=false;
      window._connClickHandler=null;
      const banner=document.getElementById("intersectBanner");
      if(banner) banner.classList.remove("visible");
      plotPoints();
    });
    // Start picking after modal opens
    setTimeout(_tvNextPick, 100);
  });
}
function _bowditchAdjust(poly,errN,errE,totalD){
  _takeSnapshot("Bowditch Adjust");
  // Closed traverse: poly[0] === poly[last] (same object reference)
  // Fix poly[0] (start = control point), don't adjust it
  // Intermediate points get correction proportional to cumulative distance
  // poly[last] is same object as poly[0] so skip it too
  const isClosed = poly.length>1 && poly[0].Point===poly[poly.length-1].Point;
  const lastIdx = isClosed ? poly.length-2 : poly.length-1;
  let cumD=0;
  for(let i=1;i<=lastIdx;i++){
    const prev=poly[i-1],cur=poly[i];
    const leg=Math.hypot(cur.Easting-prev.Easting,cur.Northing-prev.Northing);
    cumD+=leg;
    const f=cumD/totalD;
    cur.Northing-=errN*f;
    cur.Easting -=errE*f;
  }
  saveData(); plotPoints();
  showResult("✓ Bowditch Adjusted",[
    {lbl:"Points adjusted:",val:String(lastIdx)},
    {lbl:"Traverse type:",val:isClosed?"Closed":"Open"},
    {lbl:"Correction N:",val:(-errN).toFixed(4)+" "+units},
    {lbl:"Correction E:",val:(-errE).toFixed(4)+" "+units},
  ]);
}

// 2-point resection: occupy unknown station, shoot 2 known pts with azimuth + distance
function _resection2pt(){
  _helpContext="cogo-resection";
  // Method: from unknown station U, we observe:
  //   Az1 to known pt A, dist SD1
  //   Az2 to known pt B, dist SD2
  // We compute U directly from each observation and average (if consistent).
  // More precisely: U = A - (dist * unit_vector_from_U_to_A)
  // Since we have azimuth FROM U to A: A = U + dist*[sin(az), cos(az)]
  // => U = A - dist*[sin(az), cos(az)]
  // Do for both, average. If distances are accurate they should agree.
  // Note: requires TRUE azimuths (instrument reading + orientation offset applied)
  calculatorInput("Known Point 1 #:","",a=>{if(!a)return;
    const pA=points.find(p=>p.Point==+a);if(!pA)return alert("Not found");
    bearingInput(`True Azimuth to #${pA.Point}:` ,"",az1=>{if(!az1)return;
      const a1=parseBrg(az1);if(isNaN(a1))return alert("Bad azimuth");
      calculatorInput(`Slope/Horiz Dist to #${pA.Point} (${units}):` ,"",d1=>{if(!d1)return;
        const dist1=parseFloat(d1);if(isNaN(dist1)||dist1<=0)return alert("Bad distance");
        calculatorInput("Known Point 2 #:","",b=>{if(!b)return;
          const pB=points.find(p=>p.Point==+b);if(!pB)return alert("Not found");
          bearingInput(`True Azimuth to #${pB.Point}:` ,"",az2=>{if(!az2)return;
            const a2=parseBrg(az2);if(isNaN(a2))return alert("Bad azimuth");
            calculatorInput(`Slope/Horiz Dist to #${pB.Point} (${units}):` ,"",d2=>{if(!d2)return;
              const dist2=parseFloat(d2);if(isNaN(dist2)||dist2<=0)return alert("Bad distance");
              // Compute station from each observation
              const r1=a1*Math.PI/180, r2=a2*Math.PI/180;
              const E1=pA.Easting  - dist1*Math.sin(r1);
              const N1=pA.Northing - dist1*Math.cos(r1);
              const E2=pB.Easting  - dist2*Math.sin(r2);
              const N2=pB.Northing - dist2*Math.cos(r2);
              const E=(E1+E2)/2, N=(N1+N2)/2;
              const residual=Math.hypot(E1-E2,N1-N2);

              // Validation checks
              const warns=[];
              // Check computed dist back to each known pt matches entered dist
              const chk1=Math.hypot(E-pA.Easting,N-pA.Northing);
              const chk2=Math.hypot(E-pB.Easting,N-pB.Northing);
              const tol=units==="ft"?0.5:0.15;
              if(Math.abs(chk1-dist1)>tol)
                warns.push(`Dist check to #${pA.Point}: entered ${dist1.toFixed(3)}, computed ${chk1.toFixed(3)} — check azimuth/dist`);
              if(Math.abs(chk2-dist2)>tol)
                warns.push(`Dist check to #${pB.Point}: entered ${dist2.toFixed(3)}, computed ${chk2.toFixed(3)} — check azimuth/dist`);
              if(residual>tol*2)
                warns.push(`Large residual (${residual.toFixed(3)} ${units}) — observations may be inconsistent`);

              if(warns.length){
                if(!confirm("Resection warning: "+warns.join(" | ")+" Show result anyway?"))return;
              }

              tempGeom=[
                {type:"ray",E:E,N:N,az:a1,color:"rgba(74,158,255,.5)"},
                {type:"ray",E:E,N:N,az:a2,color:"rgba(62,207,116,.5)"},
              ];
              tempIntersections=[{Easting:E,Northing:N}]; plotPoints();
              zoomToPoints([{E:pA.Easting,N:pA.Northing},{E:pB.Easting,N:pB.Northing},{E:E,N:N}]);
              const qual=residual<tol?"✓ Good":`⚠ Large residual`;
              showResult("2-Point Resection",[
                {lbl:"Station N:",  val:N.toFixed(4)},
                {lbl:"Station E:",  val:E.toFixed(4)},
                {lbl:"Residual:",   val:residual.toFixed(4)+" "+units+" "+qual},
                {lbl:"Dist chk 1:", val:chk1.toFixed(3)+" (entered "+dist1.toFixed(3)+")"},
                {lbl:"Dist chk 2:", val:chk2.toFixed(3)+" (entered "+dist2.toFixed(3)+")"},
              ],[{txt:"Save as Station",cls:"ok",fn:()=>{
                tempGeom=[];tempIntersections=[];plotPoints();
                _saveCogoPoint({Northing:N,Easting:E,Elevation:0},null,null,"RESECT");
              }},
              {txt:"Cancel",cls:"",fn:()=>{tempGeom=[];tempIntersections=[];plotPoints()}},
              ]);
            });
          });
        });
      });
    });
  });
}
function _resection2ptDistOnly(){
  // Pure distance resection: two known points + distance to each = circle intersection
  // No azimuth needed. Gives two solutions — user picks the correct one.
  calculatorInput("Known Point 1 #:","",a=>{if(!a)return;
    const pA=points.find(p=>p.Point==+a);if(!pA)return alert("Not found");
    calculatorInput(`Distance to #${pA.Point} (${units}):` ,"",d1=>{if(!d1)return;
      const r1=parseFloat(d1);if(isNaN(r1)||r1<=0)return alert("Bad distance");
      calculatorInput("Known Point 2 #:","",b=>{if(!b)return;
        const pB=points.find(p=>p.Point==+b);if(!pB)return alert("Not found");
        calculatorInput(`Distance to #${pB.Point} (${units}):` ,"",d2=>{if(!d2)return;
          const r2=parseFloat(d2);if(isNaN(r2)||r2<=0)return alert("Bad distance");
          // Circle-circle intersection (same math as distance-distance COGO)
          const dx=pB.Easting-pA.Easting, dy=pB.Northing-pA.Northing;
          const d=Math.hypot(dx,dy);
          if(d>r1+r2)return alert("Distances too short — circles don't intersect.");
          if(d<Math.abs(r1-r2))return alert("One circle inside the other.");
          const a_=(r1*r1-r2*r2+d*d)/(2*d);
          const h=Math.sqrt(Math.max(0,r1*r1-a_*a_));
          const mE=pA.Easting +a_*dx/d, mN=pA.Northing+a_*dy/d;
          const rx=-dy*(h/d), ry=dx*(h/d);
          const E1=mE+rx,N1=mN+ry,E2=mE-rx,N2=mN-ry;
          // Draw circles as temp geometry
          tempGeom=[
            {type:"circle",E:pA.Easting,N:pA.Northing,R:r1,color:"rgba(74,158,255,.5)"},
            {type:"circle",E:pB.Easting,N:pB.Northing,R:r2,color:"rgba(62,207,116,.5)"},
          ];
          tempIntersections=[{Easting:E1,Northing:N1},{Easting:E2,Northing:N2}];
          plotPoints();
          zoomToPoints([{E:pA.Easting,N:pA.Northing},{E:pB.Easting,N:pB.Northing},{E:E1,N:N1},{E:E2,N:N2}]);
          showResult("Distance Resection — Choose Station",[
            {lbl:"Sol 1:",val:`N=${N1.toFixed(3)} E=${E1.toFixed(3)}`},
            {lbl:"Sol 2:",val:`N=${N2.toFixed(3)} E=${E2.toFixed(3)}`},
          ],[
            {txt:"Use Sol 1",cls:"ok",fn:()=>{
              tempGeom=[];tempIntersections=[];plotPoints();
              _saveCogoPoint({Northing:N1,Easting:E1,Elevation:0},null,null,"RESECT");
            }},
            {txt:"Use Sol 2",cls:"blue",fn:()=>{
              tempGeom=[];tempIntersections=[];plotPoints();
              _saveCogoPoint({Northing:N2,Easting:E2,Elevation:0},null,null,"RESECT");
            }},
            {txt:"Cancel",cls:"",fn:()=>{tempGeom=[];tempIntersections=[];plotPoints()}},
          ]);
        });
      });
    });
  });
}

function _resectionInput(){
  const data=[];
  const step=i=>{
    if(i===3){_solveResection(data);return}
    calculatorInput(`Known Point ${i+1} #:` ,"",pn=>{if(!pn)return;
      const pt=points.find(p=>p.Point==+pn);if(!pt){alert("Not found");return}
      bearingInput(`Observed azimuth to Pt ${pt.Point}:` ,"",az=>{if(!az)return;
        const a=parseBrg(az);if(isNaN(a)){alert("Bad azimuth");return}
        data.push({pt,az:a});step(i+1);
      });
    });
  };
  step(0);
}
function _solveResection(data){
  const [A,B,C]=[data[0].pt,data[1].pt,data[2].pt];
  const [obsA,obsB,obsC]=[data[0].az,data[1].az,data[2].az];
  const alpha=((obsB-obsA)%360+360)%360*Math.PI/180;
  const beta =((obsC-obsB)%360+360)%360*Math.PI/180;
  const gamma=((obsA-obsC+360)%360)*Math.PI/180;
  const dAB=Math.atan2(B.Easting-A.Easting,B.Northing-A.Northing);
  const dBC=Math.atan2(C.Easting-B.Easting,C.Northing-B.Northing);
  const dCA=Math.atan2(A.Easting-C.Easting,A.Northing-C.Northing);
  const angA=((dCA-dAB+4*Math.PI+Math.PI)%(2*Math.PI));
  const angB=((dAB-dBC+4*Math.PI+Math.PI)%(2*Math.PI));
  const angC=((dBC-dCA+4*Math.PI+Math.PI)%(2*Math.PI));
  const KA=1/(1/Math.tan(alpha)-1/Math.tan(angA));
  const KB=1/(1/Math.tan(beta) -1/Math.tan(angB));
  const KC=1/(1/Math.tan(gamma)-1/Math.tan(angC));
  if(!isFinite(KA)||!isFinite(KB)||!isFinite(KC)){
    alert("Resection indeterminate — station may lie on circumscribed circle. Choose different points.");return;
  }
  const denom=KA+KB+KC;
  const E=(KA*A.Easting+KB*B.Easting+KC*C.Easting)/denom;
  const N=(KA*A.Northing+KB*B.Northing+KC*C.Northing)/denom;
  const triArea=Math.abs((B.Easting-A.Easting)*(C.Northing-A.Northing)-(C.Easting-A.Easting)*(B.Northing-A.Northing))/2;
  const warning=triArea<10?"⚠ Weak geometry — points nearly collinear":"";
  showResult("Resection Solution",[
    {lbl:"Station N:",val:N.toFixed(4)},{lbl:"Station E:",val:E.toFixed(4)},
    {lbl:"Triangle Area:",val:triArea.toFixed(1)+" sq "+units},
    {lbl:"Strength:",val:warning||"✓ OK"},
  ],[{txt:"Save as New Point",cls:"ok",fn:()=>_saveCogoPoint({Northing:N,Easting:E,Elevation:0},null,null,"RESECT")}]);
}

function cogoProrate(fromPt, toPt){
  _helpContext="cogo-prorate";
  // Proportionate measurement for boundary retracement.
  // Given two found corners defining a line, place a lost corner
  // at a prorated distance from the FROM point.
  //
  // Inputs:
  //   Measured total  = actual measured distance between the two found corners
  //   Record total    = what the deed/plat says the total distance should be
  //   Record distance = deed distance from the FROM corner to the lost corner
  //
  // Prorate ratio  = measured total / record total
  // Prorated dist  = record distance × ratio
  // Result point   = FROM corner + prorated dist along the line

  const getPoints = (cb) => {
    if(fromPt && toPt){ cb(fromPt, toPt); return; }
    calculatorInput("FROM corner point # (near end):","",a=>{if(!a)return;
      const pa=points.find(p=>p.Point==+a);if(!pa)return alert("Not found");
      calculatorInput("TO corner point # (far end):","",b=>{if(!b)return;
        const pb=points.find(p=>p.Point==+b);if(!pb)return alert("Not found");
        cb(pa,pb);
      });
    });
  };

  getPoints((pa,pb)=>{
    const measuredTotal=dist2D(pa,pb);
    const az=azimuth(pa,pb);
    calculatorInput(
      `Record total dist FROM #${pa.Point} TO #${pb.Point} (deed/plat):`,
      measuredTotal.toFixed(3), recTotStr=>{
      if(!recTotStr)return;
      const recTotal=parseFloat(recTotStr);
      if(isNaN(recTotal)||recTotal<=0)return alert("Bad record distance");

      calculatorInput(
        `Record dist from #${pa.Point} to LOST corner (deed):`,
        "", recDistStr=>{
        if(!recDistStr)return;
        const recDist=parseFloat(recDistStr);
        if(isNaN(recDist)||recDist<=0)return alert("Bad record distance");
        if(recDist>recTotal)return alert("Record distance exceeds total — check values");

        const ratio      = measuredTotal / recTotal;
        const proratedD  = recDist * ratio;
        const shortfall  = measuredTotal - recTotal;
        const yourShare  = recDist * (1 - ratio);  // how much shorter your lot is

        // Place point along line at prorated distance from pa
        const r=az*Math.PI/180;
        const E=pa.Easting  + proratedD*Math.sin(r);
        const N=pa.Northing + proratedD*Math.cos(r);
        const Z=pa.Elevation + (proratedD/measuredTotal)*(pb.Elevation-pa.Elevation);

        showResult("⚖ Prorated Corner",[
          {lbl:"Measured Total:",  val:measuredTotal.toFixed(4)+" "+units},
          {lbl:"Record Total:",    val:recTotal.toFixed(4)+" "+units},
          {lbl:"Shortage:",        val:Math.abs(shortfall).toFixed(4)+" "+units+(shortfall<0?" (short)":" (over)")},
          {lbl:"Prorate Ratio:",   val:ratio.toFixed(6)},
          {lbl:"Record Dist:",     val:recDist.toFixed(4)+" "+units},
          {lbl:"Prorated Dist:",   val:proratedD.toFixed(4)+" "+units},
          {lbl:"Your Loss:",       val:Math.abs(yourShare).toFixed(4)+" "+units},
          {lbl:"N:",               val:N.toFixed(4)},
          {lbl:"E:",               val:E.toFixed(4)},
        ],[
          {txt:"Save Prorated Corner",cls:"ok",
           fn:()=>_saveCogoPoint({Northing:N,Easting:E,Elevation:Z},pa.Point,pb.Point,"PRO")},
          {txt:"Prorate Another Corner on Same Line",cls:"blue",
           fn:()=>cogoProrate(pa,pb)},
        ]);
      });
    });
  });
}

// Shared 3-point arc computation. Direction is determined by the mid point —
// the arc must pass through it, so no CW/CCW prompt is needed.
function _arc3PointCompute(pa,pb,pc,drawOnly){
  const ax=pa.Easting,ay=pa.Northing;
  const bx=pb.Easting,by=pb.Northing;
  const cx=pc.Easting,cy=pc.Northing;
  const D=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
  if(Math.abs(D)<1e-10)return alert("Points are collinear — no arc.");
  const ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/D;
  const uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/D;
  const R=Math.hypot(ax-ux,ay-uy);
  const fakeCenter={Point:0,Easting:ux,Northing:uy,Elevation:((pa.Elevation||0)+(pc.Elevation||0))/2};
  const startBrg=((Math.atan2(ax-ux,ay-uy)*180/Math.PI)+360)%360;
  const endBrg  =((Math.atan2(cx-ux,cy-uy)*180/Math.PI)+360)%360;
  // Direction so the arc passes through the mid point
  const cross=(bx-ax)*(cy-ay)-(by-ay)*(cx-ax);
  const dir=cross<0?"cw":"ccw";
  if(drawOnly){ _storeDrawArc(fakeCenter,R,startBrg,endBrg,dir); return; }
  const arcLen=Math.abs(_arcSweep(startBrg,endBrg,dir))*R;
  showResult("Arc Computed",[
    {lbl:"Center N:",val:uy.toFixed(3)},{lbl:"Center E:",val:ux.toFixed(3)},
    {lbl:"Radius:",val:R.toFixed(3)+" "+units},
    {lbl:"Start Brg:",val:fmtBrg(startBrg)},{lbl:"End Brg:",val:fmtBrg(endBrg)},
    {lbl:"Direction:",val:dir.toUpperCase()+" (through Pt #"+pb.Point+")"},
    {lbl:"Arc Length:",val:arcLen.toFixed(3)+" "+units},
  ],[
    {txt:"Generate Points",cls:"ok",fn:()=>{
      calculatorInput(`Point interval (${units}):` ,"25",intStr=>{
        if(!intStr)return;
        const interval=parseFloat(intStr);if(isNaN(interval)||interval<=0)return;
        _generateArcPoints(fakeCenter,R,startBrg,endBrg,dir,interval);
      });
    }},
    {txt:"Draw Only (no points)",cls:"blue",fn:()=>_storeDrawArc(fakeCenter,R,startBrg,endBrg,dir)},
  ]);
}

// Helper: compute sweep angle in radians for a given direction
function _buildArcConn(centerE,centerN,R,startBrg,endBrg,dir,style){
  const sweep=_arcSweep(startBrg,endBrg,dir);
  const arcLen=Math.abs(sweep)*R;
  const delta=Math.abs(sweep)*180/Math.PI;
  const chord=2*R*Math.sin(Math.abs(sweep)/2);
  const brgToRad=b=>(90-b)*Math.PI/180;
  const startAngle=brgToRad(startBrg);
  const endAngle=startAngle+sweep;
  return{
    type:"arc",
    centerE,centerN,
    R,startAngle,endAngle,
    dir,style:style||"solid",
    startBrg,endBrg,
    arcLen,delta,chord,
  };
}

function _arcSweep(startBrg,endBrg,dir){
  const brgToRad=b=>(90-b)*Math.PI/180;
  let startRad=brgToRad(startBrg), endRad=brgToRad(endBrg);
  let sweep;
  if(dir==="cw"){
    sweep=startRad-endRad;
    if(sweep<=0)sweep+=2*Math.PI;
    sweep=-sweep;
  } else {
    sweep=endRad-startRad;
    if(sweep<=0)sweep+=2*Math.PI;
  }
  return sweep;
}

// Store a visual-only arc as a special arc connection (no new points)
function _storeDrawArc(center,R,startBrg,endBrg,dir){
  _takeSnapshot("Draw Arc");
  const sweep=_arcSweep(startBrg,endBrg,dir);
  const arcLen=Math.abs(sweep)*R;
  const delta=Math.abs(sweep)*180/Math.PI;
  const chord=2*R*Math.sin(Math.abs(sweep)/2);
  // Math angle (CCW from east): bearing = (90-bearing)*PI/180
  const brgToRad=b=>(90-b)*Math.PI/180;
  const startAngle=brgToRad(startBrg);
  const endAngle=startAngle+sweep;
  // Store as a special arc connection — no from/to points needed
  const arcConn={
    type:"arc",
    centerE:center.Easting, centerN:center.Northing,
    R, startAngle, endAngle,
    dir, style:"solid",
    // Store start/end bearings for reference
    startBrg, endBrg,
    arcLen, delta, chord,
  };
  plotConnections.push(arcConn);
  saveData();
  showResult("✓ Arc Drawn",[
    {lbl:"Center N:",val:center.Northing.toFixed(3)},
    {lbl:"Center E:",val:center.Easting.toFixed(3)},

  ]);
}

function _generateArcPoints(center,R,startBrg,endBrg,dir,interval){
  // Convert bearings to standard math angles (CCW from east)
  // Bearing is CW from north: mathAngle = 90 - bearing
  const brgToRad = b => (90-b)*Math.PI/180;
  let startRad = brgToRad(startBrg);
  let endRad   = brgToRad(endBrg);

  // Arc sweep
  let sweep;
  if(dir==="cw"){
    // CW in bearing = decreasing math angle
    sweep = startRad - endRad;
    if(sweep<=0) sweep += 2*Math.PI;
    sweep = -sweep; // negative = CW in math space
  } else {
    sweep = endRad - startRad;
    if(sweep<=0) sweep += 2*Math.PI;
  }

  const arcLen = Math.abs(sweep)*R;
  const nIntervals = Math.max(1,Math.round(arcLen/interval));
  const dRad = sweep/nIntervals;

  // Arc length info
  const delta = Math.abs(sweep)*180/Math.PI;
  const chord = 2*R*Math.sin(Math.abs(sweep)/2);

  calculatorInput(`Generate ${nIntervals+1} points (incl. endpoints). Start at Point #:`,
    String(pointCounter),startPtStr=>{
    if(!startPtStr)return;
    let nextPt=parseInt(startPtStr); if(isNaN(nextPt))return;
    alphaInput("Description prefix (e.g. ARC):","ARC",prefix=>{
      if(prefix===null)return;
      const newPts=[];
      for(let i=0;i<=nIntervals;i++){
        const angle=startRad+i*dRad;
        const E=center.Easting +R*Math.cos(angle);
        const N=center.Northing+R*Math.sin(angle);
        const Z=center.Elevation||0;
        while(_ptExists(nextPt))nextPt++;
        newPts.push({
          Point:nextPt,Northing:N,Easting:E,Elevation:Z,
          Type:"COGO",Flag:"",ih:0,
          Description:prefix+(i===0?"_START":i===nIntervals?"_END":"_"+i)
        });
        nextPt++;
      }
      // Add all points
      _takeSnapshot("Generate Arc Points"); newPts.forEach(p=>points.push(p));
      pointCounter=nextPt;
      // Connect them with dashed arc line
      for(let i=0;i<newPts.length-1;i++){
        plotConnections.push({from:newPts[i].Point,to:newPts[i+1].Point,style:"dashed"});
      }
      saveData();
      showResult("✓ Arc Generated",[
        {lbl:"Points:",val:String(newPts.length)},
        {lbl:"Arc Length:",val:arcLen.toFixed(3)+" "+units},
        {lbl:"Delta:",val:delta.toFixed(4)+"°"},
        {lbl:"Chord:",val:chord.toFixed(3)+" "+units},
        {lbl:"Radius:",val:R.toFixed(3)+" "+units},
      ]);
    });
  });
}

      if(banner){banner.textContent="Tap the THIRD point (far side of angle)";banner.classList.add("visible");}
    } else if(_defPts.length>=3){
      // Cancel tap mode
      window._connClickActive=false; window._connClickHandler=null;
      if(banner){banner.classList.remove("visible");}
      const pA=_defPts[0], pV=_defPts[1], pB=_defPts[2];

      // Compute azimuths from vertex to each outer point
      const az1=azimuth(pV,pA); // vertex → first
      const az2=azimuth(pV,pB); // vertex → third

      // Interior angle (smaller angle between the two rays)
      let interior=((az2-az1)+360)%360;
      if(interior>180) interior=360-interior;
      const exterior=360-interior;

      // Deflection angle: signed angle from az1 to az2 (+ = right/CW, - = left/CCW)
      let deflection=((az2-az1)+360)%360;
      if(deflection>180) deflection=deflection-360; // now -180 to +180
      const deflDir=deflection>=0?"R":"L";

      // Build persistent tempGeom — survives pan/zoom
      // Interior arc: shorter arc from az1 to az2 (green)
      // Exterior arc: longer arc (amber)
      // Determine which direction is interior (shorter sweep)
      const sweep=((az2-az1)+360)%360; // CW sweep from az1 to az2
      const intCCW = sweep>180; // if CW sweep > 180, interior is CCW

      tempGeom=[
        // Legs from vertex
        {type:"segment",E1:pV.Easting,N1:pV.Northing,E2:pA.Easting,N2:pA.Northing,color:"rgba(240,160,32,.8)"},
        {type:"segment",E1:pV.Easting,N1:pV.Northing,E2:pB.Easting,N2:pB.Northing,color:"rgba(74,158,255,.8)"},
        // Interior arc (green, inner radius)
        {type:"anglearc",vE:pV.Easting,vN:pV.Northing,
         az1:az1,az2:az2,ccw:intCCW,r:32,
         color:"rgba(104,168,74,.9)",
         label:toDMS(interior),labelColor:"#68a84a"},
        // Exterior arc (amber, outer radius)
        {type:"anglearc",vE:pV.Easting,vN:pV.Northing,
         az1:az1,az2:az2,ccw:!intCCW,r:52,
         color:"rgba(240,160,32,.7)",
         label:toDMS(exterior),labelColor:"#f0a020"},
      ];
      tempIntersections=[{Easting:pV.Easting,Northing:pV.Northing}];
      plotPoints();
      zoomToPoints([{E:pA.Easting,N:pA.Northing},{E:pV.Easting,N:pV.Northing},{E:pB.Easting,N:pB.Northing}]);

      showResult("Angle at Point",[
        {lbl:"Points:",val:"#"+pA.Point+" \u2014 #"+pV.Point+" (vertex) \u2014 #"+pB.Point},
        {lbl:"Az #"+pA.Point+"\u2192#"+pV.Point+":",val:fmtBrg(az1)},
        {lbl:"Az #"+pB.Point+"\u2192#"+pV.Point+":",val:fmtBrg((az2+180)%360)+" (back)"},
        {lbl:"Interior Angle:",val:toDMS(interior)},
        {lbl:"Exterior Angle:",val:toDMS(exterior)},
        {lbl:"Deflection:",val:toDMS(Math.abs(deflection))+" "+deflDir},
      ],[
        {txt:"Measure Another",cls:"ok",fn:()=>{
          tempGeom=[];tempIntersections=[];plotPoints();
          cogoDeflection();
        }},
      ]);
    }
  };
  const banner=document.getElementById("intersectBanner");
  if(banner){banner.textContent="TAP the FIRST point (far side of angle)";banner.classList.add("visible");}
  tempGeom=[];tempIntersections=[];plotPoints();
}

// Plane through 3 points: solve z = aE + bN + c, then design Z at any E,N.
function _planeFrom3(p1,p2,p3){
  const x1=p1.Easting,y1=p1.Northing,z1=p1.Elevation;
  const x2=p2.Easting,y2=p2.Northing,z2=p2.Elevation;
  const x3=p3.Easting,y3=p3.Northing,z3=p3.Elevation;
  const det=(x2-x1)*(y3-y1)-(x3-x1)*(y2-y1);
  if(Math.abs(det)<1e-9)return null; // collinear in plan
  const a=((z2-z1)*(y3-y1)-(z3-z1)*(y2-y1))/det;
  const b=((x2-x1)*(z3-z1)-(x3-x1)*(z2-z1))/det;
  const c=z1-a*x1-b*y1;
  return {a,b,c,z:(E,N)=>a*E+b*N+c};
}
function _cutFillPlane(){
  _pickPoints(3,(i)=>"Tap DESIGN plane point "+(i+1)+" of 3",pp=>{
    if(!pp)return;
    const pl=_planeFrom3(pp[0],pp[1],pp[2]);
    if(!pl){alert("The three design points are collinear in plan — they don't define a plane.");return}
    // grade as % along steepest descent
    const grade=Math.hypot(pl.a,pl.b)*100;
    const _query=()=>{
      _pickPoint("Tap GROUND point to check",g=>{
        const design=pl.z(g.Easting,g.Northing);

          {txt:"Check Another Point",cls:"ok",fn:()=>_query()},
          {txt:"Done",cls:"",fn:()=>{}},
        ]);
      });
    };
    _query();
  });
}

function cogoRotateAlign(){
  _helpContext="cogo-rotate";
  calculatorInput("Pivot point # (stays fixed):","",a=>{if(!a)return;
    const p1=points.find(p=>p.Point==+a);if(!p1)return alert("Not found");
    calculatorInput("Second point # (defines baseline):","",b=>{if(!b)return;
      const p2=points.find(p=>p.Point==+b);if(!p2)return alert("Not found");
      if(p1.Point===p2.Point)return alert("Points must differ.");
      bearingInput("New azimuth for baseline:","",az=>{if(!az)return;
        const newAz=parseBrg(az);if(isNaN(newAz))return alert("Bad azimuth");
        const targetAz=((newAz%360)+360)%360;
        const dE=p2.Easting-p1.Easting,dN=p2.Northing-p1.Northing;
        let curAz=Math.atan2(dE,dN)*180/Math.PI;if(curAz<0)curAz+=360;
        let rot=targetAz-curAz;rot=((rot%360)+540)%360-180;
        const cosT=Math.cos(rot*Math.PI/180),sinT=Math.sin(rot*Math.PI/180);
        const px=p1.Easting,py=p1.Northing;
        _takeSnapshot("Rotate");
        const newPts=points.map(p=>{const rx=p.Easting-px,ry=p.Northing-py;
          return{...p,Easting:px+rx*cosT+ry*sinT,Northing:py-rx*sinT+ry*cosT}});
        points.splice(0,points.length,...newPts);

        // Rotate arc connections — center point and start/end angles
        const rotRad=rot*Math.PI/180;
        plotConnections.forEach(conn=>{
          if(conn.type!=="arc") return;
          // Rotate center about pivot
          const rx=conn.centerE-px, ry=conn.centerN-py;
          conn.centerE=px+rx*cosT+ry*sinT;
          conn.centerN=py-rx*sinT+ry*cosT;
          // Rotate start/end angles
          // World angles are CCW from east (math convention).
          // Positive rot = CCW rotation in survey (north-up) space.
          // In math angle space (CCW from east), same rotation adds rotRad.
          // Subtract rotRad because survey CW rotation = decreasing math angle
          conn.startAngle -= rotRad;
          conn.endAngle   -= rotRad;
        });

        saveData();
        showResult("Rotation Applied",[{lbl:"Aligned to:",val:toDMS(targetAz)},{lbl:"Rotation:",val:toDMS(rot)}]);
      });
    });
  });
}

        plotConnections.forEach(conn=>{

}

function _drawConnByTap(){

      // First tap — set the FROM point
      _connFrom=pt;
      const banner=document.getElementById("intersectBanner");
      if(banner){
        banner.textContent="✔ From: Pt #"+pt.Point+" ("+( pt.Description||"no desc")+") — tap the TO point";
        banner.classList.add("visible");
      }
      // Highlight the from point
      tempGeom=[{type:"segment",E1:pt.Easting,N1:pt.Northing,E2:pt.Easting,N2:pt.Northing,color:"rgba(240,160,32,.8)"}];
      plotPoints();
      // Draw a bigger ring on from point
      const canvas=document.getElementById("plotCanvas");
      const w=canvas.clientWidth,h=canvas.clientHeight;
      const T=_viewTransform(w,h);if(!T)return;
      const ctx=canvas.getContext("2d");
      const sx=pt.Easting*T.scale+T.offX;
      const sy=h-(pt.Northing*T.scale+T.offY);
      ctx.beginPath();ctx.arc(sx,sy,16,0,2*Math.PI);
      ctx.strokeStyle="rgba(240,160,32,.9)";ctx.lineWidth=2.5;ctx.stroke();
    } else {
      // Second tap — set TO point and pick style
      const fromPt=_connFrom;

        // Tapped same point — reset
        _connFrom=null;

            {lbl:"To:",  val:"#"+toPt.Point+" "+(toPt.Description||"")},
            {lbl:"Style:",val:style},

/* ── CANVAS ── */
function setupHiDpi(c,w,h){
  const dpr=window.devicePixelRatio||1;
  c.width=w*dpr;c.height=h*dpr;c.style.width=w+"px";c.style.height=h+"px";
  const ctx=c.getContext("2d");ctx.scale(dpr,dpr);return ctx;
}
function _viewTransform(w,h){
  const valid=points.filter(p=>!isNaN(p.Easting)&&!isNaN(p.Northing));
  if(!valid.length)return null;
  const es=valid.map(p=>p.Easting),ns=valid.map(p=>p.Northing);
  const minE=Math.min(...es),maxE=Math.max(...es),minN=Math.min(...ns),maxN=Math.max(...ns);
  const rng=Math.max(maxE-minE,maxN-minN)||1;
  const pad=44;
  const base=(Math.min(w,h)-pad*2)/rng;
  const scale=base*viewScale;
  const offX=(w-rng*scale)/2-minE*scale+pad+viewOffsetX;
  const offY=(h-rng*scale)/2-minN*scale+pad+viewOffsetY;
  return{scale,offX,offY,base,minE,maxE,minN,maxN,rng};
}
function _niceStep(approx){
  const mag=Math.pow(10,Math.floor(Math.log10(Math.max(approx,1e-9))));
  const n=approx/mag;
  if(n<1.5)return mag;if(n<3.5)return 2*mag;if(n<7.5)return 5*mag;return 10*mag;
}
function _drawScaleBar(ctx,w,h,scale){
  const barPx=90,worldDist=barPx/scale,nice=_niceStep(worldDist),barActual=nice*scale;
  const x=10,y=h-18;
  ctx.save();
  // Background pill for readability
  ctx.fillStyle="rgba(0,0,0,.55)";
  // Use arc-based rounded rect for Safari compatibility (no roundRect until Safari 15.4)
  (function(cx,cy,cw,ch,cr){
    ctx.beginPath();
    ctx.moveTo(cx+cr,cy);ctx.lineTo(cx+cw-cr,cy);
    ctx.arcTo(cx+cw,cy,cx+cw,cy+cr,cr);
    ctx.lineTo(cx+cw,cy+ch-cr);
    ctx.arcTo(cx+cw,cy+ch,cx+cw-cr,cy+ch,cr);
    ctx.lineTo(cx+cr,cy+ch);
    ctx.arcTo(cx,cy+ch,cx,cy+ch-cr,cr);
    ctx.lineTo(cx,cy+cr);
    ctx.arcTo(cx,cy,cx+cr,cy,cr);
    ctx.closePath();
  })(x-4,y-20,barActual+8,24,4);
  ctx.fill();
  // Bar
  ctx.strokeStyle="#c0cce0";ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(x,y);ctx.lineTo(x+barActual,y);
  ctx.moveTo(x,y-5);ctx.lineTo(x,y+2);
  ctx.moveTo(x+barActual,y-5);ctx.lineTo(x+barActual,y+2);
  ctx.stroke();
  // Label
  ctx.fillStyle="#e8f0ff";ctx.font="bold 10px 'Courier New',monospace";
  ctx.textAlign="left";ctx.textBaseline="bottom";
  ctx.fillText(`${nice.toFixed(0)} ${units}`,x,y-7);
  ctx.restore();
}

/* ── DEED PARSER ────────────────────────────────────────────────
   Best-effort parser for metes-and-bounds legal descriptions.
   Produces a list of calls for human review — never trusted blind.
   Handles: quadrant bearings in symbol/word/dash formats, fractional
   degrees, due-cardinal calls, distances in feet/chains/rods/poles/
   perches/links/varas/meters, and curves by chord or radius+arc. */

const _DEED_UNIT_FT={
  FT:1, FOOT:1, FEET:1, "'":1,
  CH:66, CHAIN:66, CHAINS:66,
  ROD:16.5, RODS:16.5, POLE:16.5, POLES:16.5, PERCH:16.5, PERCHES:16.5,
  LINK:0.66, LINKS:0.66, LK:0.66, LKS:0.66,
  VARA:2.7777778, VARAS:2.7777778,   // Texas vara, 33⅓ in
  M:3.280833333, METER:3.280833333, METERS:3.280833333, METRE:3.280833333, METRES:3.280833333
};

function _deedNormalize(t){
  return (t||"")
    // invisible characters PDF copy loves to smuggle in
    .replace(/[\u00AD\u200B\u200C\u200D\u2060\uFEFF]/g,"")
    // every dash/minus variant -> plain hyphen
    .replace(/[\u2010\u2011\u2012\u2013\u2014\u2015\u2212]/g,"-")
    .replace(/[\u2018\u2019\u2032\u02B9\u02BC\u00B4\u0060]/g,"'")
    .replace(/[\u201C\u201D\u2033\u02BA]/g,'"')
    .replace(/[\u00BA\u00B0\u02DA\u309C\u1D52]/g,"°")
    // degree lost entirely by OCR/copy: "N 45 00'00\"" still has ' and " anchors
    .replace(/\u00BD/g," 1/2").replace(/\u00BC/g," 1/4").replace(/\u00BE/g," 3/4")
    .replace(/\s+/g," ")
    .toUpperCase();
}

/* Bearing: returns {q1:'N'|'S', deg, min, sec, q2:'E'|'W'} or cardinal {card:'N'} */
function _deedParseBearing(seg){
  // DUE NORTH / NORTH etc. as a whole call direction
  const due=seg.match(/\bDUE\s+(NORTH|SOUTH|EAST|WEST)\b/) ||
            seg.match(/\b(NORTH|SOUTH|EAST|WEST)\b(?!\s*\d)(?![A-Z])(?!.*\b(?:DEG|°)\b)/);
  const m=seg.match(
    /\b(N|S|NORTH|SOUTH)\s*\.?\s*(\d{1,2})\s*(?:°|DEGREES?|DEG\.?|D\b|-|\s)\s*(?:(\d{1,2}(?:\.\d+)?)\s*(?:'|′|MINUTES?|MIN\.?|M\b|-|\s))?\s*(?:(\d{1,2}(?:\.\d+)?)\s*(?:"|″|SECONDS?|SEC\.?|S\b)?)?\s*(?:(1\/2|1\/4|3\/4)\s*(?:°|DEGREES?)?\s*)?(E|W|EAST|WEST)\b/
  );
  if(m){
    let deg=parseFloat(m[2]), min=m[3]!=null?parseFloat(m[3]):0, sec=m[4]!=null?parseFloat(m[4]):0;
    // fractional degrees: "S 12 1/2 W" — fraction lands in group 5, or min slot when written "12 1/2°"
    if(m[5]){ const fr={"1/2":30,"1/4":15,"3/4":45}[m[5]]; if(min===0)min=fr; else sec=fr*0+sec; }
    // guard: "12 1/2" often parses as deg=12 min=1 sec=2 — detect trailing "1/2" pattern
    const frac=seg.match(/\b(\d{1,2})\s+(1\/2|1\/4|3\/4)\s*(?:°|DEGREES?)?\s*(E|W|EAST|WEST)\b/);
    if(frac && parseFloat(frac[1])===deg){ min={"1/2":30,"1/4":15,"3/4":45}[frac[2]]; sec=0; }
    if(deg>90||min>=60||sec>=60) return null;
    return{q1:m[1][0], deg, min, sec, q2:m[6][0]};
  }
  if(due) return {card:due[1][0]};
  return null;
}

function _deedBearingToAz(b){
  if(b.card) return {N:0,E:90,S:180,W:270}[b.card];
  const a=b.deg+b.min/60+b.sec/3600;
  if(b.q1==="N"&&b.q2==="E")return a;
  if(b.q1==="S"&&b.q2==="E")return 180-a;
  if(b.q1==="S"&&b.q2==="W")return 180+a;
  return 360-a;
}
function _deedAzToBearingStr(az){
  az=((az%360)+360)%360;
  let q1,q2,a;
  if(az<=90){q1="N";q2="E";a=az;}
  else if(az<=180){q1="S";q2="E";a=180-az;}
  else if(az<=270){q1="S";q2="W";a=az-180;}
  else{q1="N";q2="W";a=360-az;}
  const d=Math.floor(a), m=Math.floor((a-d)*60), sc=Math.round(((a-d)*60-m)*60);
  return q1+" "+d+"°"+String(m).padStart(2,"0")+"'"+String(sc).padStart(2,"0")+"\" "+q2;
}

/* Distance: first "number unit" in segment (skipping numbers that belong to bearings/radius) */
function _deedParseDistance(seg){
  const scrub=seg.replace(/\b(RADIUS|DELTA|CENTRAL ANGLE|ARC)\s*(?:OF|LENGTH|=|:)?\s*[\d.]+\s*(?:FEET|FT|')?/g," ");
  const re=/(\d{1,6}(?:\.\d+)?)\s*(FEET|FOOT|FT\.?|CHAINS?|CH\.?|RODS?|POLES?|PERCHES?|LINKS?|LKS?\.?|VARAS?|METERS?|METRES?|M\b)/g;
  let m;
  while((m=re.exec(scrub))){
    const u=m[2].replace(/\./g,"").replace(/S$/,"")==="FT"?"FT":m[2].replace(/\./g,"");
    let key=u.replace(/S$/,""); if(key==="FEE"||u==="FEET")key="FEET";
    const perFt=_DEED_UNIT_FT[u]||_DEED_UNIT_FT[key]||_DEED_UNIT_FT[u.replace(/S$/,"")];
    if(perFt) return {val:parseFloat(m[1]), unit:u, ft:parseFloat(m[1])*perFt};
  }
  return null;
}
function _deedParseAngle(seg,label){
  const re=new RegExp(label+"\\s*(?:ANGLE)?\\s*(?:OF|=|:)?\\s*(\\d{1,3})\\s*(?:°|DEGREES?|DEG\\.?|-|\\s)\\s*(?:(\\d{1,2})\\s*(?:'|MINUTES?|MIN\\.?|-|\\s))?\\s*(?:(\\d{1,2}(?:\\.\\d+)?)\\s*(?:\"|SECONDS?|SEC\\.?)?)?");
  const m=seg.match(re);
  if(!m)return null;
  return parseFloat(m[1])+(m[2]?parseFloat(m[2])/60:0)+(m[3]?parseFloat(m[3])/3600:0);
}

/* Split description into course segments and classify each */
function parseDeedText(txt){
  const t=_deedNormalize(txt);
  // segment on THENCE / RUNNING THENCE / numbered courses / semicolons
  const segs=t.split(/\bTHENCE\b|;|\bRUNNING\b|(?:\b\d{1,2}\s*[.)]\s+(?=[NSDC]))/).map(x=>x.trim()).filter(x=>x.length>3);
  const calls=[];
  segs.forEach(seg=>{
    const isCurve=/\bCURVE\b|\bCURVING\b|\bALONG THE ARC\b/.test(seg);
    if(isCurve){
      const dir=/\bLEFT\b/.test(seg)?"L":(/\bRIGHT\b/.test(seg)?"R":null);
      const rm=seg.match(/RADIUS\s*(?:OF|=|:)?\s*(\d{1,6}(?:\.\d+)?)/);
      const am=seg.match(/ARC\s*(?:LENGTH|DISTANCE)?\s*(?:OF|=|:)?\s*(\d{1,6}(?:\.\d+)?)/);
      const delta=_deedParseAngle(seg,"(?:DELTA|CENTRAL)");
      // chord: bearing+dist appearing after CHORD
      let chB=null,chD=null;
      const ci=seg.indexOf("CHORD");
      if(ci>=0){
        const rest=seg.slice(ci);
        chB=_deedParseBearing(rest);
        chD=_deedParseDistance(rest);
      }
      if(dir&&(rm||chD)){
        calls.push({type:"curve",dir:dir,
          radius:rm?parseFloat(rm[1]):null,
          arc:am?parseFloat(am[1]):null,
          delta:delta,
          chordB:chB, chordD:chD?chD.ft:null,
          raw:seg.slice(0,140)});
        return;
      }
    }
    const b=_deedParseBearing(seg);
    // remove bearing text so its digits can't be mistaken for a distance
    let segForDist=seg;
    if(b&&!b.card){
      segForDist=seg.replace(/\b(N|S|NORTH|SOUTH)\s*\.?\s*\d{1,2}[^EW]{0,24}?(E|W|EAST|WEST)\b/," ");
    }
    const d=_deedParseDistance(segForDist);
    if(b&&d){
      calls.push({type:"line",bearing:b,dist:d.ft,unit:d.unit,rawVal:d.val,raw:seg.slice(0,140)});
    }else if(b||d){
      calls.push({type:"partial",bearing:b,dist:d?d.ft:null,unit:d?d.unit:null,raw:seg.slice(0,140)});
    }
  });
  return calls;
}

/* Geometry: run calls from a POB with rotation; returns vertices + arcs + closure */
function computeDeed(calls,pobE,pobN,rotDeg){
  const rad=Math.PI/180;
  let E=pobE,N=pobN,tangent=null;
  const verts=[{E,N}], arcs=[];
  const usable=calls.filter(c=>c.type==="line"||c.type==="curve");
  usable.forEach(c=>{
    if(c.type==="line"){
      const az=_deedBearingToAz(c.bearing)+rotDeg;
      E+=c.dist*Math.sin(az*rad); N+=c.dist*Math.cos(az*rad);
      verts.push({E,N}); tangent=az;
      return;
    }
    // curve
    let chAz=null,chLen=null,delta=c.delta;
    if(delta==null&&c.radius&&c.arc) delta=(c.arc/c.radius)/rad;
    if(c.chordB){ chAz=_deedBearingToAz(c.chordB)+rotDeg; }
    if(c.chordD){ chLen=c.chordD; }
    if(chLen==null&&c.radius&&delta!=null) chLen=2*c.radius*Math.sin(delta*rad/2);
    if(chAz==null&&tangent!=null&&delta!=null)
      chAz=tangent+(c.dir==="L"?-delta/2:delta/2);
    if(chAz==null||chLen==null){ verts.push({E,N,skip:true}); return; }
    const sE=E,sN=N;
    E+=chLen*Math.sin(chAz*rad); N+=chLen*Math.cos(chAz*rad);
    verts.push({E,N});
    if(c.radius&&c.radius>=chLen/2){
      const h=Math.sqrt(Math.max(0,c.radius*c.radius-chLen*chLen/4));
      const mE=(sE+E)/2,mN=(sN+N)/2;
      const perp=chAz+(c.dir==="L"?-90:90); // center side
      const cE=mE+h*Math.sin(perp*rad), cN=mN+h*Math.cos(perp*rad);
      arcs.push({cE,cN,r:c.radius,
        a1:Math.atan2(sN-cN,sE-cE), a2:Math.atan2(N-cN,E-cE),
        ccw:c.dir==="L", sE,sN,eE:E,eN:N});
    }
    if(delta!=null) tangent=chAz+(c.dir==="L"?-delta/2:delta/2);
    else tangent=chAz;
  });
  const closeE=verts[0].E-E, closeN=verts[0].N-N;
  const closeDist=Math.hypot(closeE,closeN);
  let perim=0;
  usable.forEach(c=>{perim+=c.type==="line"?c.dist:(c.arc||c.chordD||0);});
  return {verts,arcs,closeDist,perim,
    precision:closeDist>0.001?Math.round(perim/closeDist):null,
    closeAz:closeDist>0.001?((Math.atan2(closeE,closeN)/rad)%360+360)%360:0,
    skipped:calls.length-usable.length};
}



/* Device-appropriate press verb for prompts */
function _pressWord(cap){
  const w=(window.matchMedia&&matchMedia("(pointer:fine)").matches)?"right-click":"long-press";
  return cap?w[0].toUpperCase()+w.slice(1):w;
}

/* — Deed plotter state & flows — */
let _deedPlot=null; // {calls,pobE,pobN,rot,computed}
function _deedRecompute(){
  if(!_deedPlot)return;
  _deedPlot.computed=computeDeed(_deedPlot.calls,_deedPlot.pobE,_deedPlot.pobN,_deedPlot.rot||0);
}
function _deedCallLabel(c,i){
  if(c.type==="line")return (i+1)+". "+_deedAzToBearingStr(_deedBearingToAz(c.bearing))+" — "+c.dist.toFixed(2)+" "+(units==="ft"?"ft":"m eq")+(c.unit&&!/FEET|FT|FOOT/.test(c.unit)?" ("+c.rawVal+" "+c.unit.toLowerCase()+")":"");
  if(c.type==="curve")return (i+1)+". Curve "+(c.dir==="L"?"LEFT":"RIGHT")+(c.radius?" R="+c.radius.toFixed(2):"")+(c.arc?" arc="+c.arc.toFixed(2):"")+(c.chordD?" ch="+c.chordD.toFixed(2):"");
  return (i+1)+". ⚠ incomplete — tap to fix";
}
function _deedReview(calls){
  openModal((modal,close)=>{
    modal.innerHTML="<h2>📜 Review Calls</h2><p class='info'>Parsed "+calls.length+" call"+(calls.length===1?"":"s")+". Check each against the deed — tap any to edit.</p>";
    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b);return b;};
    calls.forEach((c,i)=>{
      const b=mk(_deedCallLabel(c,i),c.type==="partial"?"danger":"blue",()=>{close();_deedEditCall(calls,i);});
      b.style.cssText+="font-size:.72em;text-align:left";
    });
    mk("＋ Add a call","",()=>{close();calls.push({type:"partial",raw:""});_deedEditCall(calls,calls.length-1);});
    if(calls.some(c=>c.type!=="partial"))
      mk("Plot Deed →","ok",()=>{close();_deedPickPOB(calls);});
    mk("Cancel","",close);
  });
}
function _deedEditCall(calls,i){
  const c=calls[i];
  openModal((modal,close)=>{
    modal.innerHTML="<h2>Call "+(i+1)+"</h2>"+(c.raw?"<p class='info' style='font-size:.75em'>from deed: “"+c.raw.slice(0,110)+"”</p>":"");
    const fld=(label,val)=>{
      const w=document.createElement("div");
      w.innerHTML="<div class='input-label'>"+label+"</div>";
      const inp=document.createElement("input");
      inp.type="text";inp.value=val||"";
      inp.style.cssText="width:100%;background:#111;color:var(--accent,#d9a13c);border:1px solid #444;border-radius:6px;padding:10px;font-family:'Courier New',monospace;font-size:1em";
      w.appendChild(inp);modal.appendChild(w);return inp;
    };
    const bIn=fld("Bearing (e.g. N 47°23'10\" E — or CURVE L/R R=250 ARC=130.9)",
      c.type==="line"?_deedAzToBearingStr(_deedBearingToAz(c.bearing)):
      c.type==="curve"?("CURVE "+c.dir+(c.radius?" R="+c.radius:"")+(c.arc?" ARC="+c.arc:"")+(c.chordD?" CH="+c.chordD:"")):"");
    const dIn=fld("Distance ("+units+", or e.g. '12 chains')",
      c.type==="line"?(c.rawVal!=null?c.rawVal+" "+(c.unit||""):c.dist):"");
    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
    mk("Save call","ok",()=>{
      const bt=_deedNormalize(bIn.value), dt=_deedNormalize(dIn.value);
      if(/^CURVE/.test(bt)){
        const dir=/\bL\b|LEFT/.test(bt)?"L":"R";
        const r=bt.match(/R\s*=?\s*([\d.]+)/),a=bt.match(/ARC\s*=?\s*([\d.]+)/),ch=bt.match(/CH(?:ORD)?\s*=?\s*([\d.]+)/);
        calls[i]={type:"curve",dir,radius:r?parseFloat(r[1]):null,arc:a?parseFloat(a[1]):null,
                  chordD:ch?parseFloat(ch[1]):null,chordB:null,delta:null,raw:c.raw||""};
      }else{
        const b=_deedParseBearing(bt);
        let d=_deedParseDistance(dt);
        if(!d&&parseFloat(dt))d={val:parseFloat(dt),unit:units.toUpperCase(),ft:parseFloat(dt)*(units==="ft"?1:3.280833333)};
        if(!b||!d){alert("Couldn't read that — bearing like N 47°23'10\" E, distance like 156.48 or 12 chains.");return;}
        calls[i]={type:"line",bearing:b,dist:d.ft*(units==="ft"?1:1/3.280833333)*(units==="ft"?1:1),unit:d.unit,rawVal:d.val,raw:c.raw||""};
        if(units==="m")calls[i].dist=d.ft/3.280833333;
      }
      close();_deedReview(calls);
    });
    mk("Delete call","danger",()=>{calls.splice(i,1);close();_deedReview(calls);});
    mk("Back","",()=>{close();_deedReview(calls);});
  });
}
function _deedPickPOB(calls){
  openModal((modal,close)=>{
    modal.innerHTML="<h2>Point of Beginning</h2><p class='info'>Where does the first call start?</p>";
    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
    mk("At an existing point #","ok",()=>{close();
      calculatorInput("POB at point #:","",pn=>{
        if(pn===null||pn==="")return;
        const pt=points.find(p=>p.Point===parseInt(pn,10));
        if(!pt){alert("Point "+pn+" not found.");return;}
        _deedSet(calls,pt.Easting,pt.Northing);
      });});
    mk("✛ "+_pressWord(true)+" the POB on the map","blue",()=>{close();
      window._deedPobCalls=calls;plotPoints();});
    if(geoAnchor)mk("🎯 Grid coordinate (SPC/UTM)","blue",()=>{close();
      _gridCoordEntry((lat,lon,zone,Nu,Eu)=>{_deedSet(calls,Eu,Nu);});});
    mk("Cancel","",close);
  });
}
function _deedSet(calls,E,N){
  _deedPlot={calls,pobE:E,pobN:N,rot:0};
  _deedRecompute();saveData();
  // If a new-job setup chain is parked (deed-start path), run it after the
  // result dialog closes
  if(window._deferredJobSetup){window._pendingSetup=window._deferredJobSetup;window._deferredJobSetup=null;}
  const g=_deedPlot.computed;
  showResult("📜 Deed Plotted",[
    {lbl:"Courses:",val:String(g.verts.length-1)+(g.skipped?" ("+g.skipped+" skipped)":"")},
    {lbl:"Perimeter:",val:g.perim.toFixed(1)+" "+units},
    {lbl:"Closure:",val:g.closeDist.toFixed(2)+" "+units+(g.precision?"  (1:"+g.precision+")":"")},
    {lbl:"Next:",val:"COGO → Deed Plotter to swing / adjust"}]);
}
function _deedFitTwoPoint(){
  const g=_deedPlot.computed, nC=g.verts.length;
  calculatorInput("Deed corner # to HOLD (0=POB … "+(nC-1)+"):","0",ci=>{
    if(ci===null)return;
    const i=parseInt(ci,10);
    if(!(i>=0&&i<nC)){alert("Corner must be 0–"+(nC-1)+".");return;}
    calculatorInput("Hold it ON measured point #:","",pa=>{
      if(pa===null||pa==="")return;
      const A=points.find(p=>p.Point===parseInt(pa,10));
      if(!A){alert("Point "+pa+" not found.");return;}
      calculatorInput("Second deed corner # (rotate toward):","",cj=>{
        if(cj===null)return;
        const j=parseInt(cj,10);
        if(!(j>=0&&j<nC)||j===i){alert("Pick a different corner 0–"+(nC-1)+".");return;}
        calculatorInput("…onto measured point #:","",pb=>{
          if(pb===null||pb==="")return;
          const B=points.find(p=>p.Point===parseInt(pb,10));
          if(!B){alert("Point "+pb+" not found.");return;}
          const vi=g.verts[i], vj=g.verts[j];
          const azRec=Math.atan2(vj.E-vi.E,vj.N-vi.N)*180/Math.PI;
          const azMeas=Math.atan2(B.Easting-A.Easting,B.Northing-A.Northing)*180/Math.PI;
          const dTheta=azMeas-azRec;
          // rotate the whole figure about corner i by dTheta, then drop corner i on A.
          // pob moves with the figure:
          const rad=Math.PI/180, c=Math.cos(dTheta*rad), sn=Math.sin(dTheta*rad);
          const rE=_deedPlot.pobE-vi.E, rN=_deedPlot.pobN-vi.N;
          // rotate offset vector (E,N) clockwise by dTheta in azimuth terms:
          const pE=vi.E+(rE*c+rN*sn), pN=vi.N+(-rE*sn+rN*c);
          _deedPlot.rot=(_deedPlot.rot||0)+dTheta;
          _deedPlot.pobE=pE+(A.Easting-vi.E);
          _deedPlot.pobN=pN+(A.Northing-vi.N);
          _deedRecompute();
          const g2=_deedPlot.computed;
          const resid=Math.hypot(g2.verts[j].E-B.Easting,g2.verts[j].N-B.Northing);
          const dRec=Math.hypot(vj.E-vi.E,vj.N-vi.N);
          const dMeas=Math.hypot(B.Easting-A.Easting,B.Northing-A.Northing);
          saveData();
          showResult("📜 Deed fit to found points",[
            {lbl:"Held:",val:"corner "+i+" ON pt #"+A.Point},
            {lbl:"Rotated:",val:dTheta.toFixed(4)+"° (total swing "+_deedPlot.rot.toFixed(4)+"°)"},
            {lbl:"Record "+i+"→"+j+":",val:dRec.toFixed(2)+" "+units},
            {lbl:"Measured:",val:dMeas.toFixed(2)+" "+units+"  (Δ "+(dMeas-dRec>=0?"+":"")+(dMeas-dRec).toFixed(2)+")"},
            {lbl:"Residual at "+j+":",val:resid.toFixed(2)+" "+units+" — record distance HELD, not scaled"},
            ...((A.Type==="GPS"||B.Type==="GPS")?[{lbl:"⚠ Note:",val:"a control point is GPS-grade (±10-30 "+units+") — fit is for recon; residual is not meaningful for judging the deed"}]:[])]);
        });
      });
    });
  });
}
function _deedOcr(file){
  let prog=null;
  const {close}=openModal((modal)=>{
    modal.innerHTML="<h2>📷 Reading the Deed</h2><p class='info' id='ocrProg'>Loading text recognition… (first use needs a connection; cached after that)</p>";
    prog=modal.querySelector("#ocrProg");
  });
  const setP=t=>{const el=document.getElementById("ocrProg");if(el)el.textContent=t;};
  const load=()=>new Promise((res,rej)=>{
    if(window.Tesseract)return res();
    const sc=document.createElement("script");
    sc.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    sc.onload=res; sc.onerror=rej;
    document.head.appendChild(sc);
  });
  load()
    .then(()=>Tesseract.recognize(file,"eng",{logger:m=>{
      if(m.status==="recognizing text")setP("Reading… "+Math.round((m.progress||0)*100)+"%");
      else if(m.status)setP(m.status+"…");
    }}))
    .then(r=>{close();_deedPasteModal((r.data.text||"").trim());})
    .catch(()=>{close();
      alert("Couldn't read the photo. First-time setup needs a connection; and clean, well-lit, straight-on shots read best. Google Lens → copy → paste also works.");
      _deedPasteModal("");});
}
function _deedFromPdf(file){
  const {close}=openModal(modal=>{
    modal.innerHTML="<h2>📄 Reading PDF</h2><p class='info' id='ocrProg'>Opening… (first use needs a connection; cached after that)</p>";});
  const setP=t=>{const el=document.getElementById("ocrProg");if(el)el.textContent=t;};
  const loadPdfjs=()=>new Promise((res,rej)=>{
    if(window.pdfjsLib)return res();
    const sc=document.createElement("script");
    sc.src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js";
    sc.onload=()=>{try{
      pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
      res();}catch(e){rej(e);}};
    sc.onerror=rej;document.head.appendChild(sc);
  });
  file.arrayBuffer()
    .then(buf=>loadPdfjs().then(()=>pdfjsLib.getDocument({data:buf}).promise))
    .then(async doc=>{
      const nP=Math.min(doc.numPages,4);
      // Stage 1: text layer — instant and exact on born-digital PDFs
      let text="";
      for(let i=1;i<=nP;i++){
        setP("Reading text… page "+i+" / "+nP);
        const pg=await doc.getPage(i);
        const tc=await pg.getTextContent();
        text+=tc.items.map(it=>it.str).join(" ")+"\n";
      }
      if(text.replace(/\s+/g,"").length>60){close();_deedPasteModal(text.trim());return;}
      // Stage 2: scanned PDF — render pages, OCR them
      setP("Scanned PDF — loading text recognition…");
      await new Promise((res,rej)=>{
        if(window.Tesseract)return res();
        const sc=document.createElement("script");
        sc.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
        sc.onload=res;sc.onerror=rej;document.head.appendChild(sc);});
      let out="";
      for(let i=1;i<=nP;i++){
        const pg=await doc.getPage(i);
        const vp=pg.getViewport({scale:2});
        const cv=document.createElement("canvas");cv.width=vp.width;cv.height=vp.height;
        await pg.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
        const r=await Tesseract.recognize(cv,"eng",{logger:m=>{
          if(m.status==="recognizing text")setP("OCR page "+i+" / "+nP+" — "+Math.round((m.progress||0)*100)+"%");}});
        out+=(r.data.text||"")+"\n";
      }
      close();_deedPasteModal(out.trim());
    })
    .catch(()=>{close();
      alert("Couldn't read that PDF. The 📷 photo route or copy-paste also works.");

        if(v===null)return;const x=parseFloat(v);

    mk("Re-edit calls","blue",()=>{const calls=_deedPlot.calls;close();_deedReview(calls);});
    mk("Convert to points & lines","ok",()=>{close();
      confirmDialog("Create "+( _deedPlot.computed.verts.length)+" points and connect them? (Curves come in as straight chords.)",yes=>{
        if(!yes)return;
        _takeSnapshot("Deed → points");
        let prev=null;
        _deedPlot.computed.verts.forEach((v,i)=>{
          const num=pointCounter++;
          points.push({Point:num,Northing:v.N,Easting:v.E,
            Elevation:(currentPoint?currentPoint.Elevation:100)||100,
            Type:"Deed",Flag:"",ih:0,Description:i===0?"POB (deed)":"Deed crn "+i});
          if(prev!=null)plotConnections.push({type:"line",from:prev,to:num,style:"dashed"});
          prev=num;
        });
        saveData();updateStatus();
        showResult("✓ Deed converted",[{lbl:"Points:",val:String(_deedPlot.computed.verts.length)}]);
      });});
    mk("Clear deed overlay","danger",()=>{
      confirmDialog("Remove the deed overlay? (Converted points stay.)",yes=>{
        if(!yes)return;_deedPlot=null;saveData();});
      close();});
    mk("Done","",close);
  });
}

/* ── SATELLITE IMAGERY (Esri World Imagery) ─────────────────────
   Anchors the local plot to Earth via one GPS fix (or manual lat/lon),
   projects to State Plane (NAD83) where a zone is known, else UTM,
   and draws Esri World Imagery tiles beneath the plot. Imagery is
   visual context ONLY — never measure against it. */

let geoAnchor=null;          // {lat,lon,E,N,mx,my,conv,zoneName,m2u}
let satOn=false, satOpacity=0.85, satRotNudge=0, satBasemap="esri";
const _BASEMAPS={
  esri:{url:(z,y,x)=>"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/"+z+"/"+y+"/"+x,
        maxZ:19, attr:"Imagery: Esri, Maxar, Earthstar Geographics", label:"Aerial (Esri)"},
  topo:{url:(z,y,x)=>"https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/"+z+"/"+y+"/"+x,
        maxZ:16, attr:"Map: USGS The National Map", label:"USGS Topo"}
};
const _tileCache=new Map();  // "z/x/y" -> {img,ok,err}
let _satRafPending=false;
function _satRepaint(){ if(_satRafPending)return; _satRafPending=true;
  requestAnimationFrame(()=>{_satRafPending=false;plotPoints();}); }

/* — Projections (GRS80 / NAD83) — */
const _GRS80={a:6378137,f:1/298.257222101};
function _tmForward(lat,lon,z){
  const a=_GRS80.a,f=_GRS80.f,e2=2*f-f*f,ep2=e2/(1-e2),rad=Math.PI/180;
  const phi=lat*rad,lam=lon*rad,lam0=z.lon0*rad,phi0=z.lat0*rad;
  const Nr=a/Math.sqrt(1-e2*Math.sin(phi)**2);
  const T=Math.tan(phi)**2,C=ep2*Math.cos(phi)**2,A=(lam-lam0)*Math.cos(phi);
  const M=p=>a*((1-e2/4-3*e2*e2/64-5*e2**3/256)*p
    -(3*e2/8+3*e2*e2/32+45*e2**3/1024)*Math.sin(2*p)
    +(15*e2*e2/256+45*e2**3/1024)*Math.sin(4*p)
    -(35*e2**3/3072)*Math.sin(6*p));
  const E=z.FE+z.k0*Nr*(A+(1-T+C)*A**3/6+(5-18*T+T*T+72*C-58*ep2)*A**5/120);
  const N=z.FN+z.k0*(M(phi)-M(phi0)+Nr*Math.tan(phi)*(A*A/2+(5-T+9*C+4*C*C)*A**4/24
    +(61-58*T+T*T+600*C-330*ep2)*A**6/720));
  const conv=Math.atan(Math.tan(lam-lam0)*Math.sin(phi))/rad;
  return{E,N,conv};
}
function _lccForward(lat,lon,z){
  const a=_GRS80.a,f=_GRS80.f,e2=2*f-f*f,e=Math.sqrt(e2),rad=Math.PI/180;
  const phi=lat*rad,lam=lon*rad,p1=z.lat1*rad,p2=z.lat2*rad,p0=z.lat0*rad,l0=z.lon0*rad;
  const m=p=>Math.cos(p)/Math.sqrt(1-e2*Math.sin(p)**2);
  const t=p=>Math.tan(Math.PI/4-p/2)/Math.pow((1-e*Math.sin(p))/(1+e*Math.sin(p)),e/2);
  const n=(Math.log(m(p1))-Math.log(m(p2)))/(Math.log(t(p1))-Math.log(t(p2)));
  const F=m(p1)/(n*Math.pow(t(p1),n));
  const rho=a*F*Math.pow(t(phi),n),rho0=a*F*Math.pow(t(p0),n),th=n*(lam-l0);
  return{E:z.FE+rho*Math.sin(th),N:z.FN+rho0-rho*Math.cos(th),conv:th/rad};
}
function _projForward(lat,lon,z){return z.type==="lcc"?_lccForward(lat,lon,z):_tmForward(lat,lon,z);}
function _tmInverse(E,N,z){
  const a=_GRS80.a,f=_GRS80.f,e2=2*f-f*f,ep2=e2/(1-e2),rad=Math.PI/180;
  const phi0=z.lat0*rad,lam0=z.lon0*rad;
  const M=p=>a*((1-e2/4-3*e2*e2/64-5*e2**3/256)*p
    -(3*e2/8+3*e2*e2/32+45*e2**3/1024)*Math.sin(2*p)
    +(15*e2*e2/256+45*e2**3/1024)*Math.sin(4*p)
    -(35*e2**3/3072)*Math.sin(6*p));
  const Mf=M(phi0)+(N-z.FN)/z.k0;
  const mu=Mf/(a*(1-e2/4-3*e2*e2/64-5*e2**3/256));
  const e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
  const p1=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1*e1/16-55*e1**4/32)*Math.sin(4*mu)
    +(151*e1**3/96)*Math.sin(6*mu)+(1097*e1**4/512)*Math.sin(8*mu);
  const C1=ep2*Math.cos(p1)**2,T1=Math.tan(p1)**2;
  const N1=a/Math.sqrt(1-e2*Math.sin(p1)**2);
  const R1=a*(1-e2)/Math.pow(1-e2*Math.sin(p1)**2,1.5);
  const D=(E-z.FE)/(N1*z.k0);
  const phi=p1-(N1*Math.tan(p1)/R1)*(D*D/2-(5+3*T1+10*C1-4*C1*C1-9*ep2)*D**4/24
    +(61+90*T1+298*C1+45*T1*T1-252*ep2-3*C1*C1)*D**6/720);
  const lam=lam0+(D-(1+2*T1+C1)*D**3/6+(5-2*C1+28*T1-3*C1*C1+8*ep2+24*T1*T1)*D**5/120)/Math.cos(p1);
  return{lat:phi/rad,lon:lam/rad};
}
function _lccInverse(E,N,z){
  const a=_GRS80.a,f=_GRS80.f,e2=2*f-f*f,e=Math.sqrt(e2),rad=Math.PI/180;
  const p1=z.lat1*rad,p2=z.lat2*rad,p0=z.lat0*rad,l0=z.lon0*rad;
  const m=p=>Math.cos(p)/Math.sqrt(1-e2*Math.sin(p)**2);
  const t=p=>Math.tan(Math.PI/4-p/2)/Math.pow((1-e*Math.sin(p))/(1+e*Math.sin(p)),e/2);
  const n=(Math.log(m(p1))-Math.log(m(p2)))/(Math.log(t(p1))-Math.log(t(p2)));
  const F=m(p1)/(n*Math.pow(t(p1),n));
  const rho0=a*F*Math.pow(t(p0),n);
  const Ep=E-z.FE, Np=rho0-(N-z.FN);
  const rho=Math.sign(n)*Math.sqrt(Ep*Ep+Np*Np);
  const th=Math.atan2(Ep,Np);
  const tt=Math.pow(rho/(a*F),1/n);
  let phi=Math.PI/2-2*Math.atan(tt);
  for(let i=0;i<7;i++)
    phi=Math.PI/2-2*Math.atan(tt*Math.pow((1-e*Math.sin(phi))/(1+e*Math.sin(phi)),e/2));
  return{lat:phi/rad,lon:(l0+th/n)/rad};
}
function _projInverse(E,N,z){return z.type==="lcc"?_lccInverse(E,N,z):_tmInverse(E,N,z);}
