<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="application-name" content="ChainLink-v4.2.34">
<meta name="theme-color" content="#0a0905">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ChainLink">
<title>ChainLink Survey v4.2.34</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   CHAINLINK v2.8 — Pocket Survey Data Collector
   Primary: Share Tech Mono (data/values)
   Secondary: Rajdhani (labels/UI chrome)
══════════════════════════════════════════════════════ */
:root {
  /* Backgrounds — dark but with warm undertones, not cold steel */
  --bg:        #0a0905;   /* near-black with warm brown tint */
  --surface:   #151208;   /* dark warm brown */
  --surface2:  #1e1a0e;   /* slightly lighter warm */
  --surface3:  #28220f;   /* button hover — warm bronze */
  --border:    #3a3018;   /* warm border */
  --border2:   #4e4025;   /* highlighted border — bronze */
  --border-hi: #6a5830;   /* bright border — old brass */

  /* Brand palette — warm instrument feel */
  --accent:    #f0a020;   /* amber — primary */
  --accent-lo: rgba(240,160,32,.13);
  --accent2:   #c87830;   /* bronze — secondary (replaces cold blue) */
  --accent2-lo:rgba(200,120,48,.13);
  --danger:    #e05030;   /* warm red-orange, not cold red */
  --danger-lo: rgba(224,80,48,.13);
  --ok:        #68a84a;   /* warm olive green */
  --ok-lo:     rgba(104,168,74,.13);
  --warn:      #e8b030;

  /* Text — warm off-white, not cold blue-white */
  --text:      #f0ebe0;   /* warm parchment */
  --text2:     #b8a888;   /* warm tan */
  --muted:     #7a6848;   /* warm muted brown */
  --dim:       #4a3c28;

  /* Canvas — very slightly warm black */
  --canvas-bg: #080705;

  /* Typography */
  --font-data:  'Share Tech Mono', 'Courier New', monospace;
  --font-ui:    'Rajdhani', 'Arial Narrow', sans-serif;
  --radius:     8px;
  --radius-lg:  14px;
  --font:       var(--font-data);

  /* Shadows & glows — warm */
  --glow-amber: 0 0 12px rgba(240,160,32,.35);
  --glow-blue:  0 0 12px rgba(200,120,48,.28);
  --shadow-up:  0 -4px 24px rgba(0,0,0,.7);
}

/* ── LIGHT MODE ───────────────────────────────────────────── */
html.light-mode {
  --bg:        #ffffff;
  --surface:   #f0f0f0;
  --surface2:  #e0e0e0;
  --surface3:  #d0d0d0;
  --border:    #bbbbbb;
  --border2:   #999999;
  --border-hi: #666666;

  --accent:    #b06000;   /* dark amber — readable on white */
  --accent-lo: rgba(176,96,0,.12);
  --accent2:   #804000;
  --accent2-lo:rgba(128,64,0,.12);
  --danger:    #cc2200;
  --danger-lo: rgba(204,34,0,.12);
  --ok:        #2a7a00;
  --ok-lo:     rgba(42,122,0,.12);
  --warn:      #aa7700;

  --text:      #000000;
  --text2:     #000000;
  --muted:     #000000;
  --dim:       #333333;

  --canvas-bg: #ffffff;

  --glow-amber: 0 0 8px rgba(176,96,0,.2);
  --glow-blue:  0 0 8px rgba(128,64,0,.15);
  --shadow-up:  0 -4px 16px rgba(0,0,0,.12);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
input,textarea{user-select:text;-webkit-user-select:text}
button{touch-action:manipulation}
*{-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font-data);
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  touch-action:manipulation;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  height:100vh;          /* fallback for older Safari */
  height:100dvh;         /* modern iOS */
  /* Safari flex fix */
  -webkit-flex-direction:column;
}

/* ── SPLASH ─────────────────────────────────────────── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 50% 40%, #1a1408 0%, #0a0905 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease;
}
#splash.hide{opacity:0;pointer-events:none}
#splashLogo{margin-top:24px;margin-bottom:20px;filter:drop-shadow(var(--glow-amber));display:flex;flex-direction:column;align-items:center;}
@keyframes splash-pulse-ring{0%{r:6;opacity:.8}100%{r:36;opacity:0}}
@keyframes splash-rose-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes splash-needle-swing{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(18deg)}}
@keyframes splash-north-glow{0%,100%{fill:#f0a020;opacity:.9}50%{fill:#ffe8a0;opacity:1}}
.splash-pulse {animation:splash-pulse-ring 2.5s ease-out infinite;}
.splash-pulse2{animation:splash-pulse-ring 2.5s ease-out infinite 1.25s;}
.splash-rose  {animation:splash-rose-spin 24s linear infinite;transform-origin:45px 42px;}
.splash-needle{animation:splash-needle-swing 3.5s ease-in-out infinite;transform-origin:45px 42px;}
.splash-north {animation:splash-north-glow 3.5s ease-in-out infinite;}
#splashTitle{
  font-family:var(--font-ui);font-size:2.8em;font-weight:700;
  letter-spacing:.35em;color:var(--accent);text-transform:uppercase;
  margin-bottom:2px;text-shadow:var(--glow-amber);
}
#splashSub{
  font-family:var(--font-ui);font-size:.9em;font-weight:400;
  letter-spacing:.22em;color:var(--text2);text-transform:uppercase;margin-bottom:40px;
}
#splashEnter{
  font-family:var(--font-ui);font-size:1em;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;
  padding:13px 44px;background:transparent;
  border:1px solid var(--accent);border-radius:4px;
  color:var(--accent);cursor:pointer;
  transition:background .2s,box-shadow .2s;
  box-shadow:var(--glow-amber);
}
#splashEnter:active{background:var(--accent);color:var(--bg)}
#splashAuthor{
  font-family:var(--font-ui);font-size:.82em;font-weight:600;
  color:var(--accent2);letter-spacing:.12em;margin-top:22px;
  text-shadow:var(--glow-blue);
}
#splashAI{
  font-family:var(--font-ui);font-size:.68em;font-weight:400;
  color:var(--muted);letter-spacing:.1em;margin-top:4px;font-style:italic;
}
#splashVersion{
  font-family:var(--font-data);font-size:.68em;color:var(--accent2);
  letter-spacing:.12em;margin-top:auto;padding-bottom:28px;
  font-weight:600;text-shadow:0 0 8px rgba(193,127,36,.4);
}
@keyframes pulseRing{0%{opacity:.5;r:28px}100%{opacity:0;r:52px}}
.pulse-ring{animation:pulseRing 2s ease-out infinite}

/* ── HEADER ─────────────────────────────────────────── */
#appHeader{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border2);
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
#headerLeft{display:flex;flex-direction:column;gap:0}
#appHeader h1{
  font-family:var(--font-ui);font-size:1.05em;font-weight:700;
  letter-spacing:.18em;color:var(--accent);text-transform:uppercase;
  text-shadow:var(--glow-amber);
}
#jobBadge{
  font-family:var(--font-data);font-size:.60em;color:var(--accent2);
  letter-spacing:.06em;max-width:150px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;opacity:.85;
}
#statusBar{
  font-family:var(--font-data);font-size:.64em;color:var(--text2);
  text-align:right;line-height:1.7;
}
#modeToggle{
  display:flex;align-items:center;
  border:1px solid var(--border2);border-radius:20px;
  overflow:hidden;background:var(--surface2);
}
#modeToggle button{
  font-family:var(--font-ui);font-size:.78em;font-weight:700;
  padding:5px 13px;border:none;background:transparent;
  cursor:pointer;color:var(--muted);transition:all .15s;
  letter-spacing:.08em;text-transform:uppercase;
}
#modeToggle button.mode-active-2d{background:var(--ok);color:#000;text-shadow:none}
#modeToggle button.mode-active-3d{background:var(--accent2);color:#fff;text-shadow:none}
#modeHint{
  font-family:var(--font-ui);font-size:.60em;letter-spacing:.06em;
}

/* ── CANVAS ──────────────────────────────────────────── */
#canvasWrap{position:relative;flex:1 1 auto;overflow:hidden;display:flex}
#plotCanvas{
  display:block;width:100%;height:100%;
  background:var(--canvas-bg);touch-action:none;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}

/* ── HUD OVERLAYS ────────────────────────────────────── */
#recentTicker{
  position:absolute;top:8px;left:8px;
  background:var(--surface);
  border:1px solid var(--border2);border-radius:6px;
  padding:6px 10px;font-family:var(--font-data);font-size:.58em;
  color:var(--text2);line-height:1.8;max-width:170px;
  pointer-events:none;display:none;
  box-shadow:inset 0 0 12px rgba(0,0,0,.4);
}
#recentTicker.visible{display:block}

#intersectBanner{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(240,160,32,.15);border:1px solid var(--accent);
  border-radius:6px;padding:5px 16px;
  font-family:var(--font-ui);font-size:.8em;font-weight:600;
  color:var(--accent);letter-spacing:.08em;
  text-align:center;pointer-events:none;
  display:none;z-index:50;white-space:nowrap;
  box-shadow:var(--glow-amber);
}
#intersectBanner.visible{display:block}

#northArrow{position:absolute;top:8px;right:56px;pointer-events:none;opacity:.75}

/* ── PLOT CONTROLS ───────────────────────────────────── */
#plotControls{
  position:absolute;bottom:10px;right:6px;
  display:flex;flex-direction:column;gap:4px;z-index:100;
}
#plotControls button{
  width:40px;height:40px;
  background:var(--surface2);
  border:1px solid var(--border2);border-radius:7px;
  color:var(--text2);font-size:1em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;
  box-shadow:0 2px 6px rgba(0,0,0,.6);
  font-family:var(--font-ui);font-weight:600;
}
#plotControls button:active{
  background:var(--surface3);color:var(--accent);
  border-color:var(--accent);box-shadow:var(--glow-amber);
}

/* ── BOTTOM TOOLBAR ──────────────────────────────────── */
#toolbar{
  flex:0 0 auto;display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
  border-top:1px solid var(--border2);
}
#toolbar button{
  background:var(--surface);
  color:var(--text2);border:none;
  padding:10px 4px 7px;
  font-family:var(--font-ui);font-size:.72em;font-weight:600;
  letter-spacing:.07em;text-transform:uppercase;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all .12s;
}
#toolbar button .ico{font-size:1.5em;line-height:1}
#toolbar button:active,.tbar-active{
  background:var(--surface3);color:var(--accent);
}

/* ── MODAL (bottom sheet) ────────────────────────────── */
.modal-overlay{
  position:fixed;bottom:0;left:0;right:0;background:transparent;z-index:500;
  display:flex;align-items:flex-end;justify-content:center;
  padding:0 0 72px;
  /* pointer-events handled per-child */
}
.modal{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-top:2px solid var(--border-hi);
  border-top-left-radius:var(--radius-lg);
  border-top-right-radius:var(--radius-lg);
  border-bottom-left-radius:0;border-bottom-right-radius:0;
  width:100%;max-width:420px;
  padding:8px 10px 6px;
  box-shadow:var(--shadow-up);
  max-height:42vh;overflow-y:auto;
  pointer-events:auto;
  touch-action:auto;
}
/* Tighter buttons inside all modals */
.modal .btn{
  padding:9px 10px;
  margin:3px 0;
  font-size:.85em;
}
.modal h2{
  font-size:.85em;
  margin-bottom:7px;
  padding-bottom:5px;
}
/* drag handle pill */
/* drag handle removed — not functional */
.modal h2{
  font-family:var(--font-ui);font-size:1em;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px;padding-bottom:7px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.modal p.info{
  font-family:var(--font-ui);font-size:.84em;font-weight:400;
  color:var(--text2);margin-bottom:9px;line-height:1.55;
}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{
  display:block;width:100%;
  padding:12px 14px;margin:4px 0;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface2);color:var(--text);
  font-family:var(--font-ui);font-size:.9em;font-weight:600;
  letter-spacing:.05em;cursor:pointer;text-align:left;
  transition:border-color .14s,background .14s,box-shadow .14s;
}
.btn:active{background:var(--surface3)}
.btn.accent{border-color:var(--accent); color:var(--accent);  background:var(--accent-lo)}
.btn.ok    {border-color:var(--ok);     color:var(--ok);      background:var(--ok-lo)}
.btn.danger{border-color:var(--danger); color:var(--danger);  background:var(--danger-lo)}
.btn.blue  {border-color:var(--accent2);color:var(--accent2); background:var(--accent2-lo)}
.btn-row{display:flex;gap:6px}
.btn-row .btn{flex:1;text-align:center}

/* ── CALCULATOR DISPLAY ──────────────────────────────── */
.disp-input{
  width:100%;background:var(--surface);
  border:1px solid var(--border2);border-bottom:2px solid var(--accent);
  border-radius:var(--radius) var(--radius) 0 0;
  color:var(--accent);font-family:var(--font-data);
  font-size:1.5em;padding:10px 14px;margin-bottom:10px;
  text-align:right;letter-spacing:.05em;min-height:2.4em;
  word-break:break-all;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.5);
}
.input-label{
  font-family:var(--font-ui);font-size:.76em;font-weight:600;
  color:var(--text2);letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:3px;
}
.calc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:3px}
.calc-grid button{
  padding:15px 6px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);font-family:var(--font-data);font-size:.95em;cursor:pointer;
  transition:background .1s,box-shadow .1s;
  font-weight:bold;
}
.calc-grid button:active{background:var(--surface3);box-shadow:inset 0 2px 4px rgba(0,0,0,.4)}
.calc-grid button.accent-btn{border-color:var(--accent);color:var(--accent);background:var(--accent-lo)}
.calc-grid button.ok-btn    {border-color:var(--ok);    color:var(--ok);    background:var(--ok-lo);box-shadow:var(--glow-blue)}
.calc-grid button.danger-btn{border-color:var(--danger);color:var(--danger);background:var(--danger-lo)}

/* ── ALPHA KEYBOARD ──────────────────────────────────── */
.alpha-grid{
  display:grid;grid-template-columns:repeat(6,1fr);
  gap:3px;margin-top:4px;max-height:36vh;overflow-y:auto;
}
.alpha-grid button{
  padding:9px 2px;background:var(--surface2);border:1px solid var(--border);
  border-radius:5px;color:var(--text);
  font-family:var(--font-ui);font-size:.78em;font-weight:600;
  cursor:pointer;transition:background .1s;
}
.alpha-grid button:active{background:var(--surface3)}
.alpha-grid button.wide3{grid-column:span 3}
.alpha-grid button.wide2{grid-column:span 2}

/* ── TABLE ───────────────────────────────────────────── */
.tbl-wrap{
  max-height:50vh;overflow-y:auto;
  border:1px solid var(--border2);border-radius:var(--radius);
  margin-bottom:10px;
}
table.data-tbl{width:100%;border-collapse:collapse;font-size:.73em}
table.data-tbl th{
  background:#0e1828;color:var(--text2);padding:7px 6px;
  text-align:left;
  font-family:var(--font-ui);font-size:.88em;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  position:sticky;top:0;cursor:pointer;
  border-bottom:1px solid var(--border2);
}
table.data-tbl th:hover{color:var(--accent)}
table.data-tbl td{
  padding:7px 6px;border-bottom:1px solid var(--border);
  color:var(--text);font-family:var(--font-data);
  word-break:break-word;
}
table.data-tbl tr:last-child td{border-bottom:none}
table.data-tbl tr:nth-child(even) td{background:rgba(255,255,255,.018)}
table.data-tbl tr.pt-flagged td{color:var(--accent)}
table.data-tbl tr.pt-control td{color:var(--accent2)}

/* ── CSV TEXTAREA ────────────────────────────────────── */
.csv-out{
  width:100%;height:130px;background:var(--bg);
  border:1px solid var(--border);border-radius:var(--radius);
  color:var(--ok);font-family:var(--font-data);
  font-size:.72em;padding:8px;resize:none;margin-bottom:7px;
}

/* ── RESULT BOX ──────────────────────────────────────── */
.result-box{
  background:var(--surface);
  border:1px solid var(--border2);
  border-left:3px solid var(--accent);
  border-radius:0 var(--radius) var(--radius) 0;
  padding:10px 14px;margin-bottom:10px;
  font-family:var(--font-data);font-size:.82em;line-height:2.0;
}
.result-box span.val{color:var(--accent);font-weight:bold}
.result-box span.lbl{color:var(--muted)}

/* ── SHOT FORM ───────────────────────────────────────── */
.shot-form{display:flex;flex-direction:column;gap:0}
.sf-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px}
.sf-row.full{grid-template-columns:1fr}
.sf-field{display:flex;flex-direction:column}
.sf-label{
  font-family:var(--font-ui);font-size:.65em;font-weight:700;
  color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:1px;padding-left:2px;
}
.sf-val{
  background:var(--surface);
  border:1px solid var(--border);border-bottom:2px solid var(--border2);
  border-radius:var(--radius) var(--radius) 0 0;
  color:var(--accent);font-family:var(--font-data);font-size:.95em;
  padding:6px 8px;text-align:right;cursor:pointer;min-height:1.9em;
  transition:border-color .15s,box-shadow .15s;
}
.sf-val.active{
  border-color:var(--accent);border-bottom-color:var(--accent);
  box-shadow:0 0 0 2px rgba(240,160,32,.2),inset 0 1px 4px rgba(0,0,0,.4);
}
.sf-val.sf-desc{color:var(--text);font-family:var(--font-ui);font-size:.85em;
  font-weight:600;text-align:left}
.sf-val.sf-desc.active{border-color:var(--accent2);border-bottom-color:var(--accent2);
  box-shadow:0 0 0 2px rgba(61,142,240,.2)}

/* Shot numpad */
.sf-numpad{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:7px}
.sf-numpad button{
  padding:11px 4px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);font-family:var(--font-data);font-size:.9em;
  cursor:pointer;font-weight:bold;transition:all .1s;
}
.sf-numpad button:active{background:var(--surface3)}
.sf-numpad button.np-ok{
  border-color:var(--ok);color:#fff;
  background:linear-gradient(180deg,rgba(104,168,74,.35) 0%,rgba(104,168,74,.2) 100%);
  grid-column:span 2;font-family:var(--font-ui);font-size:.88em;
  font-weight:700;letter-spacing:.06em;
  box-shadow:0 0 8px rgba(104,168,74,.3);
}
.sf-numpad button.np-ok:active{background:var(--ok-lo)}
.sf-numpad button.np-clr{border-color:var(--danger);color:var(--danger);background:var(--danger-lo)}
.sf-numpad button.np-back{color:var(--text2);font-size:1.1em}
.sf-numpad button.np-neg{color:var(--accent2)}

/* Line style selector */
.sf-line-row{display:flex;gap:5px;margin-bottom:7px}
.sf-line-row button{
  flex:1;padding:7px 4px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--muted);font-family:var(--font-ui);font-size:.72em;
  font-weight:600;cursor:pointer;transition:all .15s;
}
.sf-line-row button.sel{
  border-color:var(--accent);color:var(--accent);background:var(--accent-lo);
}

/* Shot alpha keyboard */
.sf-alpha{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:4px;max-height:28vh;overflow-y:auto}
.sf-alpha button{
  padding:8px 2px;background:var(--surface2);border:1px solid var(--border);
  border-radius:5px;color:var(--text);

/* ════════════════════════════════════════════════════════════════
   CHAINLINK SURVEY ASSISTANT  v2.4
════════════════════════════════════════════════════════════════ */

/* ── VERSION GUARD ─────────────────────────────────────────────── */
const APP_VERSION = "4.2.34";

/* ── PRO ENTITLEMENT ───────────────────────────────────────────────
 * Single switch controlling access to Pro features. Currently forced
 * ON, so the app is 100% free for everyone — nothing is locked today.
 *
 * To monetize later: replace the line below so isPro is set from a
 * stored license key instead of `true`. Every Pro feature already
 * routes through requirePro(), so flipping this one source is all
 * that's needed — no other code changes.
 *   e.g.  let isPro = _checkLicense();   // validates a saved key
 *
 * Note: a client-side flag can't truly stop a determined user (all
 * code ships to the browser). Real enforcement would need a server.
 * This exists to make the free/paid line real and easy to flip.
 * ------------------------------------------------------------------ */
let isPro = true;   // ← the switch. true = everything free. Flip later.

// Gate a Pro feature. Returns true if allowed (always, while isPro=true).
// When isPro is false later, shows a friendly upsell and returns false.
function requirePro(featureName){
  if(isPro) return true;
  openModal((modal,close)=>{
    modal.innerHTML="<h2>\u2728 Pro Feature</h2>"+
      "<p class='info'><strong>"+(featureName||"This feature")+"</strong> is part of ChainLink Pro. "+
      "Unlock the full COGO suite, CAD/LandXML import &amp; export, and the fieldbook &amp; PDF reports.</p>";
    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
    mk("Maybe Later","",close);
  });
  return false;
}
document.addEventListener("DOMContentLoaded",()=>{
  const sv=document.getElementById("splashVersion");
  if(sv) sv.textContent="v"+APP_VERSION+" · Built for total station work";
});
// Wrap entirely in try/catch — Safari Private Mode throws SecurityError on localStorage
(function(){
  try {
    const stored = localStorage.getItem("cl_version");
    if(stored !== APP_VERSION){
      // Version change — MIGRATE, don't wipe. Job data (cl_points, cl_connections,
      // cl_jobName) and all settings are preserved across app updates.
      // loadData() is defensive: every key is read in a try/catch with a safe
      // fallback, so old-version data can never crash a new version.
      // Only sanity-check the job payloads — clear them ONLY if actually corrupt.
      ["cl_points","cl_connections","cl_polylines"].forEach(k => {
        const v = localStorage.getItem(k);
        if(v !== null){
          try { JSON.parse(v); } catch(e){ localStorage.removeItem(k); }
        }
      });
      localStorage.setItem("cl_version", APP_VERSION);
    }
  } catch(e) {
    // localStorage unavailable (Private Mode, restricted) — run without persistence
    console.warn("[ChainLink] localStorage unavailable:", e.message);
  }
})();

/* ── PWA bootstrap ─────────────────────────────────────────────── */
(function(){
  // 1. Ask the browser to protect localStorage from eviction (critical on iOS/Android
  //    for jobs that sit untouched for weeks). Silent no-op where unsupported.
  try{
    if(navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(()=>{});
  }catch(e){}

  // 2. Runtime web-app manifest (blob URL with absolute paths so a single-file
  //    deployment stays installable without a separate manifest.json).
  try{
    const icon='data:image/svg+xml,'+encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">'+
      '<rect width="192" height="192" rx="36" fill="#0a0905"/>'+
      '<g fill="none" stroke-width="13"><ellipse cx="66" cy="96" rx="40" ry="24" stroke="#f0a020"/>'+
      '<ellipse cx="126" cy="96" rx="40" ry="24" stroke="#c87830"/>'+
      '<path d="M 66 72 A 40 24 0 0 1 106 96" stroke="#f0a020"/></g></svg>');
    const manifest={
      name:"ChainLink Survey Assistant",
      short_name:"ChainLink",
      description:"Pocket survey data collector for total station work",
      start_url:location.origin+location.pathname,
      scope:location.origin+location.pathname.replace(/[^/]*$/,""),
      display:"standalone",
      orientation:"portrait",
      background_color:"#0a0905",
      theme_color:"#0a0905",
      icons:[{src:icon,sizes:"192x192 512x512",type:"image/svg+xml",purpose:"any"}]
    };
    const link=document.createElement("link");
    link.rel="manifest";
    link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"}));
    document.head.appendChild(link);
  }catch(e){}

  // 3. Service worker for offline use — registration is guarded so the app is
  //    unaffected if sw.js isn't deployed alongside this file.
  try{
    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>{
        navigator.serviceWorker.register("./sw.js").catch(()=>{});
      });
    }
  }catch(e){}

const MAX_SNAPSHOTS   = 20;   // keep last 20 undoable actions

function _snapState(label){
  // Deep-copy of current state (shared by undo + redo)
  return {
    label: label||"action",
    points: JSON.parse(JSON.stringify(points)),
    plotConnections: JSON.parse(JSON.stringify(plotConnections)),
    polylines: (typeof _polylines!=="undefined")?JSON.parse(JSON.stringify(_polylines)):[],
    pointCounter,
    units, prismConstant, // so undoing a unit conversion restores both
  };
}
function _restoreSnap(snap){
  points=snap.points;
  plotConnections=snap.plotConnections;
  if(typeof _polylines!=="undefined" && snap.polylines) _polylines=snap.polylines;
  if(typeof _selPolyline!=="undefined") _selPolyline=-1;
  pointCounter=snap.pointCounter;
  if(snap.units!==undefined){ units=snap.units; prismConstant=snap.prismConstant; }
  if(currentPoint){
    currentPoint=points.find(p=>p.Point===currentPoint.Point)||points[0]||null;
  }
  saveData();
  _updateUndoBtn();
}
function _takeSnapshot(label){
  // Deep-copy current state before a destructive action
  _snapshots.push(_snapState(label));
  if(_snapshots.length>MAX_SNAPSHOTS) _snapshots.shift();
  _redoStack=[]; // a new action invalidates the redo chain
  _updateUndoBtn();
}
function _convertLinearUnits(f){
  // Multiply every stored linear value by f. Angular values
  // (azimuths, zenith angles, arc deltas) are untouched.
  points.forEach(p=>{
    p.Northing*=f; p.Easting*=f;
    if(typeof p.Elevation==="number")p.Elevation*=f;
    if(typeof p.ih==="number")p.ih*=f;
    if(typeof p.HorizDist==="number")p.HorizDist*=f;
    if(typeof p.SlopeDist==="number")p.SlopeDist*=f;
    if(typeof p.IH==="number")p.IH*=f;
    if(typeof p.TH==="number")p.TH*=f;
    if(typeof p.LatOffset==="number")p.LatOffset*=f;
    if(typeof p.VertOffset==="number")p.VertOffset*=f;
  });
  plotConnections.forEach(c=>{
    if(c.type==="arc"){
      c.centerE*=f; c.centerN*=f; c.R*=f;
      if(typeof c.arcLen==="number")c.arcLen*=f;
      if(typeof c.chord==="number")c.chord*=f;
    }
  });
  if(typeof _polylines!=="undefined")_polylines.forEach(pl=>{
    (pl.verts||[]).forEach(v=>{v.E*=f; v.N*=f;});
    (pl.segs||[]).forEach(s=>{if(s.type==="arc"){s.centerE*=f; s.centerN*=f; s.R*=f;}});
  });
  prismConstant*=f;
  // Transient geometry is in old units — wipe it
  tempGeom=[]; tempIntersections=[]; recentShots=[];
}

function _csvField(v){

// Core CSV columns — everything else on a point is "raw/extra" data carried in the meta line
const _CSV_CORE=["Point","Northing","Easting","Elevation","Description","Type","Flag"];

function _buildCSV(){
  let csv="Point,Northing,Easting,Elevation,Description,Type,Flag\n";
  const raw={};
  points.forEach(p=>{
    csv+=p.Point+","+p.Northing.toFixed(4)+","+p.Easting.toFixed(4)+","+(p.Elevation||0).toFixed(4)+","+
         _csvField(p.Description||"")+","+_csvField(p.Type||"")+","+_csvField(p.Flag||"")+"\n";
    // Collect raw observation / extra fields (InstReading, SlopeDist, ZenithAngle, IH, TH, offsets, ih...)
    const extra={};
    Object.keys(p).forEach(k=>{
      if(!_CSV_CORE.includes(k)&&!k.startsWith("_")) extra[k]=p[k];
    });
    if(Object.keys(extra).length) raw[p.Point]=extra;
  });
  const meta={connections:plotConnections,surveyMode,units,v:APP_VERSION};
  if(Object.keys(raw).length) meta.raw=raw;
  if(typeof _polylines!=="undefined"&&_polylines.length) meta.polylines=_polylines;
  csv+="#CHAINLINK:"+JSON.stringify(meta)+"\n";
  return csv;
}

/* ── 4. MATH ───────────────────────────────────────────────────── */
// Fixed DMS parser — handles integers too
const parseDMS = s => {
  if(!s||!s.trim()) return NaN;
  const neg=s.trim().startsWith("-"); s=s.trim().replace(/^-/,"");
  if(!s.includes(".")){
    const v=parseFloat(s); return isNaN(v)?NaN:(neg?-v:v);
  }
  const [deg,minsec=""]=s.split(".");
  const pad=minsec.padEnd(4,"0");
  const mm=+pad.slice(0,2), ss=+pad.slice(2,4);
  if(mm>=60||ss>=60) return NaN; // reject garbage
  const dd=+deg+mm/60+ss/3600;
  return neg?-dd:dd;
};
const toDMS = deg => {
  if(isNaN(deg)) return "NaN";
  const sign=deg<0?"-":""; deg=Math.abs(deg);
  let d=Math.floor(deg);
  let m=Math.floor((deg-d)*60);
  let s=Math.round(((deg-d)*60-m)*60);
  // Carry rounding overflow
  if(s>=60){s-=60;m+=1;}
  if(m>=60){m-=60;d+=1;}
  return sign+d+"°"+String(m).padStart(2,"0")+"'"+String(s).padStart(2,"0")+'"';
};

// Quadrant bearing formatter: azimuth → "N35°22'42\"W"
function toQuadrant(deg){
  if(isNaN(deg)) return "NaN";
  deg = ((deg % 360) + 360) % 360;
  let ns, ew, workDeg;
  if(deg <= 90){         ns="N"; ew="E"; workDeg=deg;
  } else if(deg <= 180){ ns="S"; ew="E"; workDeg=180-deg;
  } else if(deg <= 270){ ns="S"; ew="W"; workDeg=deg-180;
  } else {               ns="N"; ew="W"; workDeg=360-deg; }
  let d=Math.floor(workDeg);
  let m=Math.floor((workDeg-d)*60);
  let s=Math.round(((workDeg-d)*60-m)*60);
  if(s>=60){s-=60;m+=1;} if(m>=60){m-=60;d+=1;}
  return ns+d+"\u00b0"+String(m).padStart(2,"0")+"'"+String(s).padStart(2,"0")+'"'+ew;
}

// Route bearing display through current mode
function fmtBrg(deg){ return bearingMode==="quad" ? toQuadrant(deg) : toDMS(deg); }

// Parse quadrant bearing "N35.2342W" → decimal degrees azimuth.
// Format: [N|S] DDD.MMSS [E|W]  (spaces optional, case-insensitive)
// Returns NaN if unparseable.
function parseQuadrant(str){
  if(!str||!str.trim()) return NaN;
  const m = str.trim().toUpperCase().replace(/\s/g,"")
    .match(/^([NS])(\d+(?:\.\d+)?)([EW])$/);
  if(!m) return NaN;
  const ns=m[1], ew=m[3];
  const workDeg = parseDMS(m[2]);   // reuse DDD.MMSS parser
  if(isNaN(workDeg)||workDeg<0||workDeg>90) return NaN;
  let az;
  if(ns==="N"&&ew==="E") az=workDeg;
  else if(ns==="S"&&ew==="E") az=180-workDeg;
  else if(ns==="S"&&ew==="W") az=180+workDeg;
  else                         az=360-workDeg;
  return ((az%360)+360)%360;
}

// Parse bearing input in current mode — quad mode tries quadrant first then DMS fallback
function parseBrg(str){
  if(!str||!str.trim()) return NaN;
  if(bearingMode==="quad"){
    const q = parseQuadrant(str);
    if(!isNaN(q)) return q;
    // fallback: accept plain DDD.MMSS too (handy if user switches modes mid-job)
  }
  return parseDMS(str);
}

// Build quadrant bearing keyboard: N/S row → DDD.MMSS numpad → E/W row
// Input format: N35.2342W  (NS prefix, DDD.MMSS digits, EW suffix)
// onUpdate(azDecDeg, displayStr) called on every change.
function _buildQuadKeyboard(container, onUpdate){
  const state = { ns:"N", ew:"E", val:"" };

  function _toAz(){
    if(!state.val) return NaN;
    const w = parseDMS(state.val);
    if(isNaN(w)||w<0||w>90) return NaN;
    if(state.ns==="N"&&state.ew==="E") return w;
    if(state.ns==="S"&&state.ew==="E") return 180-w;
    if(state.ns==="S"&&state.ew==="W") return 180+w;
    return ((360-w)+360)%360;
  }
  function _dispStr(){ return state.ns+(state.val||"_")+state.ew; }
  function _emit(){ onUpdate(_toAz(), _dispStr()); }

  function _refreshButtons(){
    container.querySelectorAll("[data-qns]").forEach(b=>{
      const on=b.dataset.qns===state.ns;
      b.style.borderColor=on?"var(--accent2)":"var(--border)";
      b.style.color=on?"var(--accent2)":"var(--muted)";
      b.style.background=on?"var(--accent2-lo)":"var(--surface2)";
    });
    container.querySelectorAll("[data-qew]").forEach(b=>{
      const on=b.dataset.qew===state.ew;
      b.style.borderColor=on?"var(--accent2)":"var(--border)";
      b.style.color=on?"var(--accent2)":"var(--muted)";
      b.style.background=on?"var(--accent2-lo)":"var(--surface2)";
    });
    const dispEl=container.querySelector(".qb-disp");
    if(dispEl) dispEl.textContent=_dispStr();
  }

  container.innerHTML="";
  const wrap=document.createElement("div");
  wrap.style.cssText="display:flex;flex-direction:column;gap:4px;margin-top:4px";

  // Live display
  const disp=document.createElement("div"); disp.className="qb-disp";
  disp.style.cssText="font-family:var(--font-data);font-size:1.05em;color:var(--accent);text-align:center;padding:5px 8px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);letter-spacing:.06em;min-height:1.7em";
  disp.textContent=_dispStr();
  wrap.appendChild(disp);

  // N/S row
  const nsRow=document.createElement("div"); nsRow.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:4px";
  ["N","S"].forEach(v=>{
    const b=document.createElement("button"); b.textContent=v; b.dataset.qns=v;
    b.style.cssText="padding:10px 4px;border-radius:var(--radius);font-family:var(--font-ui);font-size:1em;font-weight:800;letter-spacing:.1em;cursor:pointer;transition:all .12s;border:1px solid "+(v===state.ns?"var(--accent2)":"var(--border)")+";color:"+(v===state.ns?"var(--accent2)":"var(--muted)")+";background:"+(v===state.ns?"var(--accent2-lo)":"var(--surface2)");
    b.onclick=()=>{state.ns=v;_refreshButtons();_emit();};
    nsRow.appendChild(b);
  });
  wrap.appendChild(nsRow);

  // DDD.MMSS numpad (same layout as the main numpad)
  const np=document.createElement("div"); np.className="sf-numpad";
  ["7","8","9","⌫","4","5","6","+/-","1","2","3","CLR","0","."].forEach(k=>{
    const b=document.createElement("button"); b.textContent=k;
    if(k==="CLR") b.className="np-clr";
    else if(k==="⌫") b.className="np-back";
    else if(k==="+/-") { b.style.display="none"; } // no negatives in a bearing
    b.onclick=()=>{
      if(k==="CLR"){ state.val=""; }
      else if(k==="⌫"){ state.val=state.val.slice(0,-1); }
      else if(k==="+/-"){ /* no-op */ }
      else { state.val+=k; }
      _refreshButtons(); _emit();
    };
    np.appendChild(b);
  });
  wrap.appendChild(np);

  // E/W row
  const ewRow=document.createElement("div"); ewRow.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:4px";
  ["E","W"].forEach(v=>{
    const b=document.createElement("button"); b.textContent=v; b.dataset.qew=v;
    b.style.cssText="padding:10px 4px;border-radius:var(--radius);font-family:var(--font-ui);font-size:1em;font-weight:800;letter-spacing:.1em;cursor:pointer;transition:all .12s;border:1px solid "+(v===state.ew?"var(--accent2)":"var(--border)")+";color:"+(v===state.ew?"var(--accent2)":"var(--muted)")+";background:"+(v===state.ew?"var(--accent2-lo)":"var(--surface2)");
    b.onclick=()=>{state.ew=v;_refreshButtons();_emit();};
    ewRow.appendChild(b);
  });
  wrap.appendChild(ewRow);

  container.appendChild(wrap);
  return { getAz: _toAz, getDispStr: _dispStr };
}
const applyOrientation=b=>isNaN(b)?NaN:((b+orientationOffset)%360+360)%360;
const azimuth=(a,b)=>{let az=Math.atan2(b.Easting-a.Easting,b.Northing-a.Northing)*180/Math.PI;return((az%360)+360)%360};
const dist2D=(a,b)=>Math.hypot(b.Easting-a.Easting,b.Northing-a.Northing);

function computeShot2D(occ,bearing,hd){
  const r=bearing*Math.PI/180;
  return{E:occ.Easting+hd*Math.sin(r),N:occ.Northing+hd*Math.cos(r),Z:occ.Elevation||0,hd};
}
function computeShot3D(occ,bearing,sd,za,ih,th){
  // za = ZENITH ANGLE (what total stations output): 90=level, <90=up, >90=down
  // Convert to elevation angle: ea = 90 - za
  // HD = SD × sin(ZA),  ΔZ = SD × cos(ZA)   [standard trig levelling]
  const zaRad = za * Math.PI / 180;
  const hd = sd * Math.sin(zaRad);   // HD = SD × sin(ZA)
  const r  = bearing * Math.PI / 180;
  const E  = occ.Easting  + hd * Math.sin(r);
  const N  = occ.Northing + hd * Math.cos(r);
  // ΔZ = SD × cos(ZA)  →  cos(90°)=0 at level ✓, cos(89°)=+0.017 for uphill ✓
  const dZ = sd * Math.cos(zaRad);
  const Z  = occ.Elevation + (ih||0) + dZ - (th||0);
  return{E, N, Z, hd};
}

let _modalStack=[];
function openModal(buildFn, opts){
  if(typeof _relocateTarget!=="undefined"&&_relocateTarget!=null){
    _relocateTarget=null;setTimeout(plotPoints,0);
    if(window._deferredJobSetup){window._pendingSetup=window._deferredJobSetup;window._deferredJobSetup=null;}
  }
  if(window._deedPobCalls){window._deedPobCalls=null;setTimeout(plotPoints,0);}
  const ov=document.createElement("div"); ov.className="modal-overlay";
  const m=document.createElement("div"); m.className="modal";
  ov.appendChild(m); document.body.appendChild(ov); _modalStack.push(ov);
  const close=()=>{ov.remove();_modalStack=_modalStack.filter(x=>x!==ov);
    if(!_modalStack.length&&window._pendingRelocate!=null){
      _relocateTarget=window._pendingRelocate;window._pendingRelocate=null;plotPoints();
    }
    if(!_modalStack.length&&window._pendingSetup){
      const f=window._pendingSetup;window._pendingSetup=null;setTimeout(f,50);
    }};
  buildFn(m,close);
  // Desktop-only hint (lives on the overlay so keypad re-renders can't wipe it)
  try{

      ov.appendChild(hint);
    }
  }catch(e){}
  return{ov,m,close};
}
function closeAllModals(){

function bearingInput(label, defaultVal, cb){
  openModal((modal, close)=>{
    let _azDec = NaN;   // decimal degrees, updated by quad keyboard
    let _mode  = bearingMode; // local copy so toggle doesn't clobber global until OK

    function _buildModal(){
      modal.innerHTML="";

      // Title + label
      const h2=document.createElement("h2"); h2.textContent="Bearing"; modal.appendChild(h2);

      const disp=document.createElement("div"); disp.className="disp-input"; disp.id="brngDisp";

      if(defaultVal!=null && defaultVal!==""){

        if(!isNaN(defDec)){

        };

      });
      modal.appendChild(pill);

      if(_mode==="quad"){
        // Quad keyboard — fills display and tracks _azDec
        const qwrap=document.createElement("div");
        _buildQuadKeyboard(qwrap, (azDec, previewStr)=>{
          _azDec = azDec;

        modal.appendChild(qwrap);
        // OK / Cancel
        const row=document.createElement("div"); row.className="btn-row";
        const ok=document.createElement("button"); ok.className="btn ok"; ok.textContent="OK";
        ok.onclick=()=>{ close(); cb(isNaN(_azDec)?null:toDMS(_azDec)); };
        const can=document.createElement("button"); can.className="btn"; can.textContent="Cancel";
        can.onclick=()=>{ close(); cb(null); };
        row.appendChild(ok); row.appendChild(can); modal.appendChild(row);
      } else {
        // Standard numpad
        let fresh = (defaultVal!=null && defaultVal!=="");
        const grid=document.createElement("div"); grid.className="calc-grid";
        const getDisp=()=>modal.querySelector("#brngDisp");
        [["7","8","9"],["4","5","6"],["1","2","3"],["-","0","."]].forEach(r=>r.forEach(k=>{
          const b=document.createElement("button"); b.textContent=k;
          b.onclick=()=>{
            if(k==="-"){
              if(fresh){ getDisp().textContent="-"; fresh=false; }
              else { const v=getDisp().textContent; getDisp().textContent=v.startsWith("-")?v.slice(1):"-"+v; }
            } else {
              if(fresh){ getDisp().textContent=""; fresh=false; }

        const mkB=(t,cls,fn)=>{const b=document.createElement("button");b.textContent=t;b.className=cls;b.onclick=fn;grid.appendChild(b)};
        mkB("⌫","",()=>{fresh=false;const v=getDisp().textContent;getDisp().textContent=v.slice(0,-1)});
        mkB("CLR","danger-btn",()=>{fresh=false;getDisp().textContent=""});
        mkB("OK","ok-btn",()=>{const v=getDisp().textContent;close();cb(v||null)});
        mkB("CANCEL","accent-btn",()=>{close();cb(null)});
        modal.appendChild(grid);
      }
    }

    _buildModal();
  });

async function exportDXF(){
  if(!requirePro("DXF export")) return;
  // Generate a simple DXF with points and lines
  let dxf="0\nSECTION\n2\nHEADER\n9\n$ACADVER\n1\nAC1009\n0\nENDSEC\n";
  dxf+="0\nSECTION\n2\nENTITIES\n";
  // Points as POINT entities
  points.forEach(p=>{
    dxf+=`0\nPOINT\n8\nPOINTS\n10\n${p.Easting.toFixed(4)}\n20\n${p.Northing.toFixed(4)}\n30\n${p.Elevation.toFixed(4)}\n`;
    dxf+=`0\nTEXT\n8\nLABELS\n10\n${p.Easting.toFixed(4)}\n20\n${p.Northing.toFixed(4)}\n30\n0\n40\n0.5\n1\n${p.Point} ${String(p.Description||"").replace(/[\r\n]+/g," ")}\n`;
  });
  // Lines and arcs
  plotConnections.forEach(c=>{
    if(c.type==="arc"){
      // DXF arcs run CCW from angle 50 to 51, measured from +X (east).
      // conn angles are already math-space radians; sweep<0 means CW,
      // so for CW arcs swap start/end to express the same arc CCW.
      const norm=d=>{d=d%360;return d<0?d+360:d;};
      const aStart=norm(c.startAngle*180/Math.PI);
      const aEnd  =norm(c.endAngle  *180/Math.PI);
      const cw=(c.endAngle-c.startAngle)<0;
      const a50=cw?aEnd:aStart, a51=cw?aStart:aEnd;
      const layer=c.style==="dashed"?"DASHED":"LINES";
      dxf+=`0\nARC\n8\n${layer}\n10\n${c.centerE.toFixed(4)}\n20\n${c.centerN.toFixed(4)}\n30\n0\n40\n${c.R.toFixed(4)}\n50\n${a50.toFixed(4)}\n51\n${a51.toFixed(4)}\n`;
      return;
    }
    const pa=points.find(p=>p.Point===c.from);
    const pb=points.find(p=>p.Point===c.to);
    if(!pa||!pb)return;
    const layer=c.style==="dashed"?"DASHED":"LINES";
    dxf+=`0\nLINE\n8\n${layer}\n10\n${pa.Easting.toFixed(4)}\n20\n${pa.Northing.toFixed(4)}\n30\n0\n11\n${pb.Easting.toFixed(4)}\n21\n${pb.Northing.toFixed(4)}\n31\n0\n`;
  });
  dxf+="0\nENDSEC\n0\nEOF\n";
  const blob=new Blob([dxf],{type:"application/octet-stream"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(jobName||"survey")+".dxf";
  a.click();
  URL.revokeObjectURL(a.href);
}

function _xmlEsc(s){
  return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;");
}

/* ── PDF PLOT EXPORT (A4, full extents, all labels, library-free) ── */
function exportPlotPDF(){
  if(!requirePro("PDF plot export")) return;
  const valid=points.filter(p=>!isNaN(p.Easting)&&!isNaN(p.Northing));
  if(!valid.length){alert("No points to plot.");return}
  // Pick orientation from the survey's shape: wider than tall → landscape
  const es=valid.map(p=>p.Easting),ns=valid.map(p=>p.Northing);
  const rngE=Math.max(...es)-Math.min(...es), rngN=Math.max(...ns)-Math.min(...ns);
  const landscape = rngE > rngN;
  // A4 at 96 dpi logical px, rendered 3× (≈288 dpi) so labels stay crisp
  const pageW=landscape?1123:794, pageH=landscape?794:1123;
  const RS=3, TITLE_H=70;
  const cv=document.createElement("canvas");
  cv.width=pageW*RS; cv.height=pageH*RS;
  const ctx=cv.getContext("2d"); ctx.scale(RS,RS);
  // Save the live view, then force a full-extent, light-mode, labelled render
  const sv={viewScale,viewOffsetX,viewOffsetY,lightMode,showLabels,
            selectedPoint,selectedConn,tempGeom,tempIntersections};
  const svSelPl=(typeof _selPolyline!=="undefined")?_selPolyline:-1;
  try{
    viewScale=1;viewOffsetX=0;viewOffsetY=0;
    lightMode=true;showLabels=true;
    selectedPoint=null;selectedConn=null;
    if(typeof _selPolyline!=="undefined")_selPolyline=-1;
    tempGeom=[];tempIntersections=[];
    ctx.fillStyle="#ffffff";ctx.fillRect(0,0,pageW,pageH);
    plotPoints(ctx,pageW,pageH-TITLE_H);
    const T=_viewTransform(pageW,pageH-TITLE_H); // fitted transform for the scale note
    _drawPdfTitleBlock(ctx,pageW,pageH,TITLE_H,T,landscape);
  } finally {
    viewScale=sv.viewScale;viewOffsetX=sv.viewOffsetX;viewOffsetY=sv.viewOffsetY;
    lightMode=sv.lightMode;showLabels=sv.showLabels;
    selectedPoint=sv.selectedPoint;selectedConn=sv.selectedConn;
    if(typeof _selPolyline!=="undefined")_selPolyline=svSelPl;

function _buildMultiPagePdf(jpgs,imgW,imgH,ptsW,ptsH){
  // One DCTDecode image per page. Object layout:
  // 1 catalog, 2 pages, then per page: a Page obj, a Contents obj, an Image obj.
  const enc=new TextEncoder();
  const N=jpgs.length;
  const content="q "+ptsW.toFixed(2)+" 0 0 "+ptsH.toFixed(2)+" 0 0 cm /Im1 Do Q";
  const objs=[]; // objs[i] = {text} or {head,bin,tail}
  // Reserve numbering: catalog=1, pages=2, then 3..(3+3N-1)
  const pageObjNums=[], contentObjNums=[], imgObjNums=[];
  for(let i=0;i<N;i++){pageObjNums.push(3+i*3);contentObjNums.push(4+i*3);imgObjNums.push(5+i*3);}
  objs[1]="<< /Type /Catalog /Pages 2 0 R >>";
  objs[2]="<< /Type /Pages /Kids ["+pageObjNums.map(n=>n+" 0 R").join(" ")+"] /Count "+N+" >>";
  for(let i=0;i<N;i++){
    objs[pageObjNums[i]]="<< /Type /Page /Parent 2 0 R /MediaBox [0 0 "+ptsW.toFixed(2)+" "+ptsH.toFixed(2)+
      "] /Resources << /XObject << /Im1 "+imgObjNums[i]+" 0 R >> >> /Contents "+contentObjNums[i]+" 0 R >>";
    objs[contentObjNums[i]]="<< /Length "+content.length+" >>\nstream\n"+content+"\nendstream";
    objs[imgObjNums[i]]={img:true,
      head:"<< /Type /XObject /Subtype /Image /Width "+imgW+" /Height "+imgH+
           " /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length "+jpgs[i].length+" >>\nstream\n",
      bin:jpgs[i], tail:"\nendstream"};
  }
  const total=3+N*3-1; // highest object number
  const parts=[]; const xref=[]; let off=0;
  const push=u=>{parts.push(u);off+=u.length;};
  push(enc.encode("%PDF-1.4\n"));
  for(let i=1;i<=total;i++){
    xref[i]=off;
    const o=objs[i];
    if(typeof o==="string"){
      push(enc.encode(i+" 0 obj\n"+o+"\nendobj\n"));
    } else {
      push(enc.encode(i+" 0 obj\n"+o.head));
      push(o.bin);
      push(enc.encode(o.tail+"\nendobj\n"));
    }
  }
  const xrefStart=off;
  let xs="xref\n0 "+(total+1)+"\n0000000000 65535 f \n";
  for(let i=1;i<=total;i++)xs+=String(xref[i]).padStart(10,"0")+" 00000 n \n";
  xs+="trailer\n<< /Size "+(total+1)+" /Root 1 0 R >>\nstartxref\n"+xrefStart+"\n%%EOF\n";
  push(enc.encode(xs));
  let len=0; parts.forEach(p=>len+=p.length);
  const out=new Uint8Array(len); let pos=0;
  parts.forEach(p=>{out.set(p,pos);pos+=p.length;});
  return out;
}

function _buildPdfFromJpeg(jpg,imgW,imgH,ptsW,ptsH){
  // Minimal valid PDF: catalog, pages, page, content stream, DCTDecode image
  const content="q "+ptsW.toFixed(2)+" 0 0 "+ptsH.toFixed(2)+" 0 0 cm /Im1 Do Q";
  const header="%PDF-1.4\n";
  const objs=[];
  objs[1]="1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n";
  objs[2]="2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n";
  objs[3]="3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 "+ptsW.toFixed(2)+" "+ptsH.toFixed(2)+"] /Resources << /XObject << /Im1 5 0 R >> >> /Contents 4 0 R >>\nendobj\n";
  objs[4]="4 0 obj\n<< /Length "+content.length+" >>\nstream\n"+content+"\nendstream\nendobj\n";
  const o5head="5 0 obj\n<< /Type /XObject /Subtype /Image /Width "+imgW+" /Height "+imgH+" /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length "+jpg.length+" >>\nstream\n";
  const o5tail="\nendstream\nendobj\n";
  // Byte offsets (all non-image text is pure ASCII so .length === byte length)
  const xref=[];
  let off=header.length;
  const headParts=[header];
  for(let i=1;i<=4;i++){xref[i]=off;headParts.push(objs[i]);off+=objs[i].length;}
  xref[5]=off;
  headParts.push(o5head); off+=o5head.length;
  const xrefStart=off+jpg.length+o5tail.length;
  let xrefStr="xref\n0 6\n0000000000 65535 f \n";
  for(let i=1;i<=5;i++)xrefStr+=String(xref[i]).padStart(10,"0")+" 00000 n \n";
  xrefStr+="trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n"+xrefStart+"\n%%EOF\n";
  const enc=new TextEncoder();
  const pre=enc.encode(headParts.join(""));
  const post=enc.encode(o5tail+xrefStr);
  const out=new Uint8Array(pre.length+jpg.length+post.length);
  out.set(pre,0); out.set(jpg,pre.length); out.set(post,pre.length+jpg.length);
  return out;
}

/* ── SVG EXPORT (vector linework + labels, world units) ───────── */
function _arcPathPoints(conn,maxDeg){
  // Densify an arc into world-coordinate points along its true sweep
  const sweep=conn.endAngle-conn.startAngle; // signed, radians (− = CW)
  const segs=Math.max(8,Math.ceil(Math.abs(sweep)*180/Math.PI/(maxDeg||4)));
  const pts=[];
  for(let i=0;i<=segs;i++){
    const a=conn.startAngle+sweep*i/segs;
    pts.push({E:conn.centerE+conn.R*Math.cos(a), N:conn.centerN+conn.R*Math.sin(a)});
  }
  return pts;
}
function exportSVG(){
  if(!requirePro("SVG export")) return;
  const valid=points.filter(p=>!isNaN(p.Easting)&&!isNaN(p.Northing));
  if(!valid.length){alert("No points to export.");return}
  const es=valid.map(p=>p.Easting),ns=valid.map(p=>p.Northing);
  const minE=Math.min(...es),maxE=Math.max(...es),minN=Math.min(...ns),maxN=Math.max(...ns);
  const pad=Math.max(maxE-minE,maxN-minN,1)*0.05;
  const w=(maxE-minE)+pad*2, h=(maxN-minN)+pad*2;
  const X=e=>(e-minE+pad), Y=n=>(maxN-n+pad); // flip so north is up
  const fs=Math.max(w,h)/100;   // label size scales with the survey
  const sw=(fs/9).toFixed(5);   // stroke width
  const dotR=(fs/4).toFixed(5);
  const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  let s=`<?xml version="1.0" encoding="UTF-8"?>\n`;
  s+=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w.toFixed(4)} ${h.toFixed(4)}">\n`;
  s+=`<!-- ChainLink v${APP_VERSION} · ${esc(jobName)} · 1 SVG unit = 1 ${units} -->\n`;
  // Linework
  s+=`<g fill="none" stroke="#000" stroke-width="${sw}">\n`;
  plotConnections.forEach(c=>{
    const dash=c.style==="dashed"?` stroke-dasharray="${(fs/3).toFixed(4)} ${(fs/4).toFixed(4)}"`:"";
    if(c.type==="arc"){
      const ap=_arcPathPoints(c,4);
      let d="M "+X(ap[0].E).toFixed(4)+" "+Y(ap[0].N).toFixed(4);
      for(let i=1;i<ap.length;i++)d+=" L "+X(ap[i].E).toFixed(4)+" "+Y(ap[i].N).toFixed(4);
      s+=`<path d="${d}"${dash}/>\n`;
    } else {
      const pa=points.find(p=>p.Point===c.from), pb=points.find(p=>p.Point===c.to);
      if(!pa||!pb)return;
      s+=`<line x1="${X(pa.Easting).toFixed(4)}" y1="${Y(pa.Northing).toFixed(4)}" x2="${X(pb.Easting).toFixed(4)}" y2="${Y(pb.Northing).toFixed(4)}"${dash}/>\n`;
    }
  });
  s+=`</g>\n<g font-family="monospace" font-size="${fs.toFixed(4)}">\n`;
  valid.forEach(p=>{
    s+=`<circle cx="${X(p.Easting).toFixed(4)}" cy="${Y(p.Northing).toFixed(4)}" r="${dotR}" fill="#c00"/>\n`;
    s+=`<text x="${(X(p.Easting)+fs/3).toFixed(4)}" y="${(Y(p.Northing)-fs/3).toFixed(4)}" fill="#000">${p.Point}${p.Description?" "+esc(p.Description):""}</text>\n`;
  });
  s+=`</g>\n</svg>\n`;
  const blob=new Blob([s],{type:"image/svg+xml"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(jobName||"survey")+".svg";
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ── IMPORT: DXF + LandXML (merge into current job) ───────────── */
function _pickImportFile(accept,cb){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept=accept; inp.style.display="none";
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=ev=>cb(ev.target.result,f.name);
    r.readAsText(f);
  };
  document.body.appendChild(inp); inp.click();
  setTimeout(()=>{if(inp.parentNode)inp.remove();},60000);
}
// Find or create a point at E,N — dedupes against everything within tol.
function _importPt(E,N,Z,desc,tol){
  tol=tol||0.005;
  const hit=points.find(p=>Math.hypot(p.Easting-E,p.Northing-N)<tol);
  if(hit)return hit.Point;
  let n=pointCounter; while(_ptExists(n))n++;
  points.push({Point:n,Northing:N,Easting:E,Elevation:Z||0,Type:"Import",Flag:"",Description:desc||""});
  pointCounter=n+1;
  return n;
}
function _dxfStyleFor(layer,ltype){
  const s=((layer||"")+" "+(ltype||"")).toUpperCase();
  return (s.includes("DASH")||s.includes("HIDDEN"))?"dashed":"solid";
}
// Build an arc connection from a chord P→Q plus an LWPOLYLINE bulge.
// bulge = tan(sweep/4); positive = CCW (math space).
function _arcFromBulge(P,Q,bulge,style){
  const sweep=4*Math.atan(bulge);
  const chord=Math.hypot(Q.E-P.E,Q.N-P.N);
  if(chord<1e-12||Math.abs(sweep)<1e-12)return null;
  const R=Math.abs(chord/(2*Math.sin(sweep/2)));
  const mE=(P.E+Q.E)/2, mN=(P.N+Q.N)/2;
  // apothem (mid-chord to center); sign puts center left of travel for CCW
  const h=Math.sqrt(Math.max(0,R*R-(chord/2)*(chord/2)))*(bulge>0?1:-1);
  // unit perpendicular left of chord direction (math axes x=E, y=N)
  const ux=(Q.E-P.E)/chord, uy=(Q.N-P.N)/chord;
  const cE=mE-uy*h, cN=mN+ux*h;
  const bP=_plBearing(cE,cN,P.E,P.N), bQ=_plBearing(cE,cN,Q.E,Q.N);
  return _buildArcConn(cE,cN,R,bP,bQ,bulge>0?"ccw":"cw",style);
}
function importDXF(){
  if(!requirePro("DXF import")) return;
  _pickImportFile(".dxf,application/dxf,text/plain",(text,fname)=>{
    const lines=text.split(/\r\n|\r|\n/);
    const pairs=[];
    for(let i=0;i+1<lines.length;i+=2){
      const code=parseInt(lines[i].trim());
      if(!isNaN(code))pairs.push([code,lines[i+1].trim()]);
    }
    // Collect entities from every section (some writers omit section markers)
    const ents=[]; let cur=null;
    pairs.forEach(([c,v])=>{
      if(c===0){
        if(cur)ents.push(cur);
        cur={type:v.toUpperCase(),attrs:[],poly:[]};
      } else if(cur){
        cur.attrs.push([c,v]);
      }
    });
    if(cur)ents.push(cur);
    const A=(ent,code)=>{const hit=ent.attrs.find(a=>a[0]===code);return hit?hit[1]:null;};
    const Af=(ent,code,d)=>{const v=A(ent,code);const f=parseFloat(v);return isNaN(f)?d:f;};

    _takeSnapshot("Import DXF");
    let nPts=0,nLines=0,nArcs=0,nPl=0,skipped={};
    const before=points.length;
    const addLine=(E1,N1,E2,N2,style,layer)=>{
      const a=_importPt(E1,N1,0,layer), b=_importPt(E2,N2,0,layer);
      if(a===b)return;
      plotConnections.push({from:a,to:b,style});
      nLines++;
    };

    // Old-style POLYLINE/VERTEX/SEQEND: stitch vertices back together
    let plVerts=null, plLayer=null, plClosed=false;

    ents.forEach(ent=>{
      const layer=A(ent,8)||"";
      const style=_dxfStyleFor(layer,A(ent,6));
      switch(ent.type){
        case "POINT":
          _importPt(Af(ent,10,0),Af(ent,20,0),Af(ent,30,0),layer); nPts++;
          break;
        case "LINE":
          addLine(Af(ent,10,0),Af(ent,20,0),Af(ent,11,0),Af(ent,21,0),style,layer);
          break;
        case "ARC": {
          const cE=Af(ent,10,0),cN=Af(ent,20,0),R=Af(ent,40,0);
          if(R<=0)break;
          const a50=Af(ent,50,0),a51=Af(ent,51,0);
          // DXF angles: degrees CCW from +X; arc runs CCW 50→51
          const bS=((90-a50)+360)%360, bE=((90-a51)+360)%360;
          plotConnections.push(_buildArcConn(cE,cN,R,bS,bE,"ccw",style));
          _importPt(..._brgPtArgs(cE,cN,R,bS),0,layer);
          _importPt(..._brgPtArgs(cE,cN,R,bE),0,layer);
          nArcs++;
          break;
        }
        case "LWPOLYLINE": {
          // 10/20 repeat per vertex; 42 (bulge) belongs to the vertex it follows
          const verts=[]; let lastV=null;
          ent.attrs.forEach(([c,v])=>{
            if(c===10){lastV={E:parseFloat(v),N:0,bulge:0};verts.push(lastV);}
            else if(c===20&&lastV)lastV.N=parseFloat(v);
            else if(c===42&&lastV)lastV.bulge=parseFloat(v)||0;
          });
          const closed=(parseInt(A(ent,70)||"0")&1)===1;
          _emitPolyVerts(verts,closed,style,layer,addLine,(P,Q,b)=>{
            const arc=_arcFromBulge(P,Q,b,style);
            if(arc){plotConnections.push(arc);
              _importPt(P.E,P.N,0,layer);_importPt(Q.E,Q.N,0,layer);nArcs++;}
          });
          nPl++;
          break;
        }
        case "POLYLINE":
          plVerts=[]; plLayer=layer;
          plClosed=(parseInt(A(ent,70)||"0")&1)===1;
          break;
        case "VERTEX":
          if(plVerts)plVerts.push({E:Af(ent,10,0),N:Af(ent,20,0),bulge:Af(ent,42,0)});
          break;
        case "SEQEND":
          if(plVerts&&plVerts.length>1){
            const st=_dxfStyleFor(plLayer,null);
            _emitPolyVerts(plVerts,plClosed,st,plLayer,addLine,(P,Q,b)=>{
              const arc=_arcFromBulge(P,Q,b,st);
              if(arc){plotConnections.push(arc);
                _importPt(P.E,P.N,0,plLayer);_importPt(Q.E,Q.N,0,plLayer);nArcs++;}
            });
            nPl++;
          }
          plVerts=null;
          break;
        case "SECTION": case "ENDSEC": case "EOF": case "TABLE": case "ENDTAB":
        case "LAYER": case "VPORT": case "LTYPE": case "STYLE": case "APPID":
        case "DIMSTYLE": case "BLOCK_RECORD": case "CLASS":
          break; // structure, not geometry
        default:
          if(ent.type)skipped[ent.type]=(skipped[ent.type]||0)+1;
      }
    });
    const newPts=points.length-before;
    saveData();
    const skNames=Object.keys(skipped);
    showResult("\u2713 DXF Imported — "+fname,[
      {lbl:"New Points:",val:String(newPts)+(nPts?" ("+nPts+" POINT entities)":"")},
      {lbl:"Lines:",val:String(nLines)},
      {lbl:"Arcs:",val:String(nArcs)},
      {lbl:"Polylines:",val:String(nPl)},
      ...(skNames.length?[{lbl:"Skipped:",val:skNames.map(k=>k+"\u00d7"+skipped[k]).join(", ")}]:[]),
    ]);
  });
}
function _brgPtArgs(cE,cN,R,brg){
  const p=_plArcPt(cE,cN,R,brg); return [p.E,p.N];
}
// Walk polyline vertices emitting straight or bulge-arc segments.
function _emitPolyVerts(verts,closed,style,layer,lineFn,arcFn){
  const n=verts.length;
  if(n<2)return;
  const segCount=closed?n:n-1;
  for(let i=0;i<segCount;i++){
    const P=verts[i], Q=verts[(i+1)%n];
    if(P.bulge&&Math.abs(P.bulge)>1e-9) arcFn(P,Q,P.bulge);
    else lineFn(P.E,P.N,Q.E,Q.N,style,layer);
  }
}
function importLandXML(){
  if(!requirePro("LandXML import")) return;
  _pickImportFile(".xml,application/xml,text/xml",(text,fname)=>{
    let doc;
    try{ doc=new DOMParser().parseFromString(text,"application/xml"); }
    catch(e){ alert("Couldn't parse XML."); return; }
    if(doc.querySelector("parsererror")){alert("Couldn't parse XML — file may be malformed.");return}
    const cg=doc.getElementsByTagName("CgPoint");
    if(!cg.length){alert("No CgPoint elements found — only point import is supported.");return}
    _takeSnapshot("Import LandXML");
    let added=0,renumbered=0,skippedBad=0;
    for(const el of cg){
      const txt=(el.textContent||"").trim().split(/\s+/);
      // LandXML CgPoint order: Northing Easting [Elevation]
      const N=parseFloat(txt[0]), E=parseFloat(txt[1]), Z=txt.length>2?parseFloat(txt[2]):0;
      if(isNaN(N)||isNaN(E)){skippedBad++;continue}
      const desc=el.getAttribute("desc")||el.getAttribute("code")||"";
      const want=parseInt(el.getAttribute("name"));
      let num;
      if(!isNaN(want)&&want>0&&!_ptExists(want)){ num=want; }
      else { num=pointCounter; while(_ptExists(num))num++; if(!isNaN(want))renumbered++; }
      points.push({Point:num,Northing:N,Easting:E,Elevation:isNaN(Z)?0:Z,Type:"Import",Flag:"",Description:desc});
      pointCounter=Math.max(pointCounter,num+1);
      added++;
    }
    saveData();
    showResult("\u2713 LandXML Imported — "+fname,[
      {lbl:"Points Added:",val:String(added)},
      ...(renumbered?[{lbl:"Renumbered:",val:renumbered+" (number conflicts)"}]:[]),
      ...(skippedBad?[{lbl:"Skipped:",val:skippedBad+" (bad coordinates)"}]:[]),
    ]);
  });
}

function _fieldbookRows(){
  // Reconstruct the observation log in point order, grouping by occupied station.
  const rows=[]; let curOcc=null;
  points.forEach(p=>{
    if(p.Type==="Setup"||p.Type==="Import"||p.Type==="COGO"){
      if(p.Type==="Setup"){curOcc=p.Point;
        rows.push({kind:"setup",occ:p.Point,n:p.Northing,e:p.Easting,z:p.Elevation,
                   ih:p.ih||0,desc:p.Description||""});}
      return;
    }
    if(p.Type==="Shot"){
      if(p.From!==curOcc){curOcc=p.From;rows.push({kind:"occ",occ:p.From});}
      rows.push({kind:"shot",pt:p.Point,
        inst:p.InstReading||"",rawAz:p.RawAz||"",trueAz:p.TrueAz||"",
        hd:p.HorizDist,sd:p.SlopeDist,za:p.ZenithAngle||"",
        ih:p.IH,th:p.TH,n:p.Northing,e:p.Easting,z:p.Elevation,desc:p.Description||""});
    }
  });

}

function _parseCSV(text,fname){

    allLines.forEach(l=>{
      if(l.startsWith("#CHAINLINK:")){try{embeddedMeta=JSON.parse(l.slice(11));}catch(e){}}
    });
    // ChainLink native file — parse directly, restoring Type, Flag, and raw observation data
    if(embeddedMeta){_doParseCSV(text,fname,{pt:0,n:1,e:2,z:3,desc:4,type:5,flag:6,_skipHeader:true,_native:true},embeddedMeta);return;}

// Quote-aware CSV line splitter — handles "quoted, fields" with "" escapes;
// plain unquoted lines split identically to the old behavior.
function _splitCSVLine(l){
  if(l.indexOf('"')<0) return l.split(',');
  const out=[]; let cur="",inQ=false;
  for(let i=0;i<l.length;i++){
    const c=l[i];
    if(inQ){
      if(c==='"'){ if(l[i+1]==='"'){cur+='"';i++;} else inQ=false; }
      else cur+=c;
    } else {
      if(c==='"') inQ=true;
      else if(c===',' ){out.push(cur);cur="";}
      else cur+=c;
    }
  }
  out.push(cur);
  return out;
}

function _doParseCSV(text,fname,colMap,embeddedMeta){
  try{
    const allLines=text.split('\n');
    let headerSkipped=false;
    const lines=allLines.filter(l=>{
      if(!l.trim()||l.startsWith("#")) return false;
      if(colMap._skipHeader&&!headerSkipped){headerSkipped=true;return false;}
      return true;
    });
    const rawMap=(embeddedMeta&&embeddedMeta.raw)||{};
    const newPts=lines.map(l=>{
      const p=_splitCSVLine(l);
      const pt=parseInt(p[colMap.pt]);
      const n=parseFloat(p[colMap.n]);
      const e=parseFloat(p[colMap.e]);
      const z=parseFloat(p[colMap.z])||0;
      const desc=(p[colMap.desc]||"").trim();
      if(isNaN(pt)||isNaN(n)||isNaN(e)) return null;
      const rec={Point:pt,Northing:n,Easting:e,Elevation:z,Description:desc,Type:"Import",Flag:"",ih:0};
      if(colMap._native){
        rec.Type=(p[colMap.type]||"").trim()||"Import";
        rec.Flag=(p[colMap.flag]||"").trim();
        if(rawMap[pt]) Object.assign(rec,rawMap[pt]); // restore raw observation data
      }
      return rec;
    }).filter(Boolean);
    if(!newPts.length){alert("No valid points found. Check column mapping.");return}
    points=newPts;
    pointCounter=points.reduce((m,p)=>p.Point>m?p.Point:m,0)+1;
    undoStack=[];currentPoint=points[0];orientationChosen=true;
    jobName=(fname||"survey").replace(/\.csv$/i,"");
    if(embeddedMeta){
      plotConnections=embeddedMeta.connections||[];
      _polylines=embeddedMeta.polylines||[];
      surveyMode=embeddedMeta.surveyMode||"2D";
      units=embeddedMeta.units||"ft";
    } else {plotConnections=[];_polylines=[];}
    saveData();
    showResult("\u2713 Loaded",[
      {lbl:"Points:",  val:String(newPts.length)},
      {lbl:"Job:",     val:jobName},
      {lbl:"Mapping:", val:"Pt="+colMap.pt+" N="+colMap.n+" E="+colMap.e+" Z="+colMap.z+" Desc="+colMap.desc},
    ]);
  }catch(err){alert("Load error: "+err.message)}
}


/* ── 8. ORIENTATION ────────────────────────────────────────────── */
// ── Polyline builder ─────────────────────────────────────────────────────────
function _plBearing(cE,cN,E,N){ return ((Math.atan2(E-cE,N-cN)*180/Math.PI)+360)%360; }
function _plArcPt(cE,cN,R,brg){ const r=brg*Math.PI/180; return {E:cE+R*Math.sin(r), N:cN+R*Math.cos(r)}; }
function _plD(a,b){ return Math.hypot(a.E-b.E, a.N-b.N); }
function _plLast(){ return _plDraft.verts[_plDraft.verts.length-1]; }

// Bearing -> math angle (deg, CCW from east), normalized 0..360
function _plMathAng(brg){ return ((90-brg)%360+360)%360; }
// Angular distance from the arc's start to a bearing, traveling in the arc's dir
function _plSweepPos(startBrg,brg,dir){
  const s=_plMathAng(startBrg), t=_plMathAng(brg);
  let d=(dir==="ccw")?(t-s):(s-t);
  return ((d%360)+360)%360;
}

// Find a drawn arc that both a and b lie ALONG: each within radTol of the circle
// AND within the arc's actual swept extent. The polyline then uses the PORTION of
// that arc between a and b. Requiring both points to be inside the sweep is what
// stops a point that merely sits on the circle (but off the drawn arc) from
// matching and drawing the major arc all the way around.
// Returns {conn, dir} where dir sweeps a->b along the arc, or null.
let _plArcNearMiss=null;
function _plFindArcBetween(a,b){
  const radTol=2.5;   // ft a point may sit off the circle
  const angTol=2.0;   // deg slack at the swept ends
  _plArcNearMiss=null;
  let best=null, bestErr=radTol, miss=Infinity;
  for(const c of plotConnections){
    if(c.type!=="arc") continue;
    const da=Math.abs(Math.hypot(a.E-c.centerE,a.N-c.centerN)-c.R);
    const db=Math.abs(Math.hypot(b.E-c.centerE,b.N-c.centerN)-c.R);
    const rerr=Math.max(da,db);
    if(rerr<miss) miss=rerr;
    if(rerr>bestErr) continue;
    const total=_plSweepPos(c.startBrg,c.endBrg,c.dir);
    const posA=_plSweepPos(c.startBrg,_plBearing(c.centerE,c.centerN,a.E,a.N),c.dir);
    const posB=_plSweepPos(c.startBrg,_plBearing(c.centerE,c.centerN,b.E,b.N),c.dir);
    if(posA>total+angTol || posB>total+angTol) continue; // a or b lies off the drawn arc
    best={conn:c, dir:(posA<=posB)?c.dir:(c.dir==="cw"?"ccw":"cw")};
    bestErr=rerr;
  }
  if(!best && miss<60) _plArcNearMiss=miss;
  return best;
}

// Append a tapped POINT. If the previous vertex and this point both lie along a
// drawn arc, the new segment follows that arc's portion; otherwise it is straight.
function _plAddPoint(P){
  const v={E:P.Easting,N:P.Northing};
  if(_plDraft.verts.length===0){ _plDraft.verts.push(v); _plRedraw(); return; }
  if(_plD(_plLast(),v)<_PL_TOL) return; // same point — ignore
  const hit=_plFindArcBetween(_plLast(),v);
  if(hit){
    _plDraft.segs.push({type:"arc",centerE:hit.conn.centerE,centerN:hit.conn.centerN,R:hit.conn.R,dir:hit.dir});
  } else {
    _plDraft.segs.push({type:"line"});
  }
  _plDraft.verts.push(v);
  _plRedraw();
  // Diagnostic: straight segment, but a drawn arc's circle is nearly under these points
  if(!hit && _plArcNearMiss!=null)
    _plHint("Straight \u2014 nearest arc circle is "+_plArcNearMiss.toFixed(2)+" ft off these points (need \u2264 2.5 ft, and both must lie along the arc).");
}

// Append a tapped LINE connection — uses the portion from the last vertex to the
// line's far endpoint. The line must meet the last vertex (no auto-bridging).
function _plAddLine(conn){
  const A=points.find(p=>p.Point==conn.from), B=points.find(p=>p.Point==conn.to);
  if(!A||!B){_plHint("Could not resolve that line's endpoints.");return;}
  const a={E:A.Easting,N:A.Northing}, b={E:B.Easting,N:B.Northing};
  if(_plDraft.verts.length===0){
    _plDraft.verts.push(a); _plDraft.segs.push({type:"line"}); _plDraft.verts.push(b);
    _plRedraw(); return;
  }
  const last=_plLast();
  const near=(_plD(last,a)<=_plD(last,b))?a:b, far=(near===a)?b:a;
  if(_plD(last,near)>_PL_SNAP){ _plHint("That line doesn't meet the last vertex \u2014 tap a shared point first, or tap points to connect."); return; }
  _plDraft.segs.push({type:"line"}); _plDraft.verts.push(far);
  _plRedraw();
}

// Tapping an arc does one of three things, in priority order:
//   1. Toggle: if the matching segment is already this arc, straighten it back.
//   2. Bend:   if an existing straight segment spans this arc (both its vertices
//              lie on the circle), convert that segment to follow the curve.
//   3. Extend: if the arc meets the last vertex, follow it to the far endpoint.
// This lets you chain points first, then tap an arc's bulge (out where it is clear
// of any point) to bend the matching segment — no need to hit the arc near a point.
function _plAddArc(conn){
  const cE=conn.centerE, cN=conn.centerN, R=conn.R;
  const mkSeg=dir=>({type:"arc",centerE:cE,centerN:cN,R,dir});
  const sPt=_plArcPt(cE,cN,R,conn.startBrg);
  const ePt=_plArcPt(cE,cN,R,conn.endBrg);

  if(_plDraft.verts.length===0){
    _plDraft.verts.push(sPt); _plDraft.segs.push(mkSeg(conn.dir)); _plDraft.verts.push(ePt);
    _plRedraw(); return;
  }

  // 1 — BEND (clean): if a segment's two vertices are this arc's two endpoints,
  //      bend that straight run to follow the curve (tap again to straighten).
  //      Matching by endpoint proximity is robust to points sitting slightly off
  //      the true circle. fwd = V0 at arc start; rev = V0 at arc end (flip dir).
  const epTol=Math.max(1.0, R*0.01);
  for(let i=_plDraft.segs.length-1;i>=0;i--){
    const V0=_plDraft.verts[i], V1=_plDraft.verts[i+1]; if(!V0||!V1) continue;
    const fwd=(_plD(V0,sPt)<=epTol && _plD(V1,ePt)<=epTol);
    const rev=(_plD(V0,ePt)<=epTol && _plD(V1,sPt)<=epTol);
    if(!fwd&&!rev) continue;
    const sg=_plDraft.segs[i];
    const sameArc = sg.type==="arc" && Math.abs(sg.centerE-cE)<0.5 && Math.abs(sg.centerN-cN)<0.5 && Math.abs(sg.R-R)<0.5;
    if(sameArc){ _plDraft.segs[i]={type:"line"}; _plHint("Segment straightened."); _plRedraw(); return; } // toggle straight
    // line, or a different arc over the same span → (re)bend to this arc
    _plDraft.segs[i]=mkSeg(fwd?conn.dir:(conn.dir==="cw"?"ccw":"cw"));
    _plDraft.verts[i]  ={E:(fwd?sPt:ePt).E, N:(fwd?sPt:ePt).N};
    _plDraft.verts[i+1]={E:(fwd?ePt:sPt).E, N:(fwd?ePt:sPt).N};
    _plRedraw(); return;
  }

  // 2 — INSERT the arc's real geometry. Its own endpoints become vertices, so
  //      the stored curve (center/radius/direction) is used verbatim. The near
  //      end joins the chain: snap if it's already there, else a short straight
  //      run connects to it.
  const last=_plLast();
  const startNear=(_plD(last,sPt)<=_plD(last,ePt));
  const near=startNear?sPt:ePt, far=startNear?ePt:sPt;
  const dir=startNear?conn.dir:(conn.dir==="cw"?"ccw":"cw");
  if(_plD(last,near)<=_PL_SNAP){
    _plDraft.verts[_plDraft.verts.length-1]={E:near.E,N:near.N}; // snap end onto the arc
  } else {
    _plDraft.segs.push({type:"line"}); _plDraft.verts.push({E:near.E,N:near.N}); // connector
  }
  _plDraft.segs.push(mkSeg(dir)); _plDraft.verts.push({E:far.E,N:far.N});
  _plRedraw();
}

// Transient hint shown in the build banner (resets on the next successful tap)
function _plHint(msg){
  const el=document.getElementById("_plBanner");
  if(el) el.textContent=msg;
}

function _plUndo(){
  if(!_plDraft)return;
  if(_plDraft.segs.length===0){ _plDraft.verts=[]; }
  else { _plDraft.segs.pop(); _plDraft.verts.pop(); }
  _plRedraw();
}

function _plRedraw(){
  plotPoints();
  const el=document.getElementById("_plBanner");
  if(el&&_plDraft) el.textContent=_plDraft.verts.length+" vertices · "+_plDraft.segs.length+" segments";
}

function cogoPolyline(){
  _helpContext="cogo-polyline";
  alphaInput("Polyline name:","PL-1",name=>{
    if(!name)return;
    _plDraft={name,verts:[],segs:[]};
    _selPolyline=-1;
    window._plBuilding=true;

    // Canvas tap handler routes here while building
    window._plTap=(hit)=>{
      if(hit.kind==="point")        _plAddPoint(hit.pt);
      else if(hit.conn.type==="arc")_plAddArc(hit.conn);
      else                          _plAddLine(hit.conn);
    };

    const _finish=()=>{
      window._plBuilding=false; window._plTap=null;
      const d=_plDraft; _plDraft=null;
      if(!d||d.segs.length===0){ plotPoints(); alert("No segments — tap points, lines or arcs first."); return; }
      _polylines.push({name:d.name,verts:d.verts,segs:d.segs});
      saveData(); plotPoints();
      showResult("\u2713 Polyline Created",[
        {lbl:"Name:",val:d.name},
        {lbl:"Vertices:",val:String(d.verts.length)},
        {lbl:"Segments:",val:String(d.segs.length)},
      ]);
    };
    const _cancel=()=>{ window._plBuilding=false; window._plTap=null; _plDraft=null; plotPoints(); };

    openModal((modal,close)=>{
      modal.innerHTML="<h2>Build Polyline: "+name+"</h2>"+
        "<p class='info'>Tap points in order. If an existing arc already connects two consecutive points, that segment follows the arc automatically; otherwise it is straight. Tap a curved segment's arc to straighten it (or tap a different arc over the same span to switch).</p>"+
        "<p class='info' id='_plBanner'>0 vertices \u00b7 0 segments</p>";
      const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
      mk("Undo Last","",()=>{_plUndo();});
      mk("Done","ok",()=>{close();_finish();});
      mk("Cancel","",()=>{_cancel();close();});
    });
  });
}

function _polylineMenu(){
  const valid=_polylines.filter(pl=>pl.verts&&pl.segs);

          mk2("Offset Polyline","ok",()=>{c2();_offsetPolyline(pl,i);});

// Which polyline (if any) contains a segment matching this connection's geometry.
// Returns the polyline index, or -1. Used to surface polyline actions from the
// line/arc context menu instead of hijacking canvas taps.
function _polylineForConn(conn){
  if(typeof _polylines==="undefined") return -1;
  const tol=2.5;
  if(conn.type==="arc"){
    for(let pi=0;pi<_polylines.length;pi++){
      const pl=_polylines[pi]; if(!pl||!pl.segs)continue;
      for(const s of pl.segs)
        if(s.type==="arc" && Math.abs(s.centerE-conn.centerE)<tol && Math.abs(s.centerN-conn.centerN)<tol && Math.abs(s.R-conn.R)<0.5) return pi;
    }
    return -1;
  }
  const A=points.find(p=>p.Point==conn.from), B=points.find(p=>p.Point==conn.to);
  if(!A||!B) return -1;
  const a={E:A.Easting,N:A.Northing}, b={E:B.Easting,N:B.Northing};
  for(let pi=0;pi<_polylines.length;pi++){
    const pl=_polylines[pi]; if(!pl||!pl.verts||!pl.segs)continue;
    for(let i=0;i<pl.segs.length;i++){
      if(pl.segs[i].type!=="line")continue;
      const V0=pl.verts[i], V1=pl.verts[i+1]; if(!V0||!V1)continue;
      if((_plD(a,V0)<tol&&_plD(b,V1)<tol)||(_plD(a,V1)<tol&&_plD(b,V0)<tol)) return pi;
    }
  }
  return -1;
}

// Action sheet when a polyline is selected on the plot
function _polylineActionMenu(plIdx){
  const pl=_polylines[plIdx]; if(!pl)return;
  const totLen=_plTotalLen(pl);

      totLen.toFixed(3)+" "+units+" (Sta "+_fmtSta(totLen)+"). Highlighted in amber on the plot.</p>";
    const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;m.appendChild(b)};
    mk("Sta/Offset of a Point","ok",()=>{close();_plStaOffQuery(pl);});
