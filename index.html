function _utmZoneFor(lat,lon){
  const zn=Math.max(1,Math.min(60,Math.floor((lon+180)/6)+1));
  return{name:"UTM "+zn+(lat>=0?"N":"S"),type:"tm",lat0:0,lon0:-183+zn*6,k0:0.9996,FE:500000,FN:lat>=0?0:10000000};
}
function _spcCandidates(lat,lon){
  const area=z=>(z.bbox[1]-z.bbox[0])*(z.bbox[3]-z.bbox[2]);
  const inBox=_SPC_ZONES.filter(z=>lat>=z.bbox[0]&&lat<=z.bbox[1]&&lon>=z.bbox[2]&&lon<=z.bbox[3])
    .sort((a,b)=>area(a)-area(b)); // most specific zone first
  const near=_SPC_ZONES.filter(z=>!inBox.includes(z)&&
    lat>=z.bbox[0]-0.4&&lat<=z.bbox[1]+0.4&&lon>=z.bbox[2]-0.4&&lon<=z.bbox[3]+0.4);
  return inBox.concat(near);
}
const _m2u=()=>units==="ft"?3937/1200:1; // meters -> US survey ft (or 1 for meters)

/* — Web Mercator helpers — */
const _MR=6378137,_MWORLD=2*Math.PI*_MR;
function _ll2merc(lat,lon){return{mx:_MR*lon*Math.PI/180,my:_MR*Math.log(Math.tan(Math.PI/4+lat*Math.PI/360))};}

function _setAnchor(lat,lon,zone,E,N){
  const m=_ll2merc(lat,lon);
  const p=_projForward(lat,lon,zone);
  geoAnchor={lat,lon,E,N,mx:m.mx,my:m.my,conv:p.conv,zoneName:zone.name,m2u:_m2u()};
}

function _getTile(z,x,y){
  const n=Math.pow(2,z); x=((x%n)+n)%n;
  if(y<0||y>=n)return null;
  const key=satBasemap+"/"+z+"/"+x+"/"+y;
  let t=_tileCache.get(key);
  if(t)return t.ok?t.img:null;
  if(_tileCache.size>350){let i=0;for(const k of _tileCache.keys()){_tileCache.delete(k);if(++i>=120)break;}}
  t={ok:false,err:false,img:new Image()};
  _tileCache.set(key,t);
  t.img.crossOrigin="anonymous"; // keeps canvas untainted so PNG/PDF export still works
  t.img.onload=()=>{t.ok=true;_satRepaint();};
  t.img.onerror=()=>{t.err=true;t.img=null;};
  t.img.src=(_BASEMAPS[satBasemap]||_BASEMAPS.esri).url(z,y,x);
  return null;
}

function _drawSatellite(ctx,w,h,T){
  if(!satOn||!geoAnchor)return;
  const A=geoAnchor;
  const M2U=A.m2u||_m2u();
  const g=(A.conv+(satRotNudge||0))*Math.PI/180, cg=Math.cos(g), sg=Math.sin(g);
  const k=Math.cos(A.lat*Math.PI/180);
  const {scale,offX,offY}=T;
  const X=e=>e*scale+offX, Y=n=>h-(n*scale+offY);
  const m2s=(mx,my)=>{
    const dxm=(mx-A.mx)*k, dym=(my-A.my)*k;
    const dE=(dxm*cg-dym*sg)*M2U, dN=(dxm*sg+dym*cg)*M2U;
    return[X(A.E+dE),Y(A.N+dN)];
  };
  const s2m=(sx,sy)=>{
    const E=(sx-offX)/scale, N=(h-sy-offY)/scale;
    const dE=(E-A.E)/M2U, dN=(N-A.N)/M2U;
    const dxm=dE*cg+dN*sg, dym=-dE*sg+dN*cg;
    return[A.mx+dxm/k,A.my+dym/k];
  };
  // Pick a zoom level whose tile resolution ~ screen resolution
  const gmpp=1/(scale*M2U);              // ground meters per css px
  const _bm=_BASEMAPS[satBasemap]||_BASEMAPS.esri;
  let z=Math.round(Math.log2(_MWORLD*k/(256*gmpp)));
  z=Math.max(3,Math.min(_bm.maxZ,z));
  // Visible mercator bounds -> tile range (shrink z if too many tiles)
  let range;
  const calcRange=()=>{
    const ts=_MWORLD/Math.pow(2,z);
    let mnx=1/0,mxx=-1/0,mny=1/0,mxy=-1/0;
    [[0,0],[w,0],[0,h],[w,h]].forEach(([sx,sy])=>{
      const[mx,my]=s2m(sx,sy);
      mnx=Math.min(mnx,mx);mxx=Math.max(mxx,mx);
      mny=Math.min(mny,my);mxy=Math.max(mxy,my);
    });
    const tx0=Math.floor((mnx+_MWORLD/2)/ts), tx1=Math.floor((mxx+_MWORLD/2)/ts);
    const ty0=Math.floor((_MWORLD/2-mxy)/ts), ty1=Math.floor((_MWORLD/2-mny)/ts);
    return{ts,tx0,tx1,ty0,ty1,count:(tx1-tx0+1)*(ty1-ty0+1)};
  };
  range=calcRange();
  while(range.count>48&&z>3){z--;range=calcRange();}
  let base;
  try{base=ctx.getTransform();}catch(e){return;}
  ctx.save();
  ctx.globalAlpha=Math.max(0.1,Math.min(1,satOpacity));
  for(let tx=range.tx0;tx<=range.tx1;tx++)for(let ty=range.ty0;ty<=range.ty1;ty++){
    // Prefer the exact tile; while it loads, draw the matching sub-rect of a
    // parent tile (up to 3 levels coarser) so the backdrop fills immediately.
    let img=_getTile(z,tx,ty), sx=0,sy=0,ss=256, xx=tx,yy=ty,zz=z;
    while(!img&&zz>3&&z-zz<3){
      sx=sx/2+(xx&1)*128; sy=sy/2+(yy&1)*128; ss/=2;
      xx>>=1; yy>>=1; zz--;
      img=_getTile(zz,xx,yy);
    }
    if(!img)continue;
    const mx0=tx*range.ts-_MWORLD/2, my0=_MWORLD/2-ty*range.ts;
    const TL=m2s(mx0,my0), TR=m2s(mx0+range.ts,my0), BL=m2s(mx0,my0-range.ts);
    ctx.setTransform(base);
    ctx.transform((TR[0]-TL[0])/256,(TR[1]-TL[1])/256,(BL[0]-TL[0])/256,(BL[1]-TL[1])/256,TL[0],TL[1]);
    try{ctx.drawImage(img,sx,sy,ss,ss,0,0,256,256);}catch(e){}
  }
  ctx.setTransform(base);
  ctx.restore();
  // Required attribution
  ctx.save();
  ctx.font="8px 'Courier New',monospace";ctx.textAlign="right";ctx.textBaseline="bottom";
  const at=_bm.attr;
  const aw=ctx.measureText(at).width;
  ctx.fillStyle="rgba(0,0,0,.55)";ctx.fillRect(w-aw-8,h-13,aw+6,11);
  ctx.fillStyle="rgba(220,228,240,.85)";ctx.fillText(at,w-5,h-4);
  ctx.restore();
}

/* — Inverse of the anchor transform: job E/N -> lat/lon — */
function _jobToLL(E,N){
  const A=geoAnchor; if(!A)return null;
  const M2U=A.m2u||_m2u();
  const g=(A.conv+(satRotNudge||0))*Math.PI/180,cg=Math.cos(g),sg=Math.sin(g);
  const k=Math.cos(A.lat*Math.PI/180);
  const dE=(E-A.E)/M2U, dN=(N-A.N)/M2U;
  const dxm=dE*cg+dN*sg, dym=-dE*sg+dN*cg;
  const mx=A.mx+dxm/k, my=A.my+dym/k;
  return{lon:mx/_MR*180/Math.PI, lat:(2*Math.atan(Math.exp(my/_MR))-Math.PI/2)*180/Math.PI};
}

/* — Live GPS marker — */
let _gpsWatchId=null,_liveFix=null,_gpsStakeTarget=null,_relocateTarget=null;
function _gpsToJob(lat,lon){
  // Same anchor transform the imagery uses, so the marker sits on the
  // correct imagery pixel in both grid-coordinate and local-coordinate jobs.
  const A=geoAnchor; if(!A)return null;
  const M2U=A.m2u||_m2u();
  const g=(A.conv+(satRotNudge||0))*Math.PI/180, cg=Math.cos(g), sg=Math.sin(g);
  const k=Math.cos(A.lat*Math.PI/180);
  const m=_ll2merc(lat,lon);
  const dxm=(m.mx-A.mx)*k, dym=(m.my-A.my)*k;
  return{E:A.E+(dxm*cg-dym*sg)*M2U, N:A.N+(dxm*sg+dym*cg)*M2U};
}
function startLiveGps(){
  if(_gpsWatchId!=null)return;
  if(!navigator.geolocation){alert("Geolocation isn't available on this device/browser.");return;}
  _gpsWatchId=navigator.geolocation.watchPosition(
    pos=>{
      const nf={lat:pos.coords.latitude,lon:pos.coords.longitude,
                acc:pos.coords.accuracy,ts:Date.now()};
      // derive heading from movement (needs ~2 m of travel to be meaningful)
      if(_liveFix&&geoAnchor){
        const a=_gpsToJob(_liveFix.lat,_liveFix.lon), b=_gpsToJob(nf.lat,nf.lon);
        if(a&&b){
          const du=Math.hypot(b.E-a.E,b.N-a.N)/(geoAnchor.m2u||1);
          if(du>2) window._gpsHeading=((Math.atan2(b.E-a.E,b.N-a.N)*180/Math.PI)%360+360)%360;
          else if(Date.now()-(_liveFix.ts||0)>6000) window._gpsHeading=null; // standing still — heading stale
        }
      }
      _liveFix=nf;_satRepaint();},
    err=>{
      // Timeouts / temporary unavailability are normal (indoors, canopy) —
      // keep the watch alive. Only a permission denial is fatal.
      if(err&&err.code===1){stopLiveGps();alert("Live GPS stopped: location permission denied.");saveData();plotPoints();}
    },
    {enableHighAccuracy:true,maximumAge:2000,timeout:30000});
}
function stopLiveGps(){
  if(_gpsWatchId!=null){try{navigator.geolocation.clearWatch(_gpsWatchId);}catch(e){}}
  _gpsWatchId=null;_liveFix=null;
}
function _drawLiveGps(ctx,w,h,T){
  if(_gpsWatchId==null||!geoAnchor)return;
  if(!_liveFix){
    // Watch is running but no fix yet — show that it's trying
    ctx.save();
    ctx.font="9px 'Courier New',monospace";ctx.textAlign="left";ctx.textBaseline="top";
    const t="📍 acquiring GPS…";
    ctx.fillStyle="rgba(0,0,0,.55)";ctx.fillRect(6,6,ctx.measureText(t).width+10,15);
    ctx.fillStyle="#8ab4f8";ctx.fillText(t,11,9);
    ctx.restore();
    return;
  }
  const p=_gpsToJob(_liveFix.lat,_liveFix.lon); if(!p)return;
  const {scale,offX,offY}=T;
  const sx=p.E*scale+offX, sy=h-(p.N*scale+offY);
  _drawGpsStakeHud(ctx,w,h,T,p);
  if(sx<-20||sx>w+20||sy<-20||sy>h+20){
    // Fix is off-screen — draw an edge arrow pointing toward it
    const cx=w/2, cy=h/2, ang=Math.atan2(sy-cy,sx-cx);
    const ex=cx+Math.cos(ang)*(Math.min(w,h)/2-24), ey=cy+Math.sin(ang)*(Math.min(w,h)/2-24);
    ctx.save();
    ctx.translate(ex,ey);ctx.rotate(ang);
    ctx.fillStyle="#4285f4";ctx.strokeStyle="#fff";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(-6,-6);ctx.lineTo(-6,6);ctx.closePath();
    ctx.fill();ctx.stroke();
    ctx.restore();
    return;
  }
  const stale=Date.now()-_liveFix.ts>15000;
  const M2U=geoAnchor.m2u||_m2u();
  ctx.save();
  ctx.globalAlpha=stale?0.4:1;
  // Accuracy circle (ground meters -> job units -> px)
  if(_liveFix.acc){
    const r=_liveFix.acc*M2U*scale;
    if(r>6&&r<Math.max(w,h)){
      ctx.fillStyle="rgba(66,133,244,.12)";
      ctx.strokeStyle="rgba(66,133,244,.4)";ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(sx,sy,r,0,2*Math.PI);ctx.fill();ctx.stroke();
    }
  }
  // Blue dot, white ring
  ctx.fillStyle="#4285f4";ctx.strokeStyle="#ffffff";ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(sx,sy,7,0,2*Math.PI);ctx.fill();ctx.stroke();
  ctx.restore();
}
function _drawGpsStakeHud(ctx,w,h,T,fixJob){
  if(!_gpsStakeTarget){
    window._stakeStopBtn=null;
    try{const rt=document.getElementById("recentTicker");if(rt)rt.style.visibility="";}catch(e){}
    return;
  }
  const tgt=points.find(pt=>pt.Point===_gpsStakeTarget);
  if(!tgt){_gpsStakeTarget=null;
    try{const rt=document.getElementById("recentTicker");if(rt)rt.style.visibility="";}catch(e){}
    return;}
  const {scale,offX,offY}=T;
  const X=e=>e*scale+offX, Y=n=>h-(n*scale+offY);
  const fx=X(fixJob.E), fy=Y(fixJob.N), tx=X(tgt.Easting), ty=Y(tgt.Northing);
  ctx.save();
  ctx.strokeStyle="#ffd166";ctx.lineWidth=2.5;ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();
  ctx.setLineDash([]);

  const me={Northing:fixJob.N,Easting:fixJob.E};
  const hd=dist2D(me,tgt), az=((azimuth(me,tgt)%360)+360)%360;
  const onPoint=hd<(units==="ft"?3:1);

  // ── Navigation panel — top center (bottom is Undo/scale-bar territory) ──
  const pw=Math.min(w-20,360), ph=92;
  const px=(w-pw)/2, py=8;
  try{const rt=document.getElementById("recentTicker");if(rt)rt.style.visibility="hidden";}catch(e){}
  ctx.globalAlpha=0.92;
  ctx.fillStyle=onPoint?"rgba(18,80,34,.95)":"rgba(12,12,10,.9)";
  ctx.strokeStyle=onPoint?"#59d97c":"#ffd166";ctx.lineWidth=1.5;
  const rr=(x,y,ww,hh,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+ww,y,x+ww,y+hh,r);ctx.arcTo(x+ww,y+hh,x,y+hh,r);ctx.arcTo(x,y+hh,x,y,r);ctx.arcTo(x,y,x+ww,y,r);ctx.closePath();};
  rr(px,py,pw,ph,12);ctx.fill();ctx.stroke();
  ctx.globalAlpha=1;

  // Arrow: relative to direction of travel when we have a heading, else map-north-up
  const cx=px+50, cy=py+ph/2;
  let arrowAng, mode;
  if(window._gpsHeading!=null){
    arrowAng=az-window._gpsHeading; mode="travel";
  }else{
    arrowAng=az; mode="map";
  }
  ctx.save();
  ctx.translate(cx,cy);ctx.rotate(arrowAng*Math.PI/180);
  ctx.fillStyle=onPoint?"#7ff0a0":"#ffd166";
  ctx.beginPath();
  ctx.moveTo(0,-26);ctx.lineTo(15,14);ctx.lineTo(0,6);ctx.lineTo(-15,14);ctx.closePath();
  ctx.fill();
  ctx.restore();
  ctx.font="9px 'Courier New',monospace";ctx.textAlign="center";ctx.fillStyle="rgba(255,255,255,.45)";
  ctx.fillText(mode==="travel"?"vs travel":"map dir",cx,py+ph-8);

  // ✕ stop button, top-right of the panel (hit area recorded for the tap handler)
  const xbX=px+pw-22, xbY=py+22;
  window._stakeStopBtn={x:xbX,y:xbY,r:22};
  ctx.beginPath();ctx.arc(xbX,xbY,13,0,2*Math.PI);
  ctx.fillStyle="rgba(255,255,255,.12)";ctx.fill();
  ctx.strokeStyle=onPoint?"#59d97c":"#ffd166";ctx.lineWidth=1.5;ctx.stroke();
  ctx.font="bold 14px 'Courier New',monospace";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillStyle=onPoint?"#7ff0a0":"#ffd166";
  ctx.fillText("✕",xbX,xbY+1);

  // Big distance + guidance
  ctx.textAlign="left";ctx.textBaseline="alphabetic";
  ctx.fillStyle=onPoint?"#c6ffd8":"#ffffff";
  ctx.font="bold 30px 'Courier New',monospace";
  ctx.fillText(onPoint?"ON POINT":hd.toFixed(hd<100?1:0)+" "+units,px+96,py+38);
  ctx.font="12px 'Courier New',monospace";
  ctx.fillStyle=onPoint?"#9fe8b5":"#c9c2a8";
  let guide="";
  if(!onPoint&&mode==="travel"){
    const rel=((arrowAng%360)+360)%360;
    guide=rel<20||rel>340?"straight ahead":
          rel<160?"veer right":
          rel<200?"behind you":"veer left";
  }
  ctx.fillText("→ #"+tgt.Point+(tgt.Description?" "+tgt.Description.slice(0,14):""),px+96,py+58);
  ctx.fillText(guide||_deedAzToBearingStr(az),px+96,py+76);
  ctx.restore();
}

/* — Shift every stored coordinate (points, arc centers, polylines, labels) — */
function _shiftAllCoords(dE,dN){
  points.forEach(p=>{p.Easting+=dE;p.Northing+=dN;});
  plotConnections.forEach(c=>{if(c.type==="arc"){c.centerE+=dE;c.centerN+=dN;}});
  (typeof _polylines!=="undefined"?_polylines:[]).forEach(pl=>{
    (pl.verts||[]).forEach(v=>{v.E+=dE;v.N+=dN;});
    (pl.segs||[]).forEach(sg=>{if(sg&&sg.type==="arc"){sg.centerE+=dE;sg.centerN+=dN;}});
  });
  _areaLabels.forEach(l=>{l.E+=dE;l.N+=dN;});
}

/* — GPS fix with an acquiring modal — */
function _gpsFix(cb){
  if(!navigator.geolocation){alert("Geolocation isn't available on this device/browser.");cb(null);return;}
  let done=false;
  const {close}=openModal((modal,cl)=>{
    modal.innerHTML="<h2>📡 GPS Fix</h2><p class='info'>Acquiring position… stand at the point, clear sky view helps. High accuracy mode, up to 25s.</p>";
    const b=document.createElement("button");b.className="btn danger";b.textContent="Cancel";
    b.onclick=()=>{done=true;cl();cb(null);};modal.appendChild(b);
  });
  navigator.geolocation.getCurrentPosition(
    pos=>{if(done)return;done=true;close();cb(pos);},
    err=>{if(done)return;done=true;close();alert("GPS failed: "+err.message);cb(null);},
    {enableHighAccuracy:true,timeout:25000,maximumAge:0});
}

/* — Zone picker: auto choice + alternatives + UTM fallback — */
function _zonePick(lat,lon,cb){
  const cands=_spcCandidates(lat,lon);
  const utm=_utmZoneFor(lat,lon);
  openModal((modal,close)=>{
    modal.innerHTML="<h2>Coordinate System</h2><p class='info'>Fix: "+lat.toFixed(6)+", "+lon.toFixed(6)+
      "<br>Pick the zone (NAD83, "+(units==="ft"?"US survey ft":"meters")+"). Verify constants against NGS before record work.</p>";
    const mk=(z,tag)=>{
      const p=_projForward(lat,lon,z), u=_m2u();
      const b=document.createElement("button");b.className="btn "+(tag?"ok":"blue");
      b.textContent=(tag?"✓ ":"")+z.name+" — N "+(p.N*u).toFixed(1)+"  E "+(p.E*u).toFixed(1);
      b.style.fontSize=".78em";
      b.onclick=()=>{close();cb(z);};
      modal.appendChild(b);
    };
    cands.forEach((z,i)=>mk(z,i===0));
    mk(utm,cands.length===0);
    const c=document.createElement("button");c.className="btn";c.textContent="Cancel";
    c.onclick=()=>{close();cb(null);};modal.appendChild(c);
  });
}

/* — Anchor an existing job point via GPS or manual lat/lon — */
function _satSetupFlow(){
  const defPt=(currentPoint&&currentPoint.Point)||1;
  calculatorInput("Anchor at point # (stand HERE for GPS):",String(defPt),pn=>{
    if(pn===null)return;
    const pt=points.find(p=>p.Point===parseInt(pn,10));
    if(!pt){alert("Point "+pn+" not found.");return;}
    openModal((modal,close)=>{
      modal.innerHTML="<h2>🛰 Locate Point "+pt.Point+"</h2><p class='info'>One position fix ties the plot to satellite imagery. Phone GPS is ±10 ft class — imagery is visual context, never measure against it.</p>";
      const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
      mk("📡 Use Phone GPS","ok",()=>{close();_gpsFix(pos=>{
        if(!pos)return;
        startLiveGps();
        _satAfterFix(pt,pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy);
      });});
      mk("🎯 Enter Grid Coords (SPC/UTM)","blue",()=>{close();
        _gridCoordEntry((lat,lon)=>{_satAfterFix(pt,lat,lon,null);});
      });
      mk("⌨ Enter Lat / Lon","blue",()=>{close();
        calculatorInput("Latitude (decimal deg, N+):","",la=>{
          if(la===null||la==="")return;
          calculatorInput("Longitude (decimal deg, W is −):","",lo=>{
            if(lo===null||lo==="")return;
            const lat=parseFloat(la),lon=parseFloat(lo);
            if(isNaN(lat)||isNaN(lon)||Math.abs(lat)>85||Math.abs(lon)>180){alert("Invalid lat/lon.");return;}
            _satAfterFix(pt,lat,lon,null);
          });
        });
      });
      mk("Cancel","",close);
    });
  });
}
function _satAfterFix(pt,lat,lon,acc){
  _zonePick(lat,lon,zone=>{
    if(!zone)return;
    const p=_projForward(lat,lon,zone), u=_m2u();
    const gE=p.E*u, gN=p.N*u;
    openModal((modal,close)=>{
      modal.innerHTML="<h2>Anchor Point "+pt.Point+"</h2><p class='info'>"+zone.name+"<br>Grid N "+gN.toFixed(2)+"  E "+gE.toFixed(2)+
        (acc!=null?"<br>GPS accuracy ±"+(acc*_m2u()).toFixed(0)+" "+units:"")+
        "<br>Convergence "+p.conv.toFixed(3)+"°</p>";
      const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
      mk("Shift whole job to grid coords","ok",()=>{
        close();_takeSnapshot("Shift to grid");
        _shiftAllCoords(gE-pt.Easting,gN-pt.Northing);

        satOn=true;saveData();_syncSatBtn();
        if(points.length<3)_zoomToGround(units==="ft"?300:100);
        showResult("✓ Anchored on "+zone.name,[
          {lbl:"Point "+pt.Point+":",val:"N "+gN.toFixed(2)+" E "+gE.toFixed(2)},

      });
      mk("Keep local coords (imagery only)","blue",()=>{

          {lbl:"Point "+pt.Point+":",val:"stays N "+pt.Northing.toFixed(2)+" E "+pt.Easting.toFixed(2)},
          {lbl:"Zone (display only):",val:zone.name}]);

/* — Store a point where the phone is standing — */
function storeGpsPoint(){
  const doStore=(lat,lon,acc)=>{
    const p=_gpsToJob(lat,lon); if(!p){alert("Anchor the job first (🛰 menu).");return;}
    const accU=acc!=null?(acc*(geoAnchor.m2u||_m2u())):null;
    alphaInput("Description:","",d=>{
      const num=pointCounter;
      _takeSnapshot("GPS Pt #"+num);
      points.push({Point:num,Northing:p.N,Easting:p.E,
        Elevation:(currentPoint?currentPoint.Elevation:100)||100,
        Type:"GPS",Flag:"",ih:0,
        Description:(d||"")+(accU!=null?" [GPS ±"+accU.toFixed(0)+units+"]":" [GPS]")});
      pointCounter=num+1;
      saveData();updateStatus();
      showResult("✓ Point #"+num+" stored at GPS",[
        {lbl:"N:",val:p.N.toFixed(3)},{lbl:"E:",val:p.E.toFixed(3)},
        ...(accU!=null?[{lbl:"Accuracy:",val:"±"+accU.toFixed(1)+" "+units}]:[])]);
    });
  };
  if(_liveFix&&Date.now()-_liveFix.ts<8000) doStore(_liveFix.lat,_liveFix.lon,_liveFix.acc);
  else _gpsFix(pos=>{ if(pos) doStore(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy); });
}

/* — Pre-cache the visible area's tiles for offline use — */
function cacheAreaOffline(){
  if(!satOn||!geoAnchor){alert("Turn imagery on first.");return;}
  const c=document.getElementById("plotCanvas");
  const w=c.clientWidth,h=c.clientHeight;
  const T=_viewTransform(w,h); if(!T)return;
  // Reuse the draw math by listing tiles for current zoom + 2 finer levels
  const urls=[];
  const A=geoAnchor,M2U=A.m2u||_m2u();
  const g=(A.conv+(satRotNudge||0))*Math.PI/180,cg=Math.cos(g),sg=Math.sin(g);
  const k=Math.cos(A.lat*Math.PI/180);
  const {scale,offX,offY}=T;
  const s2m=(sx,sy)=>{
    const E=(sx-offX)/scale,N=(h-sy-offY)/scale;
    const dE=(E-A.E)/M2U,dN=(N-A.N)/M2U;
    return[A.mx+(dE*cg+dN*sg)/k,A.my+(-dE*sg+dN*cg)/k];
  };
  const bm=_BASEMAPS[satBasemap]||_BASEMAPS.esri;
  const gmpp=1/(scale*M2U);
  let z0=Math.round(Math.log2(_MWORLD*k/(256*gmpp)));
  z0=Math.max(3,Math.min(bm.maxZ,z0));
  for(let z=z0;z<=Math.min(bm.maxZ,z0+2);z++){
    const ts=_MWORLD/Math.pow(2,z);
    let mnx=1/0,mxx=-1/0,mny=1/0,mxy=-1/0;
    [[0,0],[w,0],[0,h],[w,h]].forEach(([sx,sy])=>{const[mx,my]=s2m(sx,sy);
      mnx=Math.min(mnx,mx);mxx=Math.max(mxx,mx);mny=Math.min(mny,my);mxy=Math.max(mxy,my);});
    const tx0=Math.floor((mnx+_MWORLD/2)/ts),tx1=Math.floor((mxx+_MWORLD/2)/ts);
    const ty0=Math.floor((_MWORLD/2-mxy)/ts),ty1=Math.floor((_MWORLD/2-mny)/ts);
    for(let tx=tx0;tx<=tx1;tx++)for(let ty=ty0;ty<=ty1;ty++)urls.push(bm.url(z,ty,tx));
    if(urls.length>350)break;
  }
  const total=Math.min(urls.length,350);
  let done=0,fail=0;
  const {close}=openModal((modal)=>{
    modal.innerHTML="<h2>⬇ Caching Tiles</h2><p class='info' id='tileProg'>0 / "+total+"</p>"+
      "<p class='info'>Tiles stay available offline once loaded. Zoom out further and repeat to cover more ground.</p>";
    const b=document.createElement("button");b.className="btn";b.textContent="Done / Run in background";
    b.onclick=()=>close();modal.appendChild(b);
  });
  urls.slice(0,total).forEach(u=>{
    const im=new Image();im.crossOrigin="anonymous";
    const tick=()=>{done++;const el=document.getElementById("tileProg");
      if(el)el.textContent=done+" / "+total+(fail?" ("+fail+" failed)":"");};
    im.onload=tick;im.onerror=()=>{fail++;tick();};
    im.src=u;
  });
}

/* — Ground elevation at a fix: USGS 3DEP (NAVD88), else Copernicus DEM — */
function _fetchGroundElev(lat,lon,cb){
  const ft=units==="ft";
  const bail=()=>cb(null,null);
  try{
    const c1=new AbortController(); const t1=setTimeout(()=>c1.abort(),5000);
    fetch("https://epqs.nationalmap.gov/v1/json?x="+lon+"&y="+lat+"&units="+(ft?"Feet":"Meters")+"&wkid=4326",{signal:c1.signal})
      .then(r=>r.json()).then(j=>{
        clearTimeout(t1);
        const v=parseFloat(j&&j.value);
        if(isFinite(v)&&v>-1000&&v<30000) cb(v,"USGS 3DEP NAVD88");
        else throw 0;
      })
      .catch(()=>{
        const c2=new AbortController(); const t2=setTimeout(()=>c2.abort(),5000);
        fetch("https://api.open-meteo.com/v1/elevation?latitude="+lat+"&longitude="+lon,{signal:c2.signal})
          .then(r=>r.json()).then(j=>{
            clearTimeout(t2);
            let v=j&&j.elevation&&j.elevation[0];
            if(typeof v==="number"){ cb(ft?v*3.280833333:v,"Copernicus DEM"); }
            else bail();
          }).catch(bail);
      });
  }catch(e){bail();}
}

/* — Known grid coordinate entry: state/UTM zone, then N & E in job units.
     Calls back with (lat, lon, zone, N_units, E_units). — */
function _gridCoordEntry(cb){
  alphaInput("State (e.g. AL) — or UTM:","",st=>{
    if(st===null||!st.trim())return;
    const q=st.trim().toUpperCase();
    const pickZone=zone=>{
      calculatorInput("Grid Northing ("+units+"):","",nv=>{
        if(nv===null||nv==="")return;
        calculatorInput("Grid Easting ("+units+"):","",ev=>{
          if(ev===null||ev==="")return;
          const Nu=parseFloat(nv), Eu=parseFloat(ev);
          if(isNaN(Nu)||isNaN(Eu)){alert("Invalid coordinates.");return;}
          const u=_m2u();
          const ll=_projInverse(Eu/u,Nu/u,zone);
          if(!isFinite(ll.lat)||!isFinite(ll.lon)||Math.abs(ll.lat)>85){
            alert("Those coordinates don't compute in "+zone.name+" — check zone and values.");return;}
          if(zone.bbox&&(ll.lat<zone.bbox[0]-2||ll.lat>zone.bbox[1]+2||ll.lon<zone.bbox[2]-2||ll.lon>zone.bbox[3]+2)){
            confirmDialog("Heads up: that coordinate computes to "+ll.lat.toFixed(4)+", "+ll.lon.toFixed(4)+
              " — outside the usual area for "+zone.name+". Wrong zone or units? Use it anyway?",yes=>{
              if(yes)cb(ll.lat,ll.lon,zone,Nu,Eu);});
            return;
          }
          cb(ll.lat,ll.lon,zone,Nu,Eu);
        });
      });
    };
    if(q==="UTM"){
      calculatorInput("UTM zone number (1–60):","",zn=>{
        if(zn===null||zn==="")return;
        const n=parseInt(zn,10);
        if(!(n>=1&&n<=60)){alert("Zone must be 1–60.");return;}
        openModal((modal,close)=>{
          modal.innerHTML="<h2>Hemisphere</h2>";
          const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
          mk("Northern (N)","ok",()=>{close();pickZone({name:"UTM "+n+"N",type:"tm",lat0:0,lon0:-183+n*6,k0:0.9996,FE:500000,FN:0});});
          mk("Southern (S)","blue",()=>{close();pickZone({name:"UTM "+n+"S",type:"tm",lat0:0,lon0:-183+n*6,k0:0.9996,FE:500000,FN:10000000});});
          mk("Cancel","",close);
        });
      });
      return;
    }
    const zones=_SPC_ZONES.filter(z=>z.name.toUpperCase().startsWith(q));
    if(!zones.length){alert("No State Plane zones match \""+st.trim()+"\". Use the two-letter state code, or UTM.");return;}
    if(zones.length===1){pickZone(zones[0]);return;}
    openModal((modal,close)=>{
      modal.innerHTML="<h2>Pick the Zone</h2>";
      zones.forEach(z=>{
        const b=document.createElement("button");b.className="btn blue";b.style.fontSize=".8em";
        b.textContent=z.name;b.onclick=()=>{close();pickZone(z);};modal.appendChild(b);
      });
      const c=document.createElement("button");c.className="btn";c.textContent="Cancel";c.onclick=close;modal.appendChild(c);
    });
  });
}

/* — Start a new job from a known grid coordinate — */
function _gridStartFlow(jn){
  _gridCoordEntry((lat,lon,zone,Nu,Eu)=>{
    _fetchGroundElev(lat,lon,(ge,src)=>{
      const def=ge!=null?ge.toFixed(1):"100";
      calculatorInput("Start Elev"+(src?" ("+src+")":"")+":",def,ev=>{
        const Z=parseFloat(ev===null||ev===""?def:ev);
        _startNewJob(jn,Nu,Eu,isNaN(Z)?100:Z);
        _setAnchor(lat,lon,zone,Eu,Nu);
        satOn=true;saveData();_syncSatBtn();
        _zoomToGround(units==="ft"?300:100);
        showResult("✓ Grid Start · "+zone.name,[
          {lbl:"Point 1:",val:"N "+Nu.toFixed(2)+" E "+Eu.toFixed(2)},
          {lbl:"Computed:",val:lat.toFixed(6)+", "+lon.toFixed(6)},
          {lbl:"Imagery:",val:"ON — verify it lines up with the ground"}]);
      });
    });
  });
}

/* — New-job GPS start — */
function _gpsStartFlow(jn,fineTune){
  _gpsFix(pos=>{
    if(!pos){jobNewManual(jn);return;}
    const lat=pos.coords.latitude, lon=pos.coords.longitude, acc=pos.coords.accuracy;
    startLiveGps();
    if(fineTune){
      // Streamlined path (fine-tune or deed): zero dialogs before the map.
      // Zone auto-selected (change later via 🛰 menu → Re-anchor);
      // elevation auto-filled from USGS (edit later if needed).
      const zone=_spcCandidates(lat,lon)[0]||_utmZoneFor(lat,lon);
      const p=_projForward(lat,lon,zone), u=_m2u();
      _fetchGroundElev(lat,lon,(ge)=>{
        _startNewJob(jn,p.N*u,p.E*u,ge!=null?parseFloat(ge.toFixed(1)):100,true);
        _setAnchor(lat,lon,zone,p.E*u,p.N*u);
        satOn=true;saveData();_syncSatBtn();
        _zoomToGround(units==="ft"?300:100);
        closeAllModals();
        if(fineTune==="deed"){ _deedPasteModal(""); }
        else { _relocateTarget=1; plotPoints(); }
      });
      return;
    }
    _zonePick(lat,lon,zone=>{
      if(!zone){jobNewManual(jn);return;}
      const p=_projForward(lat,lon,zone), u=_m2u();
      _fetchGroundElev(lat,lon,(ge,src)=>{
        const def=ge!=null?ge.toFixed(1):"100";
        calculatorInput("Start Elev"+(src?" ("+src+")":"")+":",def,ev=>{
        const Z=parseFloat(ev===null||ev===""?def:ev);
        _startNewJob(jn,p.N*u,p.E*u,isNaN(Z)?100:Z,fineTune);
        _setAnchor(lat,lon,zone,p.E*u,p.N*u);
        satOn=true;saveData();_syncSatBtn();
        _zoomToGround(units==="ft"?300:100);
        showResult("✓ GPS Start · "+zone.name,[
          {lbl:"Point 1:",val:"N "+(p.N*u).toFixed(2)+" E "+(p.E*u).toFixed(2)},
          {lbl:"Elev:",val:(isNaN(Z)?100:Z).toFixed(1)+" "+units+(src?" ("+src+")":"")},
          {lbl:"Fix:",val:lat.toFixed(6)+", "+lon.toFixed(6)+(acc!=null?" ±"+(acc*u).toFixed(0)+" "+units:"")}]);
        });
      });
    });
  });
}
function _zoomToGround(unitsAcross){
  const apply=()=>{
    _resetViewState();
    const c=document.getElementById("plotCanvas");
    const wrap=document.getElementById("canvasWrap");
    const w=(c&&c.clientWidth)||(wrap&&wrap.clientWidth)||360;
    const h=(c&&c.clientHeight)||(wrap&&wrap.clientHeight)||480;
    const T=_viewTransform(w,h); if(!T)return;
    viewScale=Math.max(.000002,Math.min(100,(w/unitsAcross)/T.base));
    viewOffsetX=0;viewOffsetY=0;plotPoints();
  };
  apply();
  // Layout can still be settling (job screen hiding, browser bars moving) —
  // re-assert once real dimensions are in, unless the user has already
  // started zooming/panning themselves.
  const setAt=viewScale;
  setTimeout(()=>{ if(viewScale===setAt) apply(); },350);
}
function _stageNewJob(){
  points=[];plotConnections=[];_polylines=[];_areaLabels=[];
  tempGeom=[];tempIntersections=[];recentShots=[];
  selectedPoint=null;currentPoint=null;
  if(typeof selectedConn!=="undefined")selectedConn=null;
  geoAnchor=null;satOn=false;satRotNudge=0;_deedPlot=null;
  stopLiveGps();try{_syncSatBtn();}catch(e){}
  _resetViewState();viewScale=1;viewOffsetX=0;viewOffsetY=0;
  updateStatus();plotPoints();
}
function jobNewManual(jn){
  const seq=[["Start Northing","10000"],["Start Easting","10000"],["Start Elevation","100"]];
  const vals=[];let i=0;
  const finish=()=>{
    const N=parseFloat(vals[0]),E=parseFloat(vals[1]),Z=parseFloat(vals[2]);
    _startNewJob(jn,isNaN(N)?10000:N,isNaN(E)?10000:E,isNaN(Z)?100:Z);
  };
  const step=()=>{
    if(i>=seq.length){finish();return}
    calculatorInput(seq[i][0]+" (default "+seq[i][1]+"):",seq[i][1],v=>{
      vals.push(v===null||v===""?seq[i][1]:v);i++;step();
    });
  };
  step();
}

function plotPoints(extCtx,extW,extH){
  try{ _recomputeAreaLabels(); }catch(e){} // keep area label current if points moved
  let ctx,w,h;
  if(extCtx && extCtx.canvas && typeof extCtx.fillRect==="function"){
    // Export mode — draw onto a supplied context at the supplied logical size
    ctx=extCtx; w=extW; h=extH;
  } else {
    const c=document.getElementById("plotCanvas");if(!c)return;
    // If canvas has no dimensions yet (display:none parent), bail silently
    w=c.clientWidth;h=c.clientHeight;
    if(!w||!h){
      // Try parent
      const wrap=document.getElementById("canvasWrap");
      if(wrap){w=wrap.clientWidth;h=wrap.clientHeight;}
    }
    if(!w||!h) return; // still nothing — layout not ready
    ctx=setupHiDpi(c,w,h);
  }
  ctx.fillStyle=lightMode?"#ffffff":"#0d1020";ctx.fillRect(0,0,w,h);
  const valid=points.filter(p=>!isNaN(p.Easting)&&!isNaN(p.Northing));
  if(!valid.length){
    ctx.fillStyle="rgba(107,115,143,.3)";ctx.font="13px 'Courier New',monospace";
    ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("No points loaded",w/2,h/2);return;
  }
  let T=_viewTransform(w,h);if(!T)return;
  // View stabilization — the transform is relative to the data bbox, so adding
  // or deleting a point used to implicitly re-fit (and re-zoom) the view.
  // Compensate viewScale/offsets so the view stays put; ◎ re-fits on demand.
  if(!extCtx){
    const pv=window._pvState;
    if(pv&&pv.w===w&&pv.h===h&&(pv.minE!==T.minE||pv.minN!==T.minN||pv.rng!==T.rng)){
      const prevScale=pv.base*viewScale;
      viewScale=Math.max(.000002,Math.min(100,prevScale/T.base));
      const sc=T.base*viewScale;
      viewOffsetX+=sc*((T.rng-pv.rng)/2+(T.minE-pv.minE));
      viewOffsetY+=sc*((T.rng-pv.rng)/2+(T.minN-pv.minN));
      T=_viewTransform(w,h);
    }
    window._pvState={w,h,minE:T.minE,minN:T.minN,rng:T.rng,base:T.base};
  }
  const{scale,offX,offY}=T;
  const X=e=>e*scale+offX;
  const Y=n=>h-(n*scale+offY);
  try{ _drawSatellite(ctx,w,h,T); }catch(e){}
  // Grid — ensure a sensible step even with 1 point (rng=1)
  // Minimum step = enough to show at least 3 grid lines across the view
  const minWorldStep = (Math.max(w,h)) / (T.scale * 3);
  const gs = Math.max(_niceStep(T.rng/5), _niceStep(minWorldStep));
  ctx.save();ctx.strokeStyle=lightMode?"rgba(0,0,0,.07)":"rgba(255,255,255,0.06)";ctx.lineWidth=1;
  const gE=Math.floor(T.minE/gs)*gs,gN=Math.floor(T.minN/gs)*gs;
  for(let e=gE;e<=T.maxE+gs;e+=gs){ctx.beginPath();ctx.moveTo(X(e),0);ctx.lineTo(X(e),h);ctx.stroke()}
  for(let n=gN;n<=T.maxN+gs;n+=gs){ctx.beginPath();ctx.moveTo(0,Y(n));ctx.lineTo(w,Y(n));ctx.stroke()}
  // Grid labels — only draw if the line is actually visible on screen
  ctx.font="bold 9px 'Courier New',monospace";
  ctx.textAlign="center";ctx.textBaseline="top";
  for(let e=gE;e<=T.maxE+gs;e+=gs){
    const sx=X(e); if(sx<40||sx>w-10) continue;
    const lbl=e.toFixed(0);
    const lw=ctx.measureText(lbl).width;
    ctx.fillStyle=lightMode?"rgba(0,0,0,.08)":"rgba(0,0,0,.5)";ctx.fillRect(sx-lw/2-2,h-16,lw+4,13);
    ctx.fillStyle=lightMode?"#000000":lightMode?"#000000":"#9ab0c8";ctx.fillText(lbl,sx,h-15);
  }
  ctx.textAlign="right";ctx.textBaseline="middle";
  for(let n=gN;n<=T.maxN+gs;n+=gs){
    const sy=Y(n); if(sy<10||sy>h-20) continue;
    const lbl=n.toFixed(0);
    const lw=ctx.measureText(lbl).width;
    ctx.fillStyle=lightMode?"rgba(255,255,255,.7)":"rgba(0,0,0,.5)";ctx.fillRect(2,sy-7,lw+4,13);
    ctx.fillStyle=lightMode?"#000000":lightMode?"#000000":"#9ab0c8";ctx.fillText(lbl,lw+4,sy);
  }
  ctx.restore();
  _drawScaleBar(ctx,w,h,scale);
  // Connections with azimuth + distance labels, and true arc rendering
  plotConnections.forEach(conn=>{

    // ── Arc connection (draw-only type) ──────────────────────────────
    if(conn.type==="arc"){
      const scx=X(conn.centerE), scy=Y(conn.centerN);
      const sR=conn.R*scale; // radius in screen pixels
      // Y-axis is flipped (survey N goes up, canvas Y goes down).
      // Negating the angles converts from survey math space to canvas space.
      // Flipping the direction flag corrects for the handedness reversal:
      //   CW in survey  = CCW in canvas  (acw=true)
      //   CCW in survey = CW  in canvas  (acw=false)
      const canvasStart = -conn.startAngle;
      const canvasEnd   = -conn.endAngle;
      const acw = (conn.dir === "ccw"); // inverted because Y is flipped
      ctx.save();
      ctx.strokeStyle="#3ecf74"; // green for arcs — distinct from lines
      ctx.lineWidth=2;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(scx, scy, sR, canvasStart, canvasEnd, acw);
      ctx.stroke();
      // Label at arc midpoint
      const midAngle=(conn.startAngle+conn.endAngle)/2;
      const mlx=X(conn.centerE+conn.R*Math.cos(midAngle));
      const mly=Y(conn.centerN+conn.R*Math.sin(midAngle));
      if(sR>30){
        ctx.font="bold 10px 'Courier New',monospace";
        const lbl="R:"+conn.R.toFixed(2)+units+" L:"+conn.arcLen.toFixed(2)+units;
        const lw=ctx.measureText(lbl).width;
        ctx.fillStyle=lightMode?"rgba(255,255,255,.92)":"rgba(8,11,20,.78)";ctx.fillRect(mlx-lw/2-3,mly-9,lw+6,14);
        ctx.fillStyle=lightMode?"#000000":"#3ecf74";ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(lbl,mlx,mly);
      }
      ctx.restore();
      return; // skip normal line drawing
    }

    // ── Normal point-to-point connection ─────────────────────────────
    const from=points.find(p=>p.Point==conn.from),to=points.find(p=>p.Point==conn.to);
    if(!from||!to)return;
    const sx1=X(from.Easting),sy1=Y(from.Northing);
    const sx2=X(to.Easting),  sy2=Y(to.Northing);
    ctx.save();
    const isSelConn = selectedConn===plotConnections.indexOf(conn);
    ctx.strokeStyle=isSelConn?(lightMode?"#000000":"#ffffff"):conn.style==="dashed"?"#4a9eff":"#f5a623";
    ctx.lineWidth=isSelConn?3.5:1.8;
    if(conn.style==="dashed")ctx.setLineDash([7,5]);else ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(sx1,sy1);ctx.lineTo(sx2,sy2);ctx.stroke();
    ctx.setLineDash([]);

    // Line labels when zoom is sufficient
    const linePx=Math.hypot(sx2-sx1,sy2-sy1);
    if(linePx>60){
      const hd=dist2D(from,to);
      const az=azimuth(from,to);
      const distLbl=hd.toFixed(2)+units;
      const azLbl=fmtBrg(az);
      const mx=(sx1+sx2)/2, my=(sy1+sy2)/2;
      let angle=Math.atan2(sy2-sy1,sx2-sx1);
      if(angle>Math.PI/2||angle<-Math.PI/2) angle+=Math.PI;
      // Scale-aware annotation font — grows with zoom
      const annFont = Math.max(9, Math.min(18, 9 + viewScale * 0.9));
      const annFontSm = Math.max(8, Math.min(14, 8 + viewScale * 0.6));
      ctx.save();
      ctx.translate(mx,my);ctx.rotate(angle);
      ctx.font=`bold ${annFont}px 'Courier New',monospace`;
      const dw=ctx.measureText(distLbl).width;
      ctx.font=`${annFontSm}px 'Courier New',monospace`;
      const aw=ctx.measureText(azLbl).width;
      const boxW=Math.max(dw,aw)+8;
      const boxH=annFont+annFontSm+6;
      ctx.fillStyle=lightMode?"rgba(255,255,255,.92)":"rgba(8,11,20,.82)";
      ctx.fillRect(-boxW/2,-(boxH+2),boxW,boxH+2);
      ctx.font=`bold ${annFont}px 'Courier New',monospace`;
      ctx.fillStyle=lightMode?"#000000":"#f5a623";ctx.textAlign="center";ctx.textBaseline="top";
      ctx.fillText(distLbl,0,-(boxH+1));
      ctx.font=`${annFontSm}px 'Courier New',monospace`;
      ctx.fillStyle=lightMode?"#000000":lightMode?"#000000":"#9ab0c8";
      ctx.fillText(azLbl,0,-(boxH+1)+annFont+1);
      ctx.restore();
    }
    ctx.restore();
  });
  const dotR=Math.max(3.5,Math.min(7,scale*0.35));

  // Scale-aware font sizes — grow with zoom, clamped to readable range
  const ptFontSize  = Math.max(11, Math.min(22, 11 + viewScale * 1.2));
  const descFontSize= Math.max(9,  Math.min(16, 9  + viewScale * 0.8));
  // Cell size for occupancy grid scales with font so collision detection stays correct
  const cellW = ptFontSize * 2.8;
  const cellH = ptFontSize * 1.6;

  // Occupancy grid for label collision — reset each frame
  const _labelCells = new Set();
  valid.forEach(p=>{
    const cx=X(p.Easting),cy=Y(p.Northing);
    const isOcc=currentPoint&&p.Point===currentPoint.Point;
    let color="#3ecf74",shape="circle";
    if(p.Flag==="control"){color="#4a9eff";shape="triangle"}
    else if(p.Flag==="flagged"){color="#f5a623";shape="diamond"}
    else if(p.Type==="COGO"){color="#a78bfa";shape="square"}
    else if(p.Type==="Import"){color="#60c8e8"}
    ctx.fillStyle=isOcc?(lightMode?"#1a1a1a":"#ffffff"):color;
    ctx.beginPath();
    if(shape==="circle")ctx.arc(cx,cy,isOcc?dotR+2:dotR,0,2*Math.PI);
    else if(shape==="triangle"){ctx.moveTo(cx,cy-dotR-1);ctx.lineTo(cx+dotR+1,cy+dotR);ctx.lineTo(cx-dotR-1,cy+dotR);ctx.closePath()}
    else if(shape==="square")ctx.rect(cx-dotR,cy-dotR,dotR*2,dotR*2);
    else if(shape==="diamond"){ctx.moveTo(cx,cy-dotR-1);ctx.lineTo(cx+dotR+1,cy);ctx.lineTo(cx,cy+dotR+1);ctx.lineTo(cx-dotR-1,cy);ctx.closePath()}
    ctx.fill();
    // Elevation labels — below dot, small and clean
    if(showElevations && p.Elevation!=null){
      const ez=p.Elevation.toFixed(2);
      const elvFontSize=Math.max(8,Math.min(11,8+viewScale*0.5));
      const ex=cx+dotR+4;
      const ey=cy+descFontSize+ptFontSize+4;
      ctx.save();
      ctx.font=elvFontSize+"px 'Share Tech Mono',monospace";
      ctx.textAlign="left";
      ctx.textBaseline="top";
      // No stroke outline — just a simple fill
      ctx.fillStyle=lightMode?"#2a7a00":"rgba(104,168,74,.9)";
      ctx.fillText("z:"+ez, ex, ey);
      ctx.restore();
    }

    if(showLabels){
      ctx.shadowColor="rgba(0,0,0,.9)";ctx.shadowBlur=4;
      const lx=cx+dotR+3, ly=cy-1;
      const cellKey=`${Math.round(lx/cellW)},${Math.round(ly/cellH)}`;
      if(!_labelCells.has(cellKey)){
        _labelCells.add(cellKey);
        _labelCells.add(`${Math.round(lx/cellW)+1},${Math.round(ly/cellH)}`);
        ctx.fillStyle=lightMode?"#000000":lightMode?"#000000":"#dde2f0";
        ctx.font=`bold ${ptFontSize}px 'Courier New',monospace`;
        ctx.textAlign="left";ctx.textBaseline="bottom";
        ctx.fillText(`${p.Point}`,lx,ly);
        if(p.Description&&viewScale>0.6){
          ctx.fillStyle=lightMode?"#000000":lightMode?"#000000":"#9ab0c8";
          ctx.font=`${descFontSize}px 'Courier New',monospace`;
          ctx.fillText(p.Description,lx,ly+descFontSize+1);
        }
      }
      ctx.shadowBlur=0;
    }
  });
  // Temp geometry (circles, rays) for COGO previews
  tempGeom.forEach(g=>{
    ctx.save();
    if(g.type==="circle"){
      const scx=X(g.E),scy=Y(g.N),sR=g.R*scale;
      ctx.strokeStyle=g.color||"rgba(255,255,255,.35)";
      ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
      ctx.beginPath();ctx.arc(scx,scy,sR,0,2*Math.PI);ctx.stroke();
      ctx.setLineDash([]);
    } else if(g.type==="ray"){
      // Draw a long ray from point in given bearing
      const r=g.az*Math.PI/180;
      const len=Math.max(w,h)*2/scale; // long enough to cross screen
      const ex=g.E+len*Math.sin(r), en=g.N+len*Math.cos(r);
      ctx.strokeStyle=g.color||"rgba(255,255,255,.35)";
      ctx.lineWidth=1.5;ctx.setLineDash([8,5]);
      ctx.beginPath();ctx.moveTo(X(g.E),Y(g.N));ctx.lineTo(X(ex),Y(en));ctx.stroke();
      ctx.setLineDash([]);
    } else if(g.type==="segment"){
      ctx.strokeStyle=g.color||"rgba(255,255,255,.35)";
      ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
      ctx.beginPath();ctx.moveTo(X(g.E1),Y(g.N1));ctx.lineTo(X(g.E2),Y(g.N2));ctx.stroke();
      ctx.setLineDash([]);
    } else if(g.type==="bndline"){
      // Area-selection boundary preview — SOLID line (not dashed)
      ctx.strokeStyle=g.color||"rgba(240,160,32,.85)";
      ctx.lineWidth=3;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(X(g.E1),Y(g.N1));ctx.lineTo(X(g.E2),Y(g.N2));ctx.stroke();
    } else if(g.type==="bndarc"){
      // Area-selection boundary preview — the actual sub-arc the math uses.
      // Same canvas convention as drawn arcs: negate angles (Y flip),
      // anticlockwise when the math sweep dt is positive.
      ctx.strokeStyle=g.color||"rgba(240,160,32,.85)";
      ctx.lineWidth=3;ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(X(g.cx),Y(g.cy),g.R*scale,-g.tA,-g.tB,g.dt>0);
      ctx.stroke();
    } else if(g.type==="anglearc"){
      // Draw angle arc at vertex in world coords
      // Survey az → canvas angle: ca = (az - 90) * PI/180
      // Canvas 0° = East, increases CW (Y flipped)
      // Survey 0° = North → canvas -90° ✓
      const vx=X(g.vE),vy=Y(g.vN);
      const r=g.r||30;
      const ca1=(g.az1-90)*Math.PI/180;
      const ca2=(g.az2-90)*Math.PI/180;
      ctx.beginPath();
      ctx.arc(vx,vy,r,ca1,ca2,g.ccw||false);
      ctx.strokeStyle=g.color||"rgba(255,255,255,.5)";
      ctx.lineWidth=2.5;ctx.setLineDash([]);
      ctx.stroke();
      // Label at midpoint of arc
      if(g.label){
        let midCa;
        if(g.ccw){
          // CCW: go backwards from ca1 to ca2
          let span=ca1-ca2; if(span<0)span+=2*Math.PI;
          midCa=ca1-span/2;
        } else {
          // CW: go forwards from ca1 to ca2
          let span=ca2-ca1; if(span<0)span+=2*Math.PI;
          midCa=ca1+span/2;
        }
        const lx=vx+Math.cos(midCa)*(r+16);
        const ly=vy+Math.sin(midCa)*(r+16);
        const fs=Math.max(10,Math.min(14,10+viewScale));
        ctx.font="bold "+fs+"px 'Share Tech Mono',monospace";
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.strokeStyle="rgba(0,0,0,.85)";ctx.lineWidth=3;
        ctx.strokeText(g.label,lx,ly);
        ctx.fillStyle=g.labelColor||g.color||"#fff";
        ctx.fillText(g.label,lx,ly);
      }
    } else if(g.type==="anglelabel"){
      // Standalone text label at a world position
      const lx=X(g.E),ly=Y(g.N);
      const fs=Math.max(10,Math.min(14,10+viewScale));
      ctx.font="bold "+fs+"px 'Share Tech Mono',monospace";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.strokeStyle="rgba(0,0,0,.85)";ctx.lineWidth=3;
      ctx.strokeText(g.label,lx,ly);
      ctx.fillStyle=g.color||"#fff";
      ctx.fillText(g.label,lx,ly);
    } else if(g.type==="pickHighlight"){
      // Highlight ring around a tapped point
      const colors=["rgba(74,158,255,.9)","rgba(62,207,116,.9)","rgba(240,160,32,.9)","rgba(200,80,200,.9)"];
      const col=colors[g.idx%colors.length];
      const px=X(g.E),py=Y(g.N);
      ctx.beginPath();
      ctx.arc(px,py,12,0,Math.PI*2);
      ctx.strokeStyle=col;ctx.lineWidth=2.5;
      ctx.setLineDash([]);ctx.stroke();
      // Number label
      ctx.font="bold 10px 'Share Tech Mono',monospace";
      ctx.fillStyle=col;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(String(g.idx+1),px,py-18);
    } else if(g.type==="pickLine"){
      // Dashed line between two picked points
      ctx.beginPath();
      ctx.moveTo(X(g.E1),Y(g.N1));
      ctx.lineTo(X(g.E2),Y(g.N2));
      ctx.strokeStyle=g.color||"rgba(255,255,255,.5)";
      ctx.lineWidth=1.5;
      ctx.setLineDash([6,4]);ctx.stroke();
      ctx.setLineDash([]);
    } else if(g.type==="extline"){
      // Extended line through two world points — extends to canvas edges
      const sx1=X(g.E1),sy1=Y(g.N1),sx2=X(g.E2),sy2=Y(g.N2);
      const dx=sx2-sx1,dy=sy2-sy1;
      // Find t values where line hits canvas edges
      const tVals=[];
      if(Math.abs(dx)>0.001){tVals.push(-sx1/dx);tVals.push((w-sx1)/dx);}
      if(Math.abs(dy)>0.001){tVals.push(-sy1/dy);tVals.push((h-sy1)/dy);}
      if(tVals.length<2) return;
      const tMin=Math.min(...tVals),tMax=Math.max(...tVals);
      ctx.beginPath();
      ctx.moveTo(sx1+tMin*dx,sy1+tMin*dy);
      ctx.lineTo(sx1+tMax*dx,sy1+tMax*dy);
      ctx.strokeStyle=g.color||"rgba(255,255,255,.5)";
      ctx.lineWidth=g.lineWidth||1.5;
      ctx.setLineDash(g.dash||[6,4]);ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
  });

  // ── Polyline overlays (saved faint, draft bright) ─────────────────────────
  const _plRing=(E,N,n,col)=>{
    const px=X(E),py=Y(N);
    ctx.beginPath(); ctx.arc(px,py,11,0,2*Math.PI);
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.setLineDash([]); ctx.stroke();
    ctx.font="bold 11px 'Share Tech Mono',monospace"; ctx.fillStyle=col;
    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(String(n),px,py-17);
  };
  const _drawPolyline=(pl,col,lw,rings)=>{
    if(!pl||!pl.verts||pl.verts.length===0)return;
    ctx.save();
    ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.setLineDash([]); ctx.lineCap="round"; ctx.lineJoin="round";
    const brgToRad=b=>(90-b)*Math.PI/180;
    for(let i=0;i<pl.segs.length;i++){
      const A=pl.verts[i], B=pl.verts[i+1]; if(!A||!B)continue;
      const s=pl.segs[i];
      if(s.type==="arc"){
        const sB=_plBearing(s.centerE,s.centerN,A.E,A.N);
        const eB=_plBearing(s.centerE,s.centerN,B.E,B.N);
        ctx.beginPath();
        ctx.arc(X(s.centerE),Y(s.centerN),s.R*scale,-brgToRad(sB),-brgToRad(eB),(s.dir==="ccw"));
        ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(X(A.E),Y(A.N)); ctx.lineTo(X(B.E),Y(B.N)); ctx.stroke();
      }
    }
    if(rings) pl.verts.forEach((v,i)=>_plRing(v.E,v.N,i+1,col));
    ctx.restore();
  };
  if(typeof _polylines!=="undefined") _polylines.forEach((pl,i)=>{
    const sel=(typeof _selPolyline!=="undefined" && _selPolyline===i);
    _drawPolyline(pl, sel?"rgba(255,210,80,.95)":"rgba(167,139,250,.6)", sel?4:2.5, sel);
  });
  if(typeof _plDraft!=="undefined" && _plDraft) _drawPolyline(_plDraft,"rgba(80,210,255,.97)",3.5,true);

  tempIntersections.forEach((pt,i)=>{
    const cx=X(pt.Easting),cy=Y(pt.Northing);
    ctx.fillStyle="#e05252";ctx.beginPath();ctx.arc(cx,cy,7,0,2*Math.PI);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 10px monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(i+1,cx,cy);
  });

  // Area selection rings — drawn every frame so they survive pan/zoom
  if(_areaPoly && _areaPoly.length>0){
    _areaPoly.forEach((pt,i)=>{
      const sx=X(pt.Easting), sy=Y(pt.Northing);
      // Ring
      ctx.beginPath(); ctx.arc(sx,sy,14,0,2*Math.PI);
      ctx.strokeStyle="rgba(240,160,32,.9)"; ctx.lineWidth=2.5; ctx.stroke();
      // Order number
      ctx.fillStyle=lightMode?"#000000":"#f0a020";
      ctx.font="bold 12px 'Share Tech Mono',monospace";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(String(i+1),sx,sy);
    });
  }

  // Area labels at each polygon centroid
  _areaLabels.forEach(AL=>{
    // Store screen coords for tap detection
    AL._sx = X(AL.E);
    AL._sy = Y(AL.N);
    const ax=AL._sx, ay=AL._sy;
    // Only draw if centroid is on screen
    if(ax>0&&ax<w&&ay>0&&ay<h){
      const fontSize=Math.max(11,Math.min(20,12+viewScale*1.5));
      ctx.save();
      ctx.font=`bold ${fontSize}px 'Rajdhani','Arial Narrow',sans-serif`;
      const tw=ctx.measureText(AL.label).width;
      const pad=6, bh=fontSize+8;
      // Background pill
      ctx.fillStyle=lightMode?"rgba(255,255,255,.92)":"rgba(10,9,5,.82)";
      ctx.beginPath();
      // Safari-safe rounded rect
      const rx=ax-tw/2-pad, ry=ay-bh/2, rw=tw+pad*2, rh=bh, rr=4;
      ctx.moveTo(rx+rr,ry);ctx.lineTo(rx+rw-rr,ry);ctx.arcTo(rx+rw,ry,rx+rw,ry+rr,rr);
      ctx.lineTo(rx+rw,ry+rh-rr);ctx.arcTo(rx+rw,ry+rh,rx+rw-rr,ry+rh,rr);
      ctx.lineTo(rx+rr,ry+rh);ctx.arcTo(rx,ry+rh,rx,ry+rh-rr,rr);
      ctx.lineTo(rx,ry+rr);ctx.arcTo(rx,ry,rx+rr,ry,rr);ctx.closePath();
      ctx.fill();
      // Border
      ctx.strokeStyle="rgba(240,160,32,.5)";
      ctx.lineWidth=1;
      ctx.stroke();
      // Text
      ctx.fillStyle="#f0a020";
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText(AL.label, ax, ay);
      ctx.restore();
    }
  });
  if(currentPoint){
    const cp=valid.find(p=>p.Point===currentPoint.Point);
    if(cp){ctx.strokeStyle="#4a9eff";ctx.lineWidth=2;ctx.setLineDash([5,3]);
      ctx.beginPath();ctx.arc(X(cp.Easting),Y(cp.Northing),dotR+7,0,2*Math.PI);ctx.stroke();ctx.setLineDash([])}
  }
  // Selected point — white glow ring
  if(selectedPoint){
    const sp=valid.find(p=>p.Point===selectedPoint.Point);
    if(sp){
      ctx.strokeStyle=lightMode?"#000000":"#ffffff";ctx.lineWidth=2.5;ctx.setLineDash([]);
      ctx.shadowColor=lightMode?"#000000":"#ffffff";ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(X(sp.Easting),Y(sp.Northing),dotR+10,0,2*Math.PI);ctx.stroke();
      ctx.shadowBlur=0;
    }
  }
  try{
    if(_deedPlot&&_deedPlot.computed){
      const g=_deedPlot.computed;
      ctx.save();
      ctx.strokeStyle="#25c8d8";ctx.lineWidth=2;ctx.setLineDash([10,6]);
      // Straight courses — skip any segment that an arc spans (no chord under curves)
      const arcSeg=(v1,v2)=>g.arcs.some(a=>
        Math.abs(a.sE-v1.E)<0.01&&Math.abs(a.sN-v1.N)<0.01&&
        Math.abs(a.eE-v2.E)<0.01&&Math.abs(a.eN-v2.N)<0.01);
      ctx.beginPath();
      g.verts.forEach((v,i)=>{
        const sx=X(v.E),sy=Y(v.N);
        if(i===0){ctx.moveTo(sx,sy);return;}
        arcSeg(g.verts[i-1],v)?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
      });
      ctx.stroke();
      g.arcs.forEach(a=>{
        ctx.beginPath();
        // Canvas Y is flipped vs world, so a world-CW (curve RIGHT) sweep is
        // canvas-clockwise: anticlockwise = ccw, not !ccw.
        ctx.arc(X(a.cE),Y(a.cN),a.r*scale,-a.a1,-a.a2,a.ccw);
        ctx.stroke();
      });
      ctx.setLineDash([]);
      ctx.font="bold 10px 'Courier New',monospace";ctx.textAlign="left";
      ctx.fillStyle="#25c8d8";
      g.verts.forEach((v,i)=>{
        const vx=X(v.E),vy=Y(v.N);
        if(i===0){ctx.fillRect(vx-5,vy-5,10,10);ctx.fillText("POB·0",vx+8,vy-8);}
        else{ctx.beginPath();ctx.arc(vx,vy,3,0,2*Math.PI);ctx.fill();ctx.fillText(String(i),vx+7,vy-6);}
      });
      ctx.restore();
    }
  }catch(e){}
  if(window._deedPobCalls&&!extCtx){
    ctx.save();
    ctx.font="bold 12px 'Courier New',monospace";ctx.textAlign="center";ctx.textBaseline="top";
    const txt="✛ "+_pressWord()+" the Point of Beginning";
    const tw=ctx.measureText(txt).width;
    ctx.fillStyle="rgba(10,90,100,.85)";ctx.fillRect(w/2-tw/2-12,34,tw+24,22);
    ctx.fillStyle="#bff3fa";ctx.fillText(txt,w/2,39);
    ctx.restore();
  }
  try{ _drawLiveGps(ctx,w,h,T); }catch(e){}
  if(_relocateTarget!=null&&!extCtx){
    ctx.save();
    ctx.font="bold 12px 'Courier New',monospace";ctx.textAlign="center";ctx.textBaseline="top";
    const bY=_gpsStakeTarget?108:34;
    const txt="✛ "+_pressWord()+" the exact spot for Pt "+_relocateTarget;
    const tw=ctx.measureText(txt).width;
    ctx.fillStyle="rgba(120,80,10,.85)";ctx.fillRect(w/2-tw/2-12,bY,tw+24,22);
    ctx.fillStyle="#ffe4a8";ctx.fillText(txt,w/2,bY+5);
    ctx.restore();
  }
}

/* ── PLOT CONTROLS ── */
function zoomBy(f){viewScale=Math.max(.000002,Math.min(100,viewScale*f));plotPoints()}
function panBy(px,py){viewOffsetX+=px;viewOffsetY+=py;plotPoints()}
function resetPlot(){_resetViewState();viewScale=1;viewOffsetX=0;viewOffsetY=0;plotPoints()}
function _applyLightMode(){
  if(lightMode) document.documentElement.classList.add("light-mode");
  else document.documentElement.classList.remove("light-mode");
  // Update canvas background
  const canvas=document.getElementById("plotCanvas");
  if(canvas) plotPoints();
}

function toggleLightMode(){
  lightMode=!lightMode;
  _applyLightMode();
  const b=document.getElementById("btnLightMode");
  if(b) b.textContent=lightMode?"Dark":"Light";
  saveData();
}

function toggleLabels(){
  showLabels=!showLabels;
  const b=document.getElementById("btnLabels");
  if(b)b.style.color=showLabels?"var(--ok)":"var(--danger)";
  saveData(); plotPoints();
}
function toggleElevations(){
  showElevations=!showElevations;
  const b=document.getElementById("btnElev");
  if(b)b.style.color=showElevations?"var(--ok)":"var(--muted)";
  plotPoints();
}
// Zoom canvas to frame a bounding box defined by world coords with padding
function zoomToWorldBounds(minE,maxE,minN,maxN,padFraction){
  const c=document.getElementById("plotCanvas");if(!c)return;
  const w=c.clientWidth,h=c.clientHeight;
  padFraction=padFraction||0.25;
  const rngE=maxE-minE||1, rngN=maxN-minN||1;
  // Add padding
  const pe=rngE*padFraction, pn=rngN*padFraction;
  const fitE=rngE+pe*2, fitN=rngN+pn*2;
  // Compute the base scale (at viewScale=1)
  const baseScale=(Math.min(w,h)-44*2)/Math.max(...points.filter(p=>!isNaN(p.Easting))
    .reduce(([es,ns],p)=>[[...es,p.Easting],[...ns,p.Northing]],[[],[]])
    .map(arr=>Math.max(...arr)-Math.min(...arr)),1);
  // Target scale to fit the bounding box
  const targetScale=Math.min(w,h)/(Math.max(fitE,fitN));
  viewScale=targetScale/baseScale;
  viewOffsetX=0;viewOffsetY=0;
  // After setting viewScale, center the bounding box
  const T=_viewTransform(w,h);if(!T)return;
  const X=e=>e*T.scale+T.offX;
  const Y=n=>h-(n*T.scale+T.offY);
  const screenCx=(X(minE-pe)+X(maxE+pe))/2;
  const screenCy=(Y(minN-pn)+Y(maxN+pn))/2;
  viewOffsetX+=w/2-screenCx;
  viewOffsetY-=h/2-screenCy;
  plotPoints();
}

// Zoom to frame a set of world points/coords
function zoomToPoints(coords){
  // coords: [{E,N}]
  if(!coords||!coords.length)return;
  const es=coords.map(c=>c.E), ns=coords.map(c=>c.N);
  zoomToWorldBounds(Math.min(...es),Math.max(...es),Math.min(...ns),Math.max(...ns),0.3);
}

function zoomToOccupied(){
  if(!currentPoint)return;
  const c=document.getElementById("plotCanvas");if(!c)return;
  const w=c.clientWidth,h=c.clientHeight;
  viewScale=5;viewOffsetX=0;viewOffsetY=0;
  const T=_viewTransform(w,h);if(!T)return;
  const cx=currentPoint.Easting*T.scale+T.offX;
  const cy=h-(currentPoint.Northing*T.scale+T.offY);
  viewOffsetX+=w/2-cx;viewOffsetY+=-(h/2-cy);plotPoints();
}

/* ── TOUCH / WHEEL ── */
(function(){
  const canvas=document.getElementById("plotCanvas");
  let lastTouches,lastX,lastY;

  // Zoom toward a specific canvas pixel point (cx,cy).
  // viewOffsetX/Y are screen-pixel offsets added after the base transform.
  // To keep the world point under (cx,cy) fixed on screen:
  //   new_offset = cx + (old_offset - cx) * factor
  // This is the only correct adjustment needed.
  function zoomAround(factor, cx, cy){
    // Track the world point currently under (cx,cy).
    // After changing viewScale, compute where that world point lands,
    // then shift viewOffset to bring it back to (cx,cy).
    // This is always correct regardless of padding, Y-flip, or centering.
    const c = document.getElementById("plotCanvas");
    const w = c.clientWidth, h = c.clientHeight;

    // Snapshot transform BEFORE scale change
    const T = _viewTransform(w, h);
    if(!T) return;

    const newScale = Math.max(.000002, Math.min(100, viewScale * factor));
    if(newScale === viewScale) return;

    // World coords of the finger/pointer position under current transform
    const worldE = (cx - T.offX) / T.scale;
    const worldN = (h - cy - T.offY) / T.scale;

    // Apply new scale
    viewScale = newScale;

    // Compute transform AFTER scale change (viewOffsetX/Y unchanged so far)
    const T2 = _viewTransform(w, h);
    if(!T2) return;

    // Where does (worldE, worldN) land now?
    const newSx = worldE * T2.scale + T2.offX;
    const newSy = h - (worldN * T2.scale + T2.offY);

    // Shift viewOffset to pull it back to (cx, cy)
    viewOffsetX += cx - newSx;
    viewOffsetY -= cy - newSy;   // minus because viewOffsetY is in flipped space

    plotPoints();
  }

  // Long press handler — add a manual point at the tapped world location
  function _longPressAddPoint(worldE, worldN){
    // On Android a touch long-press fires BOTH our touch timer AND a
    // synthesized contextmenu event — debounce so only one modal opens.
    if(Date.now()-(window._lpLast||0)<1200) return;
    window._lpLast=Date.now();
    // Deed POB pick mode
    if(window._deedPobCalls){
      const calls=window._deedPobCalls; window._deedPobCalls=null;
      if(navigator.vibrate)navigator.vibrate(40);
      _deedSet(calls,worldE,worldN);
      return;
    }
    // Relocate mode: move the target point here instead of adding one
    if(_relocateTarget!=null){
      const pt=points.find(p=>p.Point===_relocateTarget);
      _relocateTarget=null;
      if(pt){
        _takeSnapshot("Reposition Pt #"+pt.Point);
        pt.Easting=worldE; pt.Northing=worldN;
        if(navigator.vibrate)navigator.vibrate(40);
        // Fresh fine-tune start: re-fetch ground elevation AT THE PICKED SPOT
        // (the first fetch was at the GPS fix, which can sit on different
        // ground — matters on slopes)
        if(window._deferredJobSetup&&geoAnchor){
          const ll=_jobToLL(worldE,worldN);
          if(ll)_fetchGroundElev(ll.lat,ll.lon,(ge)=>{
            if(ge!=null){pt.Elevation=parseFloat(ge.toFixed(1));saveData();updateStatus();}
          });
        }
        saveData();updateStatus();
        if(window._deferredJobSetup){
          const f=window._deferredJobSetup;window._deferredJobSetup=null;f();
        }else{
          showResult("✓ Point #"+pt.Point+" repositioned",[
            {lbl:"N:",val:worldN.toFixed(3)},{lbl:"E:",val:worldE.toFixed(3)},
            {lbl:"Basis:",val:"placed on imagery by eye"}]);
        }
      }
      return;
    }
    // Show a quick form to confirm/edit the point
    openModal((modal,close)=>{
      const ptNum = pointCounter;
      let desc = "";
      let N = worldN, E = worldE, Z = (currentPoint?currentPoint.Elevation:100)||100;
      modal.innerHTML=`
        <h2 style="font-size:.85em;margin-bottom:6px">📍 Add Point Here</h2>
        <div class="result-box" style="margin-bottom:8px">
          <span class="lbl">N:</span>&nbsp;<span class="val">${N.toFixed(4)}</span>
          &nbsp;&nbsp;<span class="lbl">E:</span>&nbsp;<span class="val">${E.toFixed(4)}</span>
        </div>`;
      const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className=`btn ${cls}`;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
      mk(`✓ Save as Point #${ptNum}`,"ok",()=>{
        close();
        alphaInput("Description:","",d=>{
          const p={Point:ptNum,Northing:N,Easting:E,Elevation:Z,
                   Type:"Manual",Flag:"",ih:0,Description:d||""};
          _takeSnapshot("Manual Pt #"+ptNum);
          points.push(p); pointCounter=Math.max(pointCounter,ptNum+1);
          saveData(); updateStatus(); plotPoints();
          showResult(`✓ Point #${ptNum} Added`,[
            {lbl:"N:",val:N.toFixed(4)},{lbl:"E:",val:E.toFixed(4)},
            {lbl:"Desc:",val:d||"—"},
          ]);
        });
      });
      mk("Cancel","",close);
    });
  }

  // Prevent double-tap zoom on iPad — critical
  canvas.addEventListener("dblclick",e=>e.preventDefault(),{passive:false});
  canvas.style.touchAction="none"; // override any inherited touch-action

  canvas.addEventListener("wheel",e=>{
    e.preventDefault();
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX-rect.left;
    const cy=e.clientY-rect.top;
    zoomAround(e.deltaY<0?1.25:1/1.25, cx, cy);
  },{passive:false});

  // ── MOUSE SUPPORT (desktop) ──────────────────────────────────
  // Left-drag pans the plot; a real click (no drag) falls through to
  // the click handler below. Right-click on empty space adds a point,
  // mirroring the touch long-press.
  let _mDown=false, _mDragged=false, _mLastX=0, _mLastY=0;
  canvas.addEventListener("mousedown",e=>{
    if(e.button!==0)return;
    _mDown=true; _mDragged=false;
    _mLastX=e.clientX; _mLastY=e.clientY;
  });
  canvas.addEventListener("mousemove",e=>{
    if(!_mDown)return;
    const dx=e.clientX-_mLastX, dy=e.clientY-_mLastY;
    if(!_mDragged && Math.hypot(e.clientX-_mLastX,e.clientY-_mLastY)<4)return;
    _mDragged=true;
    viewOffsetX+=dx;
    viewOffsetY-=dy;
    _mLastX=e.clientX; _mLastY=e.clientY;
    plotPoints();
  });
  const _mEnd=()=>{_mDown=false;};
  canvas.addEventListener("mouseup",_mEnd);
  canvas.addEventListener("mouseleave",_mEnd);
  canvas.addEventListener("contextmenu",e=>{
    e.preventDefault();
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const c2=document.getElementById("plotCanvas");
    const w=c2.clientWidth, h=c2.clientHeight;
    const T=_viewTransform(w,h); if(!T)return;
    const worldE=(mx-T.offX)/T.scale;
    const worldN=(h-my-T.offY)/T.scale;
    // Same guards as the touch long-press: empty space only
    const PT_THRESH=28;
    const X=ep=>ep*T.scale+T.offX;
    const Y=n=>h-(n*T.scale+T.offY);
    const hitPt=points.find(p=>Math.hypot(X(p.Easting)-mx,Y(p.Northing)-my)<PT_THRESH);
    if((!hitPt||_relocateTarget!=null||window._deedPobCalls) && !_areaMode && !window._connClickActive){
      _longPressAddPoint(worldE, worldN);
    }
  });

  let isPinching = false;

  // Long press state
  let _lpTimer=null, _lpStartX=0, _lpStartY=0;

  canvas.addEventListener("touchstart",e=>{
    if(e.touches.length===2){
      isPinching = true;
      lastTouches=[...e.touches];
      clearTimeout(_lpTimer); _lpTimer=null;
    } else if(e.touches.length===1){
      isPinching = false;
      lastX=e.touches[0].clientX;
      lastY=e.touches[0].clientY;
      _lpStartX=e.touches[0].clientX;
      _lpStartY=e.touches[0].clientY;
      // Start long press timer
      clearTimeout(_lpTimer);
      _lpTimer=setTimeout(()=>{
        _lpTimer=null;
        // Convert touch position to world coords
        const rect=canvas.getBoundingClientRect();
        const mx=_lpStartX-rect.left, my=_lpStartY-rect.top;
        const c2=document.getElementById("plotCanvas");
        const w=c2.clientWidth, h=c2.clientHeight;
        const T=_viewTransform(w,h); if(!T)return;
        const worldE=(mx-T.offX)/T.scale;
        const worldN=(h-my-T.offY)/T.scale;
        // Only trigger on empty space (not on a point)
        const PT_THRESH=28;
        const X=ep=>ep*T.scale+T.offX;
        const Y=n=>h-(n*T.scale+T.offY);
        const hitPt=points.find(p=>Math.hypot(X(p.Easting)-mx,Y(p.Northing)-my)<PT_THRESH);
        if((!hitPt||_relocateTarget!=null||window._deedPobCalls) && !_areaMode && !window._connClickActive){
          if(navigator.vibrate) navigator.vibrate(40);
          _longPressAddPoint(worldE, worldN);
        }
      }, 600);
    }
  },{passive:true});

  canvas.addEventListener("touchend",e=>{
    clearTimeout(_lpTimer); _lpTimer=null;
    if(isPinching && e.touches.length===1){
      lastX=e.touches[0].clientX;
      lastY=e.touches[0].clientY;
    }
    if(e.touches.length<2){
      isPinching = false;
      lastTouches = null;
    }
  },{passive:true});

  canvas.addEventListener("touchmove",e=>{
    e.preventDefault();
    if(e.touches.length===2){
      isPinching = true;
      if(lastTouches){
        const d0=Math.hypot(
          lastTouches[0].clientX-lastTouches[1].clientX,
          lastTouches[0].clientY-lastTouches[1].clientY);
        const d1=Math.hypot(
          e.touches[0].clientX-e.touches[1].clientX,
          e.touches[0].clientY-e.touches[1].clientY);
        if(d0>0){
          const rect=canvas.getBoundingClientRect();
          const mx=((e.touches[0].clientX+e.touches[1].clientX)/2)-rect.left;
          const my=((e.touches[0].clientY+e.touches[1].clientY)/2)-rect.top;
          zoomAround(d1/d0, mx, my);
          lastTouches=[...e.touches];
        }
      }
    } else if(e.touches.length===1 && !isPinching){
      // Cancel long press if finger moves more than 10px
      if(_lpTimer){
        const dx=e.touches[0].clientX-_lpStartX, dy=e.touches[0].clientY-_lpStartY;
        if(Math.hypot(dx,dy)>10){ clearTimeout(_lpTimer); _lpTimer=null; }
      }
      viewOffsetX+=e.touches[0].clientX-lastX;
      viewOffsetY-=e.touches[0].clientY-lastY;
      lastX=e.touches[0].clientX;
      lastY=e.touches[0].clientY;
      plotPoints();
    }
  },{passive:false});
  canvas.addEventListener("click",e=>{
    // A drag-pan ends with a click event — swallow it so panning
    // never selects, deselects, or closes a modal.
    if(_mDragged){_mDragged=false;return;}
    const c=document.getElementById("plotCanvas");
    const w=c.clientWidth,h=c.clientHeight;
    const T=_viewTransform(w,h);if(!T)return;
    const rect=c.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    // Stop GPS navigation via the ✕ on the panel
    const sb=window._stakeStopBtn;
    if(sb&&Math.hypot(mx-sb.x,my-sb.y)<=sb.r){
      _gpsStakeTarget=null;window._stakeStopBtn=null;plotPoints();return;
    }
    const X=ep=>ep*T.scale+T.offX;
    const Y=n=>h-(n*T.scale+T.offY);
    const PT_THRESH=28, LINE_THRESH=18; // wider for easier tapping

    // Helper: point-to-segment distance in screen pixels
    function ptSegDist(px,py,ax,ay,bx,by){
      const dx=bx-ax,dy=by-ay;
      if(dx===0&&dy===0) return Math.hypot(px-ax,py-ay);
      const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));
      return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
    }
    // Helper: point-to-arc distance in screen pixels.
    // Returns distance to the circle edge if within threshold.
    // We skip angular range checking — draw-only arcs are the only
    // type:"arc" connections, so there's no false-positive risk.
    const ARC_THRESH = 20;
    function ptArcDist(px,py,conn){
      const scx=X(conn.centerE), scy=Y(conn.centerN);
      const sR=conn.R*T.scale;
      const distToEdge=Math.abs(Math.hypot(px-scx,py-scy)-sR);
      return distToEdge<=ARC_THRESH ? distToEdge : Infinity;
    }

    // Find best connection hit (line or arc)
    let hitConnIdx=-1, bestDist=LINE_THRESH;
    plotConnections.forEach((conn,i)=>{
      let d;
      if(conn.type==="arc"){
        d=ptArcDist(mx,my,conn);
      } else {
        const from=points.find(p=>p.Point==conn.from);
        const to  =points.find(p=>p.Point==conn.to);
        if(!from||!to) return;
        d=ptSegDist(mx,my,X(from.Easting),Y(from.Northing),X(to.Easting),Y(to.Northing));
      }
      if(d<bestDist){bestDist=d;hitConnIdx=i;}
    });

    // ── INTERSECT MODE: waiting for second geometry ──────────────
    if(intersectMode){
      if(hitConnIdx>=0){
        const second=plotConnections[hitConnIdx];
        if(second===intersectFirst.conn){
          // Tapped the same geometry — cancel
          _clearIntersectMode();
        } else {
          // Got second geometry — compute intersection
          const first=intersectFirst.conn; // save before clearing
          _clearIntersectMode();
          _tapIntersect(first, second);
        }
      } else {
        // Tapped empty space — cancel
        _clearIntersectMode();
      }
      return; // never fall through to normal mode
    }

    // ── STAKE-TO-LINE PICK MODE: waiting for a line/arc tap ──────
    if(window._stlPickActive){
      const bn=document.getElementById("intersectBanner");
      bn.classList.remove("visible");
      bn.textContent="\u2295 TAP SECOND LINE OR ARC — or tap empty space to cancel";
      window._stlPickActive=false;
      if(hitConnIdx>=0){
        _stlSelectGeom(plotConnections[hitConnIdx]);
      } else {
        // Tapped empty space — cancel
        window._stlActive=false; tempGeom=[]; tempIntersections=[]; plotPoints();
      }
      return;
    }

    // ── CONNECT-BY-TAP MODE ──────────────────────────────────────
    if(window._connClickActive && window._connClickHandler){
      const hitPt=points.find(p=>Math.hypot(X(p.Easting)-mx,Y(p.Northing)-my)<PT_THRESH);
      if(hitPt){ window._connClickHandler(hitPt); return; }
      // Tap empty space — cancel
      _connCancel(); return;
    }

    // ── AREA SELECTION MODE ──────────────────────────────────────
    if(window._areaClickActive && window._areaClickHandler){
      const hitPt=points.find(p=>Math.hypot(X(p.Easting)-mx,Y(p.Northing)-my)<PT_THRESH);
      if(hitPt){
        window._areaClickHandler(hitPt);
        return; // don't open point context menu
      }
      // No point hit — a tapped line or arc contributes its endpoints
      if(hitConnIdx>=0){
        _areaTapConn(plotConnections[hitConnIdx]);
        return;
      }
      // Tap empty space — cancel area selection
      window._areaClickActive=false; window._areaClickHandler=null;
      document.getElementById("intersectBanner").classList.remove("visible");
      document.getElementById("intersectBanner").textContent=
        "⊕ TAP SECOND LINE OR ARC — or tap empty space to cancel";
      tempGeom=[]; plotPoints();
      return;
    }

    // ── POLYLINE BUILD MODE ────────────────────
    if(window._plBuilding && window._plTap){
      // Points first: tapping a point adds it as a straight-line vertex.
      const hp=points.find(p=>Math.hypot(X(p.Easting)-mx,Y(p.Northing)-my)<PT_THRESH);
      if(hp){ window._plTap({kind:"point",pt:hp}); return; }
      // Among connections prefer an ARC over a coincident LINE — capturing
      // curves is the goal here, and a line is redundant with tapping points.
      let _aIdx=-1,_aBest=ARC_THRESH,_lIdx=-1,_lBest=LINE_THRESH;
      plotConnections.forEach((c,i)=>{
        if(c.type==="arc"){ const d=ptArcDist(mx,my,c); if(d<_aBest){_aBest=d;_aIdx=i;} }
        else {
          const f=points.find(p=>p.Point==c.from), t=points.find(p=>p.Point==c.to);
          if(!f||!t)return;
          const d=ptSegDist(mx,my,X(f.Easting),Y(f.Northing),X(t.Easting),Y(t.Northing));
          if(d<_lBest){_lBest=d;_lIdx=i;}
        }
      });
      const _ci=_aIdx>=0?_aIdx:_lIdx;
      if(_ci>=0){ window._plTap({kind:"conn",conn:plotConnections[_ci]}); return; }
      return; // empty space while building — ignore
    }

    // ── NORMAL MODE ───────────────────────────────────────────────
    // 1. Points first (skip in intersect mode — already returned above)
    // Find closest point and all points within disambiguation range
    const nearPts=points.filter(p=>Math.hypot(X(p.Easting)-mx,Y(p.Northing)-my)<PT_THRESH*1.5);
    const hitPt=points.find(p=>Math.hypot(X(p.Easting)-mx,Y(p.Northing)-my)<PT_THRESH);
    if(hitPt){
      // If another point is also very close, ask user to confirm
      const ambiguous=nearPts.filter(p=>p.Point!==hitPt.Point && Math.hypot(X(p.Easting)-mx,Y(p.Northing)-my)<PT_THRESH);
      if(ambiguous.length>0){
        openModal((modal,close)=>{
          modal.innerHTML="<h2>Select Point</h2><p class='info'>Multiple nearby points — which did you mean?</p>";
          const mk2=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
          [hitPt,...ambiguous].forEach(p=>{
            mk2("#"+p.Point+(p.Description?" — "+p.Description:""),"",()=>{
              close();
              selectedPoint=(selectedPoint&&selectedPoint.Point===p.Point)?null:p;
              selectedConn=null; plotPoints();
              if(selectedPoint) _pointContextMenu(p);
            });
          });
          mk2("Cancel","",close);
        });
        return;
      }
      selectedPoint=(selectedPoint&&selectedPoint.Point===hitPt.Point)?null:hitPt;
      selectedConn=null;
      plotPoints();
      if(selectedPoint) _pointContextMenu(hitPt);
      return;
    }

    // 2. Lines and arcs
    if(hitConnIdx>=0){
      selectedConn=(selectedConn===hitConnIdx)?-1:hitConnIdx;
      selectedPoint=null;
      plotPoints();
      if(selectedConn>=0){
        const conn=plotConnections[hitConnIdx];
        if(conn.type==="arc") _arcContextMenu(conn,hitConnIdx);
        else                  _lineContextMenu(conn,hitConnIdx);
      }
      return;
    }

    // Check if tap hits an area label — show delete option for that one
    {
      const hitAL=_areaLabels.find(AL=>AL._sx!==undefined &&
        Math.hypot(screenX-AL._sx, screenY-AL._sy)<40);
      if(hitAL){
        openModal((modal,close)=>{
          modal.innerHTML="<h2>Area Label</h2><p class='info'>"+hitAL.label+"</p>";
          const mk=(t,cls,fn)=>{const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;b.onclick=fn;modal.appendChild(b)};
          mk("Delete Label","danger",()=>{_areaLabels=_areaLabels.filter(x=>x!==hitAL);saveData();close();});
          mk("Keep","",close);
        });
        return;
      }
    }

    // 3. Empty space — close topmost modal; always wipe temp geometry
    if(_modalStack.length>0){
      const top=_modalStack[_modalStack.length-1];
      top.remove();
      _modalStack=_modalStack.filter(x=>x!==top);
      if(_modalStack.length===0){
        if(window._stlActive){ window._stlActive=false; }
        tempGeom=[];tempIntersections=[];plotPoints();
      }
      return;
    }
    // No modal open — clear stl / lingering temp geometry
    if(window._stlActive||tempGeom.length||tempIntersections.length){
      window._stlActive=false;
      tempGeom=[];tempIntersections=[];plotPoints();
      return;
    }
    if(selectedConn!==null||selectedPoint!==null||_selPolyline>=0){
      selectedConn=null; selectedPoint=null; _selPolyline=-1; plotPoints();
    }
  });
})();

function _clearIntersectMode(){
  intersectMode=false; intersectFirst=null;
  selectedConn=null;
  tempGeom=[]; tempIntersections=[];
  const bn=document.getElementById("intersectBanner");
  bn.classList.remove("visible");
  bn.textContent="⊕ TAP SECOND LINE OR ARC — or tap empty space to cancel";
  plotPoints();
}

function _tapIntersect(c1, c2){
  // Determine types and dispatch to correct solver
  const t1 = c1.type==="arc"?"arc":"line";
  const t2 = c2.type==="arc"?"arc":"line";

  if(t1==="line"&&t2==="line")  _tapIntLL(c1,c2);
  else if(t1==="arc"&&t2==="arc")   _tapIntAA(c1,c2);
  else {
    // line-arc or arc-line
    const line = t1==="line"?c1:c2;
    const arc  = t1==="arc" ?c1:c2;
    _tapIntLA(line, arc);
  }
}

// Line-Line intersection (4-point formula)
function _tapIntLL(c1,c2){
  const pa=points.find(p=>p.Point==c1.from), pb=points.find(p=>p.Point==c1.to);
  const pc=points.find(p=>p.Point==c2.from), pd=points.find(p=>p.Point==c2.to);
  if(!pa||!pb||!pc||!pd){alert("Could not resolve line endpoints.");return;}
  const x1=pa.Easting,y1=pa.Northing,x2=pb.Easting,y2=pb.Northing;
  const x3=pc.Easting,y3=pc.Northing,x4=pd.Easting,y4=pd.Northing;
  const den=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if(Math.abs(den)<1e-12){alert("Lines are parallel — no intersection.");return;}
  const xi=((x1*y2-y1*x2)*(x3-x4)-(x1-x2)*(x3*y4-y3*x4))/den;
  const yi=((x1*y2-y1*x2)*(y3-y4)-(y1-y2)*(x3*y4-y3*x4))/den;
  _showTapIntResult([{E:xi,N:yi}],"Line × Line");
}

// Arc-Arc intersection (circle-circle)
function _tapIntAA(c1,c2){
  // Show both circles as temp geometry
  tempGeom=[
    {type:"circle",E:c1.centerE,N:c1.centerN,R:c1.R,color:"rgba(74,158,255,.5)"},
    {type:"circle",E:c2.centerE,N:c2.centerN,R:c2.R,color:"rgba(62,207,116,.5)"},
  ]; plotPoints();
  const dx=c2.centerE-c1.centerE, dy=c2.centerN-c1.centerN;
  const d=Math.hypot(dx,dy);
  if(d>c1.R+c2.R||d<Math.abs(c1.R-c2.R)){tempGeom=[];plotPoints();alert("Arcs do not intersect.");return;}
  const a=(c1.R*c1.R-c2.R*c2.R+d*d)/(2*d);
  const h=Math.sqrt(Math.max(0,c1.R*c1.R-a*a));
  const em=c1.centerE+a*dx/d, nm=c1.centerN+a*dy/d;
  const rx=-dy*(h/d), ry=dx*(h/d);
  if(h<1e-6){
    _showTapIntResult([{E:em,N:nm}],"Arc × Arc (tangent)");
  } else {
    _showTapIntResult([{E:em+rx,N:nm+ry},{E:em-rx,N:nm-ry}],"Arc × Arc");
  }
}

// Line-Arc intersection
function _tapIntLA(line, arc){
  // Show circle as temp geometry
  tempGeom=[{type:"circle",E:arc.centerE,N:arc.centerN,R:arc.R,color:"rgba(62,207,116,.45)"}];
  plotPoints();
  const pa=points.find(p=>p.Point==line.from), pb=points.find(p=>p.Point==line.to);
  if(!pa||!pb){tempGeom=[];plotPoints();alert("Could not resolve line endpoints.");return;}
  const dx=pb.Easting-pa.Easting, dy=pb.Northing-pa.Northing;
  const fx=pa.Easting-arc.centerE, fy=pa.Northing-arc.centerN;
  const a=dx*dx+dy*dy;
  const b=2*(fx*dx+fy*dy);
  const c=fx*fx+fy*fy-arc.R*arc.R;
  const disc=b*b-4*a*c;
  if(disc<0){tempGeom=[];plotPoints();alert("Line and arc do not intersect.");return;}
  const sqD=Math.sqrt(disc);
  const sols=[];
  [(-b-sqD)/(2*a),(-b+sqD)/(2*a)].forEach(t=>{
    sols.push({E:pa.Easting+t*dx, N:pa.Northing+t*dy, onSeg:(t>=0&&t<=1)});
  });
  if(disc<1e-10){
    _showTapIntResult([sols[0]],"Line × Arc (tangent)");
  } else {
    _showTapIntResult(sols,"Line × Arc");
  }
}

function _showTapIntResult(sols, title){
  if(sols.length===1){
    tempIntersections=[{Easting:sols[0].E,Northing:sols[0].N}]; plotPoints();
    zoomToPoints([{E:sols[0].E,N:sols[0].N}]);
    showResult(`⊕ ${title}`,[
      {lbl:"N:",val:sols[0].N.toFixed(4)},
      {lbl:"E:",val:sols[0].E.toFixed(4)},
      ...(sols[0].onSeg===false?[{lbl:"Note:",val:"On extended line"}]:[]),
    ],[
      {txt:"Save as Point",cls:"ok",fn:()=>{
        tempGeom=[];tempIntersections=[];plotPoints();
        _saveCogoPoint({Northing:sols[0].N,Easting:sols[0].E,Elevation:0},null,null,"INT");
      }},
      {txt:"Cancel",cls:"",fn:()=>{tempGeom=[];tempIntersections=[];plotPoints()}},
    ]);
  } else {
    tempIntersections=sols.map(s=>({Easting:s.E,Northing:s.N})); plotPoints();
    zoomToPoints(sols.map(s=>({E:s.E,N:s.N})));
    openModal((modal,close)=>{
      modal.innerHTML=`<h2>⊕ ${title}</h2><p class="info">Two solutions found — choose one:</p>`;
      sols.forEach((sol,i)=>{
        const b=document.createElement("button"); b.className="btn ok";
        b.textContent=`Sol ${i+1}: N=${sol.N.toFixed(3)} E=${sol.E.toFixed(3)}`+
          (sol.onSeg===false?" (extended)":"");
        b.onclick=()=>{
          close(); tempGeom=[]; tempIntersections=[]; plotPoints();
          _saveCogoPoint({Northing:sol.N,Easting:sol.E,Elevation:0},null,null,"INT");
        };
        modal.appendChild(b);
      });
      const can=document.createElement("button");can.className="btn";can.textContent="Cancel";
      can.onclick=()=>{close();tempGeom=[];tempIntersections=[];plotPoints()};
      modal.appendChild(can);
    });
  }
}

function _pointContextMenu(p){
